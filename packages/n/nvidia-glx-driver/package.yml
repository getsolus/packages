# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# If you are updating this package please update nvidia-beta-driver as well if that package is on a lesser version than this one.
# nvidia-beta-driver should always be ahead of nvidia-glx-driver version-wise or at the same version, never behind.
name       : nvidia-glx-driver
version    : 610.43.03
release    : 614
source     :
    - https://us.download.nvidia.com/XFree86/Linux-x86_64/610.43.03/NVIDIA-Linux-x86_64-610.43.03.run#NVIDIA.run : 45e2d4c134a23c35e50f253a4aa63e7e5e8d17e3d185d4a07c8a58e9612ed392
    - https://download.nvidia.com/XFree86/nvidia-persistenced/nvidia-persistenced-610.43.03.tar.bz2#nvidia-persistenced.tar.bz2 : a60534b9adcb26f833f22ff21bdf99905475ca7d8298f43c8929ac3aceaae61f
extract    : false
homepage   : https://nvidia.com
license    :
    - EULA
component  :
    - kernel.drivers
    - 32bit : kernel.drivers
    - firmware : kernel.drivers
summary    :
    - The proprietary NVIDIA graphics driver
    - 32bit : 32-bit libraries for NVIDIA graphics driver
    - firmware : Firmware for Nvidia GPUs
description:
    - This package provides the NVIDIA graphics driver for desktop systems.
    - 32bit : 32-bit libraries for NVIDIA graphics driver.
    - firmware : Firmware for Nvidia GPUs.
strip      : false
debug      : false
builddeps  :
    - pkgconfig32(libglvnd)
    - pkgconfig32(vulkan)
    - pkgconfig(gtk+-3.0) # Needed for ABI report
    - pkgconfig(libelf)
    - pkgconfig(xorg-server)
    - linux-current
    - linux-current-headers
    - linux-lts
    - linux-lts-headers
rundeps    :
    - 32bit :
        - egl-gbm-32bit
        - egl-wayland-32bit
        - egl-x11-32bit
        - libglvnd-32bit
    - egl-gbm
    - egl-wayland
    - egl-x11
    - eglexternalplatform
    - nvidia-open # Backwards compatibility, I think?
setup      : |
    tar xf ${sources}/nvidia-persistenced.tar.bz2
install    : |
    sh ${sources}/NVIDIA.run --extract-only --target extracted

    install -Dm 00644 extracted/firmware/*.bin -t ${installdir}/usr/lib64/firmware/nvidia/${version}

    sh ${sources}/NVIDIA.run \
        --skip-module-load \
        --no-questions \
        --x-prefix=${installdir}/%PREFIX% \
        --opengl-prefix=${installdir}/%PREFIX% \
        --utility-prefix=${installdir}/%PREFIX% \
        --wine-prefix=${installdir}/%PREFIX% \
        --log-file-name=${workdir}/nvidia-installer.log \
        --ui=none \
        --no-check-for-alternate-installs \
        --no-disable-nouveau \
        --no-distro-scripts \
        --no-install-libglvnd \
        --no-libglx-indirect \
        --no-kernel-modules \
        --no-nouveau-check \
        --no-rebuild-initramfs \
        --no-sigwinch-workaround \
        --no-x-check \
        --skip-depmod \
        --glvnd-egl-config-path=${installdir}/usr/share/glvnd/egl_vendor.d \
        --egl-external-platform-config-path=${installdir}/usr/share/egl/egl_external_platform.d \
        --systemd \
        --systemd-unit-prefix=${installdir}/usr/lib64/systemd/system \
        --systemd-sleep-prefix=${installdir}/usr/lib64/systemd/system-sleep \
        --compat32-libdir=/usr/lib32 \
        --compat32-prefix=${installdir}
    cat ${workdir}/nvidia-installer.log
    rm ${installdir}/usr/bin/{nvidia-installer,nvidia-uninstall}

    # Compress firmware
    pushd ${installdir}/usr/lib64/firmware/nvidia/${version}/
    find . -name '*.bin' -print -exec zstd -19 {} \; -exec rm -v {} \;
    popd

    # Create firmware initrd
    mkdir -p initrd
    install -Dm 00644 extracted/firmware/*.bin -t initrd/usr/lib64/firmware/nvidia/${version}
    pushd initrd
    find . | cpio -o -H newc | zstd -19 -T0 -c > ../firmware.initrd
    popd
    install -Dm 00644 firmware.initrd ${installdir}/usr/lib64/kernel/initrd.d/55-nvidia-firmware.initrd

    # fix gbm
    rm -v ${installdir}/usr/lib64/gbm/nvidia-drm_gbm.so
    ln -s ../libnvidia-allocator.so.1 ${installdir}/usr/lib64/gbm/nvidia-drm_gdb.so
    rm -v ${installdir}/usr/lib32/gbm/nvidia-drm_gbm.so
    ln -s ../libnvidia-allocator.so.1 ${installdir}/usr/lib32/gbm/nvidia-drm_gdb.so

    # Used for ray-tracing (Nvidia OptiX framework)
    install -Dm 00644 extracted/nvoptix.bin -t ${installdir}/usr/share/nvidia

    # unused
    rm -v ${installdir}/usr/lib64/libnvidia-gtk2.so*
    rm -v ${installdir}/usr/lib64/libnvidia-pkcs11.so*
    install -Dm 00644 extracted/nvidia_icd.json ${installdir}/usr/share/vulkan/icd.d/nvidia_icd.json
    install -Dm 00644 extracted/nvidia_icd_vksc.json ${installdir}/usr/share/vulkansc/icd.d/nvidia_icd.json
    install -Dm 00644 extracted/nvidia_layers.json ${installdir}/usr/share/vulkan/implicit_layer.d/nvidia_layers.json

    # dbus config
    install -Dm 00644 extracted/nvidia-dbus.conf ${installdir}/usr/share/dbus-1/system.d/nvidia-dbus.conf

    # udev rules
    install -Dm 00644 ${pkgfiles}/80-nvidia-pm.rules ${installdir}/usr/lib64/udev/rules.d/80-nvidia.rules
    install -Dm 00644 extracted/nvidia-drm-outputclass.conf ${installdir}/usr/share/X11/xorg.conf.d/20-nvidia.conf

    # Needs setuid
    install -Dm 04755 extracted/nvidia-modprobe ${installdir}/usr/bin/nvidia-modprobe

    # sort out persistenced
    install -Dm 00755 extracted/nvidia-persistenced ${installdir}/usr/bin/nvidia-persistenced
    mkdir _nvp && tar xf ${sources}/nvidia-persistenced.tar.bz2 -C _nvp --strip-components=1
    pushd _nvp
    %patch -p1 -i ${pkgfiles}/0001-init-Set-the-systemd-user.patch
    install -Dm 00644 init/systemd/nvidia-persistenced.service.template ${installdir}/usr/lib64/systemd/system/nvidia-persistenced.service
    install -Dm 00644 ${pkgfiles}/nvidia-glx-driver.sysusers ${installdir}/usr/lib64/sysusers.d/nvidia-glx-driver.conf
    install -Dm 00644 ${pkgfiles}/nvidia-glx-driver.tmpfiles ${installdir}/usr/lib64/tmpfiles.d/nvidia-glx-driver.conf
    popd

    # Provided by egl-wayland
    rm -v ${installdir}/usr/lib*/libnvidia-egl-wayland.so* \
          ${installdir}/usr/share/egl/egl_external_platform.d/10_nvidia_wayland.json

    # Provided by egl-wayland2
    rm -v ${installdir}/usr/lib*/libnvidia-egl-wayland2.so* \
          ${installdir}/usr/share/egl/egl_external_platform.d/09_nvidia_wayland2.json

    # Provided by egl-gbm
    rm -v ${installdir}/usr/lib*/libnvidia-egl-gbm.so* \
          ${installdir}/usr/share/egl/egl_external_platform.d/15_nvidia_gbm.json

    # Provided by egl-x11
    rm -v ${installdir}/usr/lib*/libnvidia-egl-xcb.so* \
          ${installdir}/usr/lib*/libnvidia-egl-xlib.so* \
          ${installdir}/usr/share/egl/egl_external_platform.d/20_nvidia_xcb.json \
          ${installdir}/usr/share/egl/egl_external_platform.d/20_nvidia_xlib.json

    # Should be empty now
    rmdir -v ${installdir}/usr/share/egl/egl_external_platform.d \
             ${installdir}/usr/share/egl/

    # Provided by ocl-icd
    rm -v ${installdir}/usr/lib{64,32}/libOpenCL*

    # Make sure opencl works
    install -Dm 00644 extracted/nvidia.icd -t ${installdir}/usr/share/OpenCL/vendors

    # We don't support GLESv1 on Aeryn
    rm -v ${installdir}/usr/lib{64,32}/libGLESv1_CM_nvidia*

    # Only useful for x11 sessions
    rm -v ${installdir}/usr/bin/nvidia-xconfig

    # I don't know if nvidia-settings is useful or not but might as well fix the path
    sed -i "s|/mason/install||g" ${installdir}/usr/share/applications/nvidia-settings.desktop

    # Man pages
    install -Dm 00644 extracted/*.1.gz -t ${installdir}/usr/share/man/man1/

    # Remove man pages for binaries we don't ship
    rm -v ${installdir}/usr/share/man/man1/nvidia-installer* \
          ${installdir}/usr/share/man/man1/nvidia-xconfig*

    # Lists NVIDIA driver files for container runtimes like nvidia-container-toolkit
    install -Dm 00644 extracted/sandboxutils-filelist.json -t ${installdir}/usr/share/nvidia/files.d/

    # For neural network (DLSS etc)
    install -Dm 00644 extracted/dlsnetparams.csv -t ${installdir}/usr/share/nvidia/nvidia-powerd/

    # Finally, documentation files for nvidia-settings
    install -Dm 00644 extracted/nvidia-application-profiles-${version}-key-documentation ${installdir}/usr/share/nvidia/nvidia-application-profiles-${version}-key-documentation

    install -Dm 00644 extracted/nvidia-application-profiles-${version}-rc ${installdir}/usr/share/nvidia/nvidia-application-profiles-${version}-rc
    # Taken from https://raw.githubusercontent.com/Frogging-Family/nvidia-all/refs/heads/master/system/limit-vram-usage, check that file for updates
    # TODO: This might not actually work according to profiles.html, open an upstream issue to enable that
    install -Dm 00644 ${pkgfiles}/limit-vram-usage -t ${installdir}/usr/share/nvidia/nvidia-application-profiles-${version}-rc.d
# TODO: Make sure this is sane
conflicts  :
    - nvidia-470-glx-driver
    - nvidia-beta-driver
    - nvidia-developer-driver
    - 32bit :
        - nvidia-470-glx-driver-32bit
        - nvidia-beta-driver-32bit
        - nvidia-developer-driver-32bit
    - firmware :
        - nvidia-beta-driver-firmware
        - nvidia-developer-driver-firmware
patterns   :
    - 32bit :
        - /usr/lib32
        - /usr/share/metainfo/nvidia-32bit.metainfo.xml
    - firmware :
        - /usr/lib64/firmware/nvidia
        - /usr/lib64/kernel/initrd.d/55-nvidia-firmware.initrd
    - main :
        # Prevent emission of -devel subpackage
        - /usr/lib64/lib*.so*
# TODO: Does this still need to be here?
permanent  :
    - /lib64/modules
    - /usr/lib64/kernel
    - /usr/lib64/modules
# TODO: Replaces
