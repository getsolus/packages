# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : net-snmp
version    : 5.9.5.2
release    : 19
source     :
    - https://github.com/net-snmp/net-snmp/archive/refs/tags/v5.9.5.2.tar.gz : dc67748f382f7c0d2c17b62aabb1445724d80bb20a09081b7f010c9c86b84d45
homepage   : https://www.net-snmp.org/
license    : BSD-3-Clause
summary    : Simple Network Management Protocol
component  : network.util
description: |
    Simple Network Management Protocol (SNMP) is a widely used protocol for monitoring the health and welfare of network equipment (eg. routers), computer equipment and even devices like UPSs. Net-SNMP is a suite of applications used to implement SNMP v1, SNMP v2c and SNMP v3 using both IPv4 and IPv6.
environment: |
    export CFLAGS="$CFLAGS -Wno-missing-profile"
setup      : |
    %reconfigure --with-defaults --disable-static
build      : |
    %make
install    : |
    make install DESTDIR="${installdir}" INSTALL_PREFIX="${installdir}" INSTALLDIRS=vendor
    privlib="%perl_privlib%"
    rm -rf "$installdir/$privlib"

    %install_license COPYING
