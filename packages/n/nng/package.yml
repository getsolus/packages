# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : nng
version    : '1.11'
release    : 2
source     :
    - https://github.com/nanomsg/nng/archive/refs/tags/v1.11.tar.gz : 12aaff6f8f183ba0fec378af8620c47cf4be6da975d016ec6cdec2fbac0d3534
homepage   : https://nng.nanomsg.org/
license    : MIT
component  : system.utils
summary    : nanomsg-next-generation -- light-weight brokerless messaging
description: |
    nanomsg-next-generation -- light-weight brokerless messaging
builddeps  :
    - pkgconfig(mbedtls)
setup      : |
    %cmake_ninja \
        -DBUILD_SHARED_LIBS=ON \
        -DNNG_ENABLE_TLS=ON \
        -DNNG_ENABLE_NNGCAT=ON \
        -DNNG_TESTS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.txt
test       : |
    %ninja_check
