# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ncdu
version    : 2.11.0
release    : 28
source     :
    - https://github.com/BratishkaErik/ncdu/archive/refs/tags/v2.11.0.tar.gz : 159341f338a6a8c4fdf6f39058356051beaac7788c9463e538f1a1ef0ba18d9a
homepage   : https://github.com/BratishkaErik/ncdu
license    : MIT
component  : system.utils
summary    : Disk usage analyzer with ncurses interface
description: |
    ncdu is a disk usage analyzer with an ncurses interface, aimed to be run on a remote server over SSH. It is therefore designed to be fast, simple, and easy to use.
networking : true
environment: |
    export ZIG_FLAGS="-Dcpu=baseline --release=fast -fsys=zstd -fsys=ncurses"
builddeps  :
    - pkgconfig(libzstd)
    - pkgconfig(ncursesw)
    - zig
build      : |
    %make
install    : |
    install -D -m 00755 zig-out/bin/ncdu $installdir/usr/bin/ncdu
    install -D -m 00644 ncdu.1 $installdir/usr/share/man/man1/ncdu.1
    %install_license LICENSES/*
