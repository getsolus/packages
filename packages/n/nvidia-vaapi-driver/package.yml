# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : nvidia-vaapi-driver
version    : 0.0.17
release    : 22
homepage   : https://github.com/elFarto/nvidia-vaapi-driver
source     :
    - https://github.com/elFarto/nvidia-vaapi-driver/archive/refs/tags/v0.0.17.tar.gz : 4e4bed9acef9881de8705c8e0286901f13f6b43c2df1b0c8b6a2f8ba2a186ac9
license    : MIT
component  : xorg.display
summary    : A VA-API implemention using NVIDIA's NVDEC as the backend (UNSUPPORTED)
description: |
    This is an VA-API implementation that uses NVDEC as a backend. Mostly useful for firefox. (UNSUPPORTED)
builddeps  :
    - pkgconfig(dri)
    - pkgconfig(ffnvcodec)
    - pkgconfig(gstreamer-codecparsers-1.0)
    - pkgconfig(libva)
    - nvidia-glx-driver-common
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
conflicts  :
    - libva-vdpau-driver
