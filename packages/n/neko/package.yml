# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : neko
version    : 2.4.1
release    : 19
source     :
    - https://github.com/HaxeFoundation/neko/archive/refs/tags/v2-4-1.tar.gz : 702282028190dffa2078b00cca515b8e2ba889186a221df2226d2b6deb3ffaca
homepage   : https://nekovm.org/
license    :
    - Apache-2.0
    - BSD-2-Clause
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
    - Zlib
component  : programming
summary    : Neko is a high-level dynamically typed programming language
description: |
    Neko is a high-level dynamically typed programming language. It can be used as an embedded scripting language. It has been designed to provide a common runtime for several different languages.
builddeps  :
    - pkgconfig(apr-util-1)
    - pkgconfig(bdw-gc)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libpcre)
    - pkgconfig(mariadb)
    - pkgconfig(mbedtls)
    - pkgconfig(sqlite3)
    - git
    - httpd-devel
setup      : |
    %patch -p1 -i $pkgfiles/neko-discard-xlocale.patch
    %cmake_ninja -DRUN_LDCONFIG=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
