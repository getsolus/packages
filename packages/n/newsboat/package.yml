# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : newsboat
version    : '2.44'
release    : 11
source     :
    - https://github.com/newsboat/newsboat/archive/refs/tags/r2.44.tar.gz : aa3d144f737a39567100e82effd1dfd9a0dbcc705332ec66d0c35a750a9a3b10
homepage   : https://newsboat.org/
license    : MIT
component  : network.news
summary    : RSS/Atom feed reader for the text console
description: |
    Newsboat is an RSS/Atom feed reader for the text console. It's an actively maintained fork of Newsbeuter.
networking : true
builddeps  :
    - pkgconfig(json-c)
    - pkgconfig(libcurl)
    - pkgconfig(libxml-2.0)
    - pkgconfig(sqlite3)
    - pkgconfig(stfl)
    - asciidoctor
    - gawk
    - gettext
    - rust
setup      : |
    ./config.sh
build      : |
    %make prefix=/usr
install    : |
    %make_install prefix=/usr
    %install_license LICENSE
