# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : nuitka
version    : 4.1.3
release    : 11
source     :
    - https://pypi.debian.net/Nuitka/nuitka-4.1.3.tar.gz : 838ff8899dc2f0b652d4fcf6c5d7466cb7ad5abcb005668ac622d1e40f4d8a8d
homepage   : https://nuitka.net
license    : Apache-2.0
component  : programming.python
summary    : Nuitka is the optimizing Python compiler
description: |
    Nuitka is the optimizing Python compiler written in Python that creates executables that run without an need for a separate installer. Data files can both be included or put alongside.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - patchelf
    - python-imageio
    - python-jsonschema
    - python-ordered-set
    - python-zstandard
    - python3-devel
setup      : |
    %patch -p1 -i $pkgfiles/0001-Allow-patchelf-0.18.0-on-Solus.patch
build      : |
    %python3_setup
install    : |
    %python3_install
