# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : nanobind
version    : 2.13.0
release    : 3
source     :
    - https://pypi.debian.net/nanobind/nanobind-2.13.0.tar.gz : c7b04d6a6a4cd57985571e605539399b51331ae455d7fce576a5e2fcb89b1dcf
homepage   : https://github.com/wjakob/nanobind
license    : BSD-3-Clause
component  : programming.python
summary    : Tiny and efficient C++/Python bindings.
description: |
    Nanobind is a small binding library that exposes C++ types in Python and vice versa. It is reminiscent of Boost.Python and pybind11 and uses near-identical syntax. In contrast to these existing tools, nanobind is more efficient: bindings compile in a shorter amount of time, produce smaller binaries, and have better runtime performance.
builddeps  :
    - pkgconfig(eigen3)
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-scikit-build-core
    - python-setuptools
    - robin-map
build      : |
    SKBUILD_CMAKE_ARGS="-DNB_USE_SUBMODULE_DEPS=OFF"
    %python3_setup
install    : |
    %python3_install

    python_version=$(python -c "import sys; print(sys.version[:4])")
    install -dm 00755 ${installdir}/usr/include ${installdir}/%libdir%/cmake
    ln -rsv ${installdir}/%libdir%/python${python_version}/site-packages/nanobind/include/nanobind \
        ${installdir}/usr/include/nanobind
    ln -rsv ${installdir}/%libdir%/python${python_version}/site-packages/nanobind/cmake \
        ${installdir}/%libdir%/cmake/nanobind
patterns   :
    - main :
        - /usr/include
        - /usr/lib64/cmake
