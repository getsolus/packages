# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : netavark
version    : 2.0.0
release    : 4
source     :
    - https://github.com/containers/netavark/archive/refs/tags/v2.0.0.tar.gz : 031aeeacc930382e8635d40a885798eff1da164dfcf9024b698f822e5995d9c8
    - https://github.com/containers/aardvark-dns/archive/refs/tags/v2.0.0.tar.gz#aardvark-dns.tar.gz : d3f5d6b3be3c2d80e8257fb9467e34ff104f299474427979454034dca6dc88cc
homepage   : https://github.com/containers/netavark
license    : Apache-2.0
summary    : A container network stack
component  : network.util
description: |
    Netavark is a rust based network stack for containers. It is being designed to work with Podman but is also applicable for other OCI container management applications.
    Aardvark-dns is an authoritative dns server for A/AAAA container records. It can forward other requests to configured resolvers.
replaces   : cni-plugins
networking : true
builddeps  :
    - pkgconfig(protobuf)
    - go-md2man
    - rust
build      : |
    mkdir aardvark-dns
    tar --strip-components=1 -xf $sources/aardvark-dns.tar.gz -C aardvark-dns

    %make build docs

    cd aardvark-dns
    %make PREFIX=%PREFIX%
install    : |
    %make_install PREFIX=%PREFIX%

    cd aardvark-dns
    %make_install PREFIX=%PREFIX%
    %install_license LICENSE
