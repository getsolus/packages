# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkleo
version    : 26.04.1
release    : 98
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/libkleo-26.04.1.tar.xz : 6346fef90598d21034edaabe3221d6aba5e2fbc358eeb757d84c97357d2ccedc
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : desktop.library
summary    : KDE PIM cryptographic library
description: |
    KDE PIM cryptographic library.
builddeps  :
    - gpgmeqt-qt6-devel
    - kf6-kcodecs-devel
    - kf6-kcolorscheme-devel
    - kf6-kcompletion-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kitemmodels-devel
    - kf6-kwidgetsaddons-devel
    - libboost-devel
rundeps    :
    - devel :
        - gpgmeqt-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
