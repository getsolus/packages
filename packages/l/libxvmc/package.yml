# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxvmc
version    : 1.0.15
release    : 18
source     :
    - https://www.x.org/releases/individual/lib/libXvMC-1.0.15.tar.gz : c48f6051b1df9bd190d2763cd0312d715e4509575926247110d8f840463bdc94
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 Video extension library - MotionCompensation
description: |
    libXvMC provides an X Window System client interface to the XVideo-MotionCompensation extension to the X protocol.
optimize   : speed
emul32     : true
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig32(xv)
    - pkgconfig(xproto)
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
