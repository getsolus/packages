    - https://download.gnome.org/sources/goffice/0.10/goffice-0.10.61.tar.xz : 558597fd9ca59b93ff562750218d1e7ea8ec3c8d0ed6a5cc096aa715ef909a15
homepage   : https://gitlab.gnome.org/GNOME/goffice/
