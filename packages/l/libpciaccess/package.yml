# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libpciaccess
version    : '0.19'
release    : 15
source     :
    - https://xorg.freedesktop.org/archive/individual/lib/libpciaccess-0.19.tar.xz : 3c55aa86c82e54a4e3109786f0463530d53b36b6d1cfd14616454f985dd2aa43
license    : MIT
component  : xorg.library
emul32     : true
optimize   : speed
homepage   : https://www.x.org/
summary    : Generic PCI access library for X
description: |
    Provides functionality for X to access the PCI bus and devices in a platform-independant way
builddeps  :
