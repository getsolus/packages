# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libktorrent
version    : 26.04.1
release    : 67
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/libktorrent-26.04.1.tar.xz : 2ab61b3da9bf784845c7b92da2d6d88e6422a1d87cbd639bbbce549188a20494
homepage   : https://invent.kde.org/network/libktorrent
license    : GPL-2.0-or-later
component  : programming.library
summary    : BitTorrent protocol implementation
description: |
    libkTorrent is a BitTorrent protocol implementation for KDE.
builddeps  :
    - pkgconfig(libgcrypt)
    - kf6-karchive-devel
    - kf6-kcrash-devel
    - kf6-kio-devel
    - libboost-devel
    - qt6-base-private-devel
    - xfsprogs-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
        - kf6-kconfig-devel
        - kf6-kio-devel
        - libboost-devel
        - libgcrypt-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
