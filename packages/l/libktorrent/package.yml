# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libktorrent
version    : 26.04.2
release    : 68
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libktorrent-26.04.2.tar.xz : a6f5bac0083182e7e0d9a5034ff68b538afb6b0ee822d64980593e89ebc18e31
homepage   : https://invent.kde.org/network/libktorrent
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - MIT
component  : programming.library
summary    : BitTorrent protocol implementation
description: |
    libkTorrent is a BitTorrent protocol implementation for KDE.
builddeps  :
    - pkgconfig(libgcrypt)
    - kf6-karchive-devel
    - kf6-kcrash-devel
    - kf6-kio-devel
    - libboost-devel
    - qt6-base-private-devel
    - xfsprogs-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
        - kf6-kconfig-devel
        - kf6-kio-devel
        - libboost-devel
        - libgcrypt-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
