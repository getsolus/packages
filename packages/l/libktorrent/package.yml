# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libktorrent
version    : 25.12.3
release    : 65
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/libktorrent-25.12.3.tar.xz : e462cba899d4d122923aa4d0c6efd395ebc4ef9eb688e6b7a405234da6c8c302
homepage   : https://invent.kde.org/network/libktorrent
license    : GPL-2.0-or-later
component  : programming.library
summary    : BitTorrent protocol implementation
description: |
    libkTorrent is a BitTorrent protocol implementation for KDE.
builddeps  :
    - pkgconfig(libgcrypt)
    - kf6-karchive-devel
    - kf6-kcrash-devel
    - kf6-kio-devel
    - libboost-devel
    - qt6-base-private-devel
    - xfsprogs-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
        - kf6-kconfig-devel
        - kf6-kio-devel
        - libboost-devel
        - libgcrypt-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
