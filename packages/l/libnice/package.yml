# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libnice
version    : 0.1.23
release    : 9
source     :
    - https://gitlab.freedesktop.org/libnice/libnice/-/archive/0.1.23/libnice-0.1.23.tar.gz : cd69da89d70b529e2eac955de006503a318123d36196482b14005a83e7cb2c21
license    :
    - MPL-1.1
    - LGPL-2.1-or-later
component  : programming.library
homepage   : https://nice.freedesktop.org
summary    : The GLib ICE implementation
description: |
    Libnice is an implementation of the IETF's Interactive Connectivity Establishment (ICE) standard (RFC 5245) and the Session Traversal Utilities for NAT (STUN) standard (RFC 5389).
builddeps  :
    - pkgconfig(gnutls)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gupnp-igd-1.6)
setup      : |
    # GUPnP-IGD 1.6
    sed -i 's/gupnp-igd-1\.0/gupnp-igd-1.6/' meson.build

    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING COPYING.*
