# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgsf
version    : 1.14.58
release    : 17
source     :
    - https://download.gnome.org/sources/libgsf/1.14/libgsf-1.14.58.tar.xz : 06e07ea12b7a52b9e316faddfecb640b1717a4875c59f0efb3b0cec1e2ccf35a
homepage   : https://gitlab.gnome.org/GNOME/libgsf
license    : LGPL-2.1-only
component  : desktop.library
summary    : Library providing I/O for structured file formats
description: |
    libgsf contains the library used for providing an extensible input/output abstraction layer for structured file formats within GNOME.
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(gdk-pixbuf-2.0)
    - intltool
setup      : |
    %configure --disable-static
build      : |
    %make
install    : |
    %make_install
