# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libmtp
version    : 1.1.23
release    : 14
source     :
    - https://sourceforge.net/projects/libmtp/files/libmtp/1.1.23/libmtp-1.1.23.tar.gz : 74a2b6e8cb4a0304e95b995496ea3ac644c29371649b892b856e22f12a0bdeed
homepage   : https://libmtp.sourceforge.net/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Library implementation of the Media Transfer Protocol
description: |
    This package provides a software library for communicating with MTP
    (Media Transfer Protocol) media players, typically audio players, video
    players, smartphones, etc.
builddeps  :
    - pkgconfig(libgcrypt)
    - pkgconfig(libusb-1.0)
setup      : |
    %configure --disable-static \
               --with-udev=%libdir%/udev
build      : |
    %make
install    : |
    %make_install
check      : |
    %make check
