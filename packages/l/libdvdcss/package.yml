# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libdvdcss
version    : 1.5.0
release    : 9
source     :
    - https://code.videolan.org/videolan/libdvdcss/-/archive/1.5.0/libdvdcss-1.5.0.tar.gz : 7c0eb732653eced7d74cb9ad1b9b9b1c6206b0cea73ca596c77372df3e1d9d9f
homepage   : https://www.videolan.org/developers/libdvdcss.html
license    : GPL-2.0-or-later
component  : multimedia.library
summary    : DVD decryption library
description: |
    libdvdcss is a simple library designed for accessing DVDs as a block device without having to bother about the decryption.
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
    rm -fr $installdir/usr/share
    rm $installdir/usr/lib64/libdvdcss.a
