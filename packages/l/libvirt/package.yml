# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libvirt
version    : 12.1.0
release    : 82
source     :
    - https://libvirt.org/sources/libvirt-12.1.0.tar.xz : 3b60040a3670ec014d058ed021ae641e9fa6d3b5c4b56e63e8928f1804ef4b9b
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
homepage   : https://libvirt.org/
component  : virt
summary    : Library providing a simple virtualization API
description: |
    A toolkit to interact with the virtualization capabilities of recent versions of Linux
builddeps  :
    - pkgconfig(devmapper)
    - pkgconfig(fuse3)
    - pkgconfig(gnutls)
    - pkgconfig(json-c)
    - pkgconfig(libacl)
    - pkgconfig(libattr)
    - pkgconfig(libbsd)
    - pkgconfig(libcap-ng)
    - pkgconfig(libiptc)
    - pkgconfig(libnl-3.0)
    - pkgconfig(libparted)
    - pkgconfig(libpcap)
    - pkgconfig(libssh2)
    - pkgconfig(libtirpc)
    - pkgconfig(libxml-2.0)
    - pkgconfig(pciaccess)
    - dmidecode
    - dnsmasq
    - iptables
    - parted
    - python-docutils
    - rpcsvc-proto-devel
rundeps    :
    - dmidecode
    - dnsmasq
    - iptables
    - parted
setup      : |
    # To make libvirt work with UFW (which uses iptables userspace tools), we have to ensure
    # that iptables take precedence over nftables (which is what firewalld uses).
    # See also: https://gitlab.com/libvirt/libvirt/-/issues/644
    %meson_configure \
        -Dchrdev_lock_files='/run/lock' \
        -Ddriver_interface=enabled \
        -Ddriver_libvirtd=enabled \
        -Ddriver_network=enabled \
        -Ddriver_qemu=enabled \
        -Dfirewalld=enabled \
        -Dfirewall_backend_priority=iptables,nftables \
        -Dinit_script='systemd' \
        -Drunstatedir='/run' \
        -Dselinux=disabled \
        -Dstorage_zfs=disabled
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING COPYING.LESSER

    # Install sysusers and tmpfiles, overriding the files that libvirt ships
    install -Dm00644 $pkgfiles/libvirt.sysusers $installdir/usr/lib/sysusers.d/libvirt-qemu.conf
    install -Dm00644 $pkgfiles/libvirt.tmpfiles $installdir/usr/lib/tmpfiles.d/libvirt.conf

    rm -v $installdir/usr/lib/sysusers.d/libvirt{,-login-shell}.conf

    # Custom polkit rules
    rm -fv $installdir/usr/share/polkit-1/rules.d/50-libvirt.rules
    install -Dm00644 $pkgfiles/org.libvirt.rules $installdir/usr/share/polkit-1/rules.d/org.libvirt.rules

    rm -rf $installdir/usr/share/doc

    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/20-libvirt.preset

    # Fix virt-secret-init-encryption.service not starting because of a missing directory
    install -Dm0644 $pkgfiles/virt-secret-init-encryption.service \
        $installdir/usr/lib/systemd/system/virt-secret-init-encryption.service.d/50-create-dir.conf

    # Stateless
    rm -rfv $installdir/run \
            $installdir/var
