# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libcryptui
version    : 3.12.2
release    : 17
source     :
    - https://download.gnome.org/sources/libcryptui/3.12/libcryptui-3.12.2.tar.xz : 71ead1a7b496f07f6c5102ae79945dd2515b7b9342c6edefe58b47318be20866
homepage   : https://gitlab.gnome.org/Archive/libcryptui
license    :
    - GPL-2.0-only
    - GFDL-1.1
component  : system.utils
summary    : Libcryptui - Interface components for OpenPGP
description: |
    libcryptui is a library used for prompting for PGP keys. It's likely that this library will become deprecated in the near future.
builddeps  :
    - pkgconfig(dbus-glib-1)
    - pkgconfig(gcr-3)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gpgme)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(ice)
    - pkgconfig(libassuan)
    - pkgconfig(libnotify)
    - pkgconfig(sm)
    - gettext-devel
    - gnupg
    - gtk-doc
setup      : |
    %patch -p1 -i ${pkgfiles}/libcryptui-3.12.2-gpg24.patch
    %patch -p1 -i ${pkgfiles}/libcryptui-3.12.2-gpgme2fix.patch
    %patch -p1 -i ${pkgfiles}/libcryptui-3.12.2-use-gcr.patch

    %reconfigure --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING*
