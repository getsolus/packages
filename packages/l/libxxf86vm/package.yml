# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxxf86vm
version    : 1.1.7
release    : 18
source     :
    - https://www.x.org/releases/individual/lib/libXxf86vm-1.1.7.tar.gz : 9a983e3cbb7a57905262291a17da962293c0645f99efd475e3c85264bfddc337
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 XFree86 video mode extension library
description: |
    libXxf86vm provides an interface to the XFree86-VidModeExtension extension, which allows client applications to get and set video mode timings in extensive detail.  It is used by the xvidtune program in particular.
optimize   : speed
emul32     : true
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig(xproto)
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
