# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libnvme
version    : 1.16.2
release    : 20
source     :
    - https://github.com/linux-nvme/libnvme/archive/refs/tags/v1.16.2.tar.gz : 1d850d5a871559abf641d6e6b63bb86047e4cb26f3ad144597c2c64b3cff7231
homepage   : https://github.com/linux-nvme/libnvme
license    : LGPL-2.1-or-later
component  : programming.library
summary    : C Library for NVM Express
description: |
    libnvme provides type definitions for NVMe specification structures, enumerations, and bit fields, helper functions to construct, dispatch, and decode commands and payloads, and utilities to connect, scan, and manage nvme devices.
builddeps  :
    - pkgconfig(json-c)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
