# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libevdev
version    : 1.13.6
release    : 20
source     :
    - https://www.freedesktop.org/software/libevdev/libevdev-1.13.6.tar.xz : 73f215eccbd8233f414737ac06bca2687e67c44b97d2d7576091aa9718551110
homepage   : https://www.freedesktop.org/wiki/Software/libevdev/
license    :
    - GPL-2.0-only WITH Linux-syscall-note
    - MIT
component  : xorg.library
summary    : Wrapper library for evdev devices
description: |
    libevdev is a wrapper library for evdev devices. it moves the common tasks when dealing with evdev devices into a library and provides a library interface to the callers, thus avoiding erroneous ioctls, etc.
checkdeps  :
    - pkgconfig(check)
setup      : |
    %meson_configure -Ddocumentation=disabled
build      : |
    %ninja_build
install    : |
    %ninja_install
check      : |
    # Breaks tests
    unset LD_PRELOAD
    %ninja_check
