# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkdegames
version    : 26.04.2
release    : 110
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkdegames-26.04.2.tar.xz : af44d46b28a3449b6f805d0316ddce4674296719de0400f3e3a53a8dc59f1905
homepage   : https://kde.org/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - ISC
    - LGPL-2.0-only
    - LGPL-2.0-or-later
component  : programming
summary    : General purpose games code for KDE
description: |
    It is a collection of functions used by some games or which are useful for other games.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Svg)
    - pkgconfig(openal)
    - pkgconfig(sndfile)
    - kf6-karchive-devel
    - kf6-kcompletion-devel
    - kf6-kdeclarative-devel
    - kf6-kdnssd-devel
    - kf6-kiconthemes-devel
    - kf6-knewstuff-devel
    - kf6-kxmlgui-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcompletion-devel
        - kf6-kconfig-devel
        - kf6-kconfigwidgets-devel
        - qt6-declarative-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
