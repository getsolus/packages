# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkdegames
version    : 26.04.3
release    : 111
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkdegames-26.04.3.tar.xz : fb9a2199c1d7d5ad827584edb063dd96e41aa8a937980d641e1ffa122d1eccc3
homepage   : https://kde.org/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - ISC
    - LGPL-2.0-only
    - LGPL-2.0-or-later
component  : programming
summary    : General purpose games code for KDE
description: |
    It is a collection of functions used by some games or which are useful for other games.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Svg)
    - pkgconfig(openal)
    - pkgconfig(sndfile)
    - kf6-karchive-devel
    - kf6-kcompletion-devel
    - kf6-kdeclarative-devel
    - kf6-kdnssd-devel
    - kf6-kiconthemes-devel
    - kf6-knewstuff-devel
    - kf6-kxmlgui-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcompletion-devel
        - kf6-kconfig-devel
        - kf6-kconfigwidgets-devel
        - qt6-declarative-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
