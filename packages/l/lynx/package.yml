# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lynx
version    : 2.9.3
release    : 13
source     :
    - https://invisible-island.net/archives/lynx/tarballs/lynx2.9.3.tar.gz : 6e99e46980974a6d89eceefbb26ca8c7aa7702b78ecb5bad383b859af225d052
homepage   : https://lynx.invisible-island.net
license    : GPL-2.0-or-later
component  : network.web.browser
summary    : Lynx is the text web browser
description: |
    Lynx is the oldest text web browser still actively developed.
setup      : |
    %configure \
        --enable-default-colors \
        --enable-ipv6 \
        --enable-nls \
        --with-screen=ncursesw \
        --with-ssl=/usr \
        --sysconfdir=/usr/share/defaults/lynx
build      : |
    %make
install    : |
    %make_install
    %install_license COPYHEADER COPYING
