# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libsquish
version    : '1.15'
release    : 1
source     :
    - https://downloads.sourceforge.net/project/libsquish/libsquish-1.15.tgz : 628796eeba608866183a61d080d46967c9dda6723bc0a3ec52324c85d2147269
homepage   : https://sourceforge.net/projects/libsquish/
license    : MIT
component  : programming.library
summary    : Open source DXT compression library
description: |
    The squish library is an open source DXT compression library.
setup      : |
    sed -i "s|CMAKE_MINIMUM_REQUIRED(VERSION 2.8.3)|CMAKE_MINIMUM_REQUIRED(VERSION 3.10)|" CMakeLists.txt
    sed -i "s|DESTINATION lib|DESTINATION %libdir%|g" CMakeLists.txt
    %cmake_ninja \
        -DBUILD_SHARED_LIBS=ON \
        -DBUILD_SQUISH_EXTRA=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE*
