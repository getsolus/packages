# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libvpl-tools
version    : 1.5.0
release    : 5
source     :
    - https://github.com/intel/libvpl-tools/archive/refs/tags/v1.5.0.tar.gz : f93bfef2c0e869750e094bb0c29d5b1652704b09272c6406842688cf634e1584
license    : MIT
component  :
    - programming.tools
homepage   : https://intel.github.io/libvpl
summary    : Tools for libvpl
description: |
    Intel® Video Processing Library (Intel® VPL) tools provide access to hardware accelerated video decode, encode, and processing capabilities on Intel® GPUs from the command line.
builddeps  :
    - pkgconfig(libdrm)
    - pkgconfig(libva)
    - pkgconfig(vpl)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(x11)
setup      : |
    %cmake_ninja \
        -DBUILD_PREVIEW=OFF \
        -DBUILD_TOOLS=ON \
        -DENABLE_DRI3=ON \
        -DENABLE_DRM=ON \
        -DENABLE_VA=ON \
        -DENABLE_WAYLAND=ON \
        -DENABLE_X11=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
   
    # Remove unneeded docs
    rm -rfv $installdir/usr/share/
    # Remove unneeded devel files
    rm -rfv $installdir/usr/etc/

    %install_license LICENSE
