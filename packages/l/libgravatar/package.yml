# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgravatar
version    : 26.04.2
release    : 97
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libgravatar-26.04.2.tar.xz : 84bf34bf05b0823534b9cb40cef8803ae2e654a9c7aa5e823296edc4a002bc6c
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : KDE PIM library providing Gravatar support
description: |
    KDE PIM library providing Gravatar support.
builddeps  :
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
