# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libp11
version    : 0.4.18
release    : 4
source     :
    - https://github.com/OpenSC/libp11/releases/download/libp11-0.4.18/libp11-0.4.18.tar.gz : 9292de67ca73aba1deacf577c9086b595765f36ef47712cfeb49fa31f6e772fb
homepage   : https://github.com/OpenSC/libp11
license    : LGPL-2.1-or-later
component  : programming.devel
summary    : PKCS#11 wrapper library
description: |
    The PKCS#11 API is an abstract API to perform operations on cryptographic objects such as private keys, without requiring access to the objects themselves.
builddeps  :
    - pkgconfig(libssl)
    - pkgconfig(p11-kit-1)
setup      : |
    %configure --enable-static=no
build      : |
    %make
install    : |
    %make_install
check      : |
    %make check
