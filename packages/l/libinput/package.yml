# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libinput
version    : 1.31.3
release    : 56
source     :
    - https://gitlab.freedesktop.org/libinput/libinput/-/archive/1.31.3/libinput-1.31.3.tar.gz : b6749bf6f1890f6631c0a70a027c35fec9d2e096a39f720548896e41474a9854
license    : MIT
component  : desktop.library
homepage   : https://www.freedesktop.org/wiki/Software/libinput/
summary    : Generic input library
description: |
    libinput is a library to handle input devices in Wayland compositors and to provide a generic X.Org input driver. It provides device detection, device handling, input device event processing and abstraction so minimize the amount of custom input code compositors need to provide the common set of functionality that users expect.
builddeps  :
    - pkgconfig(libevdev)
    - pkgconfig(libudev)
    - pkgconfig(libwacom)
    - pkgconfig(mtdev)
    - pyparsing
    - python-pytest
setup      : |
    %meson_configure \
        -Ddebug-gui=false \
        -Ddocumentation=false \
        -Dtests=false \
        -Dudev-dir=%libdir%/udev
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    # Empty
    rm -fr $installdir/etc/
check      : |
    %ninja_check
