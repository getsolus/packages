# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libinput
version    : 1.31.2
release    : 55
source     :
    - https://gitlab.freedesktop.org/libinput/libinput/-/archive/1.31.2/libinput-1.31.2.tar.gz : 507a40b8a74568ed7c2bd05acf2e15ee3d9f4703102dca86d4f6a804e73bf1f6
license    : MIT
component  : desktop.library
homepage   : https://www.freedesktop.org/wiki/Software/libinput/
summary    : Generic input library
description: |
    libinput is a library to handle input devices in Wayland compositors and to provide a generic X.Org input driver. It provides device detection, device handling, input device event processing and abstraction so minimize the amount of custom input code compositors need to provide the common set of functionality that users expect.
builddeps  :
    - pkgconfig(libevdev)
    - pkgconfig(libudev)
    - pkgconfig(libwacom)
    - pkgconfig(mtdev)
    - pyparsing
    - python-pytest
setup      : |
    %meson_configure \
        -Ddebug-gui=false \
        -Ddocumentation=false \
        -Dtests=false \
        -Dudev-dir=%libdir%/udev
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    # Empty
    rm -fr $installdir/etc/
check      : |
    %ninja_check
