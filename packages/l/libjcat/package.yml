# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libjcat
version    : 0.2.6
release    : 10
source     :
    - https://github.com/hughsie/libjcat/archive/refs/tags/0.2.6.tar.gz : 28a1416cc207e51f6ffe2f0c16f7772541eac0cd864d38dbc0c3004888ef1131
homepage   : https://github.com/hughsie/libjcat
license    : LGPL-2.1-or-later
component  : programming.library
summary    : Library for reading and writing Jcat files
description: |
    This library allows reading and writing gzip-compressed JSON catalog files, which can be used to store GPG, PKCS-7 and SHA-256 checksums for each file.
    This provides equivalent functionality to the catalog files supported in Microsoft Windows.
builddeps  :
    - pkgconfig(gnutls)
    - pkgconfig(gpgme)
    - pkgconfig(json-glib-1.0)
    - help2man
    - libgnutls-utils
    - vala
patterns   :
    - devel :
        - /usr/share/installed-tests
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    %ninja_check
