# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkgapi
version    : 26.04.1
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/libkgapi-26.04.1.tar.xz : f6f456f6cd90d7a5f1bc2c7c49a5813119d96263ca3b337e6c6e693bc6040270
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Libkgapi is a KDE-based library for accessing various Google services via their public API
description: |
    Libkgapi is a KDE-based library for accessing various Google services via their public API.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(libsasl2)
    - kf6-kcontacts-devel
    - kf6-kwallet-devel
rundeps    :
    - devel :
        - kf6-kcalendarcore-devel
        - kf6-kcontacts-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
