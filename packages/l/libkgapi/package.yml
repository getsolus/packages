# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkgapi
version    : 26.04.2
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkgapi-26.04.2.tar.xz : ff52aabaa388e9a57be2510ccedb0c514ef5e35c02c0cc256217a1e4d876ebf1
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Libkgapi is a KDE-based library for accessing various Google services via their public API
description: |
    Libkgapi is a KDE-based library for accessing various Google services via their public API.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(libsasl2)
    - kf6-kcontacts-devel
    - kf6-kwallet-devel
rundeps    :
    - devel :
        - kf6-kcalendarcore-devel
        - kf6-kcontacts-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
