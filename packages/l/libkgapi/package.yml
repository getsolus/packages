# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkgapi
version    : 25.12.3
release    : 100
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/libkgapi-25.12.3.tar.xz : 3d8f6dd6e0d4274102cbf7c3dff67d8cef074e25fbf34bb8e505fd38273656b1
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Libkgapi is a KDE-based library for accessing various Google services via their public API
description: |
    Libkgapi is a KDE-based library for accessing various Google services via their public API.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(libsasl2)
    - kf6-kcontacts-devel
    - kf6-kwallet-devel
rundeps    :
    - devel :
        - kf6-kcalendarcore-devel
        - kf6-kcontacts-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
