# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lsd2dsl
version    : 0.6.0
release    : 5
source     :
    - https://github.com/nongeneric/lsd2dsl/archive/refs/tags/v0.6.0.tar.gz : f5176331b9f8d663cfb9e459a94052a9800a445b9e2aaf1dd8bde1a8e0f541ca
homepage   : https://rcebits.com/lsd2dsl/index.html
license    : MIT
component  : programming.tools
summary    : Lingvo dictionaries decompiler
description: |
    ABBYY Lingvo dictionaries decompiler.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Pdf)
    - pkgconfig(Qt6WebEngineCore)
    - pkgconfig(fmt)
    - pkgconfig(gtest)
    - pkgconfig(sndfile)
    - pkgconfig(vorbisfile)
    - libboost-devel
setup      : |
    # Backport upstream/Nix build fixes:
    # https://github.com/nongeneric/lsd2dsl/commit/bbda5be1b76a4a44804483d00c07d79783eceb6b
    # https://github.com/NixOS/nixpkgs/commit/0526068e6cb5caa194b3b268cb5522e2024ea08a
    sed -i "s|COMPONENTS system program_options|COMPONENTS program_options|" CMakeLists.txt
    sed -i "s|Boost::system||" lib/common/CMakeLists.txt lib/duden/CMakeLists.txt lib/lingvo/CMakeLists.txt
    sed -i '/#include "tools.h"/a #include <assert.h>' \
        lib/lingvo/AbbreviationDictionaryDecoder.cpp \
        lib/lingvo/SystemDictionaryDecoder.cpp \
        lib/lingvo/UserDictionaryDecoder.cpp
    sed -i '/#include <stdexcept>/a #include <assert.h>' lib/lingvo/LSDOverlayReader.cpp
    sed -i '/find_library(VORBISFILE/i \    find_library(OGG ogg REQUIRED)\n    find_library(VORBIS vorbis REQUIRED)' lib/lingvo/CMakeLists.txt
    sed -i '/IMPORTED_LOCATION ${VORBISFILE}/a \    target_link_libraries(Vorbis::vorbisfile INTERFACE ${VORBIS} ${OGG})' lib/lingvo/CMakeLists.txt

    export CFLAGS="$CFLAGS -Wno-unused-result" CXXFLAGS="$CXXFLAGS -Wno-unused-result"
    %cmake -DENABLE_DUDEN=0
build      : |
    %make
install    : |
    install -Dm00755 console/lsd2dsl ${installdir}/usr/bin/lsd2dsl
    install -Dm00755 gui/lsd2dsl-qtgui ${installdir}/usr/bin/lsd2dsl-qtgui
    %install_license LICENSE