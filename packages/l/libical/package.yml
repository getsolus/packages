# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libical
version    : 3.0.20
release    : 24
source     :
    - https://github.com/libical/libical/releases/download/v3.0.20/libical-3.0.20.tar.gz : e73de92f5a6ce84c1b00306446b290a2b08cdf0a80988eca0a2c9d5c3510b4c2
homepage   : https://github.com/libical/libical
license    : MPL-2.0
component  : desktop.library
summary    : An implementation of the iCalendar protocols and data formats
description: |
    Libical is an Open Source implementation of the iCalendar protocols and protocol data units. The iCalendar specification describes how calendar clients can communicate with calendar servers so users can store their calendar data and arrange meetings with other users.
builddeps  :
    - pkgconfig(icu-i18n)
    - vala
setup      : |
    %cmake_ninja \
        -DICAL_GLIB_VAPI=yes \
        -DGOBJECT_INTROSPECTION=yes \
        -DENABLE_GTK_DOC=no \
        -DLIB_SUFFIX=64 \
        -DSHARED_ONLY=yes
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING LICENSE LICENSE.*
