# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : layer-shell-qt
version    : 6.7.3
release    : 83
source     :
    - https://download.kde.org/stable/plasma/6.7.3/layer-shell-qt-6.7.3.tar.xz : 51924fa14d05320eacef8defea51895c96117bc89dd709e74536dd8ecdfb4581
homepage   : https://kde.org/plasma-desktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-3.0-only
    - LGPL-3.0-or-later
    - MIT
component  : system.utils
summary    : Qt component to allow applications to make use of the Wayland wl-layer-shell protocol
description: |
    Qt component to allow applications to make use of the Wayland wl-layer-shell protocol
builddeps  :
    - pkgconfig(Qt6WaylandCompositor)
    - pkgconfig(wayland-protocols)
    - pkgconfig(wayland-server)
    - pkgconfig(xkbcommon)
    - extra-cmake-modules
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
