# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkolabxml
version    : 1.3.1
release    : 13
source     :
    - git|https://git.kolab.org/diffusion/LKX/libkolabxml.git : libkolabxml-1.3.1
homepage   : https://git.kolab.org/diffusion/LKX/
license    :
    - Apache-2.0
    - LGPL-3.0
component  : programming.library
summary    : Kolab XML Format Schema Definitions Library
description: |
    Kolab XML Format Schema Definitions Library.
builddeps  :
    - pkgconfig(libcurl)
    - pkgconfig(xerces-c)
    - libboost-devel
    - swig
    - xsd-devel
setup      : |
    %patch -p1 -i ${pkgfiles}/boost-system-header-only.patch
    %patch -p1 -i ${pkgfiles}/xsd-4.2.patch

    %cmake -DBUILD_TESTS=FALSE \
        -DLIB_SUFFIX=%LIBSUFFIX% \
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5 .
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING*
