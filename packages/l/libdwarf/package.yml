# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libdwarf
version    : 2.3.1
release    : 1
source     :
    - https://github.com/davea42/libdwarf-code/releases/download/v2.3.1/libdwarf-2.3.1.tar.xz : 28cf9a5d27aceff5c1f906244a4fe7ae208e41d20a6d8fc7e091c633a40b6e97
homepage   : http://www.prevanders.net/dwarf.html
license    :
    - LGPL-2.1-only
    - BSD-2-Clause-FreeBSD
component  :
    - tools : programming.tools
    - programming.library
summary    :
    - tools : Tools for accessing DWARF debugging information
    - Library to access the DWARF Debugging file format
description:
    - tools : Tools for accessing DWARF debugging information
    - Library to access the DWARF Debugging file format
builddeps  :
    - pkgconfig(libzstd)
    - pkgconfig(zlib)
setup      : |
    %meson_configure \
        -Ddwarfgen=true
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    %ninja_check
patterns   :
    - tools :
        - /usr/bin/
        - /usr/share/dwarfdump/
        - /usr/share/man/
