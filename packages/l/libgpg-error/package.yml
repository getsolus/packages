# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgpg-error
version    : '1.61'
release    : 29
source     :
    - https://gnupg.org/ftp/gcrypt/gpgrt/libgpg-error-1.61.tar.bz2 : 7a85413f2bc354f4f8aa832b718af122e48965e9e0eb9012ee659c13c6385c93
license    : LGPL-2.1-or-later
component  : system.base
devel      : true
emul32     : true
homepage   : https://www.gnupg.org
summary    : library with error codes for GnuPG related software
description: |
    Libgpg-error is a small library with error codes and descriptions shared by most GnuPG related software.
setup      : |
    %apply_patches
    %reconfigure --disable-static \
                 --enable-install-gpg-error-config
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING COPYING.LIB
check      : |
    %make check
patterns   :
    - devel : /usr/share/aclocal
