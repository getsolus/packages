# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgpg-error
version    : '1.60'
release    : 28
source     :
    - https://gnupg.org/ftp/gcrypt/gpgrt/libgpg-error-1.60.tar.bz2 : 11b2a738e212f3eab0fe8637bc341d3181ca964e97bb2654de91aab7dae4ce09
license    : LGPL-2.1-or-later
component  : system.base
devel      : true
emul32     : true
homepage   : https://www.gnupg.org
summary    : library with error codes for GnuPG related software
description: |
    Libgpg-error is a small library with error codes and descriptions shared by most GnuPG related software.
setup      : |
    %apply_patches
    %reconfigure --disable-static \
                 --enable-install-gpg-error-config
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING COPYING.LIB
check      : |
    %make check
patterns   :
    - devel : /usr/share/aclocal
