# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxkbfile
version    : 1.2.0
release    : 19
source     :
    - https://www.x.org/releases/individual/lib/libxkbfile-1.2.0.tar.xz : 7f71884e5faf56fb0e823f3848599cf9b5a9afce51c90982baeb64f635233ebf
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 keyboard file manipulation library
description: |
    libxkbfile provides an interface to read and manipulate description files for XKB, the X11 keyboard configuration extension
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig(xproto)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
