# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libadwaita
version    : 1.9.2
release    : 40
source     :
    - https://download.gnome.org/sources/libadwaita/1.9/libadwaita-1.9.2.tar.xz : 6920f813a76c4856591ca56ee842e94efbbe736e8ca2f445c9e9fc3b4e7076f0
homepage   : https://gnome.pages.gitlab.gnome.org/libadwaita/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Building blocks for modern adaptive GNOME applications.
description: |
    Adwaita offers application developers many widgets and objects to build GNOME applications scaling from desktop workstations to mobile phones.
optimize   :
    - lto
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk4)
    - sassc
    - vala
setup      : |
    %meson_configure -Dexamples=false
build      : |
    %ninja_build
install    : |
    %ninja_install
#check      : |
#    %ninja_check
