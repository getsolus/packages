# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxxf86dga
version    : 1.1.7
release    : 17
source     :
    - https://www.x.org/releases/individual/lib/libXxf86dga-1.1.7.tar.gz : fd76cc930b85394fc12e52a01b3fb33b626731ac0084b3576b1e0095156683f7
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 Direct Graphics Access extension library
description: |
    libXxf86dga provides the XFree86-DGA extension, which allows direct graphics access to a framebuffer-like region, and also allows relative mouse reporting, et al.  It is mainly used by games and emulators for games.
optimize   : speed
emul32     : true
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig(xproto)
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
