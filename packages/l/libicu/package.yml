# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libicu
version    : '78.2'
release    : 30
source     :
    - https://github.com/unicode-org/icu/releases/download/release-78.2/icu4c-78.2-sources.tgz : 3e99687b5c435d4b209630e2d2ebb79906c984685e78635078b672e03c89df35
homepage   : https://icu.unicode.org/home
license    : MIT
component  : system.base
emul32     : true
summary    : International Components for Unicode
description: |
    The International Components for Unicode (ICU) package is a mature, widely used set of C/C++ libraries providing Unicode and Globalization support for software applications. ICU is widely portable and gives applications the same results on all platforms.
patterns   :
    - devel :
        - /usr/share/icu
setup      : |
    cd source
    %configure --disable-static
build      : |
    %make -C source
install    : |
    %make_install -C source
check      : |
    %make check -C source || :
