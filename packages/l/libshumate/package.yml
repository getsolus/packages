# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libshumate
version    : 1.6.2
release    : 22
source     :
    - https://download.gnome.org/sources/libshumate/1.6/libshumate-1.6.2.tar.xz : 22364bb98f8b520334336ab82240196a0963489b86a5b38328e1bea2b64f3a9e
