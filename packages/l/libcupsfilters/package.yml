# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libcupsfilters
version    : 2.1.1
release    : 9
source     :
    - https://github.com/OpenPrinting/libcupsfilters/releases/download/2.1.1/libcupsfilters-2.1.1.tar.gz : ff31778a438bf335ceed254ccc706d5cd0eee55f608fcf567d88699b15f4fa9e
homepage   : https://github.com/OpenPrinting/libcupsfilters
license    : Apache-2.0 WITH LLVM-exception
component  : desktop.core
summary    : OpenPrinting CUPS Filters
description: |
    OpenPrinting CUPS Filters - contains all the code of the filters of the former cups-filters package as library functions
builddeps  :
    - pkgconfig(cups)
    - pkgconfig(lcms2)
    - pkgconfig(libexif)
    - pkgconfig(libqpdf)
    - pkgconfig(libtiff-4)
    - pkgconfig(poppler)
    - ghostscript
checkdeps  :
    - dejavu-fonts-ttf
rundeps    :
    - devel :
        - cups-devel
clang      : true
setup      : |
    %patch -p1 -i ${pkgfiles}/CVE-2025-57812.patch
    %configure \
        --disable-mutool \
        --disable-static \
        --with-test-font-path=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE
check      : |
    %make check || ( cat ./test-suite.log && exit 1 )
