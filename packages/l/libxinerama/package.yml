# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxinerama
version    : 1.1.6
release    : 18
source     :
    - https://www.x.org/releases/individual/lib/libXinerama-1.1.6.tar.gz : c74ee3d05e473671bf86285e2dece345485200bb042bea1540b1e30ff3f74bae
license    : MIT
homepage   : https://www.x.org/
summary    : X Xinerama extension library
component  : xorg.library
description: |
    libXinerama provides an X Window System client interface to the XINERAMA extension to the X protocol.
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig(xproto)
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
