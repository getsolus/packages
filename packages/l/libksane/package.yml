# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libksane
version    : 26.04.1
release    : 86
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/libksane-26.04.1.tar.xz : 8d78335f78f35872afab3b206244235518b754dd2a2fcd528e716ea0df1fee1d
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : desktop.library
summary    : SANE Library interface for KDE
description: |
    libKSane is an image scanning library that provides a QWidget containing all the logic needed to interface with a scanner.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-ki18n-devel
    - kf6-ktextwidgets-devel
    - kf6-kwallet-devel
    - kf6-kwidgetsaddons-devel
    - ksanecore-devel
rundeps    :
    - sane-backends
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
