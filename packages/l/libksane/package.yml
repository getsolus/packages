# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libksane
version    : 25.12.3
release    : 85
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/libksane-25.12.3.tar.xz : ca6e7e776f2f6932b68bb48bf58f0c4c300453ed233b2f5c5a761d3d857a9805
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : desktop.library
summary    : SANE Library interface for KDE
description: |
    libKSane is an image scanning library that provides a QWidget containing all the logic needed to interface with a scanner.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-ki18n-devel
    - kf6-ktextwidgets-devel
    - kf6-kwallet-devel
    - kf6-kwidgetsaddons-devel
    - ksanecore-devel
rundeps    :
    - sane-backends
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
