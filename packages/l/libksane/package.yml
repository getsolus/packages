# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libksane
version    : 26.04.2
release    : 87
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libksane-26.04.2.tar.xz : 9266e5e33384da1cd7dc8a7fe236ff938e9f075bea9a20560884efcb7fb1c63b
homepage   : https://kde.org/
license    :
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : SANE Library interface for KDE
description: |
    libKSane is an image scanning library that provides a QWidget containing all the logic needed to interface with a scanner.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-ki18n-devel
    - kf6-ktextwidgets-devel
    - kf6-kwallet-devel
    - kf6-kwidgetsaddons-devel
    - ksanecore-devel
rundeps    :
    - sane-backends
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
