# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lazarus
version    : '4.6'
release    : 23
source     :
    - https://gitlab.com/freepascal.org/lazarus/lazarus/-/archive/lazarus_4_6/lazarus-lazarus_4_6.tar.gz : e13c74f87329467113f4ebdf7b9e7bf3b7eb4b76c94305372fb3cf99739ea886
homepage   : https://www.lazarus-ide.org
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - MPL-1.1
component  : programming.tools
summary    : Lazarus is a Rapid Application Development Tool for Free Pascal
description: |
    Lazarus is a Rapid Application Development Tool for Free Pascal.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(x11)
    - fpc-src
    - qt6pas-devel
    - rsync
rundeps    :
    - binutils
    - fpc
    - fpc-src
    - gdb
    - make
    - qt5pas-devel # To compile qt5 apps
    - qt6pas-devel # To compile qt6 apps
clang      : true
setup      : |
    %patch -p1 -i ${pkgfiles}/0000-Makefile_patch.diff
    %patch -p1 -i ${pkgfiles}/0001-Support-Wayland-appId.patch

    # Remove non-Linux and distro-specific files.
    rm -rf debian
    find tools/install -mindepth 1 -maxdepth 1 -type d -not -name linux -exec rm -rf {} +
build      : |
    # Build Qt6 IDE
    make FPC=/usr/bin/fpc OPT="-gl -gw -Crtoi" LCL_PLATFORM=qt6 bigide
install    : |
    # Skip the 'make install' mess completely and do everything manually

    install -dm 00755 ${installdir}/usr/bin
    install -dm 00755 ${installdir}/usr/lib64/lazarus
    install -dm 00755 ${installdir}/usr/share/doc
    install -dm 00755 ${installdir}/usr/share/man/man1

    # Common files

    rsync -a \
        --exclude="CVS"     --exclude=".cvsignore" \
        --exclude="*.ppw"   --exclude="*.ppl" \
        --exclude="*.ow"    --exclude="*.a"\
        --exclude="*.rst"   --exclude=".#*" \
        --exclude="*.~*"    --exclude="*.bak" \
        --exclude="*.orig"  --exclude="*.rej" \
        --exclude=".xvpics" \
        --exclude="killme*" --exclude=".gdb_hist*" \
        --exclude="debian"  --exclude="COPYING*" \
        --exclude="*.app"   --exclude="tools/install" \
        . "${installdir}"/usr/lib64/lazarus

    ln -s /usr/lib64/lazarus/lazbuild "${installdir}"/usr/bin/lazbuild
    cp -R install/man/man1/* "${installdir}"/usr/share/man/man1/
    mv "${installdir}"/usr/lib64/lazarus/docs "${installdir}"/usr/share/doc/lazarus
    install -dm 00755 "${installdir}"/usr/lib64/lazarus/docs
    ln -s /usr/share/doc/lazarus/chm "${installdir}"/usr/lib64/lazarus/docs/html
    ln -s /usr/share/doc/lazarus/lazdoc.css "${installdir}"/usr/lib64/lazarus/docs/lazdoc.css

    rm -r "${installdir}"/usr/lib64/lazarus/install

    # Qt6 editor

    # Install Qt6 binaries
    install -Dm 00755 lazarus -t "${installdir}"/usr/bin/
    install -Dm 00755 startlazarus -t "${installdir}"/usr/bin/

    # Fix missing .png icon
    sed -e 's|\(Categories\).*|\1=IDE;Development;|' \
        -e 's|\.png|\.xpm|' -i install/lazarus.desktop

    install -Dm 00644 install/lazarus.desktop -t "${installdir}"/usr/share/applications/
    install -Dm 00644 images/ide_icon48x48.png "${installdir}"/usr/share/icons/hicolor/48x48/apps/lazarus.png

    # Licenses
    %install_license COPYING.*
