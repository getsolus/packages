# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxmu
version    : 1.3.1
release    : 15
source     :
    - https://www.x.org/releases/individual/lib/libXmu-1.3.1.tar.gz : 5c8f44e26ccc9b14188599524e67ce788a205b38e297834babdeb12090be835b
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 miscellaneous utility library
description: |
    This library contains miscellaneous utilities and is not part of the Xlib standard.  It contains routines which only use public interfaces so that it may be layered on top of any proprietary implementation of Xlib or Xt
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig32(xt)
    - pkgconfig(xproto)
setup      : |
    %configure --with-appdefaultdir=/etc/X11/app-defaults \
               --disable-static
build      : |
    %make
install    : |
    %make_install
