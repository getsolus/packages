# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libpathrs
version    : 0.2.5
release    : 1
source     :
    - https://github.com/cyphar/libpathrs/releases/download/v0.2.5/libpathrs-0.2.5.tar.xz : f8f4a9419eb839cd5decbd120b65f0495bf6eac07155477fe39a8c2a23da589d
homepage   : https://github.com/cyphar/libpathrs
license    :
    - LGPL-3.0-or-later
    - MPL-2.0
component  : programming.library
summary    : C-friendly API to make path resolution safer on Linux
description: |
    C-friendly API to make path resolution safer on Linux.
networking : true
builddeps  :
    - rust
setup      : |
    %patch -p1 -i ${pkgfiles}/crate-type.patch
    %cargo_fetch
build      : |
    export LIBPATHRS_CAPI_BUILDMODE=cdylib
    %cargo_build --features=capi
install    : |
    DESTDIR="${installdir}" ./install.sh \
        --prefix=/usr \
        --libdir=%libdir% \
        --disable-static
    %install_license LICENSE*
