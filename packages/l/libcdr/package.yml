# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libcdr
version    : 0.1.8
release    : 22
source     :
    - https://dev-www.libreoffice.org/src/libcdr/libcdr-0.1.8.tar.xz : ced677c8300b29c91d3004bb1dddf0b99761bf5544991c26c2ee8f427e87193c
homepage   : https://wiki.documentfoundation.org/DLP/Libraries/libcdr
license    : MPL-2.0
component  : programming.library
summary    : library and tools for reading and converting Corel DRAW files
description: |
    Libcdr is a library and a set of tools for reading and converting binary files produced by Corel DRAW.
builddeps  :
    - pkgconfig(cppunit)
    - pkgconfig(icu-i18n)
    - pkgconfig(lcms2)
    - pkgconfig(librevenge-0.0)
    - libboost-devel
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install
check      : |
    %make check
