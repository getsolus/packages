# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libjxl
version    : 0.11.2
release    : 10
source     :
    - https://github.com/libjxl/libjxl/archive/refs/tags/v0.11.2.tar.gz : ab38928f7f6248e2a98cc184956021acb927b16a0dee71b4d260dc040a4320ea
    - git|https://skia.googlesource.com/skcms.git : b2e692629c1fb19342517d7fb61f1cf83d075492
    - https://github.com/webmproject/sjpeg/archive/94e0df6d0f8b44228de5be0ff35efb9f946a13c9.tar.gz#sjpeg.tar.gz : ac94917fe745a674eabf1e044f23ec55cd5a548c9869c06ec4b19da14ee0227d
    # Test data. Keep this in sync with the commit expected by the version tag
    - git|https://github.com/libjxl/testdata.git : 873045a9c42ed60721756e26e2a6b32e17415205
homepage   : https://jpeg.org/jpegxl
license    : BSD-3-Clause
component  : multimedia.codecs
summary    :
    - JPEG XL reference implementation
    - utils : JPEG XL reference implementation - Utilities
description: |
    JPEG XL offers significantly better image quality and compression ratios than legacy JPEG
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(glut)
    - pkgconfig(lcms2)
    - pkgconfig(libbrotlicommon)
    - pkgconfig(libglvnd)
    - pkgconfig(libhwy)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
    - asciidoc
    - doxygen
    - giflib-devel
checkdeps  :
    - pkgconfig(gtest)
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    rm -rfv third_party/skcms && cp -a $sources/skcms.git third_party/skcms
    rm -rfv testdata && cp -a $sources/testdata.git testdata
    tar -xf $sources/sjpeg.tar.gz -C third_party/sjpeg --strip-components 1

    %patch -p1 -i ${pkgfiles}/CVE-2025-70103.patch

    %cmake_ninja \
        -DBUILD_SHARED_LIBS=ON \
        -DJPEGXL_ENABLE_BENCHMARK=OFF \
        -DJPEGXL_ENABLE_PLUGINS=ON \
        -DJPEGXL_BUNDLE_LIBPNG=OFF \
        -DJPEGXL_FORCE_SYSTEM_BROTLI=ON \
        -DJPEGXL_FORCE_SYSTEM_GTEST=ON \
        -DJPEGXL_FORCE_SYSTEM_HWY=ON \
        -DJPEGXL_VERSION=$version
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    %ninja_check
patterns   :
    - utils :
        - /usr/bin/
        - /usr/share/man/man1

# Todo: Package GIMP plugin, not packaged currently due to it adding gimp as a dependency to this package
# Todo: Split out the gdk-pixbuf loader into a GNOME/Budgie specific package. 
# Both of these require a smarter dependency management system.
