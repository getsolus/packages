# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lsp-plugins
version    : 1.2.33
release    : 22
source     :
    - https://github.com/sadko4u/lsp-plugins/releases/download/1.2.33/lsp-plugins-src-1.2.33.tar.gz : 2b6922105118ac87bd942b0ff3e7bf3c8180227b2ab5c4e50e48deb90ac689bd
homepage   : https://lsp-plug.in
license    : LGPL-3.0-only
component  : multimedia.audio
summary    : Linux Studio Plugins Project
description: |
    LSP (Linux Studio Plugins) is a collection of open-source plugins
builddeps  :
    - pkgconfig(cairo)
    - pkgconfig(gl)
    - pkgconfig(jack)
    - pkgconfig(lv2)
    - pkgconfig(sndfile)
    - pkgconfig(xrandr)
    - ladspa-devel
setup      : |
    make config FEATURES='ladspa lv2 vst2 jack' PREFIX=/usr LIBDIR=%libdir%
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING COPYING.LESSER
