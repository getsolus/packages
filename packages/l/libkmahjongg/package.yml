# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkmahjongg
version    : 26.04.3
release    : 79
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkmahjongg-26.04.3.tar.xz : 1914c780160d8913dd649fdd1b0760b445523c09b572f45ce99c08196e29c7e8
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.library
summary    : Common code and assets for Kmahjonhgg
description: |
    Library providing common code and assets for Kmahjonhgg.
builddeps  :
    - pkgconfig(Qt6Svg)
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kwidgetsaddons-devel
rundeps    :
    - devel :
        - kf6-kconfigwidgets-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
