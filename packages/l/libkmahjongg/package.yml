# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkmahjongg
version    : 26.04.2
release    : 78
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkmahjongg-26.04.2.tar.xz : 7189fae0a80c3cab9f34bc93f1733036183ea91b4b1b0da748522f65392d367b
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.library
summary    : Common code and assets for Kmahjonhgg
description: |
    Library providing common code and assets for Kmahjonhgg.
builddeps  :
    - pkgconfig(Qt6Svg)
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kwidgetsaddons-devel
rundeps    :
    - devel :
        - kf6-kconfigwidgets-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
