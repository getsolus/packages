# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : librepods
version    : 0.2.5
release    : 1
source     :
    - https://github.com/kavishdevar/librepods/archive/refs/tags/v0.2.5.tar.gz : c32051e917c96b7d183d3d490f99dc4ab4fd50dcbd8b18f38619794e478f4db3
homepage   : https://github.com/kavishdevar/librepods
license    : GPL-3.0-only
component  : desktop
summary    : AirPods management app for Linux
description: |
    LibrePods is a Qt-based desktop application for pairing and managing Apple AirPods
    on Linux systems, including battery and device controls outside of Apple's ecosystem.
builddeps  :
    - pkgconfig(Qt6Bluetooth)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Gui)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(libpulse)
    - pkgconfig(openssl)
    - qt6-tools-devel
setup      : |
    %cmake_ninja -S linux
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
    install -Dm00644 ${pkgfiles}/me.kavishdevar.librepods.metainfo.xml -t ${installdir}/usr/share/metainfo
