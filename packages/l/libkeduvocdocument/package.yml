# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkeduvocdocument
version    : 26.04.2
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkeduvocdocument-26.04.2.tar.xz : da1fa33f918a177e60bf51fa589748d8ff42fc230a7ab0d555d0eb8a01c09ff7
homepage   : https://kde.org/
license    :
    - BSD-1-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : desktop.library
summary    : Library to parse, convert, and manipulate KVTML files
description: |
    Contains KEduVocDocument and its related class for reading from/writing to the KVTML format (and others too).
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-karchive-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
