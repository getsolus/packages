# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkeduvocdocument
version    : 25.12.3
release    : 98
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/libkeduvocdocument-25.12.3.tar.xz : 92a680125c75bb9d419d36335bdce78510ff74d3b892b3573729a19cae18752d
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : desktop.library
summary    : Library to parse, convert, and manipulate KVTML files
description: |
    Contains KEduVocDocument and its related class for reading from/writing to the KVTML format (and others too).
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-karchive-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
