# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libeconf
version    : 0.8.3
release    : 11
source     :
    - https://github.com/openSUSE/libeconf/archive/refs/tags/v0.8.3.tar.gz : c8855f08d64c06b57a5028a14eec6ddde5e35124f9718031d592b44d8e091f83
homepage   : https://opensuse.github.io/libeconf
license    : MIT
component  :
    - utils : system.utils
    - system.base
summary    :
    - utils : Utilities for manipulating config files
    - Enhanced config file parser
description:
    - utils : Utilities for manipulating config files
    - Enhanced config file parser, which merges config files placed in several locations into one
emul32     : true
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-cmake-no-install-html.patch

    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE

    # x64 won't install the correct binaries if this is present
    if [[ ! -z "${EMUL32BUILD}" ]]; then
        rm -v ${installdir}/usr/bin/econftool
    fi
check      : |
    %ninja_check
patterns   :
    - utils :
        - /usr/bin/econftool
        - /usr/share/man/man8/econftool.8*
