# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libusb
version    : 1.0.30
release    : 19
source     :
    - https://github.com/libusb/libusb/releases/download/v1.0.30/libusb-1.0.30.tar.bz2 : fea36f34f9156400209595e300840767ab1a385ede1dc7ee893015aea9c6dbaf
homepage   : https://libusb.info/
license    : LGPL-2.1-only
summary    : libusb (USB library)
component  : system.base
builddeps  :
    - pkgconfig32(libudev)
emul32     : true
description: |
    libusb is a C library that gives applications easy access to USB devices on many different operating systems.
setup      : |
    %configure --disable-static
build      : |
    %make
install    : |
    %make_install
