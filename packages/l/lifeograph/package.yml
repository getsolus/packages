# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lifeograph
version    : 3.1.1
release    : 11
source     :
    - https://launchpad.net/lifeograph/trunk/3.1.1/+download/lifeograph-3.1.1.tar.xz : 5080890e2c8bc80f54ffbafde22f9519c72fbd389841c41b2be6ac72b789602b
license    : GPL-3.0-or-later
homepage   : https://lifeograph.sourceforge.net/
component  : office.notes
summary    : Lifeograph is an off-line and private journal and note taking application
description: |
    Lifeograph is an off-line and private journal and note taking application
builddeps  :
    - pkgconfig(enchant-2)
    - pkgconfig(gtkmm-4.0)
    - pkgconfig(libgcrypt)
    - pkgconfig(pybind11)
    - pkgconfig(python3-embed)
    - pkgconfig(shumate-1.0)
    - intltool
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
