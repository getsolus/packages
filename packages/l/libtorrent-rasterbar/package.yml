# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libtorrent-rasterbar
version    : 2.0.13
release    : 48
source     :
    - https://github.com/arvidn/libtorrent/releases/download/v2.0.13/libtorrent-rasterbar-2.0.13.tar.gz : 892cb75c06318e2420de0faf9f63a908069d3d237676e2459fd30abe0cb3b1bf
homepage   : https://libtorrent.org/
license    : BSD-2-Clause
component  : programming
summary    : libtorrent is a C++ implementation of the BitTorrent protocol
description: |
    libtorrent is a C++ implementation of the BitTorrent protocol.
builddeps  :
    - pkgconfig(python3)
    - libboost-devel
    - libiconv-devel
    - python-setuptools
clang      : true
optimize   :
    - thin-lto
setup      : |
    %cmake_ninja \
        -Dpython-bindings=on \
        -Dpython-egg-info=on \
        -Dpython-install-system-dir=on
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING LICENSE
