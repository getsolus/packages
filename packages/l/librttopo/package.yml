# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : librttopo
version    : 1.1.0
release    : 3
source     :
    - https://git.osgeo.org/gitea/rttopo/librttopo/archive/librttopo-1.1.0.tar.gz : 60b49acb493c1ab545116fb0b0d223ee115166874902ad8165eb39e9fd98eaa9
homepage   : https://strk.kbt.io/projects/rttopo/
license    : GPL-2.0-or-later
component  : programming.library
summary    : RT Topology Library
description: |
    The RT Topology Library exposes an API to create and manage standard (ISO 13249 aka SQL/MM) topologies using user-provided data stores.
builddeps  :
    - pkgconfig(geos)
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
    rm $installdir/usr/lib64/librttopo.a
