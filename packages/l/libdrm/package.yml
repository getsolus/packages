# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libdrm
version    : 2.4.133
release    : 54
source     :
    - https://dri.freedesktop.org/libdrm/libdrm-2.4.133.tar.xz : fc68f9d0ba2ea63c9432a299e14fea09fad7a8a66e8039fcd7802ca59f77b4f5
license    : MIT
component  : xorg.display
homepage   : https://dri.freedesktop.org/
summary    : Direct Rendering Manager API + Library
description: |
    libdrm provides core library routines for the X Window System to directly interface with video hardware using the Linux kernel's Direct Rendering Manager (DRM).
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(pciaccess)
    - pkgconfig(xorg-macros)
setup      : |
    %meson_configure -Dinstall-test-programs=true
build      : |
    %ninja_build
install    : |
    %ninja_install
check      : |
    %ninja_check
patterns   :
    - devel :
        - /usr/bin/*
