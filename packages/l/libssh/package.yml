# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libssh
version    : 0.12.1
release    : 21
source     :
    - https://www.libssh.org/files/0.12/libssh-0.12.1.tar.xz : d3941af0a2d78d5d82ed7a36988e9133994312f035b9659a6e43f8db3968784c
homepage   : https://www.libssh.org/
license    : LGPL-2.1-or-later
component  : programming.library
summary    : SSH library
description: |
    libssh is a multi-platform C library implementing the SSHv2 and SSHv1 protocol on client and server side. With libssh, you can remotely execute programs, transfer files, use a secure and transparent tunnel, manage public keys and much more.
checkdeps  :
    - pkgconfig(cmocka)
setup      : |
    %cmake_ninja -DUNIT_TESTING=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    unset LD_PRELOAD
    %ninja_check
