# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libssh
version    : 0.11.4
release    : 19
source     :
    - https://www.libssh.org/files/0.11/libssh-0.11.4.tar.xz : 002ac320e3d66c9e100ec6576e3e84aa0c48949efde3bf5b40a2802992297701
homepage   : https://www.libssh.org/
license    : LGPL-2.1-or-later
component  : programming.library
summary    : SSH library
description: |
    libssh is a multi-platform C library implementing the SSHv2 and SSHv1 protocol on client and server side. With libssh, you can remotely execute programs, transfer files, use a secure and transparent tunnel, manage public keys and much more.
checkdeps  :
    - pkgconfig(cmocka)
setup      : |
    %cmake_ninja -DUNIT_TESTING=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    unset LD_PRELOAD
    %ninja_check
