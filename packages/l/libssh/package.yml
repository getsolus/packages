# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libssh
version    : 0.12.0
release    : 20
source     :
    - https://www.libssh.org/files/0.12/libssh-0.12.0.tar.xz : 1a6af424d8327e5eedef4e5fe7f5b924226dd617ac9f3de80f217d82a36a7121
homepage   : https://www.libssh.org/
license    : LGPL-2.1-or-later
component  : programming.library
summary    : SSH library
description: |
    libssh is a multi-platform C library implementing the SSHv2 and SSHv1 protocol on client and server side. With libssh, you can remotely execute programs, transfer files, use a secure and transparent tunnel, manage public keys and much more.
checkdeps  :
    - pkgconfig(cmocka)
setup      : |
    %cmake_ninja -DUNIT_TESTING=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    unset LD_PRELOAD
    %ninja_check
