# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libcbor
version    : 0.14.0
release    : 7
source     :
    - https://github.com/PJK/libcbor/archive/refs/tags/v0.14.0.tar.gz : a8c1516e741562cf95aa4479c64916c3d4d2623e24fdc35e414e2320e7300aae
license    : MIT
component  : system.base
summary    : CBOR protocol implementation for C
homepage   : https://github.com/PJK/libcbor
builddeps  :
    - cmocka-devel
description: |
    libcbor is a C library for parsing and generating CBOR, the general-purpose schema-less binary data format.
setup      : |
    %cmake_ninja -DBUILD_SHARED_LIBS=on \
                 -DWITH_TESTS=1
build      : |
    %ninja_build
install    : |
    %ninja_install
check      : |
    %ninja_check
    %install_license LICENSE.md
