# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libheif
version    : 1.22.2
release    : 62
source     :
    - https://github.com/strukturag/libheif/releases/download/v1.22.2/libheif-1.22.2.tar.gz : eea48e4841f83fbe51d029337ffd2d14512d0203015dad40b90213d872958af3
homepage   : https://github.com/strukturag/libheif
license    :
    - LGPL-3.0-or-later
    - MIT # /usr/include/libheif/heif_cxx.h
summary    :
    - libheif is an ISO/IEC 23008-12:2017 HEIF and AVIF (AV1 Image File Format) file format decoder and encoder
    - tools : Tools for manipulating HEIF files
    - plugin-aom : HEIF and AVIF file format decoder and encoder - aom plugins
    - plugin-dav1d : HEIF and AVIF file format decoder and encoder - dav1d plugin
    - plugin-ffmpeg : HEIF and AVIF file format decoder and encoder - ffmpeg plugin
    - plugin-j2k : HEIF and AVIF file format decoder and encoder - libopenjp2 plugin
    - plugin-jpeg : HEIF and AVIF file format decoder and encoder - jpeg plugin
    - plugin-libde265 : HEIF and AVIF file format decoder and encoder - libde265 plugin
    - plugin-openh264 : HEIF and AVIF file format decoder and encoder - openh264 plugin
    - plugin-rav1e : HEIF and AVIF file format decoder and encoder - rav1e plugin
    - plugin-svtav1 : HEIF and AVIF file format decoder and encoder - svtav1 plugin
    - plugin-x264 : HEIF and AVIF file format decoder and encoder - x264 plugin
    - plugin-x265 : HEIF and AVIF file format decoder and encoder - x265 plugin
component  :
    - multimedia.codecs
    - tools : multimedia.codecs
    - plugin-aom : multimedia.codecs
    - plugin-dav1d : multimedia.codecs
    - plugin-ffmpeg : multimedia.codecs
    - plugin-j2k : multimedia.codecs
    - plugin-jpeg : multimedia.codecs
    - plugin-libde265 : multimedia.codecs
    - plugin-openh264 : multimedia.codecs
    - plugin-rav1e : multimedia.codecs
    - plugin-svtav1 : multimedia.codecs
    - plugin-x264 : multimedia.codecs
    - plugin-x265 : multimedia.codecs
description:
    - |
        HEIF is a new image file format employing HEVC (h.265) or AV1 image coding, respectively, for the best compression ratios currently possible.
        libheif makes use of libde265 for the actual image decoding and x265 for encoding. For AVIF, libaom, dav1d, rav1e, or SVT-AV1 are used as codecs.
    - tools : This package provides tools for manipulating HEIF files.
    - plugin-aom : HEIF and AVIF file format decoder and encoder - aom plugins.
    - plugin-dav1d : HEIF and AVIF file format decoder and encoder - dav1d plugin.
    - plugin-ffmpeg : HEIF and AVIF file format decoder and encoder - ffmpeg plugin.
    - plugin-j2k : HEIF and AVIF file format decoder and encoder - libopenjp2 plugin.
    - plugin-jpeg : HEIF and AVIF file format decoder and encoder - jpeg plugin.
    - plugin-libde265 : HEIF and AVIF file format decoder and encoder - libde265 plugin.
    - plugin-openh264 : HEIF and AVIF file format decoder and encoder - openh264 plugin.
    - plugin-rav1e : HEIF and AVIF file format decoder and encoder - rav1e plugin.
    - plugin-svtav1 : HEIF and AVIF file format decoder and encoder - svtav1 plugin.
    - plugin-x264 : HEIF and AVIF file format decoder and encoder - x264 plugin.
    - plugin-x265 : HEIF and AVIF file format decoder and encoder - x265 plugin.
# autodep would add libheif on each plugin and cycle with default plugin rundeps below (cf. pinentry, gssdp)
autodep    : false
builddeps  :
    - pkgconfig(SvtAv1Enc)
    - pkgconfig(aom)
    - pkgconfig(dav1d)
    - pkgconfig(libavcodec)
    - pkgconfig(libavutil)
    - pkgconfig(libde265)
    - pkgconfig(libjpeg)
    - pkgconfig(libopenjp2)
    - pkgconfig(libpng)
    - pkgconfig(libsharpyuv)
    - pkgconfig(openh264)
    - pkgconfig(rav1e)
    - pkgconfig(x264)
    - pkgconfig(x265)
    - pkgconfig(zlib)
rundeps    :
    - devel :
        - libheif-plugin-aom
        - libheif-plugin-dav1d
        - libheif-plugin-ffmpeg
        - libheif-plugin-j2k
        - libheif-plugin-jpeg
        - libheif-plugin-libde265
        - libheif-plugin-openh264
        - libheif-plugin-rav1e
        - libheif-plugin-svtav1
        - libheif-plugin-x264
        - libheif-plugin-x265
    - libheif-plugin-dav1d # Default AV1 decoder
    - libheif-plugin-ffmpeg # Default HEVC decoder (hardware-accelerated)
    - libheif-plugin-jpeg # JPEG encoder/decoder
    - libheif-plugin-rav1e # Default AV1 encoder
    - libheif-plugin-x265 # Default HEVC encoder
    - plugin-aom :
        - aom
    - plugin-dav1d :
        - dav1d
    - plugin-ffmpeg :
        - ffmpeg
    - plugin-j2k :
        - openjpeg
    - plugin-jpeg :
        - libjpeg-turbo
    - plugin-libde265 :
        - libde265
    - plugin-openh264 :
        - openh264
    - plugin-rav1e :
        - rav1e
    - plugin-svtav1 :
        - svt-av1
    - plugin-x264 :
        - x264
    - plugin-x265 :
        - x265
    - tools :
        - libheif
setup      : |
    # Codec backends install as shared plugins; patterns below carve out subpackages.
    %cmake_ninja \
        -DWITH_AOM_DECODER=ON \
        -DWITH_AOM_DECODER_PLUGIN=ON \
        -DWITH_AOM_ENCODER=ON \
        -DWITH_AOM_ENCODER_PLUGIN=ON \
        -DWITH_DAV1D=ON \
        -DWITH_DAV1D_PLUGIN=ON \
        -DWITH_FFMPEG_DECODER=ON \
        -DWITH_FFMPEG_DECODER_PLUGIN=ON \
        -DWITH_GDK_PIXBUF=OFF \
        -DWITH_JPEG_DECODER=ON \
        -DWITH_JPEG_DECODER_PLUGIN=ON \
        -DWITH_JPEG_ENCODER=ON \
        -DWITH_JPEG_ENCODER_PLUGIN=ON \
        -DWITH_LIBDE265=ON \
        -DWITH_LIBDE265_PLUGIN=ON \
        -DWITH_UNCOMPRESSED_CODEC=ON \
        -DWITH_VVENC:BOOL=ON \
        -DWITH_VVENC_PLUGIN:BOOL=ON \
        -DWITH_OpenH264_DECODER=ON \
        -DWITH_OpenH264_DECODER_PLUGIN=ON \
        -DWITH_OPENJPH_ENCODER=OFF \
        -DWITH_OpenJPEG_DECODER=ON \
        -DWITH_OpenJPEG_DECODER_PLUGIN=ON \
        -DWITH_RAV1E=ON \
        -DWITH_RAV1E_PLUGIN=ON \
        -DWITH_SvtEnc=ON \
        -DWITH_SvtEnc_PLUGIN=ON \
        -DWITH_X264=ON \
        -DWITH_X264_PLUGIN=ON \
        -DWITH_X265=ON \
        -DWITH_X265_PLUGIN=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
patterns   :
    - tools :
        - /usr/bin/heif-*
        - /usr/share/man/**/heif-*
        - /usr/share/thumbnailers/heif.thumbnailer
    - plugin-aom :
        - /usr/lib64/libheif/libheif-aom*.so
    - plugin-dav1d :
        - /usr/lib64/libheif/libheif-dav1d.so
    - plugin-ffmpeg :
        - /usr/lib64/libheif/libheif-ffmpegdec.so
    - plugin-j2k :
        - /usr/lib64/libheif/libheif-j2kdec.so
    - plugin-jpeg :
        - /usr/lib64/libheif/libheif-jpeg*.so
    - plugin-libde265 :
        - /usr/lib64/libheif/libheif-libde265.so
    - plugin-openh264 :
        - /usr/lib64/libheif/libheif-openh264dec.so
    - plugin-rav1e :
        - /usr/lib64/libheif/libheif-rav1e.so
    - plugin-svtav1 :
        - /usr/lib64/libheif/libheif-svtenc.so
    - plugin-x264 :
        - /usr/lib64/libheif/libheif-x264.so
    - plugin-x265 :
        - /usr/lib64/libheif/libheif-x265.so
