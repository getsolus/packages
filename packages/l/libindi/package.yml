# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libindi
version    : 2.2.1.1
release    : 1
source     :
    - https://github.com/indilib/indi/archive/refs/tags/v2.2.1.1.tar.gz : 270e0767768dcca6879d6a9f410ad6086b067ea492228c48e03ba3803c718271
homepage   : https://www.indilib.org
license    :
    - LGPL-2.1-or-later
    - GPL-2.0-or-later
component  : programming.library
summary    : INDI is a standard for astronomical instrumentation control. INDI Library is an Open Source POSIX implementation of the Instrument-Neutral-Device-Interface protocol.
description: |
    INDI core library is composed of the following components:
    - INDI Server.
    - INDI Core Drivers: Hardware drivers that communicate with the equipment. Many devices are supported including:
      - Mounts
      - CCDs, CMOS, Webcams, DSLRs (Canon, Nikon, Sony, Pentax..etc).
      - Focusers.
      - Filter Wheels.
      - Adaptive Optics.
      - Domes.
      - GPS.
      - Weather Stations.
      - Controllers.
      - Auxiliary Devices (switches, watchdog, relays, light sources, measurement devices..etc).
    - Client Library: Cross-platform POSIX and Qt5-based client libraries. The client libraries can be embedded in 3rd party applications to communicate with INDI server and devices.
builddeps  :
    - pkgconfig(cfitsio)
    - pkgconfig(fftw3)
    - pkgconfig(gsl)
    - pkgconfig(libcurl)
    - pkgconfig(libjpeg)
    - pkgconfig(libusb-1.0)
    - pkgconfig(ogg)
    - pkgconfig(theora)
    - libev-devel
    - libnova-devel
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install

    rm -v $installdir/%libdir%/*.a

    %install_license COPYING.*
