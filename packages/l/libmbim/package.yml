# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libmbim
version    : 1.34.0
release    : 15
source     :
    - https://gitlab.freedesktop.org/mobile-broadband/libmbim/-/archive/1.34.0/libmbim-1.34.0.tar.gz : 55bb88df358f8a36b6e01e63877500d7c6420f5907d2d3101812b4912eabe08f
homepage   : https://www.freedesktop.org/wiki/Software/libmbim/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : network.base
summary    : Library for talking to WWAN modems
description: |
    libmbim is a glib-based library for talking to WWAN modems and devices which speak the Mobile Interface Broadband Model (MBIM) protocol.
builddeps  :
    - help2man
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
check      : |
    %ninja_check
