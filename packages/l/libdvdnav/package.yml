# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libdvdnav
version    : 7.0.0
release    : 9
source     :
    - https://code.videolan.org/videolan/libdvdnav/-/archive/7.0.0/libdvdnav-7.0.0.tar.gz : 15d28086937647a95c3d6b083f0a86678cd4dd428914e319c64adf52cadec786
homepage   : https://www.videolan.org/developers/libdvdnav.html
license    : GPL-2.0-or-later
component  : multimedia.library
summary    : DVD navigation library
description: |
    libdvdnav is a library that allows easy use of sophisticated DVD navigation features such as DVD menus, multiangle playback and even interactive DVD games.
builddeps  :
    - pkgconfig(dvdread)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
    rm $installdir/usr/lib64/libdvdnav.a
    rm -r $installdir/usr/share
