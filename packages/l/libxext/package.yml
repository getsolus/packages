# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxext
version    : 1.3.7
release    : 19
source     :
    - https://www.x.org/releases/individual/lib/libXext-1.3.7.tar.gz : 6564608dc3b816b0cfddf0c7ddc62bc579055dd70b2f28113a618df2acb64189
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 common extensions base
description: |
    library for common extensions to the X11 protocol
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig(xproto)
patterns   :
    - devel :
        - /usr/share/man
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
