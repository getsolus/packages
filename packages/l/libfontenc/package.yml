# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libfontenc
version    : 1.1.9
release    : 19
source     :
    - https://www.x.org/releases/individual/lib/libfontenc-1.1.9.tar.gz : 941630531501bb6f7cf9fecadbb8da66f0cfe1d55d840808f7a3d3e2fdb89b2b
license    : MIT
homepage   : https://www.x.org/
summary    : X font encoding library
component  : xorg.library
description: |
    libfontenc is a library which helps font libraries portably determine and deal with different encodings of fonts.
builddeps  :
    - pkgconfig32(zlib)
    - pkgconfig(xproto)
emul32     : true
setup      : |
    %configure  --disable-static
build      : |
    %make
install    : |
    %make_install
