# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libpeas
version    : 1.38.1
release    : 35
source     :
    - https://download.gnome.org/sources/libpeas/1.38/libpeas-1.38.1.tar.xz : e82fd328adcac1aba34b64136bdfcbbacf2b3258a8bc4e5f480a72502a611ae9
homepage   : https://gitlab.gnome.org/GNOME/libpeas
license    : LGPL-2.1-or-later
component  : desktop.gnome.core
summary    : libpeas provides a plugin framework for GLib applications
description: |
    libpeas is a gobject-based plugins engine, and is targetted at giving every application the chance to assume its own extensibility.
builddeps  :
    - pkgconfig(gtk+-3.0)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(python3)
    - python-setuptools
rundeps    :
    - python-gobject
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
