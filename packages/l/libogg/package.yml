# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libogg
version    : 1.3.6
release    : 14
source     :
    - https://github.com/xiph/ogg/archive/v1.3.6.tar.gz : 95b643da661155d79db9de2fca55daed3a8d491039829def246aacb3d9201c81
homepage   : https://www.xiph.org/ogg/
license    : BSD-3-Clause
component  : multimedia.codecs
summary    : Ogg format library
description: |
    The libogg package contains the Ogg file structure. This is useful for creating (encoding) or playing (decoding) a single physical bit stream.
emul32     : true
optimize   : speed
setup      : |
    if [[ ! -z $EMUL32BUILD ]]; then
        %cmake_ninja \
            -DCMAKE_INSTALL_LIBDIR=lib32 \
            -DBUILD_SHARED_LIBS=ON
    else
        %cmake_ninja \
            -DBUILD_SHARED_LIBS=ON
    fi
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
patterns   :
    - docs : /usr/share/doc
