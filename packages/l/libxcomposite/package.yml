# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxcomposite
version    : 0.4.7
release    : 17
source     :
    - https://www.x.org/releases/individual/lib/libXcomposite-0.4.7.tar.gz : 5fc39a8fd6452ec225a95070dd5ac312899247a154fd041cc5f100a93c4ce192
license    : MIT
homepage   : https://www.x.org/
summary    : client library for the Composite extension to the X11 protocol
component  : xorg.library
description: |
    libXcomposite provides an X Window System client interface to the Composite extension to the X protocol. The Composite extension allows clients called compositing managers to control the final drawing of the screen. Rendering is done into an off-screen buffer.
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xfixes)
    - pkgconfig(xproto)
patterns   :
    - /usr/share/man
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
