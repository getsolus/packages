# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libimagequant
version    : 4.4.1
release    : 4
source     :
    - https://github.com/ImageOptim/libimagequant/archive/refs/tags/4.4.1.tar.gz : 2464a3e922b5a220b633d674062b82f0670114f8f3dd30d1935a621c95965f1b
homepage   : https://pngquant.org/lib
license    : GPL-3.0-or-later
component  : multimedia.library
summary    : Palette quantization library that powers pngquant and other PNG optimizers
description: |
    Palette quantization library that powers pngquant and other PNG optimizers
networking : true
builddeps  :
    - cargo-c
build      : |
    cd imagequant-sys
    cargo cinstall --prefix=/usr --destdir=$installdir
install    : |
    rm $installdir/usr/lib64/libimagequant.a
    %install_license COPYRIGHT
