# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libdvdread
version    : 7.0.1
release    : 14
source     :
    - https://code.videolan.org/videolan/libdvdread/-/archive/7.0.1/libdvdread-7.0.1.tar.gz : 5eeda23c75405c89d04f4c601cbb99447477ea5c8c05b341c59da07b1651155b
homepage   : https://www.videolan.org/developers/libdvdnav.html
license    : GPL-2.0-or-later
component  : multimedia.library
summary    : DVD reading library
description: |
    libdvdread is a library which provides a simple foundation for reading DVDs.
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
    rm $installdir/usr/lib64/libdvdread.a
    rm -r $installdir/usr/share
