# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : live-media
version    : 2026.04.22
release    : 7
source     :
    - https://download.live555.com/live.2026.04.22.tar.gz : 1ffd626ce2e2473196e55a473b7b5ba056326eeabf8fd5622cea6b123d8b6370
homepage   : http://www.live555.com/
license    :
    - LGPL-3.0-or-later
    - GPL-3.0-or-later
component  : multimedia.library
summary    : A set of C++ libraries for multimedia streaming
description: |
    A set of C++ libraries for multimedia streaming, using open standard protocols (RTP/RTCP, RTSP, SIP).
environment: |
    # BasicTaskScheduler.cpp:191:40: error: 'struct std::atomic_flag' has no member named 'test'
    export CXXFLAGS="-std=c++20 $CXXFLAGS"
setup      : |
    sed -e 's/$(INCLUDES) -I. -O2 -DSOCKLEN_T/$(INCLUDES) -I. -O2 -I. -fPIC -DRTSPCLIENT_SYNCHRONOUS_INTERFACE=1 -DSOCKLEN_T/g' -i config.linux-with-shared-libraries
    ./genMakefiles linux-with-shared-libraries
build      : |
    %make PREFIX=/usr LIBDIR=%libdir%
install    : |
    %make_install PREFIX=/usr LIBDIR=%libdir%

    %install_license COPYING
    %install_license COPYING.LESSER
