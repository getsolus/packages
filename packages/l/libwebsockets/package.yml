# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libwebsockets
version    : 4.5.8
release    : 1
source     :
    - https://github.com/warmcat/libwebsockets/archive/refs/tags/v4.5.8.tar.gz : b6ade658f4af3a823d0dc806ae5ef0623f0f4f5e2aeb895a0f77c4783840c30e
homepage   : https://libwebsockets.org
license    :
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - MIT
    - OFL-1.1
    - Zlib
component  : programming.library
summary    : Lightweight C library for websocket clients and servers
description: |
    Libwebsockets is a lightweight pure C library built to use minimal CPU and memory resources, and provide fast throughput in both directions as client or server.
builddeps  :
    - pkgconfig(glib-2.0)
    - pkgconfig(libuv)
    - pkgconfig(openssl)
    - pkgconfig(zlib)
setup      : |
      %cmake_ninja \
        -DCMAKE_INSTALL_LIBDIR=%libdir% \
        -DLWS_WITH_SHARED=ON \
        -DLWS_WITH_STATIC=OFF \
        -DLWS_WITH_EVLIB_PLUGINS=OFF \
        -DLWS_WITH_GLIB=ON \
        -DLWS_WITH_LIBUV=ON \
        -DLWS_LINK_TESTAPPS_DYNAMIC=ON \
        -DLWS_USE_BUNDLED_ZLIB=OFF \
        -DLWS_WITHOUT_CLIENT=OFF \
        -DLWS_WITHOUT_SERVER=OFF \
        -DLWS_WITHOUT_TEST_CLIENT=ON \
        -DLWS_WITHOUT_TEST_PING=ON \
        -DLWS_WITHOUT_TEST_SERVER_EXTPOLL=ON \
        -DLWS_WITHOUT_TEST_SERVER=ON \
        -DLWS_WITHOUT_TESTAPPS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
