# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libraw
version    : 0.22.2
release    : 23
source     :
    - https://github.com/LibRaw/LibRaw/archive/refs/tags/0.22.2.tar.gz : 627928088300ecde6ca91ffd202e189203f04ad61ad12f0fe9dc57b9a7a0fb3c
homepage   : https://www.libraw.org/
license    :
    - CDDL-1.0
    - LGPL-2.1-or-later
component  :
    - multimedia.library
    - utils : multimedia.graphics
summary    :
    - LibRaw is a library for reading RAW files from digital cameras
    - utils : Tools for Libraw
description:
    - LibRaw is a library for reading RAW files obtained from digital photo cameras (CRW/CR2, NEF, RAF, DNG, and others).
    - utils : Tools for Libraw
avx2       : true
optimize   :
    - speed
builddeps  :
    - pkgconfig(jasper)
    - pkgconfig(lcms2)
    - pkgconfig(libturbojpeg)
setup      : |
    %reconfigure \
        --disable-static \
        --enable-jasper
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE* COPYRIGHT
    # Remove the license files from the share directory.
    rm -rf ${installdir}/usr/share/doc
patterns   :
    - utils : /usr/bin
