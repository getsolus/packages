# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkdcraw
version    : 26.04.2
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkdcraw-26.04.2.tar.xz : 0ceb4e3ae7921e25ff9e3c4ac0693321521fa8c455d3f44152d03b3ffbba391d
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : multimedia.library
summary    : C++ interface to LibRaw
description: |
    Libkdcraw is a C++ interface around LibRaw library used to decode RAW picture files.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libraw)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
