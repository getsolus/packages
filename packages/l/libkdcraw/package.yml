# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkdcraw
version    : 26.04.3
release    : 104
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkdcraw-26.04.3.tar.xz : 7bc63591e1fc1352177849a6998030dca2fca98e902a55186afec55add326f4f
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : multimedia.library
summary    : C++ interface to LibRaw
description: |
    Libkdcraw is a C++ interface around LibRaw library used to decode RAW picture files.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libraw)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
