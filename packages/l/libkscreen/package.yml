# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkscreen
version    : 6.6.5
release    : 138
source     :
    - https://download.kde.org/stable/plasma/6.6.5/libkscreen-6.6.5.tar.xz : f2fd11f2f65ff9ca4ff3b50b9953018a929b1bf3263b32ec171c4298e4662149
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.1-or-later
component  : desktop.kde.core
summary    : KDE's screen management software
description: |
    KDE's screen management software.
builddeps  :
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(xrandr)
    - kf6-kconfig-devel
    - plasma-wayland-protocols-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
