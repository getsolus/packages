name       : libkscreen
version    : 6.3.1
release    : 113
source     :
    - https://download.kde.org/stable/plasma/6.3.1/libkscreen-6.3.1.tar.xz : 86327eedb42c4a632e376116c28e108a81fca0ec6658688ba22aaae6164c88a2
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-only
component  : desktop.kde.core
summary    : KDE's screen management software
description: |
    KDE's screen management software.
builddeps  :
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(xrandr)
    - kf6-kconfig-devel
    - plasma-wayland-protocols-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
