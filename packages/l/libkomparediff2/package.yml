# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkomparediff2
version    : 26.04.2
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkomparediff2-26.04.2.tar.xz : 31fed1758f80e560852ad15bc24d6e9778c1a5983ea2fb7ee0081795a0175010
homepage   : https://kde.org/
license    :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming
summary    : Library to compare files and strings
description: |
    Library to compare files and strings, used in Kompare and KDevelop.
builddeps  :
    - kf6-kio-devel
    - kf6-kxmlgui-devel
rundeps    :
    - devel :
        - kf6-kconfig-devel
        - kf6-kxmlgui-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
