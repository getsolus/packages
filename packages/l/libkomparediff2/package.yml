# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkomparediff2
version    : 26.04.3
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkomparediff2-26.04.3.tar.xz : dd77529a93ac3f9aefe571961e8f7ab14c416f3164a524c6588284bcc1ac817b
homepage   : https://kde.org/
license    :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming
summary    : Library to compare files and strings
description: |
    Library to compare files and strings, used in Kompare and KDevelop.
builddeps  :
    - kf6-kio-devel
    - kf6-kxmlgui-devel
rundeps    :
    - devel :
        - kf6-kconfig-devel
        - kf6-kxmlgui-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
