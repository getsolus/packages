# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libTAS
version    : 1.4.8
release    : 12
source     :
    - https://github.com/clementgallet/libTAS/archive/refs/tags/v1.4.8.tar.gz : cd9d23f4def84a043f35670470ece58f2d8a9de286f4f9c1041dffb274218098
homepage   : https://github.com/clementgallet/libTAS
license    : GPL-3.0-or-later
component  : games
summary    : Toolset for creating tool-assisted speedruns
description: |
    libTAS is a Linux-only toolset for creating tool-assisted speedruns. It mostly supports SDL, but is being actively developed to support other engines as well. It's already been used for some GDQ runs, including the Mari0 speedrun at AGDQ2019.
builddeps  :
    - pkgconfig(Qt5Widgets)
    - pkgconfig(alsa)
    - pkgconfig(libswresample)
    - pkgconfig(lua-5.4)
    - pkgconfig(sdl2)
    - pkgconfig(xcb-cursor)
    - pkgconfig(xcb-keysyms)
    - pkgconfig(xi)
    - pkgconfig(xinerama)
    - pkgconfig(xkbcommon)
    - pkgconfig(xrandr)
    - pkgconfig(zlib)
    - extra-cmake-modules
rundeps    :
    - ffmpeg
    - gdb
    - sdl2
setup      : |
    %patch -p1 -i $pkgfiles/replace-icon-with-preferences-gaming.patch
    %reconfigure
build      : |
    %make
install    : |
    %make_install
