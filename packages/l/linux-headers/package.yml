# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : linux-headers
version    : 7.1.3
release    : 117
source     :
    - https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.xz : be41c068e88f5242a19bccdbffbe077b18c47b45f627e2325504b4fab79dd1dc
license    : GPL-2.0-only
component  : system.devel
replaces   : kernel-libc-devel
homepage   : https://www.kernel.org/
summary    : Kernel's libc headers
patterns   :
    - /*
description: |
    Headers for the kernel's libc implementation
builddeps  :
    - rsync
setup      : |
    %make allnoconfig
install    : |
    %make headers_install INSTALL_HDR_PATH=$installdir/usr
    find $installdir -name ..install.cmd -or -name .install | xargs rm -vf
