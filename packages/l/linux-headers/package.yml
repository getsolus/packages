# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : linux-headers
version    : 7.0.3
release    : 116
source     :
    - https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.3.tar.xz : 0bedadbf5788693ddebbcc913c893f1a97349af79ddde7144c2a80b401959f1c
license    : GPL-2.0-only
component  : system.devel
replaces   : kernel-libc-devel
homepage   : https://www.kernel.org/
summary    : Kernel's libc headers
patterns   :
    - /*
description: |
    Headers for the kernel's libc implementation
builddeps  :
    - rsync
setup      : |
    %make allnoconfig
install    : |
    %make headers_install INSTALL_HDR_PATH=$installdir/usr
    find $installdir -name ..install.cmd -or -name .install | xargs rm -vf
