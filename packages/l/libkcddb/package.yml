# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkcddb
version    : 26.04.3
release    : 97
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkcddb-26.04.3.tar.xz : c5af21abfc86438c576c84846f95d895c10e9be9d5f40bac5df45000b993c38d
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming
summary    : KDE CDDB library
description: |
    KDE CDDB library.
builddeps  :
    - pkgconfig(libmusicbrainz5)
    - kf6-kcmutils-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DQT_MAJOR_VERSION=6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove docs
    rm -rfv $installdir/usr/share/doc
