# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkexiv2
version    : 26.04.2
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/libkexiv2-26.04.2.tar.xz : fdd8b2ca473339281676bccd1be1d6bf7df2f7644822c52a5cb73af8535a854e
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : programming
summary    : Exiv2 library interface for KDE
description: |
    Libkexiv2 is a wrapper around Exiv2 library to manipulate pictures metadata as EXIF/IPTC and XMP.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(exiv2)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
