# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkexiv2
version    : 26.04.3
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/libkexiv2-26.04.3.tar.xz : dd5ddbf107dd9a51454ae83b0537ca80ce31e65da649c0a8db745e356d0d0064
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : programming
summary    : Exiv2 library interface for KDE
description: |
    Libkexiv2 is a wrapper around Exiv2 library to manipulate pictures metadata as EXIF/IPTC and XMP.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(exiv2)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
