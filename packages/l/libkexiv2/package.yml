# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libkexiv2
version    : 26.04.1
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/libkexiv2-26.04.1.tar.xz : 7827c710db4b63d059a0721b6a2a833663d0c457bf4219eb8dfc1c98b19c93e5
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : programming
summary    : Exiv2 library interface for KDE
description: |
    Libkexiv2 is a wrapper around Exiv2 library to manipulate pictures metadata as EXIF/IPTC and XMP.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(exiv2)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
