# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libproxy
version    : 0.5.12
release    : 28
source     :
    - https://github.com/libproxy/libproxy/archive/refs/tags/0.5.12.tar.gz : a1fa55991998b80a567450a9e84382421a7176a84446c95caaa8b72cf09fa86f
homepage   : https://libproxy.github.io/libproxy/
license    : LGPL-2.1-or-later
component  : network.base
summary    : libproxy is a library that provides automatic proxy configuration management
description: |
    libproxy is a library that provides automatic proxy configuration management.
builddeps  :
    - pkgconfig(duktape)
    - pkgconfig(gi-docgen)
    - pkgconfig(gsettings-desktop-schemas)
    - pkgconfig(libcurl)
    - pkgconfig(libnm)
    - pkgconfig(vapigen)
    - vala
patterns   :
    - docs :
        - /usr/share/doc
rundeps    :
    - perl
setup      : |
    %patch -p1 -i $pkgfiles/fix-meson-includes.patch
    %meson_configure -Dconfig-sysconfig=true -Dconfig-gnome=true -Dconfig-env=true -Dconfig-kde=true
build      : |
    %ninja_build
install    : |
    %ninja_install

    rm -v $installdir/%libdir%/libproxy.a
check      : |
    %ninja_check
