# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lokalize
version    : 26.04.3
release    : 79
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/lokalize-26.04.3.tar.xz : c23ac4bf5ec63100823855f72f9c6e473050282361b1460072bb15d193ece5dd
homepage   : https://apps.kde.org/lokalize/
license    :
    - BSD-3-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.1-or-later
component  : desktop.kde
summary    : Computer-Aided Translation System
description: |
    Lokalize is a computer-aided translation system that focuses on productivity and quality assurance. It is targeted for software translation and also integrates external conversion tools for freelance office document translation.
builddeps  :
    - pkgconfig(hunspell)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-knotifications-devel
    - kf6-ktextwidgets-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
