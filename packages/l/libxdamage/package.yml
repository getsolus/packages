# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxdamage
version    : 1.1.7
release    : 18
source     :
    - https://www.x.org/releases/individual/lib/libXdamage-1.1.7.tar.gz : fd5fcc94626886451b731cbcc500bdb3d5afd6d608056540b7cbc314c7678bfe
license    : MIT
component  : xorg.library
homepage   : https://www.x.org/
summary    : X11 damaged region extension library
description: |
    libXdamage provides an X Window System client interface to the DAMAGE extension to the X protocol.
emul32     : true
optimize   : speed
builddeps  :
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig32(xfixes)
    - pkgconfig(xproto
setup      : |
    %configure --prefix=/usr \
               --disable-static
build      : |
    %make
install    : |
    %make_install
