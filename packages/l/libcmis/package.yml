# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libcmis
version    : 0.6.3
release    : 12
source     :
    - https://github.com/tdf/libcmis/releases/download/v0.6.3/libcmis-0.6.3.tar.gz : a7de8359f002e91cc430fcdfc14e1bb9cb45ac6a47ead8905f88f589b1eca6a2
homepage   : https://github.com/tdf/libcmis
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - MPL-1.1
component  : programming.library
summary    : C/C++ client library for the CMIS protocol
description: |
    Libcmis aims at providing a C/C++ client library for the CMIS protocol. A cmis-client tool is maintained to help testing and showing libcmis features.
builddeps  :
    - pkgconfig(cppunit)
    - pkgconfig(libcurl)
    - libboost-devel
setup      : |
    # Avoid moving /usr/include ahead of GCC's C++ headers via -isystem.
    sed -i "/BOOST_CPPFLAGS=.*-isystem/d" configure.ac

    %reconfigure \
        --disable-static \
        --without-man \
        --disable-werror
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING*
check      : |
    %make check
