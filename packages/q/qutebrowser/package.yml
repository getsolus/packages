# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qutebrowser
version    : 3.7.0
release    : 54
source     :
    - https://github.com/qutebrowser/qutebrowser/releases/download/v3.7.0/qutebrowser-3.7.0.tar.gz : c7f95884ea5e6675e584025bea55cff950c47d749aff7f415f68da03fcce0f92
homepage   : https://qutebrowser.org
license    : GPL-3.0-or-later
component  : network.web.browser
summary    : A keyboard-driven, vim-like browser based on PyQt6.
description: |
    A keyboard-driven, vim-like browser based on PyQt6.
builddeps  :
    - pkgconfig(python3)
    - asciidoc
    - python-setuptools
rundeps    :
    - pygments
    - python-jinja
    - python-pyqt6-webengine
    - pyyaml
build      : |
    %make -f misc/Makefile
install    : |
    %make_install -f misc/Makefile PREFIX=/usr
    %install_license LICENSE
