# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qtpass
version    : 1.7.0
release    : 19
source     :
    - https://github.com/IJHack/QtPass/archive/refs/tags/v1.7.0.tar.gz : 16d7bf01114a7f11c2e361b46e15063f419a27beff54a96985b706da756703c3
homepage   : https://qtpass.org/
license    : 
    - CC0-1.0
    - CC-BY-4.0
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - MIT
component  : security
summary    : QtPass is a multi-platform GUI for pass, the standard unix password manager.
description: |
    QtPass is a multi-platform GUI for pass, the standard unix password manager.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Help)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools)
rundeps    :
    - password-store
setup      : |
    qmake6 -spec linux-g++ QMAKE_CC="$CC" QMAKE_CXX="$CXX" QMAKE_LINK="$CXX" PREFIX=$installdir/usr
build      : |
    /usr/lib64/qt6/bin/lrelease localization/localization_*
    %make
install    : |
    %make_install
    install -Dm00644 qtpass.desktop $installdir/usr/share/applications/qtpass.desktop
    install -Dm00644 qtpass.appdata.xml $installdir/usr/share/metainfo/qtpass.appdata.xml
    install -Dm00644 artwork/icon.svg $installdir/usr/share/icons/hicolor/scalable/apps/qtpass-icon.svg
    %install_license LICENSES/*
