# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qscintilla
version    : 2.14.1
release    : 15
source     :
    - https://www.riverbankcomputing.com/static/Downloads/QScintilla/2.14.1/QScintilla_src-2.14.1.tar.gz : dfe13c6acc9d85dfcba76ccc8061e71a223957a6c02f3c343b30a9d43a4cdd4d
homepage   : https://www.riverbankcomputing.com/software/qscintilla/
license    : GPL-3.0-only
component  :
    - ^python-qscintilla-qt5 : programming.python
    - ^python-qscintilla-qt6 : programming.python
    - qt5 : programming.library
    - qt6 : programming.library
    - programming.library
summary    :
    - ^python-qscintilla-qt5 : Python bindings for QScintilla Qt5
    - ^python-qscintilla-qt6 : Python bindings for QScintilla Qt6
    - qt5 : Qt5 bindings for QScintilla
    - qt6 : Qt6 bindings for QScintilla
    - QScintilla is a port to Qt of Neil Hodgson's Scintilla C++ editor control
description: |
    QScintilla is a port to Qt of Neil Hodgson's Scintilla C++ editor control.
clang      : true
builddeps  :
    - pkgconfig(Qt5UiTools)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(python3)
    - pyqt-builder
    - python-pyqt5-sip
    - python-pyqt6-sip
    - python-qt6-devel
    - python-sip
    - python3-qt5
rundeps    :
    - ^python-qscintilla-qt5 :
        - python3-qt5
        - qscintilla-qt5
    - ^python-qscintilla-qt6 :
        - python-qt6
        - qscintilla-qt6
    - devel :
        - qscintilla-qt5
        - qscintilla-qt6
setup      : |
    cp -r ../QScintilla_src-${version}{,-qt5}

    pushd ../QScintilla_src-${version}-qt5/src
    export QMAKEFEATURES=${PWD}/features/
    %qmake

    pushd ../Python
    mv pyproject{-qt5,}.toml
    popd
    popd

    pushd src
    export QMAKEFEATURES=${PWD}/features/
    qmake6 \
        QMAKE_CFLAGS_RELEASE="${CFLAGS}" \
        QMAKE_CXXFLAGS_RELEASE="${CXXFLAGS}" \
        QMAKE_LFLAGS="${LDFLAGS}"
    popd

    pushd designer
    qmake6 INCLUDEPATH+=../src QMAKE_LIBDIR+=../src
    popd

    pushd Python
    mv pyproject{-qt6,}.toml
    popd
build      : |
    pushd ../QScintilla_src-${version}-qt5
    %make -C src

    pushd Python
    sip-build \
        --no-make \
        --qsci-features-dir ../src/features \
        --qsci-include-dir ../src \
        --qsci-library-dir ../src \
        --api-dir /usr/share/qt5/qsci/api/python
    %make -C build
    popd
    popd

    %make -C src
    %make -C designer

    pushd Python
    sip-build \
        --no-make \
        --qsci-features-dir ../src/features \
        --qsci-include-dir ../src \
        --qsci-library-dir ../src \
        --qmake=/usr/bin/qmake6 \
        --api-dir /usr/share/qt6/qsci/api/python
    %make -C build
    popd
install    : |
    pushd ../QScintilla_src-${version}-qt5
    %make_install -C src INSTALL_ROOT=${installdir}
    %make_install -C Python/build INSTALL_ROOT=${installdir}
    popd

    %make_install -C src INSTALL_ROOT=${installdir}
    %make_install -C designer INSTALL_ROOT=${installdir}
    %make_install -C Python/build INSTALL_ROOT=${installdir}

    for d in qt5 qt6; do
        install -Dm00644 LICENSE -t "${installdir}/usr/share/licenses/${package}-${d}/"
    done
patterns   :
    - devel :
        - /usr/lib64/qt*/mkspecs
    - ^python-qscintilla-qt5 :
        - /usr/lib/python3.*/site-packages/PyQt5
        - /usr/lib/python3.*/site-packages/qscintilla-*.dist-info
    - ^python-qscintilla-qt6 :
        - /usr/lib/python3.*/site-packages/PyQt6
        - /usr/lib/python3.*/site-packages/pyqt6_qscintilla-*.dist-info
    - qt5 :
        - /usr/lib64/libqscintilla2_qt5.so.*
        - /usr/share/licenses/qscintilla-qt5/LICENSE
        - /usr/share/qt5
    - qt6 :
        - /usr/lib64/libqscintilla2_qt6.so.*
        - /usr/share/licenses/qscintilla-qt6/LICENSE
        - /usr/share/qt6
replaces   :
    - devel : qscintilla-qt5-devel
    - ^python-qscintilla-qt5 : python-qscintilla
