# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qbittorrent
version    : 5.2.2
release    : 110
source     :
    - https://github.com/qbittorrent/qBittorrent/archive/refs/tags/release-5.2.2.tar.gz : 177efdadcd66fa66c473e97ee8ed117ce33ccb9a0a25a0716b62245ce506d1d7
homepage   : https://www.qbittorrent.org/
license    : GPL-2.0-or-later
component  : network.download
summary    : qBittorrent project aims to provide a Free Software alternative to µTorrent
description: |
    qBittorrent project aims to provide a Free Software alternative to µTorrent
builddeps  :
    - pkgconfig(Qt6Help)
    - pkgconfig(Qt6Svg)
    - pkgconfig(libtorrent-rasterbar)
    - libboost-devel
    - qt6-base-private-devel
rundeps    :
    - qt6-svg
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING*
