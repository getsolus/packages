# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qtractor
version    : 1.6.0
release    : 49
source     :
    - https://sourceforge.net/projects/qtractor/files/qtractor/1.6.0/qtractor-1.6.0.tar.gz : d22315756963456c32a7361343eb64fb2e900baf2e62021d05ff88ba31a5b794
homepage   : https://qtractor.org/
license    : GPL-2.0-or-later
component  : multimedia.audio
summary    : Qtractor is an audio/MIDI multi-track sequencer application
description: |
    Qtractor is an audio/MIDI multi-track sequencer application
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Svg)
    - pkgconfig(alsa)
    - pkgconfig(jack)
    - pkgconfig(liblo)
    - pkgconfig(lilv-0)
    - pkgconfig(mad)
    - pkgconfig(rubberband)
    - pkgconfig(samplerate)
    - pkgconfig(sndfile)
    - pkgconfig(suil-0)
    - pkgconfig(vorbis)
    - ladspa-devel
setup      : |
    %cmake_ninja \
        -D CONFIG_QT6=ON \
        -D CONFIG_LV2_UI_GTK2=OFF \
        -D CONFIG_LV2_UI_GTKMM2=OFF \
        -W no-dev
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
