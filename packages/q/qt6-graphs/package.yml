# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qt6-graphs
version    : 6.11.1
release    : 2
source     :
    - https://download.qt.io/official_releases/qt/6.11/6.11.1/submodules/qtgraphs-everywhere-src-6.11.1.tar.xz : 84b1138ab68a8e2956439895a4b85eb68dda48ac169da673f67191873b1e0462
license    :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
component  :
    - desktop.qt
homepage   : https://www.qt.io
summary    : Qt6 Graphs Module
description: |
    The Qt Graphs module enables you to visualize data in 2D and 3D graphs. Qt Graphs is built on Qt 6 and the 3D graphs on Qt Quick 3D to take advantage of hardware acceleration and Qt Quick.
builddeps  :
    - pkgconfig(Qt63DCore)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Quick3D)
    - pkgconfig(Qt6ShaderTools)
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
                 -DCMAKE_MESSAGE_LOG_LEVEL=STATUS
build      : |
    %ninja_build
install    : |
    %ninja_install

    %install_license LICENSES/*
