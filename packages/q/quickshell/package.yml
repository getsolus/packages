# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : quickshell
version    : 0.3.0
release    : 7
source     :
    - https://git.outfoxxed.me/quickshell/quickshell/archive/v0.3.0.tar.gz : f4821f9084cab04bd2b5384cc92b9726aecc4ce3eb27200dca24edc67da3b6e5
homepage   : https://quickshell.org/
license    : LGPL-3.0-only
component  : system.utils
summary    : Building blocks for your desktop
description: |
    Quickshell is a toolkit for building status bars, widgets, lockscreens, and other desktop components using QtQuick. It can be used alongside your wayland compositor or window manager to build a complete desktop environment.
builddeps  :
    - pkgconfig(CLI11)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6ShaderTools)
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(jemalloc)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(wayland-protocols)
    - cpptrace-devel
    - qt6-base-private-devel
rundeps    :
    - polkit
    - power-profiles-daemon
    - upower
setup      : |
    %cmake_ninja \
        -DCRASH_REPORTER=OFF \
        -DINSTALL_QMLDIR="lib/qt6/qml" \
        -DDISTRIBUTOR="Solus" \
        -DNO_PCH=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE LICENSE-GPL
