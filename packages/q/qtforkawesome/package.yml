# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qtforkawesome
version    : 0.3.2
release    : 1
source     :
    - https://github.com/Martchus/qtforkawesome/archive/refs/tags/v0.3.2.tar.gz : 9215162e9dd73eb64047de5f2a21c654ce8e6df2994ebe558b7fd7a31b28bb52
homepage   : https://github.com/Martchus/qtforkawesome
networking: true
license    : GPL-2.0-or-later
component  : programming.library
summary    : Library that bundles ForkAwesome for use within Qt applications
description: |
    Library that bundles ForkAwesome for use within Qt applications
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Quick)
    - pkgconfig(c++utilities)
    - perl-yaml-tiny
    - qtutilities
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja -DBUILD_SHARED_LIBS=ON -DQT_PACKAGE_PREFIX:STRING='Qt6'
build      : |
    %ninja_build
install    : |
    %ninja_install

    # Install Licence
    %install_license LICENSE
