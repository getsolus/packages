# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qtforkawesome
version    : 0.3.2
release    : 1
source     :
    - https://github.com/Martchus/qtforkawesome/archive/refs/tags/v0.3.2.tar.gz : 9215162e9dd73eb64047de5f2a21c654ce8e6df2994ebe558b7fd7a31b28bb52
    - https://github.com/ForkAwesome/Fork-Awesome/archive/refs/tags/1.2.0.tar.gz#Fork-Awesome-1.2.0.tar.gz : 23fba5f191f204e0414c547bf4c9b10fd7ca42c151260e8f64698449a75fbdb3
homepage   : https://github.com/Martchus/qtforkawesome
license    : GPL-2.0-or-later
component  : programming.library
summary    : Library that bundles ForkAwesome for use within Qt applications
description: |
    Library that bundles ForkAwesome for use within Qt applications
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Quick)
    - pkgconfig(c++utilities)
    - perl-yaml-tiny
    - qtutilities
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    mkdir ${sources}/forkawesome
    tar -xf ${sources}/Fork-Awesome-1.2.0.tar.gz -C ${sources}/forkawesome

    %cmake_ninja \
        -DBUILD_SHARED_LIBS=ON \
        -DQT_PACKAGE_PREFIX:STRING='Qt6' \
        -DFORK_AWESOME_FONT_FILE='%sources%/forkawesome/Fork-Awesome-1.2.0/fonts/forkawesome-webfont.woff2' \
        -DFORK_AWESOME_ICON_DEFINITIONS='%sources%/forkawesome/Fork-Awesome-1.2.0/src/icons/icons.yml'
build      : |
    %ninja_build
install    : |
    %ninja_install

    # Install Licence
    %install_license LICENSE

    # Install Fork-Awesome Licence
    %install_license ${sources}/forkawesome/Fork-Awesome-1.2.0/LICENSES
