# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qsynth
version    : 1.0.6
release    : 15
source     :
    - https://download.sourceforge.net/qsynth/qsynth-1.0.6.tar.gz : 7bba1591aec2aeb57171aa37697d33f038de7ee22b3f8cf50aaada772ca89ac1
homepage   : https://qsynth.sourceforge.io/
license    : GPL-2.0-or-later
component  : multimedia.audio
summary    : Fluidsynth GUI frontend
description: |
    Qsynth is a fluidsynth GUI front-end application written in C++ around the Qt framework.
builddeps  :
    - pkgconfig(Qt6Help)
    - pkgconfig(Qt6Svg)
    - pkgconfig(fluidsynth)
rundeps    :
    - pipewire-jack
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
