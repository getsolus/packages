# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qrca
version    : 26.04.3
release    : 4
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/qrca-26.04.3.tar.xz : d67d2fa3ba6d96ef73e0335ccd99661c6cd479e99bffc1e3b21ddb23ac21148e
homepage   : https://apps.kde.org/qrca/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.kde
summary    : qrca is an application for Plasma Desktop that lets you scan many barcode formats and create your own QR code images.
description: |
    qrca is an application for Plasma Desktop that lets you scan many barcode formats and create your own QR code images.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Svg)
    - extra-cmake-modules
    - kf6-kconfig-devel
    - kf6-kcontacts-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-knotifications-devel
    - kf6-networkmanager-qt-devel
    - kf6-prison-devel
    - kirigami-addons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
