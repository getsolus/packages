# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qcoro
version    : 0.13.0
release    : 7
source     :
    - https://github.com/danvratil/qcoro/archive/refs/tags/v0.13.0.tar.gz : 4bff7513c5c8e301b66308df05795043b1792ed16381a484e5c990171b8ff19e
homepage   : https://qcoro.dvratil.cz/
license    : MIT
description: |
    The QCoro library provides set of tools to make use of C++20 coroutines with Qt.
component  : programming.library
summary    : The QCoro library provides set of tools to make use of C++20 coroutines with Qt.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6WebSockets)
    - qt6-base-private-devel
setup      : |
    %cmake_ninja \
        -DUSE_QT_VERSION=6 \
        -DBUILD_SHARED_LIBS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
check      : |
    %ninja_check
