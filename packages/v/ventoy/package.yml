# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ventoy
version    : 1.1.10
release    : 1
source     :
    - https://github.com/ventoy/Ventoy/releases/download/v1.1.10/ventoy-1.1.10-linux.tar.gz : 1113abe6e1bb712834fe574a966621a912858004f4fefd701666ec97c5beb208
homepage   : https://www.ventoy.net/
license    : GPL-3.0-or-later
component  : system.utils
summary    : An open source tool to create bootable USB drives for ISO/WIM/IMG/VHD(x)/EFI files
description: |
    Ventoy is an open source tool to create bootable USB drive for ISO/WIM/IMG/VHD(x)/EFI files. With Ventoy, you don't need to format the disk over and over, you just need to copy the image files to the USB drive and boot them directly. You can copy many files at a time and Ventoy will give you a boot menu to select them.
builddeps  :
    - pkgconfig(gtk+-3.0)
    - pkgconfig(Qt5Widgets)
rundeps    :
    - bash
    - dosfstools
    - e2fsprogs
    - exfatprogs
    - ntfs-3g
    - parted
    - polkit
    - util-linux
install    : |
    install -dm00755 $installdir/usr/share/ventoy
    install -dm00755 $installdir/usr/bin
    install -dm00755 $installdir/usr/share/applications
    install -dm00755 $installdir/usr/share/icons/hicolor/128x128/apps
    cp -a * $installdir/usr/share/ventoy/
    # Remove unused architectures to prevent ypkg scanner errors
    rm -rf $installdir/usr/share/ventoy/tool/{aarch64,i386,mips64el}
    cp WebUI/static/img/VentoyLogo.png $installdir/usr/share/icons/hicolor/128x128/apps/ventoy.png
    # Manually create desktop entry
    cat << EOF > $installdir/usr/share/applications/ventoy.desktop
    [Desktop Entry]
    Name=Ventoy
    GenericName=Bootable USB Creator
    Comment=Create bootable USB drive for ISO/WIM/IMG/VHD(x)/EFI files
    Exec=ventoygui
    Icon=ventoy
    Terminal=false
    Type=Application
    Categories=System;Utility;
    EOF

    # Create Wrappers
    
    cat << EOF > $installdir/usr/bin/ventoygui
    #!/bin/bash
    cd /usr/share/ventoy
    exec ./VentoyGUI.x86_64 "\$@"
    EOF
    
    cat << EOF > $installdir/usr/bin/ventoyweb
    #!/bin/bash
    cd /usr/share/ventoy
    exec ./VentoyWeb.sh "\$@"
    EOF
    
    cat << EOF > $installdir/usr/bin/ventoy2disk
    #!/bin/bash
    cd /usr/share/ventoy
    exec ./Ventoy2Disk.sh "\$@"
    EOF
    
    cat << EOF > $installdir/usr/bin/ventoyplugson
    #!/bin/bash
    cd /usr/share/ventoy
    exec ./VentoyPlugson.sh "\$@"
    EOF

    # Make wrappers executable
    chmod +x $installdir/usr/bin/ventoygui
    chmod +x $installdir/usr/bin/ventoyweb
    chmod +x $installdir/usr/bin/ventoy2disk
    chmod +x $installdir/usr/bin/ventoyplugson
