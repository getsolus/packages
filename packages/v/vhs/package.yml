# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : vhs
version    : 0.11.0
release    : 1
source     :
    - https://github.com/charmbracelet/vhs/archive/refs/tags/v0.11.0.tar.gz : c08b8502989fe7e9626c02938f3fc512c2a4ba21f839f455d20d7eb1da7bc39f
homepage   : https://github.com/charmbracelet/vhs
license    : MIT
component  : programming.tools
summary    : Your CLI home video recorder
description: |
    Write terminal GIFs as code for integration testing and demoing your CLI tools.
networking : true
builddeps  :
    - golang
rundeps    :
    - ffmpeg
    - ttyd
setup      : |
    go mod vendor
build      : |
    export GOFLAGS="-buildmode=pie -trimpath -mod=vendor -modcacherw"
    # Refresh embedded themes (see Makefile)
    %make all

    go build -v -ldflags "-linkmode=external -X main.Version=%version%" -o vhs .
    
    # Generate shell completions and manual page artifacts.
    ./vhs completion bash > vhs.bash
    ./vhs completion zsh > _vhs
    ./vhs completion fish > vhs.fish
    ./vhs manual > vhs.1
install    : |
    # Install binaries.
    %install_license LICENSE
    install -Dm00755 vhs ${installdir}/usr/share/vhs/vhs
    install -Dm00755 ${pkgfiles}/vhs.sh ${installdir}/usr/bin/vhs

    # Install completions and man page.
    install -Dm00644 vhs.bash ${installdir}/usr/share/bash-completion/completions/vhs
    install -Dm00644 _vhs ${installdir}/usr/share/zsh/site-functions/_vhs
    install -Dm00644 vhs.fish ${installdir}/usr/share/fish/vendor_completions.d/vhs.fish
    install -Dm00644 vhs.1 ${installdir}/usr/share/man/man1/vhs.1
