# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : vpl-gpu-rt
version    : 26.1.5
release    : 5
source     :
    - https://github.com/intel/vpl-gpu-rt/archive/refs/tags/intel-onevpl-26.1.5.tar.gz : d2f297dc03d4e5585bee75ce3bafc5c8a35b30ac60ff7d6b49c1ed6f6b8152a3
homepage   : https://github.com/intel/vpl-gpu-rt/
license    : MIT
component  : programming.library
summary    : Intel VPL runtime implementation for Intel GPUs (Tiger Lake and newer)
description: |
    Intel VPL runtime implementation for Intel GPUs (Tiger Lake and newer)
builddeps  :
    - pkgconfig(libdrm)
    - pkgconfig(libva)
rundeps    :
    - intel-media-driver
clang      : true
optimize   : thin-lto
setup      : |
    %patch -p1 -i $pkgfiles/reproducible.patch
    %cmake_ninja \
        -DMFX_ENABLE_AENC:BOOL='ON'
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
