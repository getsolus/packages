# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : veusz
version    : 4.2.1
release    : 26
source     :
    - https://github.com/veusz/veusz/archive/refs/tags/veusz-4.2.1.tar.gz : 084f87907d73a3229e041c2dcbcbece19a31141105b7f5e77f5b3a8c75543b4b
homepage   : https://veusz.github.io/
license    : GPL-2.0-or-later
component  : office.scientific
summary    : A Scientific Plotting and Graphing Program
description: |
    Veusz is a scientific plotting and graphing program with a graphical user interface, designed to produce publication-ready 2D plots.
builddeps  :
    - pkgconfig(Qt6Gui)
    - pkgconfig(python3)
    - ghostscript-devel
    - numpy
    - python-build
    - python-installer
    - python-qt6
    - python-setuptools
    - python-sip
rundeps    :
    - numpy
    - python-qt6
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license COPYING

    install -Dm00644 support/veusz.desktop $installdir/usr/share/applications/veusz.desktop
    install -Dm00644 support/veusz.appdata.xml $installdir/usr/share/metainfo/veusz.appdata.xml
    install -Dm00644 icons/veusz.svg $installdir/usr/share/icons/hicolor/scalable/apps/veusz.svg

    for i in 16 32 48 64 128; do
        install -Dm00644 icons/veusz_${i}.png $installdir/usr/share/icons/hicolor/${i}x${i}/apps/veusz.png
    done
