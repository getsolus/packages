# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : vscodium
version    : 1.121.03429
release    : 2
source     :
    - https://github.com/VSCodium/vscodium/releases/download/1.121.03429/VSCodium-1.121.03429-src.tar.gz : 
        36a97e323555b47aa706d58618cc30779d779fff4020e6e75b0bdf7af1089876
    - git|https://github.com/microsoft/vscode.git : 1.121.0
homepage   : https://vscodium.com/
license    : MIT
component  : programming.ide
summary    : VSCodium is a community-driven, freely-licensed binary distribution of Microsoft’s editor VS Code.
networking : true
description: |
    VSCodium is a community-driven, freely-licensed binary distribution of Microsoft’s editor VS Code.
environment: |
    # 4 digit time patch added in ./vscodium/get_repo.sh
    export RELEASE_VERSION=$(echo "%version%" | sed 's/[0-9]\{4\}$//')
    export PATH=/usr/lib64/nodejs-22/bin:$PATH
    export SHOULD_BUILD=yes
    export SHOULD_BUILD_REH=no
    export SHOULD_BUILD_REH_WEB=no
    export VSCODE_QUALITY=stable
    export OS_NAME=linux
    export CI_BUILD=yes
builddeps  :
    - pkgconfig(atk)
    - pkgconfig(atk-bridge-2.0)
    - pkgconfig(atspi-2)
    - pkgconfig(cairo)
    - pkgconfig(cups)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(krb5)
    - pkgconfig(libsecret-1)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(pango)
    - pkgconfig(webkit2gtk-4.1)
    - pkgconfig(x11)
    - pkgconfig(xcomposite)
    - pkgconfig(xdamage)
    - pkgconfig(xfixes)
    - pkgconfig(xkbfile)
    - pkgconfig(xrandr)
    - desktop-file-utils
    - gcc
    - jq
    - make
    - nodejs-22
setup      : |
    install -dm 00755 %workdir%/vscode/

    # copies both dot files and non-dot files
    cp -aR $sources/vscode.git/. %workdir%/vscode

    # force it to use node-22 instead of the build default
    %patch -p1 -i $pkgfiles/0001-prepare-vscode-setup-script.patch
    ./prepare_vscode.sh

    # patch to fill in placeholders
    %patch -p1 -i $pkgfiles/0002-prepare-desktop-file.patch
build      : |
    pushd $workdir/vscode

    # step in ./vscodium/build.sh
    npm-22 run gulp vscode-min-prepack

    # steps in ./vscodium/build/linux/package_bin.sh
    npm-22 run copy-policy-dto --prefix build
    node ./build/lib/policies/policyGenerator.ts ./build/lib/policies/policyData.jsonc linux
    npm-22 run gulp vscode-linux-x64-min-packing
install    : |
    install -dm 00755 $installdir/usr/share/vscodium

    cp -aR %workdir%/VSCode-linux-x64/* $installdir/usr/share/vscodium/

    install -Dm00644 %workdir%/src/stable/resources/linux/code.desktop $installdir/usr/share/applications/com.vscodium.codium.desktop
    install -Dm00644 %workdir%/src/stable/resources/linux/code.svg $installdir/usr/share/icons/hicolor/scalable/apps/vscodium.svg
    install -Dm00644 $pkgfiles/com.vscodium.codium.metainfo.xml $installdir/usr/share/metainfo/com.vscodium.codium.metainfo.xml

    install -Dm00644 %workdir%/VSCode-linux-x64/resources/completions/bash/codium $installdir/usr/share/bash-completion/completions/codium
    install -Dm00644 %workdir%/VSCode-linux-x64/resources/completions/zsh/_codium $installdir/usr/share/zsh/site-functions/_codium

    install -dm 00755 $installdir/usr/bin
    ln -srv $installdir/usr/share/vscodium/bin/codium $installdir/usr/bin/codium

    %install_license LICENSE
check    : |
    desktop-file-validate $installdir/usr/share/applications/com.vscodium.codium.desktop