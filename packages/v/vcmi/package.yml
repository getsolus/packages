# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : vcmi
version    : 1.7.4
release    : 35
source     :
    - git|https://github.com/vcmi/vcmi.git : 1.7.4
homepage   : https://vcmi.eu/
license    :
    - CC-BY-SA-4.0
    - GPL-2.0-or-later
component  : games.strategy
summary    : Open-source engine for Heroes of Might and Magic III
description: |
    VCMI is an open-source implementation of the Heroes III engine, giving it new and extended possibilities. To use VCMI you need to own original data files.
optimize   :
    - runpath
builddeps  :
    - pkgconfig(Qt5Network)
    - pkgconfig(Qt5Svg)
    - pkgconfig(Qt5Widgets)
    - pkgconfig(Qt5Xml)
    - pkgconfig(SDL2_image)
    - pkgconfig(SDL2_mixer)
    - pkgconfig(SDL2_ttf)
    - pkgconfig(egl)
    - pkgconfig(libavcodec)
    - pkgconfig(libavformat)
    - pkgconfig(libavutil)
    - pkgconfig(libswresample)
    - pkgconfig(libswscale)
    - pkgconfig(luajit)
    - pkgconfig(minizip)
    - pkgconfig(sdl2)
    - pkgconfig(tbb)
    - pkgconfig(x11)
    - libboost-devel
    - libsquish-devel
    - qt5-tools-devel
rundeps    :
    - innoextract
setup      : |
    %patch -p1 -i $pkgfiles/fix-translated-metadata-output.patch
    %cmake \
        -DBUILD_SHARED_LIBS=ON \
        -DCMAKE_SKIP_RPATH=FALSE \
        -DENABLE_DISCORD=OFF \
        -DENABLE_MMAI=OFF \
        -DCMAKE_INSTALL_RPATH_USE_LINK_PATH=TRUE \
        -DCMAKE_INSTALL_RPATH=%libdir%/vcmi
build      : |
    %make
install    : |
    %make_install
    %install_license license*
