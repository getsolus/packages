# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : visidata
version    : '3.3'
release    : 15
source     :
    - https://github.com/saulpw/visidata/archive/refs/tags/v3.3.tar.gz : 4d7f93bdcc6da98030df5e3198e4098d9b57b9cae6f0ccaca9820a85e1bef51b
homepage   : https://www.visidata.org/
license    : GPL-3.0-only
component  : office.viewers
summary    : A terminal spreadsheet multitool for discovering and arranging data
description: |
    VisiData supports tsv, csv, sqlite, json, xlsx (Excel), hdf5, and many other formats.
builddeps  :
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE*
