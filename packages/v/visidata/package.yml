# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : visidata
version    : '3.4'
release    : 17
source     :
    - https://github.com/saulpw/visidata/archive/refs/tags/v3.4.tar.gz : afd17d636b2dafb52c64e1f6e7c75c1b6adfb66a6834009ef0e76ee278685df7
homepage   : https://www.visidata.org/
license    : GPL-3.0-only
component  : office.viewers
summary    : A terminal spreadsheet multitool for discovering and arranging data
description: |
    VisiData supports tsv, csv, sqlite, json, xlsx (Excel), hdf5, and many other formats.
builddeps  :
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE*
