# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : weechat
version    : 4.8.2
release    : 101
source     :
    - https://github.com/weechat/weechat/archive/refs/tags/v4.8.2.tar.gz : 16f61a75db8f2d661bb1ceaea5d82d7fffb6a0e20db95f49130fe965007110b1
homepage   : https://weechat.org
license    : GPL-3.0-or-later
summary    : WeeChat is a fast, light and extensible chat client.
component  : network.irc
description: |
    WeeChat is a fast, light and extensible chat client.
builddeps  :
    - pkgconfig(bdw-gc)
    - pkgconfig(enchant-2)
    - pkgconfig(gnutls)
    - pkgconfig(guile-2.0)
    - pkgconfig(libcjson)
    - pkgconfig(libcurl)
    - pkgconfig(libgcrypt)
    - pkgconfig(libzstd)
    - pkgconfig(lua-5.4)
    - pkgconfig(python3)
    - pkgconfig(ruby-3.4)
    - pkgconfig(tcl)
    - asciidoctor
    - perl
rundeps    :
    - perl
setup      : |
    %cmake_ninja \
        -DENABLE_ENCHANT=ON \
        -DENABLE_JAVASCRIPT=OFF \
        -DENABLE_PHP=OFF \
        -DENABLE_MAN=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING LICENSES/*
