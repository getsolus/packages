# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : wxPython
version    : 4.2.5
release    : 19
source     :
    - https://files.pythonhosted.org/packages/source/w/wxPython/wxpython-4.2.5.tar.gz : 44e836d1bccd99c38790bb034b6ecf70d9060f6734320560f7c4b0d006144793
homepage   : https://wxpython.org/
license    : LGPL-2.0-or-later WITH WxWindows-exception-3.1
component  : programming.python
summary    : A blending of the wxWidgets C++ class library with the Python programming language
description: |
    A blending of the wxWidgets C++ class library with the Python programming language.
builddeps  :
    - pkgconfig(glu)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libnotify)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(python3)
    - pkgconfig(sdl2)
    - pkgconfig(sm)
    - pkgconfig(webkit2gtk-4.1)
    - cython
    - doxygen
    - python-requests
    - python-setuptools
    - python-sip
    - wxwidgets-devel
networking : true
rundeps    :
    - wxwidgets
setup      : |
    # todo 3.11
    #rm -r sip/{cpp,gen}/*
build      : |
    SIP=/usr/bin/sip DOXYGEN=/usr/bin/doxygen \
    python3 build.py --nodoc sip build --use_syswx --release
install    : |
    python3 build.py install --destdir=$installdir
