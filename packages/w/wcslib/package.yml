# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : wcslib
version    : '8.7'
release    : 2
source     :
    - https://www.atnf.csiro.au/computing/software/wcs/wcslib-releases/wcslib-8.7.tar.bz2 : 792fe05c09544433a9a4ea5480facdbec2da6d28058275b5e9006a1f28c56465
homepage   : https://www.atnf.csiro.au/computing/software/wcs/WCS/
license    : LGPL-3.0-or-later
component  : office.scientific
summary    : An implementation of the FITS World Coordinate System standard
description: |
    WCSLIB is a library that implements the "World Coordinate System" (WCS) convention in FITS (Flexible Image Transport System)
setup      : |
    %configure
build      : |
    %make
install    : |
    %make_install
    # Remove static libs
    rm $installdir/usr/lib64/libwcs{,-8.7}.a
