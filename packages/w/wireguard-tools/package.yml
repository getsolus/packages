# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : wireguard-tools
version    : 1.0.20260223
release    : 10
source     :
    - https://git.zx2c4.com/wireguard-tools/snapshot/wireguard-tools-1.0.20260223.tar.xz : af459827b80bfd31b83b08077f4b5843acb7d18ad9a33a2ef532d3090f291fbf
homepage   : https://www.wireguard.com/
license    : GPL-2.0-only
component  : network.util
summary    : Required tools for WireGuard, such as wg(8) and wg-quick(8)
description: |
    This supplies the main userspace tooling for using and configuring WireGuard tunnels, including the wg(8) and wg-quick(8) utilities.
rundeps    :
    - iproute2
environment: |
    export WITH_WGQUICK=yes
    export WITH_SYSTEMDUNITS=yes
build      : |
    %make -C src
install    : |
    %make_install -C src

    # Remove empty directories
    rm -r $installdir/etc
