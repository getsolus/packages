# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : warpinator
version    : 2.0.3
release    : 6
source     :
    - https://github.com/linuxmint/warpinator/archive/refs/tags/2.0.3.tar.gz : 4216d3b9dc379cc96ed2968e23f4035d253d89c6050d618286abe5472e64aac3
homepage   : https://github.com/linuxmint/warpinator/
license    : GPL-3.0-or-later
component  : network.util
summary    : Send and receive files across a local network
description: |
    Warpinator allows you to easily connect multiple computers on a local area network and share files quickly and securely.
builddeps  :
    - pkgconfig(polkit-gobject-1)
rundeps    :
    - python-grpcio
    - python-netifaces
    - python-protobuf
    - python-pynacl
    - python-qrcode
    - python-setproctitle
    - python-xapp
    - python-zeroconf
    - xapp
setup      : |
    %meson_configure \
        -Dbundle-zeroconf=false \
        -Dbundle-grpc=false
build      : |
    %ninja_build
install    : |
    %ninja_install
    # Remove autostart file
    rm -fr $installdir/etc/
