# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : warpinator
version    : 2.0.4
release    : 7
source     :
    - https://github.com/linuxmint/warpinator/archive/refs/tags/2.0.4.tar.gz : 2e36a58a621a31594131855c9ccbc88d352fec647536b1fa798fc09faf8bb42c
homepage   : https://github.com/linuxmint/warpinator/
license    : GPL-3.0-or-later
component  : network.util
summary    : Send and receive files across a local network
description: |
    Warpinator allows you to easily connect multiple computers on a local area network and share files quickly and securely.
builddeps  :
    - pkgconfig(polkit-gobject-1)
rundeps    :
    - python-grpcio
    - python-netifaces
    - python-protobuf
    - python-pynacl
    - python-qrcode
    - python-setproctitle
    - python-xapp
    - python-zeroconf
    - xapp
setup      : |
    %meson_configure \
        -Dbundle-zeroconf=false \
        -Dbundle-grpc=false
build      : |
    %ninja_build
install    : |
    %ninja_install
    # Remove autostart file
    rm -fr $installdir/etc/
    %install_license COPYING
