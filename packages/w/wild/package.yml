# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : wild
version    : 0.9.0
release    : 1
source     :
    - https://github.com/wild-linker/wild/archive/refs/tags/0.9.0.tar.gz : f70ac025d158fd2c41be8f895a90a8f39b8b89fefbbb8ad5f45441f57b80156a
homepage   : https://github.com/wild-linker/wild
license    :
    - Apache-2.0
    - MIT
component  : programming.tools
summary    : A very fast linker for Linux
description: |
    Wild is a linker with the goal of being very fast for iterative development.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install
    %install_license LICENSE-*

    ln -sv $installdir/usr/bin/wild $installdir/usr/bin/ld.wild
