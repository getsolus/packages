# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-ipykernel
version    : 7.3.0
release    : 28
source     :
    - https://files.pythonhosted.org/packages/source/i/ipykernel/ipykernel-7.3.0.tar.gz : 9acaaaf97d16355166e4085afe9d225bfbdf2b7ef520f9df3be8f2b248275e09
homepage   : https://github.com/ipython/ipykernel
license    : BSD-3-Clause
component  : programming.python
summary    : IPython Kernel for Jupyter
description: |
    IPython Kernel for Jupyter.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-jupyter_client
    - python-nest-asyncio
checkdeps  :
    - matplotlib
    - python-comm
    - python-debugpy
    - python-flaky
    - python-ipyparallel
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-cov
    - python-pytest-timeout
    - python-trio
rundeps    :
    - python-comm
    - python-debugpy
    - python-ipython
    - python-jupyter_client
    - python-nest-asyncio
    - python-psutil
setup      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Headless build root has no display; upstream skips GUI tests when CI is set.
    # test_run_concurrently_sequence probes --cov, which requires pytest-cov.
    export CI=1
    %python3_test pytest -v
