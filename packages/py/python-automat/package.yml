# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-automat
version    : 25.4.16
release    : 14
source     :
    - https://files.pythonhosted.org/packages/source/a/automat/automat-25.4.16.tar.gz : 0017591a5477066e90d26b0e696ddc143baafd87b588cfac8100bc6be9634de0
homepage   : https://github.com/glyph/automat
license    : MIT
component  : programming.python
summary    : Self-service finite-state machines for the programmer on the go
description: |
    Automat is a library for concise, idiomatic Python expression of finite-state automata (particularly deterministic finite-state transducers).
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - python-attrs
    - python-six
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v ${installdir}/%PREFIX%/lib/python%python3_version%/site-packages/automat/_test
