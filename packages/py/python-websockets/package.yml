# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-websockets
version    : 16.0
release    : 14
source     :
    - https://files.pythonhosted.org/packages/source/w/websockets/websockets-16.0.tar.gz : 5f6261a5e56e8d5c42a4497b364ea24d94d9563e8fbd44e78ac40879c60179b5
homepage   : https://github.com/python-websockets/websockets
license    : BSD-3-Clause
component  : programming.python
summary    : An implementation of the WebSocket Protocol (RFC 6455 & 7692)
description: |
    websockets is a library for building WebSocket servers and clients in Python with a focus on correctness and simplicity. Built on top of asyncio, Python's standard asynchronous I/O framework, it provides an elegant coroutine-based API.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
