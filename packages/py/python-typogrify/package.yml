# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-typogrify
version    : 2.1.0
release    : 8
source     :
    - https://files.pythonhosted.org/packages/source/t/typogrify/typogrify-2.1.0.tar.gz : f0aa004e98032a6e6be4c9da65e7eb7150e36ca3bf508adbcda82b4d003e61ee
homepage   : https://github.com/mintchaos/typogrify
license    : BSD-3-Clause
