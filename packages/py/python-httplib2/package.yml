# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-httplib2
version    : 0.32.0
release    : 14
source     :
    - https://github.com/httplib2/httplib2/archive/refs/tags/v0.32.0.tar.gz : 14e842d2041ae3cf11f2e82f1b3454e0283050cc38599ed87d116e005097e470
homepage   : https://github.com/httplib2/httplib2
license    : MIT
component  : programming.python
summary    : Small, fast HTTP client library for Python
description: |
    Small, fast HTTP client library for Python. Features persistent connections, cache, Appengine support.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-six
    - python-wheel
rundeps    :
    - pyparsing
setup      : |
    # Don't hardcode support for one old version please...
    sed -i 's/==/>=/' requirements-test.txt
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
#    # Requires python-pytest-xdist, use wheel and networking for local check.
#    %python3_test
