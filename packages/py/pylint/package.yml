# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pylint
version    : 3.3.4
release    : 42
source     :
    - https://github.com/pylint-dev/pylint/archive/refs/tags/v3.3.4.tar.gz : bdb1f2218222df18d1b1336686d81f5e0a03de28acaa3092fae9fbe660ca76db
homepage   : https://github.com/PyCQA/pylint
license    : GPL-2.0-or-later
component  : programming.tools
summary    : Pylint is a static code analyser for Python
description: |
    Pylint is a Python static code analysis tool which looks for programming errors, helps enforcing a coding standard, sniffs for code smells and offers simple refactoring suggestions.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - mccabe
    - python-astroid
    - python-dill
    - python-isort
    - python-magic
    - python-platformdirs
    - python-pytest-benchmark
    - python-pytest-timeout
    - python-six
    - python-tomlkit
    - python-typing-extensions
rundeps    :
    - mccabe
    - python-astroid
    - python-dill
    - python-isort
    - python-platformdirs
    - python-tomlkit
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Need to undeprecate and update python-gitpython and deps
    rm tests/testutils/_primer/{test_package_to_lint.py,test_primer.py}

    # skip failing tests
    skiptest='test_do_not_import_files_from_local_directory'

    # Needs requests, which would introduce a circular dependency
    skiptest+=' or test_functional[missing_timeout]'
    skiptest+=' or test_functional[wrong_import_order]'

    # No idea why this is failing, the error is about not being able to import shazam from magic but magic doesn't have that class?
    skiptest+=' or test_functional[use_yield_from]'

    # Python 3.14: argparse help format change
    skiptest+=' or test_pylint_config_main_messages'

    # Python 3.14: functional test line numbers / stdlib changes
    skiptest+=' or test_functional[consider_using_with]'
    skiptest+=' or test_functional[typing_broken_callable]'
    skiptest+=' or test_functional[typing_broken_callable_future_import]'
    skiptest+=' or test_functional[typing_consider_using_union]'
    skiptest+=' or test_functional[typing_consider_using_union_py310]'
    skiptest+=' or test_functional[typing_consider_using_union_without_future]'
    skiptest+=' or test_functional[function_redefined_2540]'

    # Python 3.14: codecs.open() deprecation treated as error in pyreverse/import_graph tests
    %python3_test pytest3 -v -W default::DeprecationWarning -k "not (${skiptest})"
