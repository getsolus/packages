# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pycodestyle
version    : 2.14.0
release    : 19
source     :
    - https://github.com/PyCQA/pycodestyle/archive/refs/tags/2.14.0.tar.gz : ffcf4dc55f1e5fbdc6dd6acf5db0fd07ded534ae376eee23a742e1410b48d9ae
homepage   : https://github.com/PyCQA/pycodestyle
license    : MIT
component  : programming.python
summary    : Python style guide checker
description: |
    pycodestyle is a tool to check your Python code against some of the style conventions in PEP 8.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
