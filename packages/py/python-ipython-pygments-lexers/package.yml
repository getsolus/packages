# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-ipython-pygments-lexers
version    : 1.1.1
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/i/ipython_pygments_lexers/ipython_pygments_lexers-1.1.1.tar.gz : 09c0138009e56b6854f9535736f4171d855c8c08a563a0dcd8022f78355c7e81
homepage   : https://github.com/ipython/ipython-pygments-lexers
license    : BSD-3-Clause
component  : programming.python
summary    : Pygments lexers for IPython code and console sessions
description: |
    Defines Pygments lexers for highlighting IPython code and console sessions.
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
checkdeps  :
    - pygments
    - python-pytest
rundeps    :
    - pygments
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
