# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pyflakes
version    : 3.4.0
release    : 22
source     :
    - https://github.com/PyCQA/pyflakes/archive/refs/tags/3.4.0.tar.gz : b987f60fa44ae1a2374d162ba22b496ace1fd7af49d95df46335eeff6a99bf84
homepage   : https://github.com/PyCQA/pyflakes
license    : MIT
component  : programming.python
summary    : Passive checker of Python programs
description: |
    A simple program which checks Python source files for errors. Pyflakes analyzes programs and detects various errors. It works by parsing the source file, not importing it, so it is safe to use on modules with side effects. It's also much faster.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test
