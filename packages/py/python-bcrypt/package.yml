# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-bcrypt
version    : 5.0.0
release    : 18
source     :
    - https://github.com/pyca/bcrypt/archive/refs/tags/5.0.0.tar.gz : 00426239c15a99c6b3f61a43d5c825fb53ee64921ceb0bdf95d22d581bdba67e
homepage   : https://github.com/pyca/bcrypt
license    : Apache-2.0
component  : programming.python
summary    : Modern password hashing for your software and your servers
description: |
    Modern password hashing for your software and your servers
networking : true
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-rust
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - python-cffi
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
