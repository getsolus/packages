# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-charset-normalizer
version    : 3.4.7
release    : 13
source     :
    - https://pypi.io/packages/source/c/charset_normalizer/charset_normalizer-3.4.7.tar.gz : ae89db9e5f98a11a4bf50407d4363e7b09b31e55bc117b4f7d80aab97ba009e5
homepage   : https://github.com/ousret/charset_normalizer
license    : MIT
component  : programming.python
summary    : Truly universal encoding detector in pure Python
description: |
    The Real First Universal Charset Detector. Open, modern and actively maintained alternative to Chardet.
builddeps  :
    - python-build
    - python-installer
    - python-mypy
    - python-setuptools
    - python-setuptools-scm
checkdeps  :
    - python-pytest-cov
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
