# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-lxml-html-clean
version    : 0.4.4
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/l/lxml_html_clean/lxml_html_clean-0.4.4.tar.gz : 58f39a9d632711202ed1d6d0b9b47a904e306c85de5761543b90e3e3f736acfb
homepage   : https://github.com/fedora-python/lxml_html_clean
license    : BSD-3-Clause
component  : programming.python
summary    : HTML cleaner from the lxml project
description: |
    Separate project for the HTML cleaner that used to ship as lxml.html.clean. It removes unwanted tags and content from HTML documents.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-lxml
    - python-pytest
rundeps    :
    - python-lxml
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Doctest .txt tests fail on Python 3.14 due to lxml.doctestcompare incompatibility
    %python3_test pytest -v tests/test_clean.py
