# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-nbconvert
version    : 7.17.1
release    : 23
source     :
    - https://files.pythonhosted.org/packages/source/n/nbconvert/nbconvert-7.17.1.tar.gz : 34d0d0a7e73ce3cbab6c5aae8f4f468797280b01fd8bd2ca746da8569eddd7d2
homepage   : https://github.com/jupyter/nbconvert
license    : BSD-3-Clause
component  : programming.python
summary    : Jupyter Notebook Conversion
description: |
    The nbconvert tool, jupyter nbconvert, converts notebooks to various other formats via Jinja templates. The nbconvert tool allows you to convert an .ipynb notebook file into various static formats.
networking : true
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
rundeps    :
    - python-beautifulsoup4
    - python-bleach
    - python-defusedxml
    - python-jinja
    - python-jupyter_core
    - python-jupyterlab-pygments
    - python-mistune
    - python-nbclient
    - python-packaging
    - python-pandocfilters
setup      : |
    %python3_setup
install    : |
    %python3_install
