# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pyqt6-sip
version    : 13.11.1
release    : 24
source     :
    - https://pypi.debian.net/PyQt6-sip/pyqt6_sip-13.11.1.tar.gz : 869c5b48afe38e55b1ee0dd72182b0886e968cc509b98023ff50010b013ce1be
license    : GPL-3.0-or-later
component  : programming.python
homepage   : https://pypi.org/project/PyQt6-sip/
summary    : The sip module support for PyQt6
description: |
    The sip extension module provides support for the PyQt6 package.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
