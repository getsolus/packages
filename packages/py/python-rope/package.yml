# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-rope
version    : 1.14.0
release    : 24
source     :
    - https://github.com/python-rope/rope/archive/refs/tags/1.14.0.tar.gz : abd7d50021e847c33c9b36abdea8252f8d9b42701a3af363c8da6ac5f4ac7a7b
homepage   : https://github.com/python-rope/rope
license    : LGPL-3.0-or-later
component  : programming.python
summary    : Rope is a python refactoring library
description: |
    A python refactoring library. It provides features like refactorings and coding assists.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-platformdirs
    - python-pytest
    - python-pytoolconfig
rundeps    :
    - python-pytoolconfig
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # https://github.com/python-rope/rope/commit/702ff3bbb9636ba91f1187d5a0d32b1a8ea76609
    sed -i 's/check_call(\[sys\.executable, "-m", "pip", "uninstall"/check_call([session_venv_python_executable, "-m", "pip", "uninstall"/' ropetest/conftest.py
    %python3_test pytest -v
