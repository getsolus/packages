# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-packaging
version    : '26.2'
release    : 27
source     :
    - https://files.pythonhosted.org/packages/source/p/packaging/packaging-26.2.tar.gz : ff452ff5a3e828ce110190feff1178bb1f2ea2281fa2075aadb987c2fb221661
homepage   : https://packaging.pypa.io/
license    : Apache-2.0
component  : programming.python
summary    : Core utilities for Python packages
description: |
    Reusable core utilities for various Python Packaging interoperability specifications. This library provides utilities that implement the interoperability specifications which have clearly one correct behaviour (eg: PEP 440) or benefit greatly from having a single shared implementation (eg: PEP 425).
networking : true # flip this for python3 rebuilds
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
checkdeps  :
    - python-hypothesis
    - python-pretend
    - python-pytest
    - python-tomli-w
environment: |
    # flip this for python3 rebuilds
    export BOOTSTRAP=1
build      : |
    if [[ ${BOOTSTRAP} == "1" ]]; then
        python3 -m pip wheel --no-deps .
    else
        %python3_setup
    fi
install    : |
    if [[ ${BOOTSTRAP} == "1" ]]; then
        python3 -m pip install --root=%installroot% --no-deps --ignore-installed .
    else
        %python3_install
    fi
check      : |
    if [[ ${BOOTSTRAP} != "1" ]]; then
        %python3_test py.test3 -v
    fi
