# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-qtawesome
version    : 1.4.2
release    : 19
source     :
    - https://github.com/spyder-ide/qtawesome/archive/refs/tags/v1.4.2.tar.gz : f5c927ffcc52e68cca6813574dc51afc02649095a908ff406a133b2cfcbd9353
homepage   : https://github.com/spyder-ide/qtawesome
license    : MIT
component  : programming.python
summary    : Iconic fonts in PyQt and PySide applications
description: |
    QtAwesome enables iconic fonts such as Font Awesome and Elusive Icons in PyQt and PySide applications. It started as a Python port of the QtAwesome C++ library by Rick Blommers.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - python-qtpy
    - python-six
build      : |
    %python3_setup
install    : |
    %python3_install
