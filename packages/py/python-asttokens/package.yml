# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-asttokens
version    : 3.0.1
release    : 19
source     :
    - https://files.pythonhosted.org/packages/source/a/asttokens/asttokens-3.0.1.tar.gz : 71a4ee5de0bde6a31d64f6b13f2293ac190344478f081c3d1bccfcf5eacb0cb7
homepage   : https://github.com/gristlabs/asttokens
license    : Apache-2.0
component  : programming.python
summary    : Annotate Python AST trees with source text and token information
description: |
    The asttokens module annotates Python abstract syntax trees (ASTs) with the positions of tokens and text in the source code that generated them.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-astroid
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
