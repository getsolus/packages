# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pandas
version    : 3.0.3
release    : 33
source     :
    - https://files.pythonhosted.org/packages/source/p/pandas/pandas-3.0.3.tar.gz : 696a4a00a2a2a35d4e5deb3fc946641b96c944f02230e4f76137fe35d806c4fc
homepage   : https://pandas.pydata.org/
license    : BSD-3-Clause
component  : programming.python
summary    : Flexible and powerful Python data analysis toolkit
description: |
    Flexible and powerful data analysis / manipulation library for Python, providing labeled data structures similar to R data.frame objects, statistical functions, and much more.
builddeps  :
    - cython
    - meson-python
    - numpy
    - patchelf
    - python-build
    - python-installer
    - python-packaging
    - python-versioneer
    - python-wheel
checkdeps  :
    - python-dateutil
    - python-pytest
    - python-pytz
rundeps    :
    - python-bottleneck # optional
    - python-dateutil
    - python-numexpr
    - python-pytz
    - python-tzdata
build      : |
    # no macros as we need skip-dependency-check here
    python3 -m build --wheel --no-isolation --skip-dependency-check
install    : |
    python3 -m installer --destdir=%installroot% dist/*.whl
#check      : |
#    %python3_test pytest3 pandas --skip-slow --skip-network --skip-db -m "not single" -n 4 -r sxX
