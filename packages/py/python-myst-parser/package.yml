# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-myst-parser
version    : 5.1.0
release    : 6
source     :
    # The pypi source doesn't include the tests https://github.com/executablebooks/mdit-py-plugins/issues/97
    - https://github.com/executablebooks/MyST-Parser/archive/refs/tags/v5.1.0.tar.gz : 9909a92a28567b8d3eda7e6fe346c60ffc94e8ca36f6feae986d01917810951a
homepage   : https://github.com/executablebooks/MyST-Parser
license    : MIT
component  : programming.python
summary    : extended commonmark compliant parser
description: |
    An extended commonmark compliant parser, with bridges to docutils/sphinx
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
checkdeps  :
    - python-beautifulsoup4
    - python-defusedxml
    - python-linkify-it-py
    - python-markdown-it-py
    - python-mdit-py-plugins
    - python-pytest
    - python-pytest-param-files
    - python-pytest-regressions
    - python-sphinx-pytest
rundeps    :
    - python-docutils
    - python-jinja
    - python-markdown-it-py
    - python-mdit-py-plugins
    - python-sphinx
    - pyyaml
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v -k "not (test_references_singlehtml or test_fieldlist_extension or test_extended_syntaxes or 320-math)"
