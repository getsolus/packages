# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytz
version    : '2026.2'
release    : 27
source     :
    - https://pypi.debian.net/pytz/pytz-2026.2.tar.gz : 0e60b47b29f21574376f218fe21abc009894a2321ea16c6754f3cad6eb7cdd6a
homepage   : https://pythonhosted.org/pytz
license    : MIT
component  : programming.python
summary    : World timezone definitions, modern and historical
description: |
    World timezone definitions, modern and historical
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
setup      : |
    %patch -p1 -i $pkgfiles/use-system-zoneinfo.patch
build      : |
    %python3_setup
install    : |
    %python3_install
    rm -rf $installdir/usr/lib/python%python3_version%/site-packages/pytz/zoneinfo
# Fails using system timezone info
#check      : |
#    %python3_test pytest3
