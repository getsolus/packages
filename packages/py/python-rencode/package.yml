# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-rencode
version    : 1.0.8
release    : 10
source     :
    - https://github.com/aresch/rencode/archive/v1.0.8.tar.gz : 480aab74948a7f339b749b5c39bdb4caf15429f4b49a998c770d5f371098d351
homepage   : https://pypi.org/project/rencode/
license    : GPL-3.0-or-later
component  : programming.python
summary    : Python module for fast object serialization
description: |
    Python module for fast (basic) object serialization similar to bencode.
    This version of rencode is a complete rewrite in Cython to attempt to increase the performance over the pure Python module written by Petru Paler, Connelly Barnes et al.
builddeps  :
    - cython
    - python-build
    - python-installer
    - python-poetry-core
    - python-setuptools
    - python-wheel
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-Remove-extra-compile-args.patch
build      : |
    export PYTHONSAFEPATH=1
    %python3_setup
install    : |
    %python3_install
