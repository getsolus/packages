# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-proton-vpn-core-api
version    : 4.16.0
release    : 20
source     :
    - https://github.com/ProtonVPN/python-proton-vpn-api-core/archive/refs/tags/v4.16.0.tar.gz : 2316987c0fa6e8c67cb3d78c1828d464b644bce5b8f2c564bf9447993f035a78
homepage   : https://github.com/ProtonVPN/python-proton-vpn-api-core
license    : GPL-3.0-or-later
component  : programming.python
summary    : The proton-vpn-core-api component
description: |
    The proton-vpn-core-api acts as a facade to the other Proton VPN components, exposing a uniform API to the available Proton VPN services.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
replaces   :
    - python-proton-vpn-logger
    - python-proton-vpn-network-manager
