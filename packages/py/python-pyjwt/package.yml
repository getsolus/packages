# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pyjwt
version    : 2.13.0
release    : 19
source     :
    - https://files.pythonhosted.org/packages/source/P/PyJWT/pyjwt-2.13.0.tar.gz : 41571c89ca91598c79e8ef18a2d07367d4810fbbd6f637794879baf1b7703423
homepage   : https://github.com/jpadilla/pyjwt
license    : MIT
component  : programming.python
summary    : JSON Web Token implementation in Python
description: |
    PyJWT is a Python library which allows you to encode and decode JSON Web Tokens (JWT). JWT is an open, industry-standard (RFC 7519) for representing claims securely between two parties.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - pytest-runner
    - python-cryptography
    - python-pytest-cov
rundeps    :
    - python-cryptography
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
