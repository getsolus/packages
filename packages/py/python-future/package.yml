# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-future
version    : 1.0.0
release    : 16
source     :
    - https://files.pythonhosted.org/packages/source/f/future/future-1.0.0.tar.gz : bd2968309307861edae1458a4f8a4f3598c03be43b97521076aebf5d94c07b05
homepage   : https://python-future.org/
license    : MIT
component  : programming.python
summary    : Clean single-source support for Python 3 and 2
description: |
    python-future is the missing compatibility layer between Python 2 and Python 3. It allows you to use a single, clean Python 3.x-compatible codebase to support both Python 2 and Python 3 with minimal overhead.
networking : true
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
    - python-requests
setup      : |
    # https://github.com/PythonCharmers/python-future/pull/644
    %patch -p1 -i ${pkgfiles}/remove-uu.patch
    %patch -p1 -i ${pkgfiles}/test_ftp.patch
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # https://github.com/PythonCharmers/python-future/issues/647
    # Python 3.14: skip lib2to3 tests, unittest.makeSuite, and FancyURLopener tests.
    %python3_test pytest -v \
        --ignore=tests/test_future/test_urllib.py \
        --ignore=tests/test_future/test_urllib_toplevel.py \
        --ignore=tests/test_future/test_futurize.py \
        --ignore=tests/test_future/test_libfuturize_fixers.py \
        --ignore=tests/test_future/test_pasteurize.py \
        --ignore=tests/test_past/test_translation.py \
        -k "not test_isinstance_recursion_limit and not test_subclass_recursion_limit and not test_main and not test_getcode"
