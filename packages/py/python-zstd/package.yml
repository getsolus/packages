# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-zstd
version    : 1.5.7.3
release    : 8
source     :
    - https://files.pythonhosted.org/packages/source/z/zstd/zstd-1.5.7.3.tar.gz : 403e5205f4ac04b92e6b0cda654be2f51de268228a0db0067bc087faacf2f495
homepage   : https://github.com/sergey-dryabzhinsky/python-zstd
license    : BSD-2-Clause
component  : programming.python
summary    : Simple Python bindings to ZSTD compression library
description: |
    Simple Python bindings to ZSTD compression library
builddeps  :
    - pkgconfig(libzstd)
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
environment: |
    export ZSTD_EXTERNAL=1
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest3 -v
