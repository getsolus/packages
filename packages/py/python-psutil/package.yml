# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# NOTE: Also update python-types-psutil when updating this package.
name       : python-psutil
version    : 7.2.2
release    : 38
source     :
    - https://pypi.debian.net/psutil/psutil-7.2.2.tar.gz : 0746f5f8d406af344fd547f1c8daa5f5c33dbc293bb8d6a16d80b4bb88f59372
homepage   : https://github.com/giampaolo/psutil
license    : BSD-3-Clause
component  : programming.python
summary    : Cross-platform lib for process and system monitoring in Python
description: |
    psutil (process and system utilities) is a cross-platform library for retrieving information on running processes and system utilization (CPU, memory, disks, network, sensors) in Python.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
build      : |
    sed -e '/typing_extensions/d;/mypy_extensions/d;/typed_ast/d;/tomli/d;/types-psutil/d;/types-setuptools/d;/types-typed-ast/d' -i pyproject.toml
    %python3_setup
install    : |
    %python3_install
