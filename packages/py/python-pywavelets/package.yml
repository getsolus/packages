# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pywavelets
version    : 1.9.0
release    : 14
source     :
    - https://github.com/PyWavelets/pywt/archive/refs/tags/v1.9.0.tar.gz : 8b6916bbe47ebb079aa47ea14b191cff715751929e8e83db252b259aa6d1134b
homepage   : https://github.com/PyWavelets/pywt
license    : MIT
component  : programming.python
summary    : Wavelet Transforms in Python
description: |
    PyWavelets is a free Open Source library for wavelet transforms in Python.
builddeps  :
    - cython
    - matplotlib
    - meson-python
    - numpy
    - patchelf
    - python-build
    - python-installer
    - python-packaging
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - numpy
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
  #    %python3_test pytest3 -v
