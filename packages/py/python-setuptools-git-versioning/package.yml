# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-setuptools-git-versioning
version    : 3.1.0
release    : 3
source     :
    - https://files.pythonhosted.org/packages/source/s/setuptools-git-versioning/setuptools_git_versioning-3.1.0.tar.gz : 612dfcf184addac9e1c2216f4f229724b2390e5bf613fb925ae80b84f2529172
homepage   : https://pypi.org/project/setuptools-git-versioning/
license    : MIT
component  : programming.python
summary    : Use git repo data for building a version number according to PEP-440
description: |
    setuptools-git-versioning uses git repo data (latest tag, current commit hash, etc) for building a version number according to PEP 440.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
