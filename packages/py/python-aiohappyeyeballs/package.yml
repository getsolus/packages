# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-aiohappyeyeballs
version    : 2.6.2
release    : 7
source     :
    - https://files.pythonhosted.org/packages/source/a/aiohappyeyeballs/aiohappyeyeballs-2.6.2.tar.gz : e202810ee718bd01fc6ef49e8ea53d023d5cb6b581076d7925aa499fa55dbe64
homepage   : https://aiohappyeyeballs.readthedocs.io/
license    : PSF-2.0
component  : programming.python
summary    : Happy Eyeballs for pre-resolved hosts
description: |
    This library exists to allow connecting with Happy Eyeballs (RFC 8305) when you already have a list of addrinfo and not a DNS name.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
checkdeps  :
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-cov
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v --no-cov
