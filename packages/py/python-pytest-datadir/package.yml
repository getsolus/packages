# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-datadir
version    : 1.8.0
release    : 5
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-datadir/pytest_datadir-1.8.0.tar.gz : 7a15faed76cebe87cc91941dd1920a9a38eba56a09c11e9ddf1434d28a0f78eb
homepage   : https://github.com/gabrielcnr/pytest-datadir
license    : MIT
component  : programming.python
summary    : pytest plugin for test data directories and files
description: |
    pytest plugin for test data directories and files
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
checkdeps  :
    - python-pytest
rundeps    :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
