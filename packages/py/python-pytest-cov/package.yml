# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-cov
version    : 7.1.0
release    : 18
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-cov/pytest_cov-7.1.0.tar.gz : 30674f2b5f6351aa09702a9c8c364f6a01c27aae0c1366ae8016160d1efc56b2
homepage   : https://github.com/pytest-dev/pytest-cov/
license    : MIT
component  : programming.python
summary    : Coverage plugin for pytest
description: |
    Py.test plugin for coverage reporting with support for both centralised and distributed testing, including subprocesses and multiprocessing for Python.
builddeps  :
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-hatchling
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
rundeps    :
    - python-coverage
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
#    Upstream tests require process-tests and pytest-xdist (not packaged).
#    %python3_test pytest -v
