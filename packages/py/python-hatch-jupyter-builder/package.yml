# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-hatch-jupyter-builder
version    : 0.9.1
release    : 5
source     :
    - https://files.pythonhosted.org/packages/source/h/hatch_jupyter_builder/hatch_jupyter_builder-0.9.1.tar.gz : 79278198d124c646b799c5e8dca8504aed9dcaaa88d071a09eb0b5c2009a58ad
homepage   : https://github.com/jupyterlab/hatch-jupyter-builder
license    : BSD-3-Clause
component  : programming.python
summary    : A hatch plugin to help build Jupyter packages
description: |
    This provides a build hook plugin for Hatch that adds a build step for use with Jupyter packages.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
checkdeps  :
    - python-pytest-mock
rundeps    :
    - python-hatchling
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Disabled test that require networking
    %python3_test pytest -v -k 'not test_hatch_build'
