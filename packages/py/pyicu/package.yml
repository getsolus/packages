# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pyicu
version    : 2.16.2
release    : 38
source     :
    - https://pypi.io/packages/source/p/pyicu/pyicu-2.16.2.tar.gz : 006d51e24b5ec76df6ec2130f3dde269c51db8b8cfebb7d45a427dde0d10aa52
homepage   : https://gitlab.pyicu.org/main/pyicu
license    : MIT
component  : programming.python
summary    : Python extension wrapping the ICU C++ API
description: |
    A Python extension wrapping IBM’s International Components for Unicode C++ library (ICU).
optimize   : speed
builddeps  :
    - pkgconfig(icu-i18n)
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-six
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test
