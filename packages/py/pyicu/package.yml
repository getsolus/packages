# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pyicu
version    : 2.16.1
release    : 36
source     :
    - https://pypi.io/packages/source/p/pyicu/pyicu-2.16.1.tar.gz : cafdc2bc6cfbb4b6e511dedeff37316f902af900993b576116b8243f4ad6478c
homepage   : https://gitlab.pyicu.org/main/pyicu
license    : MIT
component  : programming.python
summary    : Python extension wrapping the ICU C++ API
description: |
    A Python extension wrapping IBM’s International Components for Unicode C++ library (ICU).
optimize   : speed
builddeps  :
    - pkgconfig(icu-i18n)
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-six
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test
