# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-feedparser
version    : 6.0.12
release    : 16
source     :
    - https://pypi.python.org/packages/source/f/feedparser/feedparser-6.0.12.tar.gz : 64f76ce90ae3e8ef5d1ede0f8d3b50ce26bcce71dd8ae5e82b1cd2d4a5f94228
homepage   : https://pypi.org/project/feedparser/
license    :
    - BSD-2-Clause
    - MIT
component  : programming.python
summary    : Universal feed parser
description: |
    Universal feed parser, handles RSS 0.9x, RSS 1.0, RSS 2.0, CDF, Atom 0.3, and Atom 1.0 feeds.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - python-sgmllib3k
build      : |
    %python3_setup
install    : |
    %python3_install
