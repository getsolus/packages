# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-orjson
version    : 3.11.9
release    : 56
source     :
    - https://files.pythonhosted.org/packages/source/o/orjson/orjson-3.11.9.tar.gz : 4fef17e1f8722c11587a6ef18e35902450221da0028e65dbaaa543619e68e48f
homepage   : https://github.com/ijl/orjson
license    :
    - Apache-2.0
    - MIT
component  : programming.python
summary    : Fast, correct Python JSON library
description: |
    Fast, correct Python JSON library supporting dataclasses, datetimes, and numpy
clang      : true
builddeps  :
    - python-installer
    - python-maturin
checkdeps  :
    - numpy
    - python-arrow
    - python-dateutil
    - python-psutil
    - python-pytest
    - python-pytz
build      : |
    maturin build --release --strip
install    : |
    python3 -m installer --destdir=${installdir} target/wheels/*.whl
check      : |
    # pytz/dateutil timezone offset tests fail on Python 3.14 with system zoneinfo.
    %python3_test pytest3 -k "not test_datetime_pytz and not test_datetime_tz_assume and not test_datetime_arrow_positive"
