# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-dunamai
version    : 1.26.1
release    : 2
source     :
    - https://files.pythonhosted.org/packages/source/d/dunamai/dunamai-1.26.1.tar.gz : 3b46007bd65b00b4824ead0a1aee365fd22d0ec2b9c219497d4fd48f52860c8b
homepage   : https://dunamai.readthedocs.io/en/latest/
license    : MIT
component  : programming.python
summary    : Dynamic version generation from VCS tags
description: |
    Dunamai inspects your repository and produces a version string based on your version control metadata.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
rundeps    :
    - python-packaging
build      : |
    %python3_setup
install    : |
    %python3_install
