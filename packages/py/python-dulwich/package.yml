# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-dulwich
version    : 1.1.0
release    : 9
source     :
    - https://files.pythonhosted.org/packages/source/d/dulwich/dulwich-1.1.0.tar.gz : 9aa855db9fee0a7065ae9ffb38e14e353876d82f17e33e1a1fb3830eb8d0cf43
homepage   : https://github.com/jelmer/dulwich
license    : Apache-2.0
component  : programming.python
summary    : Pure-Python Git implementation
description: |
    This is the Dulwich project. It aims to provide an interface to git repos (both local and remote) that doesn't call out to git directly but instead uses pure Python.
networking : true
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-rust
build      : |
    %python3_setup
install    : |
    %python3_install
