name       : python-gobject
version    : 3.48.1
release    : 34
source     :
    - https://download.gnome.org/sources/pygobject/3.48/pygobject-3.48.1.tar.xz : 3a0a2c0c0f25931b5840649c54834b9e58a63148d37fa9f6308887b7027e15c2
homepage   : https://gnome.pages.gitlab.gnome.org/pygobject/
license    : LGPL-2.1-or-later
summary    : Python GObject bindings
description: |
    PyGObject provides Python bindings to the GObject class from GLib.
component  : programming.python
builddeps  :
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(py3cairo)
    - pkgconfig(python3)
    - meson-python
    - patchelf
    - python-build
    - python-installer
    - python-packaging
    - python-wheel
rundeps    :
    - python3-cairo
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
replaces   :
    - python3-gobject
    - devel : python3-gobject-devel
conflicts  :
    - devel :
        - python2-gobject-devel
