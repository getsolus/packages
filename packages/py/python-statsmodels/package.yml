# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-statsmodels
version    : 0.14.6
release    : 19
source     :
    - https://files.pythonhosted.org/packages/source/s/statsmodels/statsmodels-0.14.6.tar.gz : 4d17873d3e607d398b85126cd4ed7aad89e4e9d89fc744cdab1af3189a996c2a
homepage   : https://www.statsmodels.org/
license    : BSD-3-Clause
component  : programming.python
summary    : Statistical modeling and econometrics in Python
description: |
    statsmodels is a Python module that provides classes and functions for the estimation of many different statistical models, as well as for conducting statistical tests, and statistical data exploration.
builddeps  :
    - cython
    - python-build
    - python-installer
    - python-pandas
    - python-patsy
    - python-setuptools
    - python-setuptools-scm
rundeps    :
    - python-packaging
    - python-pandas
    - python-patsy
    - scipy
build      : |
    %python3_setup
install    : |
    %python3_install
