# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-libarchive-c
version    : '5.3'
release    : 4
source     :
    - https://github.com/Changaco/python-libarchive-c/archive/refs/tags/5.3.tar.gz : 867f94601c177236afb9d1c385f524b28ebc47e9b090cb08dfdc75dd18d5520c
homepage   : https://github.com/Changaco/python-libarchive-c/
license    : CC0-1.0
component  : programming.python
summary    : Python interface to libarchive
description: |
    A Python interface to libarchive. It uses the standard ctypes module to dynamically load and access the C library.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - libarchive
build      : |
    %python3_setup
install    : |
    %python3_install
