# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jupyter-events
version    : 0.12.1
release    : 8
source     :
    - https://files.pythonhosted.org/packages/source/j/jupyter_events/jupyter_events-0.12.1.tar.gz : faff25f77218335752f35f23c5fe6e4a392a7bd99a5939ccb9b8fbf594636cf3
homepage   : https://github.com/jupyter/jupyter_events/
license    : BSD-3-Clause
component  : programming.python
summary    : Jupyter Event System library
description: |
    Jupyter Events enables Jupyter Python Applications (e.g. Jupyter Server, JupyterLab Server, JupyterHub, etc.) to emit events—structured data describing things happening inside the application. Other software (e.g. client applications like JupyterLab) can listen and respond to these events.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
rundeps    :
    - python-json-logger
    - python-jsonschema
    - python-rfc3339-validator
    - python-rfc3986-validator
    - python-traitlets
    - pyyaml
build      : |
    %python3_setup
install    : |
    %python3_install
