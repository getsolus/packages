# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-tinycss2
version    : 1.5.1
release    : 11
source     :
    - https://pypi.io/packages/source/t/tinycss2/tinycss2-1.5.1.tar.gz : d339d2b616ba90ccce58da8495a78f46e55d4d25f9fd71dfd526f07e7d53f957
homepage   : https://www.courtbouillon.org/tinycss2/
license    : BSD-3-Clause
component  : programming.python
summary    : Low-level CSS parser for Python
description: |
    tinycss2 is a low-level CSS parser and generator: it can parse strings, return Python objects representing tokens and blocks, and generate CSS strings corresponding to these objects.
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
    - python-webencodings
checkdeps  :
    - pytest-runner
    - python-pytest-cov
    - python-pytest-isort
rundeps    :
    - python-webencodings
setup      : |
    sed -i 's/--flake8//' pyproject.toml
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
