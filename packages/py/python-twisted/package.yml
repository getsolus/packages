# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-twisted
version    : 26.4.0
release    : 20
source     :
    - https://files.pythonhosted.org/packages/source/t/twisted/twisted-26.4.0.tar.gz : dbfd0fe1ee409d0243fdd7a6a6ff14f4948cec1fd78e0376291f805e1501fae9
homepage   : https://www.twistedmatrix.com
license    : MIT
component  : programming.python
summary    : Python Twisted module
description: |
    Twisted is an event-driven networking engine written in Python and licensed under the open source MIT license.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-hatchling
    - python-incremental
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
rundeps    :
    - python-automat
    - python-constantly
    - python-hyperlink
    - python-incremental
    - python-pyhamcrest
    - python-service-identity
    - python-typing-extensions
    - python-zope.interface
build      : |
    %python3_setup
install    : |
    %python3_install
