# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-moddb
version    : 0.15.0
release    : 11
source     :
    - https://files.pythonhosted.org/packages/source/m/moddb/moddb-0.15.0.tar.gz : 1f561aae2de737bb70f113178dae2bfd1c3a58864499b786e0b7c216668e89c4
homepage   : https://github.com/ClementJ18/moddb
license    : MIT
component  : programming.python
summary    : A scrapper for ModDB Mod and Game pages
description: |
    The goal of this library is to be able to navigate ModDB purely programmatically through scraping and parsing of the various models present on the website.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - python-beautifulsoup4
    - python-pyrate-limiter
    - python-requests
build      : |
    %python3_setup
install    : |
    %python3_install
