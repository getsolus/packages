# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-txtorcon
version    : 26.6.0
release    : 12
source     :
    - https://github.com/meejah/txtorcon/archive/refs/tags/v26.6.0.tar.gz : 1c24f84e429efb2ae67e1bd80204b055537a8f84fb64bb623cc67fc1d99b0bb8
homepage   : https://github.com/meejah/txtorcon
license    : MIT
component  : programming.python
summary    : A Twisted-based Python asynchronous controller library for Tor
description: |
    A Twisted-based Python asynchronous controller library for Tor
builddeps  :
    - python-setuptools
checkdeps  :
    - lsof
    - python-mock
    - python-pytest
    - python-twisted
    - python-zope.interface
rundeps    :
    - python-twisted
setup      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE
check      : |
    # These tests chmod files to 0 and expect IOError; root in the build chroot can still read them.
    %python3_test pytest3 -k "not test_explit_dir_not_readable_version2 and not test_system_tor_explit_dir_not_readable0 and not test_single_client_ioerror"
