# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-mdit-py-plugins
version    : 0.6.1
release    : 5
source     :
    # The pypi source doesn't include the tests https://github.com/executablebooks/mdit-py-plugins/issues/97
    - https://github.com/executablebooks/mdit-py-plugins/archive/refs/tags/v0.6.1.tar.gz : cc58c0cd7264b3b1972773f14126666462047fbfffaa4ba59a287ee5e6858165
homepage   : https://github.com/executablebooks/mdit-py-plugins
license    : MIT
component  : programming.python
summary    : Collection of core plugins for markdown-it-py
description: |
    Collection of core plugins for markdown-it-py
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
rundeps    :
    - python-markdown-it-py
checkdeps  :
    - python-markdown-it-py
    - python-pytest
    - python-pytest-regressions
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
