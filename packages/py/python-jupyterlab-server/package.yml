# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jupyterlab-server
version    : 2.28.0
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/j/jupyterlab_server/jupyterlab_server-2.28.0.tar.gz : 35baa81898b15f93573e2deca50d11ac0ae407ebb688299d3a5213265033712c
homepage   : https://github.com/jupyterlab/jupyterlab_server
license    : BSD-3-Clause
component  : programming.python
summary    : A set of server components for JupyterLab and JupyterLab like applications
description: |
    JupyterLab Server sits between JupyterLab and Jupyter Server, and provides a set of REST API handlers and utilities that are used by JupyterLab. It is a separate project in order to accommodate creating JupyterLab-like applications from a more limited scope.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
rundeps    :
    - python-jinja
    - python-json5
    - python-jsonschema
    - python-jupyter-server
    - python-requests
build      : |
    %python3_setup
install    : |
    %python3_install
