# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pyudev
version    : 0.24.4
release    : 4
source     :
    - https://github.com/pyudev/pyudev/archive/refs/tags/v0.24.4.tar.gz : 7f2e9f14151c314b0c252313e933138a4901baa25505e20c71e77080ee8a90f7
homepage   : https://pyudev.readthedocs.io/
license    : LGPL-2.1-or-later
component  : programming.python
summary    : pyudev is a LGPL licensed, pure Python binding for libudev
description: |
    pyudev is a LGPL licensed, pure Python binding for libudev
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - python-six
build      : |
    %python3_setup
install    : |
    %python3_install
replaces   :
    - python3-pyudev
