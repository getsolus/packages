# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-iniconfig
version    : 2.3.0
release    : 8
source     :
    - https://files.pythonhosted.org/packages/source/i/iniconfig/iniconfig-2.3.0.tar.gz : c76315c77db068650d49c5b56314774a7804df16fee4402c1f19d6d15d8c4730
homepage   : https://github.com/pytest-dev/iniconfig
license    : MIT
component  : programming.python
summary    : brain-dead simple config-ini parsing
description: |
    iniconfig is a small and simple INI-file parser module having a unique set of features.
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
    - python-packaging
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
