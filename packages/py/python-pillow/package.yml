# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pillow
version    : 12.2.0
release    : 45
source     :
    - https://github.com/python-pillow/Pillow/archive/refs/tags/12.2.0.tar.gz : 15d08a03e16953813045ad24c5818e2909ef2141a0b97b2bd3bc8ec6f222cadb
homepage   : https://python-pillow.github.io/
license    : MIT-CMU
component  : programming.python
summary    : The friendly PIL fork (Python Imaging Library)
description: |
    Pillow is the "friendly PIL fork" by Alex Clark and Contributors. PIL is the Python Imaging Library by Fredrik Lundh and Contributors.
builddeps  :
    - pkgconfig(freetype2)
    - pkgconfig(lcms2)
    - pkgconfig(libopenjp2)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libwebp)
    - pkgconfig(pybind11)
    - pkgconfig(python3)
    - pkgconfig(tk)
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
rundeps    :
    - libjpeg-turbo
build      : |
    %python3_setup
install    : |
    %python3_install
    install -dm00755 $installdir/usr/include/python%python3_version%/
    install -m00644 src/libImaging/*.h $installdir/usr/include/python%python3_version%/
check      : |
    %python3_test selftest.py
