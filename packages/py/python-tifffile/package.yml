# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-tifffile
version    : 2026.6.1
release    : 10
source     :
    - https://files.pythonhosted.org/packages/source/t/tifffile/tifffile-2026.6.1.tar.gz : 626c892c0e899d959b9438e7c0e1491dc154a7fead1f1f37a991724a50eceba9
homepage   : https://github.com/cgohlke/tifffile/
license    : BSD-3-Clause
component  : programming.python
summary    : Read and write TIFF files
description: |
    Tifffile is a Python library to store numpy arrays in TIFF (Tagged Image File Format) files, and read image and metadata from TIFF-like files used in bioimaging.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - numpy
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
#    # requires packaging python-fsspec and python-xarray
#    %python3_test pytest3 -v
