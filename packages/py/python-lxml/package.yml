# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-lxml
version    : 6.1.0
release    : 28
source     :
    - https://github.com/lxml/lxml/archive/refs/tags/lxml-6.1.0.tar.gz : d62d3f15631982e884920d20a89d89ff059b33b373314f9e1973f4e18129898a
homepage   : https://lxml.de/
license    :
    - BSD-3-Clause
    - MIT
    - GPL-2.0-or-later
    - ZPL-2.0
component  : programming.python
summary    : XML and HTML with Python
description: |
    lxml is the most feature-rich and easy-to-use library for processing XML and HTML in the Python language. It's also very fast and memory friendly, just so you know.
optimize   :
    - speed
    - lto
builddeps  :
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxslt)
    - pkgconfig(python3)
    - cython
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
#    pushd $PKG_BUILD_DIR/py3build
#        python3 test.py -vuf
#    popd
