# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-lxml
version    : 6.1.1
release    : 29
source     :
    - https://github.com/lxml/lxml/archive/refs/tags/lxml-6.1.1.tar.gz : 624d1f5a50862c1bd5280f6997898c5a334e26d3a58bc2bbfec1efd8f98135fa
homepage   : https://lxml.de/
license    :
    - BSD-3-Clause
    - MIT
    - GPL-2.0-or-later
    - ZPL-2.0
component  : programming.python
summary    : XML and HTML with Python
description: |
    lxml is the most feature-rich and easy-to-use library for processing XML and HTML in the Python language. It's also very fast and memory friendly, just so you know.
optimize   :
    - speed
    - lto
builddeps  :
    - pkgconfig(libxml-2.0)
    - pkgconfig(libxslt)
    - pkgconfig(python3)
    - cython
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
#    pushd $PKG_BUILD_DIR/py3build
#        python3 test.py -vuf
#    popd
