# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-uvicorn
version    : 0.49.0
release    : 10
source     :
    - https://files.pythonhosted.org/packages/source/u/uvicorn/uvicorn-0.49.0.tar.gz : ebf4271aa580d9de97f93192d4595176df6e91f9aae919ca73e4fc07df1e66a3
homepage   : https://uvicorn.dev/
license    : BSD-3-Clause
component  : programming.python
summary    : An ASGI web server, for Python
description: |
    Uvicorn is an ASGI web server implementation for Python.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
checkdeps  :
    - python-cryptography
    - python-httpx
    - python-pytest
    - python-pytest-mock
    - python-trustme
    - python-websockets
    - python-wsproto
rundeps    :
    - python-click
    - python-h11
    - python-typing-extensions
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    export PYTHONWARNINGS='ignore:websockets.exceptions.InvalidStatusCode is deprecated:DeprecationWarning'
    export PYTEST_ADDOPTS='-o addopts="-rxXs --strict-config --strict-markers" -o filterwarnings="ignore:websockets.exceptions.InvalidStatusCode is deprecated:DeprecationWarning" -W ignore::pytest.PytestDeprecationWarning'
    %python3_test pytest -v \
        --ignore=tests/benchmarks \
        --ignore=tests/middleware/test_wsgi.py \
        --ignore=tests/test_server.py \
        --deselect tests/test_config.py::test_env_file \
        --deselect tests/protocols/test_websocket.py::test_fragmented_message_exceeding_max_size \
        --deselect tests/protocols/test_websocket.py::test_fragmented_message_reassembly \
        --deselect 'tests/protocols/test_websocket.py::test_send_binary_data_to_server_bigger_than_default_on_websockets[h11-max=defaults sent=defaults+1]'
