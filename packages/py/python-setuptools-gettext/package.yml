# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-setuptools-gettext
version    : 0.1.18
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/s/setuptools-gettext/setuptools_gettext-0.1.18.tar.gz : c92b0ae486def502686cd944f16559819e42f8dc0b9d683cf62e7415397f2b35
homepage   : https://github.com/breezy-team/setuptools-gettext
license    : GPL-2.0-or-later
component  : programming.python
summary    : Setuptools plugin for compiling gettext translations
description: |
    setuptools-gettext is a setuptools plugin that compiles .po files into .mo
    files during the Python package build.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
