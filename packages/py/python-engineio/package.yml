# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-engineio
version    : 4.13.2
release    : 7
source     :
    - https://github.com/miguelgrinberg/python-engineio/archive/refs/tags/v4.13.2.tar.gz : 3962cad8acbab095603c8c839b448b14990fe42f4d382597f800e62d3b822121
homepage   : https://github.com/miguelgrinberg/python-engineio
license    : MIT
component  : programming.python
summary    : Engine.IO server and client for Python
description: |
    Python implementation of the Engine.IO_ realtime client and server.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-aiohttp
    - python-pytest
    - python-pytest-asyncio
    - python-requests
    - python-simple-websocket
    - python-tornado
    - python-websocket-client
rundeps    :
    - python-aiohttp
    - python-requests
    - python-simple-websocket
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest
