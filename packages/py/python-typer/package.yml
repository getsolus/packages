# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-typer
version    : 0.26.7
release    : 3
source     :
    - https://files.pythonhosted.org/packages/source/t/typer/typer-0.26.7.tar.gz : e314a34c617e419c091b2830dda3ea1f257134ff593061a8f5b9717ab8dddb3a
homepage   : https://typer.tiangolo.com/
license    : MIT
component  : programming.python
summary    : Build great CLIs
description: |
    Typer is a library for building CLI applications that users will love using and developers will love creating. Based on Python type hints.
builddeps  :
    - python-build
    - python-installer
    - python-pdm-backend
    - python-setuptools
checkdeps  :
    - python-annotated-doc
    - python-coverage
    - python-pytest
    - python-rich
    - python-shellingham
rundeps    :
    - python-annotated-doc
    - python-rich
    - python-shellingham
build      : |
    %python3_setup
install    : |
    %python3_install

    # /usr/bin/typer conflicts with the erlang
    # package, so rename the binary here.
    mv ${installdir}/usr/bin/typer ${installdir}/usr/bin/python-typer
check      : |
    # See scripts/test.sh. We do not run the linters (scripts/lint.sh, i.e.,
    # mypy/black/isort).
    export TERMINAL_WIDTH=3000
    export _TYPER_FORCE_DISABLE_TERMINAL=1
    export _TYPER_RUN_INSTALL_COMPLETION_TESTS=1

    # Rich 15 no longer emits ANSI codes these two tests expect in headless CI.
    %python3_test pytest -v -rs \
        --ignore=tests/test_tutorial/test_printing/test_tutorial001.py \
        --ignore=tests/test_tutorial/test_printing/test_tutorial002.py
