# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-gp-libs
version    : 0.0.17
release    : 2
source     :
    - https://github.com/git-pull/gp-libs/archive/refs/tags/v0.0.17.tar.gz : f68d401ab1423eb48437d57d7b10af349b8e683ed0055abbe9348a6e749768fe
homepage   : https://github.com/git-pull/gp-libs
license    : MIT
component  : programming.python
summary    : Incubator for pytest and sphinx helpers for git-pull python projects
description: |
    Incubator for pytest and sphinx helpers for git-pull python projects.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-setuptools
rundeps    :
    - python-docutils
    - python-myst-parser
checkdeps  :
    - python-docutils
    - python-myst-parser
    - python-pytest
    - python-pytest-mock
    - python-pytest-rerunfailures
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    _site_packages="$(python -c "import site; print(site.getsitepackages()[0])")"
    python -m installer --destdir=test_dir dist/*.whl
    export PYTHONPATH="test_dir/${_site_packages}:${PYTHONPATH}"

    %python3_test pytest -vv tests
