# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-rerunfailures
version    : '16.3'
release    : 5
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-rerunfailures/pytest_rerunfailures-16.3.tar.gz : 37c9b1231c8083e9f4e724f50f7a21241822f9516c15c700ebbf218d6452355c
homepage   : https://github.com/pytest-dev/pytest-rerunfailures/
license    : MPL-2.0
component  : programming.python
summary    : A plugin for py.test that re-runs failed tests
description: |
    A plugin for py.test that re-runs failed tests to eliminate intermittent failures
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
