# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-rerunfailures
version    : '16.4'
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-rerunfailures/pytest_rerunfailures-16.4.tar.gz : 8222d17c37eb7b9e4d6fc96a3c724ff4e1a5c97a5cc7cbb2c19e9282cfd21a11
homepage   : https://github.com/pytest-dev/pytest-rerunfailures/
license    : MPL-2.0
component  : programming.python
summary    : A plugin for py.test that re-runs failed tests
description: |
    A plugin for py.test that re-runs failed tests to eliminate intermittent failures
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
