# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-xxhash
version    : 3.8.1
release    : 14
source     :
    - https://files.pythonhosted.org/packages/source/x/xxhash/xxhash-3.8.1.tar.gz : b0de4bf3aa66363552d52c6a89003c479911f12098cd48a53d44a0f7a25f7c46
homepage   : https://github.com/ifduyue/python-xxhash
license    : BSD-2-Clause
component  : programming.python
summary    : Python binding for xxHash
description: |
    xxhash is a Python binding for the xxHash library.
builddeps  :
    - pkgconfig(libxxhash)
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
#checkdeps  :
  #    - python-pytest
rundeps    :
    - xxhash
environment: |
    export XXHASH_LINK_SO=1
build      : |
    %python3_setup
install    : |
    %python3_install
# circular
#check      : |
#    %python3_test pytest3
