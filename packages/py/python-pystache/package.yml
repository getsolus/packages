# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pystache
version    : 0.6.8
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/p/pystache/pystache-0.6.8.tar.gz : 3707518e6a4d26dd189b07c10c669b1fc17df72684617c327bd3550e7075c72c
homepage   : https://github.com/PennyDreadfulMTG/pystache
license    : MIT
component  : programming.python
summary    : Mustache templating for Python
description: |
    Pystache is a Python implementation of Mustache, a framework-agnostic, logic-free templating system.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
