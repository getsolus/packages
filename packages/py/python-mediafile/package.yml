# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-mediafile
version    : 0.17.0
release    : 13
source     :
    - https://files.pythonhosted.org/packages/source/m/mediafile/mediafile-0.17.0.tar.gz : 80c9003fd25d7096a7237e3b58e6ff018ef67f9c39900feafacabac1742c7d3a
homepage   : https://mediafile.readthedocs.io/
license    : MIT
component  : programming.python
summary    : Read and write audio files' tags in Python
description: |
    MediaFile is a simple interface to the metadata tags for many audio file formats. It wraps Mutagen, a high-quality library for low-level tag manipulation, with a high-level, format-independent interface for a common set of tags.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
rundeps    :
    - mutagen
    - python-filetype
build      : |
    %python3_setup
install    : |
    %python3_install
