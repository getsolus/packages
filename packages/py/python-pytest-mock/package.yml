# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-mock
version    : 3.15.1
release    : 18
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-mock/pytest_mock-3.15.1.tar.gz : 1849a238f6f396da19762269de72cb1814ab44416fa73a8686deac10b0d87a0f
homepage   : https://github.com/pytest-dev/pytest-mock
license    : MIT
component  : programming.python
summary    : Thin-wrapper around the mock package for easier use with py.test
description: |
    This plugin installs a mocker fixture which is a thin-wrapper around the patching API provided by the mock package, but with the benefit of not having to worry about undoing patches at the end of a test.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-pytest-asyncio
rundeps    :
    - python-pytest
environment: |
    export SETUPTOOLS_SCM_PRETEND_VERSION=${version}
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v -k 'not test_standalone_mock'  --assert=plain
