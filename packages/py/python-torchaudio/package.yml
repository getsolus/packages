# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-torchaudio
version    : 2.11.0
release    : 13
source     :
    - https://github.com/pytorch/audio/archive/refs/tags/v2.11.0.tar.gz : 599ec24e7e1eef476ef21f0178e33da00e2434f930ba42e9cc20bf4002220486
homepage   : https://pytorch.org/audio
license    : BSD-3-Clause
component  : programming.python
summary    : Datasets, Transforms and Models specific to Computer Vision
description: |
    The torchaudio package consists of popular datasets, model architectures, and common image transformations for computer audio.
# clang      : true
networking : true
builddeps  :
    - pkgconfig(libdrm)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
    - pkgconfig(protobuf)
    - pkgconfig(python3)
    - pkgconfig(tbb)
    - libtorch-devel
    - python-build
    - python-installer
    - python-setuptools
    - pytorch
    - rocm-hip
rundeps    :
    - numpy
    - python-pillow
    - python-six
    - python-tqdm
    - pytorch
environment: |
    export MAX_JOBS=%YJOBS%

    export USE_ROCM=1 \
      USE_OPENMP=1

    export ROCM_PATH=/usr
    export HIP_PATH=/usr
    export HIP_CLANG_PATH=/usr/lib64/llvm-rocm/bin
    export HIP_CXX_COMPILER=/usr/bin/hipcc
    export HIP_DEVICE_LIB_PATH="/usr/lib64/amdgcn/bitcode"
    export PYTORCH_ROCM_ARCH="%AMDGPUTARGETS%"
setup      : |
    echo "%version%" > version.txt
build      : |
    %python3_setup
install    : |
    %python3_install
