# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-gpg
version    : 2.0.0
release    : 34
source     :
    - git|https://dev.gnupg.org/source/gpgmepy : 22e1cd5fdea1f62690fba55cf616bde97c1ac5d3
homepage   : https://gnupg.org/software/gpgme/index.html
license    : GPL-2.0-or-later
component  : programming.python
summary    : GnuPG Made Easy library (Python bindings)
description: |
    GnuPG Made Easy (GPGME) is a library designed to make access to GnuPG easier for applications. It provides a High-Level Crypto API for encryption, decryption, signing, signature verification and key management.
builddeps  :
    - pkgconfig(gpgme)
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - swig
rundeps    :
    - gpgme
setup      : |
    sed -e 's|, \"swig\"||' -i pyproject.toml
    # Required to set the version number
    %reconfigure
    mv src gpg
build      : |
    %python3_setup
install    : |
    %python3_install
