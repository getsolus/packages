# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-humanize
version    : 4.16.0
release    : 15
source     :
    - https://files.pythonhosted.org/packages/source/h/humanize/humanize-4.16.0.tar.gz : 7dc2244a2f84a4bfb1d36c37bac80cd78e35cdc5c119206d87b018e1445f3a3f
homepage   : https://github.com/python-humanize/humanize
license    : MIT
component  : programming.python
summary    : Common humanization utilities for Python
description: |
    This modest package contains various common humanization utilities, like turning a number into a fuzzy human readable duration ("3 minutes ago") or into a human readable size or throughput.
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
    - python-setuptools-scm
checkdeps  :
    - python-freezegun
    - python-pytest-benchmark
    - python-pytest-cov
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
