# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-sphinxcontrib-apidoc
version    : 0.6.0
release    : 2
source     :
    - https://files.pythonhosted.org/packages/source/s/sphinxcontrib_apidoc/sphinxcontrib_apidoc-0.6.0.tar.gz : 329b9810d66988f48e127a6bd18cc8efbbd1cd20b8deb4691a35738af49ad88d
