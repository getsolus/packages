# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-zope.deprecation
version    : '6.0'
release    : 10
source     :
    - https://github.com/zopefoundation/zope.deprecation/archive/6.0.tar.gz : e377d43dfabc1ecd84d760b2e7d98c9a82dc7ce78284ba40e17ddba36b7f68d5
homepage   : https://github.com/zopefoundation/zope.deprecation
license    : ZPL-2.1
component  : programming.python
summary    : Zope Deprecation Infrastructure
description: |
    This package provides a simple function called deprecated(names, reason) to mark deprecated modules, classes, functions, methods and properties.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    # skip dep check for setuptools 82.0, remove on update
    %python3_setup --skip-dependency-check
install    : |
    %python3_install

    rm -f $installdir/usr/lib/python*/site-packages/zope/deprecation/tests.py*
