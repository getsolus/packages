# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-bsddb3
version    : 6.2.9
release    : 1
source     :
    - https://pypi.io/packages/source/b/bsddb3/bsddb3-6.2.9.tar.gz : 70d05ec8dc568f42e70fc919a442e0daadc2a905a1cfb7ca77f549d49d6e7801
homepage   : https://www.jcea.es/programacion/pybsddb.htm
license    : BSD-3-Clause
component  : programming.python
summary    : Python bindings for Oracle Berkeley DB
description: |
    Python bindings for Oracle Berkeley DB
builddeps  :
    - pkgconfig(python3)
    - db5-devel
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install --no-compile
replaces   :
    - python3-bsddb3
    - devel : python3-bsddb3-devel
    - dbginfo : python3-bsddb3-dbginfo
