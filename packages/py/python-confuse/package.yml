# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-confuse
version    : 2.2.0
release    : 12
source     :
    - https://files.pythonhosted.org/packages/source/c/confuse/confuse-2.2.0.tar.gz : 35c1b53e81be125f441bee535130559c935917b26aeaa61289010cd1f55c2b9e
homepage   : https://github.com/beetbox/confuse
license    : MIT
component  : programming.python
summary    : Painless YAML config files for Python
description: |
    Confuse is a configuration library for Python that uses YAML. It takes care of defaults, overrides, type checking, command-line integration, human-readable errors, and standard OS-specific locations.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
checkdeps  :
    - python-pytest
rundeps    :
    - pyyaml
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
