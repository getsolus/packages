# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-wsproto
version    : 1.3.2
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/w/wsproto/wsproto-1.3.2.tar.gz : b86885dcf294e15204919950f666e06ffc6c7c114ca900b060d6e16293528294
homepage   : https://github.com/python-hyper/wsproto/
license    : MIT
component  : programming.python
summary    : Sans-IO WebSocket protocol implementation
description: |
    This is a pure-Python implementation of a WebSocket protocol stack. It’s written from the ground up to be embeddable in whatever program you choose to use, ensuring that you can communicate via WebSockets, as defined in RFC6455, regardless of your programming paradigm.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-h11
    - python-pytest
rundeps    :
    - python-h11
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
