# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-bottleneck
version    : 1.6.0
release    : 17
source     :
    - https://files.pythonhosted.org/packages/source/b/bottleneck/bottleneck-1.6.0.tar.gz : 028d46ee4b025ad9ab4d79924113816f825f62b17b87c9e1d0d8ce144a4a0e31
homepage   : https://github.com/pydata/bottleneck
license    : BSD-2-Clause
component  : programming.python
summary    : Fast NumPy array functions written in C
description: |
    Bottleneck is a collection of fast, NaN-aware NumPy array functions written in C.
builddeps  :
    - pkgconfig(python3)
    - numpy
    - python-build
    - python-installer
    - python-setuptools
    - python-versioneer
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - numpy
build      : |
    %python3_setup
install    : |
    %python3_install
# TODO 3.14
#check      : |
