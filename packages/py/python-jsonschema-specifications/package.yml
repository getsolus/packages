# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jsonschema-specifications
version    : 2025.9.1
release    : 7
source     :
    - https://files.pythonhosted.org/packages/source/j/jsonschema_specifications/jsonschema_specifications-2025.9.1.tar.gz : b540987f239e745613c7a9176f3edb72b832a4ac465cf02712288397832b5e8d
homepage   : https://github.com/python-jsonschema/jsonschema-specifications
license    : MIT
component  : programming.python
summary    : Support files exposing JSON from the JSON Schema specifications to Python
description: |
    JSON support files from the JSON Schema Specifications (metaschemas, vocabularies, etc.), packaged for runtime access from Python as a referencing-based Schema Registry.
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
checkdeps  :
    - python-pytest
    - python-referencing
rundeps    :
    - python-referencing
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
