# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-anyio
version    : 4.13.0
release    : 11
source     :
    - https://files.pythonhosted.org/packages/source/a/anyio/anyio-4.13.0.tar.gz : 334b70e641fd2221c1505b3890c69882fe4a2df910cba14d97019b90b24439dc
homepage   : https://github.com/agronholm/anyio
license    : MIT
component  : programming.python
summary    : High level compatibility layer for multiple asynchronous event loop implementations
description: |
    AnyIO is an asynchronous networking and concurrency library that works on top of either asyncio or trio. It implements trio-like structured concurrency (SC) on top of asyncio and works in harmony with the native SC of trio itself.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-hypothesis
    - python-psutil
    - python-pytest
    - python-pytest-mock
    - python-trustme
rundeps    :
    - python-idna
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    export PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
    %python3_test pytest -v -m "not network" \
        --ignore=tests/test_pytest_plugin.py \
        -W ignore::pytest.PytestRemovedIn10Warning \
        --deselect tests/test_sockets.py::TestTCPStream::test_happy_eyeballs \
        --deselect tests/test_sockets.py::TestTCPStream::test_connection_refused
