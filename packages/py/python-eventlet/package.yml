# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-eventlet
version    : 0.41.0
release    : 11
source     :
    - https://pypi.io/packages/source/e/eventlet/eventlet-0.41.0.tar.gz : 35df85f0ccd3e73effb6fd9f1ceae46b500b966c7da1817289c323a307bd397b
homepage   : https://eventlet.readthedocs.io/en/latest/
license    : MIT
component  : programming.python
summary    : Highly concurrent networking library
description: |
    Eventlet is a concurrent networking library for Python that allows you to change how you run your code, not how you write it.
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
checkdeps  :
    - dnspython
    - python-greenlet
    - python-openssl
    - python-pytest
rundeps    :
    - dnspython
    - python-greenlet
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Python 3.14: isolated subprocess tests fail due to greenlet shutdown stderr noise.
    %python3_test pytest -v --ignore=tests/patcher_test.py \
        -k 'not (test_zero_second_sleep or test_reverse_name or test_double_close_219 or test_os_read_nonblocking or test_os_write_nonblocking or test_dns_methods_are_green or test_context_version_setters or test_patched_communicate_290 or test_can_use_eventlet_in_os_threads)'
