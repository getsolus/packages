# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-scikit-build
version    : 0.19.0
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/s/scikit_build/scikit_build-0.19.0.tar.gz : 46e1b2d71343d14e4c07d7e60902e673c78defb9a2c282b70ad80fb8502ade2e
homepage   : https://github.com/scikit-build/scikit-build
license    : MIT
component  : programming.python
summary    : Improved build system generator for CPython C, C++, Cython and Fortran extensions
description: |
    Improved build system generator for CPython C/C++/Fortran/Cython extensions.
builddeps  :
