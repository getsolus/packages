# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-grpcio-tools
version    : 1.81.1
release    : 3
source     :
    - https://pypi.io/packages/source/g/grpcio-tools/grpcio_tools-1.81.1.tar.gz : a22a3870180927fdd84e2b27d079ef5b7f5f8c6110181b6736afc17a463481f1
homepage   : https://github.com/grpc/grpc
license    : Apache-2.0
component  : programming.python
summary    : gRPC Python tools.
description: |
    gRPC is a modern open source high performance Remote Procedure Call (RPC) framework that can run in any environment.
builddeps  :
    - pkgconfig(python3)
    - cython
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    sed -i 's/Cython==3.1.1/Cython>=3.1.1/' pyproject.toml
    %python3_setup
install    : |
    %python3_install
