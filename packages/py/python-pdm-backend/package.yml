# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pdm-backend
version    : 2.4.8
release    : 4
source     :
    - https://files.pythonhosted.org/packages/source/p/pdm-backend/pdm_backend-2.4.8.tar.gz : d8ef85d2c4306ee67195412d701fae9983e84ec6574598e26798ae26b7b3c7e0
homepage   : https://github.com/pdm-project/pdm-backend
license    : MIT
component  : programming.python
summary    : The build backend used by PDM that supports latest packaging standards
description: |
    This is the backend for PDM projects that is fully-compatible with PEP 517 spec, but you can also use it alone. It reads the metadata of PEP 621 format and coverts it to Core metadata.
builddeps  :
    - python-build
    - python-installer
build      : |
    %python3_setup
install    : |
    %python3_install
replaces   :
    - python-pdm-pep517
