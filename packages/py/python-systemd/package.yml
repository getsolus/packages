# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-systemd
version    : '236'
release    : 7
source     :
    - https://github.com/systemd/python-systemd/archive/refs/tags/v236.tar.gz : fc2c2ff4f03bf1a110f6ba2cadb874f51a7c0ce4fa0261d2bbe3371548ddbc88
homepage   : https://github.com/systemd/python-systemd
license    : LGPL-2.1-or-later
component  : programming.python
summary    : Python interface for libsystemd
description: |
    Python module for native access to the systemd facilities. Functionality is separated into a number of modules
builddeps  :
    - pkgconfig(libsystemd)
    - pkgconfig(python3)
    - meson-python
    - patchelf
    - python-build
    - python-installer
build      : |
    %python3_setup
install    : |
    %python3_install
