# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-nbxmpp
version    : 7.1.0
release    : 31
source     :
    - https://files.pythonhosted.org/packages/source/n/nbxmpp/nbxmpp-7.1.0.tar.gz : 133407d6ff3ded2e569c1da2e92b34d68432e8f4330ad0a034e9d041eb4483ca
homepage   : https://python-nbxmpp.gajim.org
license    : GPL-3.0-or-later
component  : programming.python
summary    : Library to connect to Jabber/XMPP networks in a non-blocking way
description: |
    python-nbxmpp is a Python library that provides a way for Python applications to use Jabber/XMPP networks in a non-blocking way.
builddeps  :
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
rundeps    :
    - libsoup
    - python-gobject
    - python-idna
    - python-packaging
    - python-precis_i18n
build      : |
    %python3_setup
install    : |
    %python3_install
