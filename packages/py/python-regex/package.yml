# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-regex
version    : 2026.5.9
release    : 22
source     :
    - https://github.com/mrabarnett/mrab-regex/archive/refs/tags/2026.5.9.tar.gz : c94e357751f7278075e0b4d496dffa99f7b973de7783ac4347483f7678e9efa5
homepage   : https://github.com/mrabarnett/mrab-regex
license    : Python-2.0
component  : programming.python
summary    : Alternative regular expression module, to replace re
description: |
    This regex implementation is backwards-compatible with the standard 're' module, but offers additional functionality.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
