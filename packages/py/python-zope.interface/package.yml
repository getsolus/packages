# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-zope.interface
version    : '8.5'
release    : 17
source     :
    - https://github.com/zopefoundation/zope.interface/archive/refs/tags/8.5.tar.gz : d1feb62c823e44ec9dcb04da4e9ee3f883aa58b60328d3b74aacfd6d0969f21a
homepage   : https://github.com/zopefoundation/zope.interface
license    : ZPL-2.1
component  : programming.python
summary    : Python Zope Interface
description: |
    This package provides an implementation of “object interfaces” for Python. Interfaces are a mechanism for labeling objects as conforming to a given API or contract. So, this package can be considered as implementation of the Design By Contract methodology support in Python.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-coverage
    - python-installer
    - python-setuptools
    - python-zope.event
#checkdeps  :
  #    - python-pytest
  #    - python-zope.testing
build      : |
    %python3_setup --skip-dependency-check
install    : |
    %python3_install
#check      : |
  #    %python3_test pytest
