# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-trio
version    : 0.33.0
release    : 15
source     :
    - https://files.pythonhosted.org/packages/source/t/trio/trio-0.33.0.tar.gz : a29b92b73f09d4b48ed249acd91073281a7f1063f09caba5dc70465b5c7aa970
homepage   : https://github.com/python-trio/trio
license    : Apache-2.0
component  : programming.python
summary    : A friendly Python library for async concurrency and I/O
description: |
    The Trio project aims to produce a production-quality, permissively licensed, async/await-native I/O library for Python. Like all async libraries, its main purpose is to help you write programs that do multiple things at the same time with parallelized I/O.
builddeps  :
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-async-generator
    - python-attrs
    - python-idna
    - python-outcome
    - python-pytest
    - python-sniffio
    - python-sortedcontainers
    - python-trustme
rundeps    :
    - python-async-generator
    - python-attrs
    - python-idna
    - python-outcome
    - python-sniffio
    - python-sortedcontainers
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v -m "not redistributors_should_skip" \
        --skip-optional-imports
