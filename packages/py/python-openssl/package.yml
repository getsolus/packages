# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-openssl
version    : 26.2.0
release    : 25
source     :
    - https://pypi.debian.net/pyOpenSSL/pyopenssl-26.2.0.tar.gz : 8c6fcecd1183a7fc897548dfe388b0cdb7f37e018200d8409cf33959dbe35387
homepage   : https://pyopenssl.org/
license    : Apache-2.0
component  : programming.python
summary    : Python interface to the OpenSSL library
description: |
    pyOpenSSL - A Python wrapper around the OpenSSL library
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-cryptography
    - python-installer
    - python-setuptools
    - python-sphinx
checkdeps  :
    - python-pretend
    - python-pytest-rerunfailures
rundeps    :
    - python-cryptography
    - python-typing-extensions
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # https://github.com/pyca/pyopenssl/issues/1455
    %python3_test py.test -v \
        --deselect tests/test_ssl.py::TestOCSP::test_client_receives_servers_data
