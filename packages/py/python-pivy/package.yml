# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pivy
version    : 0.6.11
release    : 12
source     :
    - https://github.com/coin3d/pivy/archive/refs/tags/0.6.11.tar.gz : 78f79bd7d1ce7e8140ceba4b1220136ea1f14b4403b1e463c59fa892feed961e
homepage   : https://github.com/coin3d/pivy
license    : ISC
component  : programming.python
summary    : Python bindings to coin3d
description: |
    Pivy is a Coin binding for Python. Coin is a high-level 3D graphics library with a C++ Application Programming Interface. Coin uses scene-graph data structures to render real-time graphics suitable for mostly all kinds of scientific and engineering visualization applications.
builddeps  :
    - pkgconfig(SoQt)
    - pkgconfig(glu)
    - pkgconfig(python3)
    - swig
rundeps    :
    - numpy
    - python-pyside6
clang      : true
setup      : |
    %cmake_ninja -DPIVY_USE_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %python3_compile
