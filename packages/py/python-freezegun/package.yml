# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-freezegun
version    : 1.5.5
release    : 14
source     :
    - https://files.pythonhosted.org/packages/source/f/freezegun/freezegun-1.5.5.tar.gz : ac7742a6cc6c25a2c35e9292dfd554b897b517d2dec26891a2e8debf205cb94a
homepage   : https://github.com/spulec/freezegun
license    : Apache-2.0
component  : programming.python
summary    : Let your Python tests travel through time
description: |
    FreezeGun is a library that allows your Python tests to travel through time by mocking the datetime module.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-dateutil
    - python-pytest
rundeps    :
    - python-dateutil
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
