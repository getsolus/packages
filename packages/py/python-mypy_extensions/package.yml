# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-mypy_extensions
version    : 1.1.0
release    : 11
source     :
    - https://github.com/python/mypy_extensions/archive/refs/tags/1.1.0.tar.gz : 178030dd39335042c2c5becccc596c2f307f796868f9c627da3fe14d76de9d97
homepage   : https://github.com/python/mypy_extensions
license    : MIT
component  : programming.python
summary    : Experimental type system extensions for programs checked with the mypy typechecker
description: |
    The “mypy_extensions” module defines experimental extensions to the standard “typing” module that are supported by the mypy typechecker.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-flit-core
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
