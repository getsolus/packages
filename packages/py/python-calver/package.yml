# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-calver
version    : 2025.10.20
release    : 5
source     :
    - https://files.pythonhosted.org/packages/source/c/calver/calver-2025.10.20.tar.gz : c98b376c2424642224d456b2f70c51402343e008c63d204634665e1a2a2835f5
homepage   : https://github.com/di/calver
license    : Apache-2.0
component  : programming.python
summary    : Setuptools extension for CalVer package versions
description: |
    The calver package is a setuptools extension for automatically defining your Python package version as a calendar version.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
