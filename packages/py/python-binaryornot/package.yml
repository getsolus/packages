# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-binaryornot
version    : 0.6.0
release    : 9
source     :
    - https://github.com/binaryornot/binaryornot/archive/refs/tags/v0.6.0.tar.gz : 5ac33a5f2c27d1836f57aa8bd3a8a5410e4b43f861afcdda24dfcb48f13102f8
homepage   : https://github.com/audreyfeldroy/binaryornot
license    : BSD-3-Clause
component  : programming.python
summary    : Ultra-lightweight pure Python package to check if a file is binary or text
description: |
    Ultra-lightweight pure Python package to guess whether a file is binary or text, using a heuristic similar to Perl's pp_fttext and its analysis. 
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-setuptools
checkdeps  :
    - python-chardet
    - python-hypothesis
    - python-pytest
rundeps    :
    - python-chardet
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -k 'not test_sdist and not test_unreadable_file_raises'
