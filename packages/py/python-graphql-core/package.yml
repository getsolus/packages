# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-graphql-core
version    : 3.2.11
release    : 3
source     :
    - https://files.pythonhosted.org/packages/source/g/graphql_core/graphql_core-3.2.11.tar.gz : e7e156d10beb127cab5c89ff0da71416fc73d27c484a4757d3b2d35633774802
homepage   : https://github.com/graphql-python/graphql-core
license    : MIT
component  : programming.python
summary    : A Python 3 port of the GraphQL.js reference implementation of GraphQL
description: |
    GraphQL-core 3 is a Python 3.7+ port of GraphQL.js, the JavaScript reference implementation for GraphQL, a query language for APIs created by Facebook.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
