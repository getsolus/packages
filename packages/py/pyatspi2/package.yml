# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pyatspi2
version    : 2.58.2
release    : 19
source     :
    - https://download.gnome.org/sources/pyatspi/2.58/pyatspi-2.58.2.tar.xz : 24590e5b60fec8dfb59fcd27d2a90de7034060be318ca3f7770e0f984f1f94e2
homepage   : https://gitlab.gnome.org/GNOME/pyatspi2
license    :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming.python
summary    : A python client library for the AT-SPI D-Bus accessibility infrastructure.
description: |
    A python client library for the AT-SPI D-Bus accessibility infrastructure.
builddeps  :
    - pkgconfig(dbus-glib-1)
    - pkgconfig(gtk+-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(pygobject-3.0)
    - python3-dbus
rundeps    :
    - python-gobject
    - python3-dbus
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
