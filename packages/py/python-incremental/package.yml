# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-incremental
version    : 24.11.0
release    : 15
source     :
    - https://github.com/twisted/incremental/archive/refs/tags/incremental-24.11.0.tar.gz : 7e6864d90bfe764fd5073593c47aa8cdf0197e9491aafe2d30b6779c4d3f7188
homepage   : https://github.com/twisted/incremental
license    : MIT
component  : programming.python
summary    : A library for versioning your Python projects
description: |
    Incremental is a small library that versions your Python projects.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
checkdeps  :
    - python-twisted # circular
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test trial incremental
