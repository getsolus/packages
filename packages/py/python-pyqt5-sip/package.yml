# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pyqt5-sip
version    : 12.18.0
release    : 13
source     :
    - https://files.pythonhosted.org/packages/source/P/PyQt5_sip/pyqt5_sip-12.18.0.tar.gz : 71c37db75a0664325de149f43e2a712ec5fa1f90429a21dafbca005cb6767f94
homepage   : https://pypi.org/project/PyQt5-sip/
license    : GPL-3.0-or-later
component  : programming.python
summary    : The sip module support for PyQt5
description: |
    The sip extension module provides support for the PyQt5 package.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
build      : |
    python3 -m build --wheel --no-isolation
install    : |
    python3 -m installer --destdir=%installroot% dist/*.whl
