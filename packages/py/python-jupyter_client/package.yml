# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jupyter_client
version    : 8.9.1
release    : 28
source     :
    - https://github.com/jupyter/jupyter_client/releases/download/v8.9.1/jupyter_client-8.9.1.tar.gz : a58f730dd9e728ba16ba1d62ebccf7ffe1ebbdbce4e95cfae941b7321ae1f4fa
homepage   : https://github.com/jupyter/jupyter_client
license    : BSD-3-Clause
component  : programming.python
summary    : Jupyter protocol client APIs
description: |
    jupyter_client contains the reference implementation of the Jupyter protocol. It also provides client and kernel management APIs for working with kernels. It also provides the jupyter kernelspec entrypoint for installing kernelspecs for use with Jupyter frontends.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-packaging
checkdeps  :
    - openssh
    - python-dateutil
    - python-ipykernel
    - python-jupyter_core
    - python-msgpack
    - python-psutil
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-jupyter
    - python-pytest-timeout
    - python-pyzmq
    - python-tornado
    - python-traitlets
    - python-typing-extensions
rundeps    :
    - python-dateutil
    - python-ipython
    - python-jupyter_core
    - python-pyzmq
    - python-tornado
    - python-traitlets
    - python-typing-extensions
setup      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Python 3.14: ipykernel jsonutil triggers DeprecationWarning from _strptime at import.
    # Upstream filter targets ipykernel.jsonutil but the warning originates in _strptime.
    # https://github.com/jupyter/jupyter_client/issues/979
    %python3_test pytest -v \
        -W "ignore:Parsing dates:DeprecationWarning" \
        --deselect tests/test_kernelspecapp.py::test_kernelspec_app \
        --deselect tests/test_localinterfaces.py::test_load_ips \
        --deselect tests/test_kernelspec.py::KernelSpecTests::test_cant_install_kernel_spec
