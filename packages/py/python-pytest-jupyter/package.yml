# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-jupyter
version    : 0.11.0
release    : 7
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest_jupyter/pytest_jupyter-0.11.0.tar.gz : a4e08ced44cfea1bce080090c626b8dc4f9d617fa5aafcd84b71405f503e9899
homepage   : https://github.com/jupyter-server/pytest-jupyter
license    : BSD-3-Clause
component  : programming.python
summary    : A pytest plugin for testing Jupyter libraries and extensions.
description: |
    This installs the basic pytest-jupyter package that includes fixture definitions for the various Jupyter-based pytest plugins.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
checkdeps  :
    - python-ipykernel
    - python-jupyter-server
    - python-jupyter_client
    - python-platformdirs
    - python-psutil
    - python-pytest-timeout
rundeps    :
    - python-jupyter_core
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
# TODO 3.14
#check      : |
#    %python3_test pytest3 -v
