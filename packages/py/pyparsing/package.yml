# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pyparsing
version    : 3.3.2
release    : 19
source     :
    - https://files.pythonhosted.org/packages/source/p/pyparsing/pyparsing-3.3.2.tar.gz : c777f4d763f140633dcb6d8a3eda953bf7a214dc4eff598413c070bcdc117cbc
homepage   : https://github.com/pyparsing/pyparsing/
license    : MIT
component  : programming.python
summary    : Python library for creating PEG parsers
description: |
    The pyparsing module is an alternative approach to creating and executing simple grammars, vs. the traditional lex/yacc approach, or the use of regular expressions. The pyparsing module provides a library of classes that client code uses to construct the grammar directly in Python code.
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # require python-railroad-diagrams for chekc and as optional dependency
#    %python3_test pytest -v
