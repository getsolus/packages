# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-types-psutil
version    : 7.0.0.20251116
release    : 2
source     :
    - https://pypi.python.org/packages/source/t/types-psutil/types_psutil-7.0.0.20251116.tar.gz : 92b5c78962e55ce1ed7b0189901a4409ece36ab9fd50c3029cca7e681c606c8a
homepage   : https://github.com/python/typeshed
license    : Apache-2.0
component  : programming.python
summary    : Typing stubs for psutil
description: |
    This is a PEP 561 type stub package for the psutil package. It can be used by type-checking tools like mypy, pyright, pytype, PyCharm, etc. to check code that uses psutil.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
