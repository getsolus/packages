# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-cairosvg
version    : 2.9.0
release    : 6
source     :
    - https://github.com/Kozea/CairoSVG/archive/refs/tags/2.9.0.tar.gz : d42ade287050d1385bdd701c011c8e9e3b0af72669362a420aaccdb06b31141d
homepage   : https://cairosvg.org/
license    : LGPL-3.0-or-later
component  : programming.python
summary    : CairoSVG is a SVG converter based on Cairo
description: |
    CairoSVG is a SVG converter based on Cairo. It can export SVG files to PDF, PostScript and PNG files.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - pytest-runner
    - python-cairocffi
    - python-cssselect2
    - python-defusedxml
    - python-pillow
rundeps    :
    - python-cairocffi
    - python-cssselect2
    - python-defusedxml
    - python-pillow
setup      : |
    sed -i -e '/pytest-runner/d' -e '/--flake8/d' -e '/--isort/d' setup.cfg
    cp -r cairosvg test_non_regression/cairosvg_reference/
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
