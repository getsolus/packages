# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jellyfish
version    : 1.2.1
release    : 16
source     :
    - https://pypi.io/packages/source/j/jellyfish/jellyfish-1.2.1.tar.gz : 72d2fda61b23babe862018729be73c8b0dc12e3e6601f36f6e65d905e249f4db
homepage   : https://jamesturk.github.io/jellyfish/
license    : BSD-2-Clause
component  : programming.python
summary    : A python library for doing approximate and phonetic matching of strings
description: |
    Jellyfish is a python library for doing approximate and phonetic matching of strings.
networking : true
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-maturin
build      : |
    %python3_setup
install    : |
    %python3_install
