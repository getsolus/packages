# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-lap
version    : 0.5.13
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/l/lap/lap-0.5.13.tar.gz : 9eff7169e3ca452995af0493cc20d35452c4bfd06122c36c06457119ffbd411b
homepage   : https://github.com/gatagat/lap
license    : BSD-2-Clause
component  : programming.python
summary    : Linear Assignment Problem solver (LAPJV/LAPMOD)
description: |
    lap is a Python wrapper for the Jonker-Volgenant algorithm for solving the linear assignment problem.
builddeps  :
    - cython
    - numpy
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - numpy
build      : |
    %python3_setup
install    : |
    %python3_install
