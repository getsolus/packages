# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-annotated-doc
version    : 0.0.4
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/a/annotated-doc/annotated_doc-0.0.4.tar.gz : fbcda96e87e9c92ad167c2e53839e57503ecfda18804ea28102353485033faa4
homepage   : https://github.com/fastapi/annotated-doc
license    : MIT
component  : programming.python
summary    : Inline documentation helpers for typing.Annotated
description: |
    Document parameters, class attributes, return types, and variables inline, with Annotated.
builddeps  :
    - python-build
    - python-installer
    - python-pdm-backend
    - python-setuptools
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
