# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-markdown
version    : 3.10.2
release    : 16
source     :
    - https://github.com/Python-Markdown/markdown/archive/refs/tags/3.10.2.tar.gz : 9f4cb524094839583fdaf7480e5da9b9fe92c45bc8c58286155e2d14b74d4f1e
homepage   : https://github.com/Python-Markdown/markdown
license    : BSD-3-Clause
component  : programming.python
summary    : A Python implementation of Markdown
description: |
    This is a Python implementation of Markdown. It is almost completely compliant with the reference implementation, though there are a few known issues.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
