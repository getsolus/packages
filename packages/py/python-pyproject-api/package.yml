# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pyproject-api
version    : 1.10.1
release    : 4
source     :
    - https://files.pythonhosted.org/packages/source/p/pyproject-api/pyproject_api-1.10.1.tar.gz : c2b2726bd7aa9217b6c50b621fef5b2ae5def4d55b779c9e0694c15e0a8517ba
homepage   : https://github.com/tox-dev/pyproject-api
license    : MIT
component  : programming.python
summary    : API to interact with the python pyproject.toml based projects
description: |
    API to interact with the python pyproject.toml based projects
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-hatchling
    - python-installer
    - python-packaging
    - python-wheel
checkdeps  :
    - python-pytest-mock
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest --deselect tests/test_frontend_setuptools.py::test_result_missing
