name       : python-types-markdown
version    : 3.10.2.20260408
release    : 2
source     :
    - https://pypi.python.org/packages/source/t/types-markdown/types_markdown-3.10.2.20260408.tar.gz : d5cba15ed65a1420e80e31c17e3d4a2ad7208a3f3a4da97fd2c5f093caf523cd
homepage   : https://github.com/python/typeshed
license    : Apache-2.0
component  : programming.python
summary    : Typing stubs for Markdown
description: |
    This is a PEP 561 type stub package for the Markdown package. It can be used by type-checking tools like mypy, pyright, pytype, PyCharm, etc. to check code that uses Markdown.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
