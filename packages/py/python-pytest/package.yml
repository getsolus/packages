# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest
version    : 9.1.0
release    : 37
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest/pytest-9.1.0.tar.gz : 41dd9148c08072446394cefd3d79701701335a9f4cae69ba92e39f6c7f5c061c
homepage   : https://pytest.org/
license    : MIT
component  : programming.python
summary    : Simple powerful testing with Python
description: |
    The pytest framework makes it easy to write small tests, yet scales to support complex functional testing for applications and libraries.
builddeps  :
    - lsof
    - numpy
    - py
    - python-build
    - python-iniconfig
    - python-installer
    - python-packaging
    - python-pluggy
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - pygments
    - python-argcomplete
    - python-decorator
    - python-hypothesis
    - python-jinja
    - python-mock
    - python-twisted
    - python-xmlschema
rundeps    :
    - py
    - python-attrs
    - python-iniconfig
    - python-packaging
    - python-pluggy
build      : |
    %python3_setup
install    : |
    %python3_install

    # Symlinking pytest3 and py.test3 to prevent check failures
    pushd ${installdir}/usr/bin
    ln -sv pytest pytest3
    ln -sv py.test py.test3
    popd
check      : |
    # Mimic the terminal type that the build server uses so we see test failures that would fail there
    export TERM=dumb

    %python3_test ${installdir}/usr/bin/pytest -v
