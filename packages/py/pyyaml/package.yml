# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# NOTE: Also update python-types-pyyaml when updating this package.
name       : pyyaml
version    : 6.0.3
release    : 25
source     :
    - https://github.com/yaml/pyyaml/archive/refs/tags/6.0.3.tar.gz : c7b45011e052458ae79015d5eea3046c37d099023d4b253dde26ee1c29ea2f36
homepage   : https://pyyaml.org/
license    : MIT
component  : programming.python
summary    : Python YAML binding
description: |
    YAML is a data serialization format designed for human readability and interaction with scripting languages.
builddeps  :
    - pkgconfig(python3)
    - pkgconfig(yaml-0.1)
    - cython
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
# check      : |
#     %python3_test
