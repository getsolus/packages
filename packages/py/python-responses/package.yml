# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-responses
version    : 0.26.1
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/r/responses/responses-0.26.1.tar.gz : 2eb3218553cc8f79b57d257bac23af5e1bf381f5b9390b1767816f0843e01dc2
homepage   : https://github.com/getsentry/responses
license    : Apache-2.0
component  : programming.python
summary    : Utility library for mocking out the requests library
description: |
    A utility library for mocking out the requests Python library.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-httpserver
    - python-requests
    - python-tomli-w
    - pyyaml
rundeps    :
    - python-requests
    - pyyaml
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
