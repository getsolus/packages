# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jeepney
version    : 0.9.0
release    : 10
source     :
    - https://pypi.io/packages/source/j/jeepney/jeepney-0.9.0.tar.gz : cf0e9e845622b81e4a28df94c40345400256ec608d0e55bb8a3feaa9163f5732
homepage   : https://gitlab.com/takluyver/jeepney
license    : MIT
component  : programming.python
summary    : Pure Python DBus interface
description: |
    Low-level, pure Python DBus protocol client. It has an I/O-free core, and integration modules for different event loops.
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
    - python-packaging
checkdeps  :
    - python-async_timeout
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-trio
    - python-testpath
    - python-trio
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
