# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-platformdirs
version    : 4.10.0
release    : 17
source     :
    - https://files.pythonhosted.org/packages/source/p/platformdirs/platformdirs-4.10.0.tar.gz : 31e761a6a0ca04faf7353ea759bdba55652be214725111e5aac52dfa29d4bef7
homepage   : https://github.com/platformdirs/platformdirs
license    : MIT
component  : programming.python
summary    : A small Python module for determining appropriate platform-specific dirs
description: |
    platformdirs is a library to determine platform-specific system directories. This includes directories where to place cache files, user data, configuration, etc.
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
    - python-wheel
checkdeps  :
    - python-pytest-mock
build      : |
    %python3_setup
install    : |
    %python3_install
# TODO 3.14 appdirs was deprecated?
#check      : |
#    %python3_test pytest -v
