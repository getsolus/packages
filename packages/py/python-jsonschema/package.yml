# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jsonschema
version    : 4.26.0
release    : 25
source     :
    - https://files.pythonhosted.org/packages/source/j/jsonschema/jsonschema-4.26.0.tar.gz : 0c26707e2efad8aa1bfc5b7ce170f3fccc2e4918ff85989ba9ffa9facb2be326
homepage   : https://github.com/python-jsonschema/jsonschema
license    : MIT
component  : programming.python
summary    : An implementation of JSON Schema validation for Python
description: |
    An implementation of JSON Schema validation for Python
builddeps  :
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-hatch-vcs
    - python-installer
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-jsonschema-specifications
    - python-pytest
rundeps    :
    - python-jsonschema-specifications
    - python-six
environment: |
    export SETUPTOOLS_SCM_PRETEND_VERSION=$version
setup      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # test_exceptions.py requires jsonpath-ng, which is not packaged.
    %python3_test pytest -v --ignore=jsonschema/tests/test_exceptions.py
