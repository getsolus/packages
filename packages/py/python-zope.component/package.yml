# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-zope.component
version    : '7.1'
release    : 15
source     :
    - https://github.com/zopefoundation/zope.component/archive/refs/tags/7.1.tar.gz : 5202f1a3fc0eedd1b85b183e3c3e49cf07a0eca9c3d28bafb138dbfffdec86ba
homepage   : https://github.com/zopefoundation/zope.component
license    : ZPL-2.1
component  : programming.python
summary    : Represents the core of the Zope Component Architecture
description: |
    Represents the core of the Zope Component Architecture.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - python-zope.deferredimport
    - python-zope.deprecation
    - python-zope.event
    - python-zope.hookable
build      : |
    %python3_setup --skip-dependency-check
install    : |
    %python3_install
