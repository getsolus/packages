# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-xlib
version    : '0.33'
release    : 16
source     :
    - https://github.com/python-xlib/python-xlib/archive/refs/tags/0.33.tar.gz : e10d1b49655800bffe0fbb5eb31eeef915a4421952ef006d468d53d34901f6f8
homepage   : https://github.com/python-xlib/python-xlib
license    : LGPL-2.1-or-later
component  : programming.python
summary    : A library for writing low-level X Windows clients
description: |
    The Python X Library is a complete X11 client-side implementation, written in pure Python. It can be used to write low-levelish X Windows client applications in Python.
replaces   : python3-xlib
builddeps  :
    - harfbuzz
    - python-build
    - python-installer
    - python-setuptools-scm
rundeps    :
    - python-six
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-build-Migrate-from-pkg_resources-to-importlib.patch
build      : |
    %python3_setup
install    : |
    %python3_install
