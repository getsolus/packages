# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-typeguard
version    : 4.5.2
release    : 15
source     :
    - https://files.pythonhosted.org/packages/source/t/typeguard/typeguard-4.5.2.tar.gz : 5a16dcac23502039299c97c8941651bc33d7ea8cc4b2f7d6bbb1b528f6eea423
homepage   : https://github.com/agronholm/typeguard
license    : MIT
component  : programming.python
summary    : Run-time type checker for Python
description: |
    This library provides run-time type checking for functions defined with PEP 484 argument (and return) type annotations.
builddeps  :
    - python-build
    - python-installer
    - python-mypy           # check
    - python-pytest         # check
    - python-setuptools-scm
    - python-wheel
rundeps    :
    - python-typing-extensions
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest3 -v 
