# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-timeout
version    : 2.4.0
release    : 12
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-timeout/pytest_timeout-2.4.0.tar.gz : 7e68e90b01f9eff71332b25001f85c75495fc4e3a836701876183c4bcfd0540a
homepage   : https://github.com/pytest-dev/pytest-timeout/
license    : MIT
component  : programming.python
summary    : py.test plugin to abort hanging tests
description: |
    This is a plugin which will terminate tests after a certain timeout, assuming the test session isn't being debugged. When aborting a test it will show a stack dump of all threads running at the time. This is useful when running tests under a continuous integration server or simply if you don't know why the test suite hangs.
builddeps  :
    - python-build
    - python-installer
    - python-packaging
    - python-pexpect
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-pytest-cov
rundeps    :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
