# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-zope.testrunner
version    : '8.2'
release    : 4
source     :
    - https://github.com/zopefoundation/zope.testrunner/archive/refs/tags/8.2.tar.gz : 6565be81fb8cec5f306e20c3cd9b8f54b6ae99bac4527884c2b26399973b5f41
homepage   : https://zopetestrunner.readthedocs.io
license    : ZPL-2.1
component  : programming.python
summary    : A flexible test runner with layer support.
description: |
    A flexible test runner with layer support.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-zope.interface
rundeps    :
    - python-zope.exceptions
    - python-zope.interface
build      : |
    %python3_setup --skip-dependency-check
install    : |
    %python3_install

    rm -frv $installdir/usr/lib/python%python3_version%/site-packages/zope/testrunner/tests
