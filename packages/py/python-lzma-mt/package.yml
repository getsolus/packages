# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-lzma-mt
version    : 0.1.4
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/l/lzma_mt/lzma_mt-0.1.4.tar.gz : d330ca01dcf3cbfd532ac45c0f46d74a99ecce922972d12b478989a09111bb8c
homepage   : https://github.com/isarandi/lzma-mt
license    : GPL-2.0-or-later
component  : programming.python
summary    : Multi-threaded LZMA/XZ compression for Python
description: |
    Multi-threaded LZMA/XZ compression for Python.

    A drop-in replacement for Python's lzma module with multi-threading support, implemented as a Cython wrapper around liblzma.
builddeps  :
    - cython
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
