# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-qtwebengine
version    : 5.15.7
release    : 29
source     :
    - https://pypi.python.org/packages/source/P/PyQtWebEngine/PyQtWebEngine-5.15.7.tar.gz : f121ac6e4a2f96ac289619bcfc37f64e68362f24a346553f5d6c42efa4228a4d
homepage   : https://www.riverbankcomputing.com/software/pyqtwebengine
license    : GPL-3.0-or-later
component  : programming.python
summary    : Python bindings for QtWebEngine
description: |
    A set of Python bindings for the Qt Company's Qt WebEngine libraries.
replaces   :
    - python3-qtwebengine
builddeps  :
    - pkgconfig(Qt5WebEngine)
    - pkgconfig(python3)
    - pyqt-builder
    - python-setuptools
    - python-sip
    - python3-qt5
rundeps    :
    - python3-qt5
# Needed because qmake defaults to clang
clang      : true
setup      : |
    sip-build \
        --no-make \
        --api-dir /usr/share/qt5/qsci/api/python
build      : |
    %make -C build
install    : |
    %make_install -C build INSTALL_ROOT="$installdir"
    %install_license LICENSE
