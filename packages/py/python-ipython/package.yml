# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-ipython
version    : 9.14.1
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/i/ipython/ipython-9.14.1.tar.gz : f913bf74df06d458e46ced84ca506c23797590d594b236fe60b14df213291e7b
homepage   : https://ipython.org/
license    : BSD-3-Clause
component  : programming.python
summary    : IPython provides a rich toolkit to help you make the most of using Python interactively
description: |
    IPython provides a rich toolkit to help you make the most of using Python interactively.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - matplotlib
    - pygments
    - python-decorator
    - python-ipython-pygments-lexers
    - python-jedi
    - python-matplotlib-inline
    - python-nbformat
    - python-pandas
    - python-pexpect
    - python-pickleshare
    - python-prompt-toolkit
    - python-psutil
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-trio
    - python-stack-data
    - python-testpath
    - python-traitlets
rundeps    :
    - pygments
    - python-decorator
    - python-ipython-pygments-lexers
    - python-jedi
    - python-matplotlib-inline
    - python-pexpect
    - python-pickleshare
    - python-prompt-toolkit
    - python-psutil
    - python-simplegeneric
    - python-stack-data
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # ipdoctest scans IPython sources from the build tree while the staged
    # install is also on PYTHONPATH, causing ImportPathMismatchError in solbuild.
    %python3_test pytest -v tests/ -o addopts=
replaces   :
    - python3-ipython
