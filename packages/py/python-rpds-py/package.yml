# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-rpds-py
version    : 2026.5.1
release    : 9
source     :
    - https://files.pythonhosted.org/packages/source/r/rpds_py/rpds_py-2026.5.1.tar.gz : 07b24fea40541e28570e5b795a4a38fbdcd12550c06bd0748005ecc8116ca256
homepage   : https://github.com/crate-py/rpds
license    : MIT
component  : programming.python
summary    : Python bindings to Rust's persistent data structures (rpds)
description: |
    Python bindings to the Rust rpds crate for persistent data structures.
networking : true
builddeps  :
    - python-build
    - python-installer
    - python-maturin
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest3 -v
