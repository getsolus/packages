# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-rich
version    : 15.0.0
release    : 9
source     :
    - https://files.pythonhosted.org/packages/source/r/rich/rich-15.0.0.tar.gz : edd07a4824c6b40189fb7ac9bc4c52536e9780fbbfbddf6f1e2502c31b068c36
homepage   : https://github.com/Textualize/rich
license    : MIT
component  : programming.python
summary    : Rich is a Python library for rich text and beautiful formatting in the terminal
description: |
    Rich is a Python library for rich text and beautiful formatting in the terminal. The Rich API makes it easy to add color and style to terminal output. Rich can also render pretty tables, progress bars, markdown, syntax highlighted source code, tracebacks, and more — out of the box.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
rundeps    :
    - pygments
    - python-markdown-it-py
build      : |
    %python3_setup
install    : |
    %python3_install
