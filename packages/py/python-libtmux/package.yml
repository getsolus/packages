# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-libtmux
version    : 0.55.0
release    : 16
source     :
    - https://files.pythonhosted.org/packages/source/l/libtmux/libtmux-0.55.0.tar.gz : cdc4aa564b2325618d73d57cb0d7d92475d02026dba2b96a94f87ad328e7e79d
homepage   : https://github.com/tmux-python/libtmux
license    : MIT
component  : programming.python
summary    : Python API for tmux
description: |
    libtmux is the tool behind tmuxp, a tmux workspace manager in Python.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
rundeps    :
    - tmux
checkdeps  :
    - python-gp-libs
    - python-pytest
    - python-pytest-mock
    - python-pytest-rerunfailures
    - tmux
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    pytest_args=(
        --deselect tests/test_pane.py::test_capture_pane_start
        --deselect tests/test_pane_capture_pane.py::test_capture_pane_backward_compatible
        --deselect tests/test_pane_capture_pane.py::test_capture_pane_start_end_with_flags
        --deselect tests/test_pane_capture_pane.py::test_capture_pane_trim_trailing_warning
        --deselect 'tests/test_pane_capture_pane.py::test_capture_pane_flags[join_wrapped_numbers]'
    )

    _site_packages="$(python -c "import site; print(site.getsitepackages()[0])")"
    python -m installer --destdir=test_dir dist/*.whl
    export PYTHONPATH="test_dir/${_site_packages}:${PYTHONPATH}"

    %python3_test pytest "${pytest_args[@]}" -vv tests
