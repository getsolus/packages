# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-tornado
version    : 6.5.5
release    : 20
source     :
    - https://github.com/tornadoweb/tornado/archive/refs/tags/v6.5.5.tar.gz : abd5473239228ea944b5b041d0531c26ac832d654db9044a44012a2e6f95fc61
homepage   : https://www.tornadoweb.org/
license    : Apache-2.0
component  : programming.python
summary    : Tornado is a Python web framework and asynchronous networking library, originally developed at FriendFeed
description: |
    Tornado is a Python web framework and asynchronous networking library, originally developed at FriendFeed. By using non-blocking network I/O, Tornado can scale to tens of thousands of open connections, making it ideal for long polling, WebSockets, and other applications that require a long-lived connection to each user.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE
#check      : |
#    # https://github.com/tornadoweb/tornado/issues/2947
#    %python3_test -m tornado.test.runtests --verbose
