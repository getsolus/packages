# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-trove-classifiers
version    : 2026.6.1.19
release    : 9
source     :
    - https://files.pythonhosted.org/packages/source/t/trove-classifiers/trove_classifiers-2026.6.1.19.tar.gz : c5132b4b61a829d11cfbd2d72e97f20a45ed6edb95e45c5efdeb5e00836b2745
