# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-debugpy
version    : 1.8.21
release    : 17
source     :
    - https://github.com/microsoft/debugpy/archive/refs/tags/v1.8.21.tar.gz : 5f1699a85d124efded8b64b6ecff6060e1d53bf652436061e59b8a2201e15c6c
homepage   : https://github.com/microsoft/debugpy
license    : MIT
component  : programming.python
summary    : A debugger for Python
description: |
    An implementation of the Debug Adapter Protocol for Python.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
