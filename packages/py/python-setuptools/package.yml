# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# NOTE: Also update python-types-setuptools when updating this package.
name       : python-setuptools
version    : 83.0.0
release    : 29
source     :
    - https://pypi.debian.net/setuptools/setuptools-83.0.0.tar.gz : 025bccbbf0fa05b6192bc64ae1e7b16e001fd6d6d4d5de03c97b1c1ade523bef
homepage   : https://github.com/pypa/setuptools
license    : MIT
component  :
    - wheel : programming.python
    - programming.python
summary    :
    - wheel : Python wheels for python-setuptools
    - Easily download, build, install, upgrade, and uninstall Python packages
description: |
    Setuptools allows the easy download, build, install, upgrade, and uninstallation of Python packages.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-coverage
    - python-installer
    - python-jaraco.functools
    - python-jaraco.text
    - python-packaging
    - python-wheel
rundeps     :
    - python-jaraco.functools
    - python-jaraco.text
    - python-more-itertools
    - python-wheel
#checkdeps  :
#    - pip
#    - python-filelock
#    - python-jaraco.envs
#    - python-jaraco.path
#    - python-jaraco.test
#    - python-path
#    - python-pytest
#    - python-tomli-w
#    - python3-test
#    - virtualenv
#networking : yes # check
environment: |
    # Don't want .exe files
    export SETUPTOOLS_INSTALL_WINDOWS_SPECIFIC_FILES=0
setup      : |
    rm -r setuptools/_vendor

    # Populate dependencies list for devendored deps
    sed '/^core =/,/]/!d' pyproject.toml > ../requirements.txt
    sed -i '1d;$d' ../requirements.txt
    sed -i '/^dependencies =/ {
        r ../requirements.txt
        s/^core =/dependencies =/
        }' pyproject.toml
build      : |
    %python3_setup
install    : |
    %python3_install

    # Delete vendored packages
    # TODO replace with python sitepackage macro
    rm -rfv ${installdir}/usr/lib/python3.*/site-packages/setuptools/_vendor/

    # Install wheel for virtualenv
    install -Dm 00644 dist/*.whl -t ${installdir}/usr/share/python-wheels
#check      : |
#    export PYTHONPATH="$PWD"
#
#    pytest_args=(
#        --ignore tools/finalize.py # jaraco.develop is not packaged
#        --ignore tools/vendored.py # jaraco.packaging is not packaged
#        --ignore=setuptools/tests/config/test_apply_pyprojecttoml.py
#        --ignore=setuptools/tests/test_editable_install.py
#        --ignore=setuptools/tests/integration/
#        # devendoring
#        --deselect setuptools/tests/test_setuptools.py::test_wheel_includes_vendored_metadata
#        --deselect setuptools/tests/test_virtualenv.py::test_no_missing_dependencies
#        # system site packages
#        --deselect setuptools/tests/test_virtualenv.py::test_pip_upgrade_from_source
#    )
#
#    %python3_test pytest -v "${pytest_args[@]}"
patterns    :
    - wheel :
        - /usr/share/python-wheels
