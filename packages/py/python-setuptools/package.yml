# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# NOTE: Also update python-types-setuptools when updating this package.
name       : python-setuptools
version    : 82.0.1
release    : 27
source     :
    - https://pypi.debian.net/setuptools/setuptools-82.0.1.tar.gz : 7d872682c5d01cfde07da7bccc7b65469d3dca203318515ada1de5eda35efbf9
homepage   : https://github.com/pypa/setuptools
license    : MIT
component  : programming.python
summary    : Easily download, build, install, upgrade, and uninstall Python packages
description: |
    Setuptools allows the easy download, build, install, upgrade, and uninstallation of Python packages.
environment: |
    # Don't want .exe files
    export SETUPTOOLS_INSTALL_WINDOWS_SPECIFIC_FILES=0
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-coverage
    - python-installer
    - python-packaging
    - python-wheel
#checkdeps  :
#    - pip
#    - python-filelock
#    - python-jaraco.envs
#    - python-jaraco.path
#    - python-jaraco.test
#    - python-path
#    - python-pytest
#    - python-tomli-w
#    - python3-test
#    - virtualenv
#networking : yes # check
build      : |
    %python3_setup
install    : |
    %python3_install
