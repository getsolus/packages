# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-asyncio
version    : 1.4.0
release    : 17
source     :
    - https://files.pythonhosted.org/packages/source/p/pytest-asyncio/pytest_asyncio-1.4.0.tar.gz : c6c0d2259945122819f171a32ecea2c349ead889ee28176caaf492143424be42
homepage   : https://github.com/pytest-dev/pytest-asyncio
license    : Apache-2.0
component  : programming.python
summary    : Pytest support for asyncio
description: |
    pytest-asyncio is an Apache2 licensed library, written in Python, for testing asyncio code with pytest. asyncio code is usually written in the form of coroutines, which makes it slightly more difficult to test using normal testing tools. pytest-asyncio provides useful fixtures and markers to make testing easier.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-async-generator
    - python-flaky
    - python-hypothesis
    - python-pytest-trio
rundeps    :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
