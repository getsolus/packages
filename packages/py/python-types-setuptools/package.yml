# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-types-setuptools
version    : 82.0.0.20260408
release    : 2
source     :
    - https://pypi.python.org/packages/source/t/types-setuptools/types_setuptools-82.0.0.20260408.tar.gz : 036c68caf7e672a699f5ebbf914708d40644c14e05298bc49f7272be91cf43d3
homepage   : https://github.com/python/typeshed
license    : Apache-2.0
component  : programming.python
summary    : Typing stubs for setuptools
description: |
    This is a PEP 561 type stub package for the setuptools package. It can be used by type-checking tools like mypy, pyright, pytype, PyCharm, etc. to check code that uses setuptools.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
