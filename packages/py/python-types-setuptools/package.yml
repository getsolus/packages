# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-types-setuptools
version    : 83.0.0.20260706
release    : 3
source     :
    - https://pypi.python.org/packages/source/t/types-setuptools/types_setuptools-83.0.0.20260706.tar.gz : 9e586ac6c1eb504d28b5f06aced1d705e0043839413219ee3c08d16625fbb4ff
homepage   : https://github.com/python/typeshed
license    : Apache-2.0
component  : programming.python
summary    : Typing stubs for setuptools
description: |
    This is a PEP 561 type stub package for the setuptools package. It can be used by type-checking tools like mypy, pyright, pytype, PyCharm, etc. to check code that uses setuptools.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
