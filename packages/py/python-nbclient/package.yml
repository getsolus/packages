# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-nbclient
version    : 0.11.0
release    : 13
source     :
    - https://files.pythonhosted.org/packages/source/n/nbclient/nbclient-0.11.0.tar.gz : 04a134a5b087f2c5887f228aca155db50169b8cd9334dee6942c8e927e56081a
homepage   : https://github.com/jupyter/nbclient/
license    : BSD-3-Clause
component  : programming.python
summary    : A client library for executing notebooks
description: |
    NBClient lets you execute notebooks. A client library for programmatic notebook execution, NBClient is a tool for running Jupyter Notebooks in different execution contexts, including the command line.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
rundeps    :
    - python-jupyter_client
    - python-nbformat
    - python-nest-asyncio
setup      : |
    %python3_setup
install    : |
    %python3_install
