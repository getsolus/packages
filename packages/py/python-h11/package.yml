# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-h11
version    : 0.16.0
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/h/h11/h11-0.16.0.tar.gz : 4e35b956cf45792e4caa5885e69fba00bdbc6ffafbfa020300e549b208ee5ff1
homepage   : https://github.com/python-hyper/h11
license    : MIT
component  : programming.python
summary    : A pure-Python, bring-your-own-I/O implementation of HTTP/1.1
description: |
    This is a little HTTP/1.1 library written from scratch in Python, heavily inspired by hyper-h2.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
