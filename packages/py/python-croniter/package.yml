# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-croniter
version    : 6.2.2
release    : 15
source     :
    - https://files.pythonhosted.org/packages/source/c/croniter/croniter-6.2.2.tar.gz : ba60832a5ec8e12e51b8691c3309a113d1cf6526bdf1a48150ce8ec7a532d0ab
homepage   : https://github.com/kiorky/croniter
license    : MIT
component  : programming.python
summary    : croniter provides iteration for datetime object with cron like format
description: |
    croniter is a python module to provide iteration for datetime object.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-packaging
    - python-pluggy
    - python-setuptools
    - python-trove-classifiers
checkdeps  :
    - python-dateutil
    - python-pytest
    - python-pytz
rundeps    :
    - python-dateutil
    - python-pytz
build      : |
    # don't hardcode fucking version constraints
    sed -i 's/==/>=/g' pyproject.toml
    %python3_setup
install    : |
    %python3_install
