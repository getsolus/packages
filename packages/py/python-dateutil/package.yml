# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-dateutil
version    : 2.9.0
release    : 25
source     :
    - https://pypi.python.org/packages/source/p/python-dateutil/python-dateutil-2.9.0.post0.tar.gz : 
        37dd54208da7e1cd875388217d5e00ebd4179249f90fb72437e91a35459a0ad3
homepage   : https://github.com/dateutil/dateutil
license    :
    - Apache-2.0
    - BSD-3-Clause
component  : programming.python
summary    : Python date module
description: |
    The dateutil module provides powerful extensions to the datetime module available in the Python standard library.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools-scm
    - python-wheel
checkdeps  :
    - python-freezegun
    - python-hypothesis
    - python-pytest
rundeps    :
    - python-six
build      : |
    %patch -p1 -i $pkgfiles/relax-setuptools_scm-requires.patch
    %python3_setup
install    : |
    %python3_install
#check      : |
#    %python3_test pytest3
