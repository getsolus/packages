# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python3
version    : 3.14.6
release    : 79
source     :
    - https://www.python.org/ftp/python/3.14.6/Python-3.14.6.tar.xz : 143b1dddefaec3bd2e21e3b839b34a2b7fb9842272883c576420d605e9f30c63
homepage   : https://www.python.org/
license    : Python-2.0
summary    :
    - Python development environment - 3.14
    - idle : Python's integrated development and learning environment
    - test : Python 3.14 Test package
component  :
    - programming.python
    - idle : programming.ide
    - test : programming.python
    - tkinter : programming.python
description: |
    The Python 3 package contains the Python development environment. This is useful for object-oriented programming, writing scripts, prototyping large programs or developing entire applications.
optimize   :
    - speed
networking : true
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(harfbuzz) # Fix linking for tkinter
    - pkgconfig(libb2)
    - pkgconfig(libffi)
    - pkgconfig(liblzma)
    - pkgconfig(libxcrypt)
    - pkgconfig(openssl)
    - pkgconfig(sqlite3)
    - pkgconfig(tcl)
    - pkgconfig(tk)
    - pkgconfig(x11)
    - db5-devel
    - gdbm-devel
rundeps    :
    - idle :
        - python3
        - python3-tkinter
    - test : python3
    - tkinter : python3
patterns   :
    - devel :
        - /usr/bin/*-config
        - /usr/lib/python3.*/config-3.*-x86_64-linux-gnu/libpython3.*.a
    - idle :
        - /usr/bin/idle*
        - /usr/lib/python3.*/idlelib
        - /usr/share/applications/idle3.desktop
        - /usr/share/metainfo/idle3.metainfo.xml
        - /usr/share/icons/hicolor/*/apps/idle*
    - test :
        - /usr/lib/python3.*/test
    - tkinter :
        - /usr/lib64/python3.*/lib-dynload/_tkinter.cpython-3*-x86_64-linux-gnu.so*
environment: |
    # stolen from Arch's PKGBUILD
    export _pybasever=${version%.*}
setup      : |
    %patch -p1 -i $pkgfiles/Try-to-load-so.avx2-libs-first-if-they-exist-and-cpu.patch

    %configure --enable-ipv6=yes \
               --enable-loadable-sqlite-extensions \
               --enable-optimizations \
               --enable-shared \
               --with-ensurepip=no \
               --with-lto \
               --with-system-expat \
               --with-system-ffi \
               --without-cxx-main \
               ax_cv_c_float_words_bigendian=no
build      : |
    %make
install    : |
    %make_install

    install -Dm00644 Tools/gdb/libpython.py $installdir/usr/share/gdb/auto-load/usr/lib64/libpython3.12.so.1.0-gdb.py

    # Idle desktop and appstream metainfo
    install -Dm00644 $pkgfiles/idle3.desktop -t $installdir/usr/share/applications/
    install -Dm00644 $pkgfiles/idle3.metainfo.xml -t $installdir/usr/share/metainfo/
    for i in 16 32 48 256; do
        install -Dm00644 Lib/idlelib/Icons/idle_${i}.png $installdir/usr/share/icons/hicolor/${i}x${i}/apps/idle3.png
    done

    # Unneeded on Linux
    find "$installdir" -name '*.exe' -print -delete

    ln -s python3               $installdir/usr/bin/python
    ln -s python3-config        $installdir/usr/bin/python-config
    ln -s idle3                 $installdir/usr/bin/idle
    ln -s pydoc3                $installdir/usr/bin/pydoc
    ln -s python${_pybasever}.1 $installdir/usr/share/man/man1/python.1
