# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-spyder-kernels
version    : 3.1.5
release    : 36
source     :
    - https://github.com/spyder-ide/spyder-kernels/archive/refs/tags/v3.1.5.tar.gz : 97ade365b2b2cc5684f8bb8ecfccd809801edad23f01eb31ef28e3d1dc9fc17c
homepage   : https://github.com/spyder-ide/spyder-kernels
license    : MIT
component  : programming.ide
summary    : Jupyter Kernels for the Spyder console
description: |
    Package that provides Jupyter kernels for use with the consoles of Spyder, the Scientific Python Development Environment. These kernels can launched either through Spyder itself or in an independent Python session, and allow for interactive or file-based execution of Python code inside Spyder.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - python-cloudpickle
    - python-ipykernel
    - python-ipython
    - python-jupyter_client
    - python-packaging
    - python-pyzmq
    - python-traitlets
    - python-wurlitzer
    - pyxdg
build      : |
    %python3_setup
install    : |
    %python3_install
