# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pygal
version    : 3.1.3
release    : 11
source     :
    - https://github.com/Kozea/pygal/archive/refs/tags/3.1.3.tar.gz : 39dd727cb65400cb76c4a70a522a9899bbf10f9be19ace90ee4796b6476d8720
homepage   : https://www.pygal.org/
license    : LGPL-3.0-or-later
component  : programming.python
