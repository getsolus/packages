# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-aiohttp
version    : 3.14.0
release    : 25
source     :
    - https://files.pythonhosted.org/packages/source/a/aiohttp/aiohttp-3.14.0.tar.gz : 2882de819734c715fd1b9c11c97e09fa020d14438203d1d354d8ed1702791c9b
homepage   : https://docs.aiohttp.org/
license    : Apache-2.0
