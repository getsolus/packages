# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-yarl
version    : 1.24.2
release    : 15
source     :
    - https://files.pythonhosted.org/packages/source/y/yarl/yarl-1.24.2.tar.gz : 9ac374123c6fd7abf64d1fec93962b0bd4ee2c19751755a762a72dd96c0378f8
homepage   : https://yarl.aio-libs.org/
license    : Apache-2.0
component  : programming.python
summary    : The module provides handy URL class for URL parsing and changing
description: |
    The module provides handy URL class for URL parsing and changing
builddeps  :
    - cython
    - python-build
    - python-expandvars
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-idna
    - python-multidict
    - python-propcache
    - python-pytest
rundeps    :
    - python-idna
    - python-multidict
    - python-propcache
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v -m "not hypothesis" \
        --ignore=tests/test_pydantic.py \
        --ignore=tests/test_quoting.py \
        --ignore=tests/test_quoting_benchmarks.py \
        --ignore=tests/test_url_benchmarks.py \
        -o addopts="-v -ra --showlocals --doctest-modules --strict-markers"
