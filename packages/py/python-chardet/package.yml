# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-chardet
version    : 7.4.3
release    : 17
source     :
    - https://files.pythonhosted.org/packages/source/c/chardet/chardet-7.4.3.tar.gz: cc1d4eb92a4ec1c2df3b490836ffa46922e599d34ce0bb75cf41fd2bf6303d56
homepage   : https://github.com/chardet/chardet
license    : LGPL-2.1-or-later
component  : programming.python
summary    : Python character encoding detector
description: |
    Python Chardet - The Universal Character Encoding Detector
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-installer
    - python-wheel
checkdeps  :
    - git
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
