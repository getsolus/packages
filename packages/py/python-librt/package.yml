# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-librt
version    : 0.8.1
release    : 2
source     :
    - https://github.com/mypyc/librt/archive/refs/tags/v0.8.1.tar.gz : a070ef12fa2d83474e93e483d798bd5bc321a2517791e3d908bee5901a7baded
homepage   : https://github.com/mypyc/librt
license    : MIT
component  : programming.python
summary    : mypyc runtime library
description: |
    This library contains basic functionality that is useful in code compiled using mypyc, and efficient C implementations of various Python standard library classes and functions. Mypyc can produce faster extensions when you use librt in the code you compile. librt also contains some internal library features used by mypy.
clang      : true
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-mypy_extensions
    - python-pytest
setup      : |
    # See https://github.com/mypyc/librt/issues/17
    cp -r lib-rt/* ./
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest smoke_tests.py
