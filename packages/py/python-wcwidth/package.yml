# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-wcwidth
version    : 0.8.1
release    : 16
source     :
    - https://files.pythonhosted.org/packages/source/w/wcwidth/wcwidth-0.8.1.tar.gz : faf5b4a5366a72dc49cad48cdf21f52bdf63bdda995178e483ba247ff79089b9
homepage   : https://github.com/jquast/wcwidth
license    : MIT
component  : programming.python
summary    : Measures the displayed width of unicode strings in a terminal
description: |
    This library is mainly for CLI programs that carefully produce output for Terminals, or make pretend to be an emulator.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-hatchling
    - python-installer
checkdeps  :
    - python-pytest-cov
setup      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
