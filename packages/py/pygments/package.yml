# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pygments
version    : 2.20.0
release    : 23
source     :
    - https://files.pythonhosted.org/packages/source/p/pygments/pygments-2.20.0.tar.gz : 6757cd03768053ff99f3039c1a36d6c0aa0b263438fcab17520b30a303a82b5f
homepage   : https://pygments.org/
license    : BSD-2-Clause
component  : programming
summary    : Pygments is a syntax highlighting package written in Python
description: |
    Pygments is a generic syntax highlighter written in Python that supports over 500 languages and text formats, for use in code hosting, forums, wikis or other applications that need to prettify source code.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
build      : |
    %python3_setup
install    : |
    %python3_install
