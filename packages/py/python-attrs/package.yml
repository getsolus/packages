# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-attrs
version    : 26.1.0
release    : 25
source     :
    - https://files.pythonhosted.org/packages/source/a/attrs/attrs-26.1.0.tar.gz : d03ceb89cb322a8fd706d4fb91940737b6642aa36998fe130a9bc96c985eff32
homepage   : https://www.attrs.org/en/stable/
license    : MIT
component  : programming.python
summary    : Python Classes Without Boilerplate
description: |
    attrs is the Python package that will bring back the joy of writing classes by relieving you from the drudgery of implementing object protocols (aka dunder methods).
builddeps  :
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-hatch-vcs
    - python-installer
checkdeps  :
    - python-cloudpickle
    - python-hypothesis
    - python-pytest
    - python-zope.interface
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
