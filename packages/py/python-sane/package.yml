# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-sane
version    : 2.9.2
release    : 14
source     :
    - https://github.com/python-pillow/Sane/archive/v2.9.2.tar.gz : 0863c0c4e935e6404d53317b74dfc3b58f7da14ffc97086327f1a51c7ab60062
homepage   : https://github.com/python-pillow/Sane
license    : MIT
component  : programming.python
