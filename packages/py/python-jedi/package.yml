# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jedi
version    : 0.20.0
release    : 20
source     :
    - git|https://github.com/davidhalter/jedi.git : v0.20.0
homepage   : https://github.com/davidhalter/jedi
license    : MIT
component  : programming.python
summary    : An autocompletion tool for Python that can be used for text editors
description: |
    An autocompletion tool for Python that can be used for text editors.
builddeps  :
    - python-build
    - python-installer
    - python-parso
    - python-setuptools
checkdeps  :
    - python-pytest
rundeps    :
    - python-parso
replaces   :
    - python3-jedi
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # Python 3.14: stdlib os additions, deferred annotations, PEP 695 type params.
    %python3_test pytest -v -k "not test_find_system_environments and not test_string_annotation and not test_compiled_signature_annotation_string and not TestSetupReadline and not pep0695_type_parameter_syntax"
