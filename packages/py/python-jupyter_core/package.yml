# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-jupyter_core
version    : 5.9.1
release    : 21
source     :
    - https://files.pythonhosted.org/packages/source/j/jupyter_core/jupyter_core-5.9.1.tar.gz : 4d09aaff303b9566c3ce657f580bd089ff5c91f5f89cf7d8846c3cdf465b5508
homepage   : https://github.com/jupyter/jupyter_core
license    : BSD-3-Clause
component  : programming.python
summary    : Core Jupyter functionality
description: |
    Jupyter core package. A base package on which Jupyter projects rely.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
rundeps    :
    - python-platformdirs
    - python-traitlets
checkdeps  :
    - python-platformdirs
    - python-pytest
    - python-traitlets
setup      : |
    %python3_setup
install    : |
    %python3_install
    install -Dm00644 examples/jupyter-completion.bash ${installdir}/usr/share/bash-completion/completions/jupyter
    install -Dm00644 examples/completions-zsh ${installdir}/usr/share/zsh/site-functions/_jupyter
check      : |
    # https://github.com/jupyter/jupyter_core/issues/231
    # Subprocess command tests spawn python without PYTHONPATH to the staged install.
    # troubleshoot expects pip, which is not available in the build root.
    %python3_test pytest -v \
        --deselect tests/test_paths.py::test_jupyter_path_user_site \
        --deselect tests/test_paths.py::test_jupyter_path_no_user_site \
        --deselect tests/test_paths.py::test_jupyter_path_prefer_env \
        --deselect tests/test_command.py::test_not_on_path \
        --deselect tests/test_command.py::test_path_priority \
        --deselect tests/test_command.py::test_argv0 \
        --deselect tests/test_troubleshoot.py::test_troubleshoot
