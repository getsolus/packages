# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-multidict
version    : 6.7.1
release    : 10
source     :
    - https://files.pythonhosted.org/packages/source/m/multidict/multidict-6.7.1.tar.gz : ec6652a1bee61c53a3e5776b6049172c53b6aaba34f18c9ad04f82712bac623d
homepage   : https://github.com/aio-libs/multidict
license    : Apache-2.0
component  : programming.python
summary    : The multidict implementation
description: |
    Multidict is dict-like collection of key-value pairs where key might occur more than once in the container.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - python-pytest
    - python-pytest-cov
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v -m "not leaks" --no-cov \
        --ignore=tests/isolated \
        --ignore=tests/test_circular_imports.py \
        --ignore=tests/test_multidict_benchmarks.py \
        --ignore=tests/test_views_benchmarks.py
