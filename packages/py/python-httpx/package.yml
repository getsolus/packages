# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-httpx
version    : 0.28.1
release    : 6
source     :
    - https://files.pythonhosted.org/packages/source/h/httpx/httpx-0.28.1.tar.gz : 75e98c5f16b0f35b567856f597f06ff2270a374470a5c2392242528e3e3e42fc
homepage   : https://www.python-httpx.org/
license    : BSD-3-Clause
component  : programming.python
summary    : The next generation HTTP client
description: |
    HTTPX is a fully featured HTTP client library for Python 3. It includes an integrated command line client, has support for both HTTP/1.1 and HTTP/2, and provides both sync and async APIs.
builddeps  :
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-installer
checkdeps  :
    - python-anyio
    - python-brotli
    - python-certifi
    - python-chardet
    - python-click
    - python-h11
    - python-h2
    - python-httpcore
    - python-idna
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-trio
    - python-trustme
    - python-trio
    - python-uvicorn
    - python-wsproto
rundeps    :
    - python-anyio
    - python-httpcore
    - python-idna
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    export PYTEST_ADDOPTS="-o asyncio_default_fixture_loop_scope=function -W ignore::pytest.PytestDeprecationWarning -W ignore::pytest.PytestUnraisableExceptionWarning"
    %python3_test pytest -v -m "not network" \
        --deselect tests/client/test_proxies.py::test_socks_proxy \
        --deselect tests/client/test_client.py::test_client_decode_text_using_autodetect \
        --deselect tests/client/test_client.py::test_client_decode_text_using_explicit_encoding \
        --deselect tests/models/test_responses.py::test_response_decode_text_using_autodetect \
        --deselect tests/test_utils.py::test_logging_request \
        --deselect tests/test_utils.py::test_logging_redirect_chain \
        --deselect 'tests/test_timeouts.py::test_write_timeout[trio]'
