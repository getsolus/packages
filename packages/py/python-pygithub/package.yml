# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pygithub
version    : 2.9.1
release    : 15
source     :
    - https://github.com/PyGithub/PyGithub/archive/refs/tags/v2.9.1.tar.gz : e04f9e6b34dcc7714535dc8d01bf1bf2210c13863c6ca0519328f326cb967b32
homepage   : https://github.com/PyGithub/PyGithub
license    : LGPL-3.0-or-later
component  : programming.python
summary    : Typed interactions with the GitHub API
description: |
    PyGitHub is a Python library to access the GitHub API and Github Enterprise API. This library enables you to manage GitHub resources such as repositories, user profiles, and organizations in your Python applications.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools-scm
checkdeps  :
    - pytest-subtests
    - python-deprecated
    - python-httpretty
    - python-pyjwt
    - python-pynacl
    - python-pytest
    - python-requests
    - python-responses
rundeps    :
    - python-dateutil
    - python-deprecated
    - python-pyjwt
    - python-pynacl
    - python-requests
    - python-typing-extensions
environment: |
    export SETUPTOOLS_SCM_PRETEND_VERSION=${version}
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
