# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-httpcore
version    : 1.0.9
release    : 7
source     :
    - https://files.pythonhosted.org/packages/source/h/httpcore/httpcore-1.0.9.tar.gz : 6e34463af53fd2ab5d807f399a9b45ea31c3dfa2276f15a2c3f00afff6e176e8
homepage   : https://www.encode.io/httpcore/
license    : BSD-3-Clause
component  : programming.python
summary    : A minimal HTTP client
description: |
    The HTTP Core package provides a minimal low-level HTTP client, which does one thing only. Sending HTTP requests.
builddeps  :
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-installer
checkdeps  :
    - python-anyio
    - python-certifi
    - python-h11
    - python-h2
    - python-hpack
    - python-hyperframe
    - python-pytest
    - python-pytest-asyncio
    - python-pytest-trio
    - python-trio
rundeps    :
    - python-anyio
    - python-certifi
    - python-h11
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    export PYTEST_ADDOPTS="-o asyncio_default_fixture_loop_scope=function -W ignore::pytest.PytestDeprecationWarning"
    %python3_test pytest -v \
        --ignore=tests/_async/test_integration.py \
        --ignore=tests/_async/test_socks_proxy.py \
        --ignore=tests/_sync/test_integration.py \
        --ignore=tests/_sync/test_socks_proxy.py \
        --ignore=tests/test_api.py
