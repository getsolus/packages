# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-flask-socketio
version    : 5.6.1
release    : 9
source     :
    - https://pypi.io/packages/source/F/Flask-SocketIO/flask_socketio-5.6.1.tar.gz : fe5bd995c3ed4da9a98f335d0d830fa1a19d84a64789f6265642a671fdacaeac
homepage   : https://github.com/miguelgrinberg/flask-socketio
license    : MIT
component  : programming.python
summary    : Socket.IO integration for Flask applications
description: |
    This integrates Socket.IO into Flask.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - flask
    - python-pytest
    - python-socketio
rundeps    :
    - flask
    - python-socketio
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # flask_socketio.test_client is not a test module; ignore it to avoid import clashes.
    # Skip Redis queue tests and test_background_task (eventlet timing on Python 3.14).
    %python3_test pytest -vk "not (test_message_queue_options or test_background_task)" --ignore-glob='*/test_client.py'
