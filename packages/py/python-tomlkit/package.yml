# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-tomlkit
version    : 0.15.0
release    : 10
source     :
    - https://files.pythonhosted.org/packages/source/t/tomlkit/tomlkit-0.15.0.tar.gz : 7d1a9ecba3086638211b13814ea79c90dd54dd11993564376f3aa92271f5c7a3
homepage   : https://github.com/sdispater/tomlkit
license    : MIT
component  : programming.python
summary    : Style-preserving TOML library for Python
description: |
    TOML Kit is a 1.0.0-compliant TOML library. It includes a parser that preserves all comments, indentations, whitespace and internal element ordering, and makes them accessible and editable via an intuitive API.
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
checkdeps  :
    - python-pytest
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
