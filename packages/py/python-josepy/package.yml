# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-josepy
version    : 2.2.0
release    : 11
source     :
    - https://files.pythonhosted.org/packages/source/j/josepy/josepy-2.2.0.tar.gz : 74c033151337c854f83efe5305a291686cef723b4b970c43cfe7270cf4a677a9
homepage   : https://github.com/certbot/josepy
license    : Apache-2.0
component  : programming.python
summary    : JOSE protocol implementation in Python using cryptography
description: |
    Python implementation of the standards developed by IETF Javascript Object Signing and Encryption (JOSE).
builddeps  :
    - python-build
    - python-installer
    - python-poetry-core
checkdeps  :
    - python-cryptography
    - python-pytest
rundeps    :
    - python-cryptography
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
