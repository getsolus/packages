# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pyscard
version    : 2.3.1
release    : 17
source     :
    - https://github.com/LudovicRousseau/pyscard/archive/refs/tags/2.3.1.tar.gz : 6b84eea9f2fd19a0a54e213b3d76870b21a7792f823755a824f49de822c964c7
homepage   : https://github.com/LudovicRousseau/pyscard
license    : LGPL-2.1-or-later
component  : programming.python
summary    : Smartcard module for Python
description: |
    pyscard - python smart card library - is a python module adding smart cards support to python.
builddeps  :
    - pkgconfig(libpcsclite)
    - pkgconfig(python3)
    - python-setuptools
    - swig
rundeps    :
    - pcsc-lite
setup      : |
    rm pyproject.toml
    %python3_setup
install    : |
    %python3_install
