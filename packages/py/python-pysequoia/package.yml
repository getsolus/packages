# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pysequoia
version    : 0.1.34
release    : 1
source     :
    - https://files.pythonhosted.org/packages/source/p/pysequoia/pysequoia-0.1.34.tar.gz : a5427e7cc695d4d95ca4ecdc06a09d79809efd761dd58f5777029ad6105b53c9
homepage   : https://github.com/wiktor-k/pysequoia
license    : Apache-2.0
component  : programming.python
summary    : OpenPGP in Python using Sequoia PGP
description: |
    This library provides OpenPGP facilities in Python through the Sequoia PGP library.
networking : true # for downloading rust crates
builddeps  :
    - python-build
    - python-installer
    - python-maturin
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
