# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-protobuf
version    : '34.0'
release    : 29
source     :
    - https://github.com/protocolbuffers/protobuf/releases/download/v34.0/protobuf-34.0.tar.gz : e540aae70d3b4f758846588768c9e39090fab880bc3233a1f42a8ab8d3781efd
license    : BSD-3-Clause
homepage   : https://pypi.python.org/pypi/protobuf/
component  : programming.python
summary    : Python bindings for Protobuf
description: |
    Protocol Buffers are Google’s data interchange format.
networking : true
builddeps  :
    - pkgconfig(protobuf)
    - pkgconfig(python3)
    - bazelisk
    - python-installer
    - python-wheel
rundeps    :
    - protobuf
    - python-six
environment: |
    export JAVA_HOME=/usr/lib64/openjdk-21
build      : |
    bazel build //python/dist:binary_wheel
install    : |
    python3 -m installer --destdir=$installdir bazel-bin/python/dist/*.whl
    %install_license LICENSE
