# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-debian
version    : 1.1.0
release    : 2
source     :
    - https://ftp.debian.org/debian/pool/main/p/python-debian/python-debian_1.1.0.tar.xz : 7c7396ffc7bd3e3d6b740c5e9c156a18a5641a06a96b65580ff2a97457b8d2f2
homepage   : https://salsa.debian.org/python-debian-team/python-debian
license    :
    - GPL-2.0-or-later
    - GPL-3.0-or-later
component  : programming.python
summary    : Modules for Debian-related data formats
description: |
    Modules for Debian-related data formats.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools-scm
    - python-wheel
rundeps    :
    - python-chardet
    - python-six
    - xz
checkdeps  :
    - dpkg
    - python-chardet
    - python-pytest
build      : |
    export SETUPTOOLS_SCM_PRETEND_VERSION=${version}
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
