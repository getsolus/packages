# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-joblib
version    : 1.5.3
release    : 13
source     :
    - https://github.com/joblib/joblib/archive/refs/tags/1.5.3.tar.gz : 7de874013042e7c4dfd14e34c81a0fec19ab7cd8f08bf447b773488e96770fa2
homepage   : https://joblib.readthedocs.io
license    : BSD-3-Clause
component  : programming.python
summary    : Computing with Python functions
description: |
    Joblib is a set of tools to provide lightweight pipelining in Python.
    In particular:
    - transparent disk-caching of functions and lazy re-evaluation (memoize pattern)
    - easy simple parallel computingJoblib is optimized to be fast and robust on large data in particular and has specific optimizations for numpy arrays.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
