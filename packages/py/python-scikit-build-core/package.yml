# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-scikit-build-core
version    : 0.12.2
release    : 3
source     :
    - https://files.pythonhosted.org/packages/source/s/scikit_build_core/scikit_build_core-0.12.2.tar.gz : 562e0bbc9de1a354c87825ccf732080268d6582a0200f648e8c4a2dcb1e3736d
homepage   : https://github.com/scikit-build/scikit-build-core
license    : Apache-2.0
component  : programming.python
summary    : A next generation Python CMake adaptor and Python API for plugins
description: |
    Scikit-build-core is a build backend for Python that uses CMake to build extension modules. It has a simple yet powerful static configuration system in pyproject.toml, and supports almost unlimited flexibility via CMake. It was initially developed to support the demanding needs of scientific users, but can build any sort of package that uses CMake.
builddeps  :
    - python-build
    - python-hatch-vcs
    - python-hatchling
    - python-installer
    - python-packaging
    - python-wheel
#checkdeps  :
  #    - pybind11
  #    - python-fastjsonschema
  #    - python-pytest
  #    - virtualenv
rundeps    :
    - python-packaging
    - python-pathspec
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
  #    %python3_test pytest
