# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-build
version    : 1.5.1
release    : 16
source     :
    - https://pypi.debian.net/build/build-1.5.1.tar.gz : 94e17f1db803ab22f46049376c44c8437c52090f0dfdf1adc43df56542d644fb
homepage   : https://build.pypa.io/
license    : MIT
component  : programming.python
summary    : A simple, correct PEP 517 build frontend
description: |
    A simple, correct PEP 517 build frontend. python-build will invoke the PEP 517 hooks to build a distribution package. It is a simple build tool and does not perform any dependency management.
networking : false # flip this for python3 rebuilds
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
rundeps    :
    - python-packaging
    - python-pyproject-hooks
environment: |
    # flip this for python3 rebuilds
    export BOOTSTRAP=0
build      : |
    if [[ ${BOOTSTRAP} == "1" ]]; then
        python3 -m pip wheel --no-deps .
    else
        %python3_setup
    fi
install    : |
    if [[ ${BOOTSTRAP} == "1" ]]; then
        python3 -m pip install --root=%installroot% --no-deps --ignore-installed .
    else
        %python3_install
    fi
