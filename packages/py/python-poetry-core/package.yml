# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-poetry-core
version    : 2.4.1
release    : 11
source     :
    - https://files.pythonhosted.org/packages/source/p/poetry-core/poetry_core-2.4.1.tar.gz : 89dceb6c10e9c6d8650a16183400e3c9ff9ddee13b0a81023b5575334a2b3744
homepage   : https://github.com/python-poetry/poetry-core
license    : MIT
component  : programming.python
summary    : Poetry PEP 517 Build Backend & Core Utilities
description: |
    A PEP 517 build backend implementation developed for Poetry. This project is intended to be a lightweight, fully compliant, self-contained package allowing PEP 517-compatible build frontends to build Poetry-managed projects.
builddeps  :
    - python-build
    - python-installer
rundeps    :
    - python-attrs
    - python-packaging
    - python-typing-extensions
build      : |
    %python3_setup
install    : |
    %python3_install
