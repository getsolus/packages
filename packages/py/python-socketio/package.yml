# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-socketio
version    : 5.16.3
release    : 12
source     :
    - https://github.com/miguelgrinberg/python-socketio/archive/refs/tags/v5.16.3.tar.gz : 5a9ae7217b807f0635f817dac4f5a2c32ad71311398093a8cda4df44063fa9f8
homepage   : https://github.com/miguelgrinberg/python-socketio
license    : MIT
component  : programming.python
summary    : Socket.IO server and client for Python
description: |
    Python implementation of the Socket.IO_ realtime client and server.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - python-aiohttp
    - python-bidict
    - python-engineio
    - python-msgpack
    - python-pytest
    - python-pytest-asyncio
    - python-uvicorn
    - python-websocket-client
rundeps    :
    - python-bidict
    - python-engineio
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v \
        --ignore=tests/async/test_redis_manager.py \
        --ignore=tests/common/test_redis_manager.py
