# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-tenacity
version    : 9.1.4
release    : 16
source     :
    - https://files.pythonhosted.org/packages/source/t/tenacity/tenacity-9.1.4.tar.gz : adb31d4c263f2bd041081ab33b498309a57c77f9acf2db65aadf0898179cf93a
homepage   : https://tenacity.readthedocs.io/en/latest/
license    : Apache-2.0
component  : programming.python
summary    : Retrying library for Python
description: |
    Tenacity is a general-purpose retrying library, written in Python, to simplify the task of adding retry behavior to just about anything.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-setuptools-scm
checkdeps  :
    - python-pytest
    - python-tornado
    - python-typeguard
rundeps    :
    - python-six
    - python-tornado
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest
