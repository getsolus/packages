# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-pytest-regressions
version    : 2.11.0
release    : 4
source     :
    - https://pypi.debian.net/pytest-regressions/pytest_regressions-2.11.0.tar.gz : d4a86092f979eb25d2403c51b2b61039781c4c7c7a364a56b9fa838872a650f7
homepage   : https://github.com/ESSS/pytest-regressions
license    : MIT
component  : programming.python
summary    : Pytest plugin for regression testing
description: |
    Pytest plugin for regression testing
builddeps  :
    - python-build
    - python-installer
    - python-setuptools-scm
checkdeps  :
    - matplotlib
    - numpy
    - python-pandas
    - python-pillow
    - python-pytest
    - python-pytest-datadir
rundeps    :
    - python-pytest
    - python-pytest-datadir
    - pyyaml
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
