# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pywal16
version    : 3.8.15
release    : 4
source     :
    - https://github.com/eylles/pywal16/archive/refs/tags/3.8.15.tar.gz : cd3e4588c453b844dd222d861b52b7a7c88a3396b3e104300ef1db27b9492b1d
homepage   : https://github.com/eylles/pywal16
license    : MIT
component  : system.utils
summary    : Generate and change color-schemes on the fly
description: |
    Pywal is a tool that generates a color palette from the dominant colors in an image. It then applies the colors system-wide and on-the-fly in all of your favourite programs.
builddeps  :
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE.md
