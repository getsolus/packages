# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kldap
version    : 25.12.3
release    : 99
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kldap-25.12.3.tar.xz : 496cabade483caaea19f77cfa63047c3c0a2ee4dfc9bfe2e810dcffcc08af155
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Allows LDAP accessing with a convenient Qt style C++ API
description: |
    Allows LDAP accessing with a convenient Qt style C++ API.
builddeps  :
    - pkgconfig(ldap)
    - pkgconfig(libsasl2)
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove doc
    rm -rfv $installdir/usr/share/doc
