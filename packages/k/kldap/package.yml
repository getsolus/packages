# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kldap
version    : 26.04.2
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kldap-26.04.2.tar.xz : 5988a3e160ee7c5e4edffd442225a4685a55bbe8d81a7b12c290fb980899120f
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Allows LDAP accessing with a convenient Qt style C++ API
description: |
    Allows LDAP accessing with a convenient Qt style C++ API.
builddeps  :
    - pkgconfig(ldap)
    - pkgconfig(libsasl2)
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
