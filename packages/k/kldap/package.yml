# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kldap
version    : 26.04.3
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kldap-26.04.3.tar.xz : 50d0f6675c13323023fc4305ce516d37884e244231ff82b09be00324e6c9bdbe
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Allows LDAP accessing with a convenient Qt style C++ API
description: |
    Allows LDAP accessing with a convenient Qt style C++ API.
builddeps  :
    - pkgconfig(ldap)
    - pkgconfig(libsasl2)
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
