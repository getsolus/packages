# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdav
version    : 6.26.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.26/kdav-6.26.0.tar.xz : 7535b2b9a6eb35e5b539de780f2d2b84668eb97eec3b7a6cf14d91fbe6bedfec
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
