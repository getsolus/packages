# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmag
version    : 26.04.2
release    : 94
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmag-26.04.2.tar.xz : c89c5eee844b7d471d477dfee553fc22d72843f8b4c452d9e322cce2abadcdfd
homepage   : https://kde.org/applications/utilities/org.kde.kmag
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-only
    - GPL-2.0-or-later
component  : desktop.kde
summary    : KMag is a screen magnifier
description: |
    KMag is a screen magnifier.
builddeps  :
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - libqaccessibilityclient-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove docs
    rm -rfv $installdir/usr/share/doc
