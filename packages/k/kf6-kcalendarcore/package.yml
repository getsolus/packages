# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcalendarcore
version    : 6.26.0
release    : 36
source     :
    - https://download.kde.org/stable/frameworks/6.26/kcalendarcore-6.26.0.tar.xz : 386be0eee392d8432b6b7fafd3dead95dd1fc74f81790928c580f81e6222a17c
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - LGPL-3.0-or-later
component  : desktop.library
summary    : Provides access to and handling of calendar data
description: |
    This library provides access to and handling of calendar data. It supports the standard formats iCalendar and vCalendar and the group scheduling standard iTIP.
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(libical)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - libical-devel
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 \
        -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
