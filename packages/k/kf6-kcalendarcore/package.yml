# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcalendarcore
version    : 6.28.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.28/kcalendarcore-6.28.0.tar.xz : c0c8272729cc9cc7006f87b64f80feb03750acb6bbd208ae94c2bad77fc444be
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - LGPL-3.0-or-later
component  : desktop.library
summary    : Provides access to and handling of calendar data
description: |
    This library provides access to and handling of calendar data. It supports the standard formats iCalendar and vCalendar and the group scheduling standard iTIP.
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(libical)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - libical-devel
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 \
        -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
