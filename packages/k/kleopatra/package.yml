# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kleopatra
version    : 26.04.3
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kleopatra-26.04.3.tar.xz : 67d1c3786076de19f1005d0b3d75f6b44cfd2027a73615659093e192b9df8e1b
homepage   : https://kde.org/applications/utilities/org.kde.kleopatra
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-only
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.kde
summary    : Kleopatra is a GUI for GnuPG
description: |
    Kleopatra is a GUI for GnuPG so it needs a working GnuPG setup.
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(libassuan)
    - akonadi-mime-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-kitemmodels-devel
    - kf6-knotifications-devel
    - kf6-kxmlgui-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - kmime-devel
    - libboost-devel
    - libkleo-devel
    - mimetreeparser-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
