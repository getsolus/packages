# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kbookmarks
version    : 6.28.0
release    : 35
source     :
    - https://download.kde.org/stable/frameworks/6.28/kbookmarks-6.28.0.tar.xz : d7f4048860ef00bc5d135e284dc6b1307d03199c2c13020994b17e38e3741f5c
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Bookmarks management library.
description: |
    Bookmarks management library.
