# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ksvg
version    : 6.24.0
release    : 33
source     :
    - https://download.kde.org/stable/frameworks/6.24/ksvg-6.24.0.tar.xz : c4d61f6bb4c61452e83de0427f444cdec296d87333f6c7676fb7dae09480f4d2
homepage   : https://community.kde.org/Frameworks
license    :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Components for handling SVGs
description: |
    Components for handling SVGs
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Svg)
    - kf6-karchive-devel
    - kf6-kcolorscheme-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kirigami-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
