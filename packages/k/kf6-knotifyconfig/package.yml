# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-knotifyconfig
version    : 6.27.0
release    : 33
source     :
    - https://download.kde.org/stable/frameworks/6.27/knotifyconfig-6.27.0.tar.xz : 81861316d615e7e5ff07143c1d58d9b52cadc5e02ab38c8f2677c01f71e51f26
