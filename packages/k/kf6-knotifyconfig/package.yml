# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-knotifyconfig
version    : 6.26.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.26/knotifyconfig-6.26.0.tar.xz : 062e22f48a1da485d42ef56b37db1fc502f5f9305871483627d218f357560a28
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
component  : desktop.library
summary    : Configuration dialog for desktop notifications.
description: |
    Configuration dialog for desktop notifications.
builddeps  :
    - pkgconfig(libcanberra)
    - kf6-kcompletion-devel
    - kf6-kconfig-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
