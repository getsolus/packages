# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kidentitymanagement
version    : 26.04.2
release    : 104
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kidentitymanagement-26.04.2.tar.xz : f5d10bc2e20863892c0a78e707790a5691cfdc2dfe7debaaa749bfce2e4bf7ff
homepage   : https://kde.org/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - MIT
