# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ktextaddons
version    : 2.0.2
release    : 10
source     :
    - https://download.kde.org/stable/ktextaddons/ktextaddons-2.0.2.tar.xz : 0d7f82a976ef682f45822b221e2f15cefc0039488bc8c700a6b0e7594aaebdea
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : programming.devel
homepage   : https://invent.kde.org/libraries/ktextaddons
summary    : Various text handling addons
description: |
    Text addons (autocorrection, text to speak, grammar checking, text translator, emoticon support)
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6TextToSpeech)
    - kf6-karchive-devel
    - kf6-kconfigwidgets-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-ktextwidgets-devel
    - kf6-sonnet-devel
    - kf6-syntax-highlighting-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja -DBUILD_QCH=ON \
                 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
