# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ktextaddons
version    : 2.1.1
release    : 11
source     :
    - https://download.kde.org/stable/ktextaddons/ktextaddons-2.1.1.tar.xz : 7ce5961b7a82ad50e4ff2b4386d764cd29d308600ebbb5fd76e2492d31e0f5f0
license    :
    - BSD-3-Clause
    - CC0-1.0
    - CC-BY-SA-4.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
component  : programming.devel
homepage   : https://invent.kde.org/libraries/ktextaddons
summary    : Various text handling addons
description: |
    Text addons (autocorrection, text to speak, grammar checking, text translator, emoticon support)
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6TextToSpeech)
    - kf6-karchive-devel
    - kf6-kconfigwidgets-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-ktextwidgets-devel
    - kf6-sonnet-devel
    - kf6-syntax-highlighting-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja -DBUILD_QCH=ON \
                 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
