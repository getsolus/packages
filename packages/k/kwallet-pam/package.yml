# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kwallet-pam
version    : 6.6.5
release    : 142
source     :
    - https://download.kde.org/stable/plasma/6.6.5/kwallet-pam-6.6.5.tar.xz : 5434a50f421867fc11190389bdebc43404b64cadcc7d87b1f08ff95ef199853e
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
component  : desktop.kde.core
summary    : KWallet PAM integration
description: |
    KWallet PAM integration.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libgcrypt)
