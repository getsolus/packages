# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kwallet-pam
version    : 6.7.1
release    : 143
source     :
    - https://download.kde.org/stable/plasma/6.7.1/kwallet-pam-6.7.1.tar.xz : 2f371edd8e4347d5b8af0e2a687f5e35377bfdd896c705c93b83ece0439e9c45
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
component  : desktop.kde.core
summary    : KWallet PAM integration
description: |
    KWallet PAM integration.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libgcrypt)
    - extra-cmake-modules
    - kf6-kwallet-devel
    - socat
rundeps    :
    - socat
clang      : true
optimize   :
