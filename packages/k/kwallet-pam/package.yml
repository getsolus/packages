# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kwallet-pam
version    : 6.7.3
release    : 145
source     :
    - https://download.kde.org/stable/plasma/6.7.3/kwallet-pam-6.7.3.tar.xz : a720a1440edf8734e4b8d4d4d5ea96fc14946c21f38f6a5ca1b738d8a8dc583b
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
component  : desktop.kde.core
summary    : KWallet PAM integration
description: |
    KWallet PAM integration.
builddeps  :
    - pkgconfig(Qt6Core)
