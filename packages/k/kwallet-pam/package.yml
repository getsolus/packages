# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kwallet-pam
version    : 6.7.2
release    : 144
source     :
    - https://download.kde.org/stable/plasma/6.7.2/kwallet-pam-6.7.2.tar.xz : 057f33cab5857ad596ce36460cdf5729005d478eef80afee870b366d1b9c3673
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
component  : desktop.kde.core
summary    : KWallet PAM integration
description: |
    KWallet PAM integration.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libgcrypt)
    - extra-cmake-modules
    - kf6-kwallet-devel
    - socat
rundeps    :
    - socat
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
