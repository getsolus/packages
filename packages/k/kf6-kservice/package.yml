# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kservice
version    : 6.27.0
release    : 36
source     :
    - https://download.kde.org/stable/frameworks/6.27/kservice-6.27.0.tar.xz : 3736c6d6cd389efc89adbcb64fe7ba25ffc9d62eb8eaf6393f42bb85f655a8c7
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : programming.library
summary    : Plugin framework for desktop services.
description: |
    Plugin framework for desktop services.
builddeps  :
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
rundeps    :
    - devel :
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
