# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kservice
version    : 6.28.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.28/kservice-6.28.0.tar.xz : d9151195b748361a12d7aeafd8df531d2f45b55d202d7fa5f47c3a11d59877d6
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : programming.library
summary    : Plugin framework for desktop services.
description: |
    Plugin framework for desktop services.
builddeps  :
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
rundeps    :
    - devel :
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
