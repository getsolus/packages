# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmix
version    : 26.04.3
release    : 95
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmix-26.04.3.tar.xz : 6bcd3c7d9a093fa93c9d6cfaf1a13b691d73de91b9bceaf7de2f00dc4d5eb3ad
homepage   : https://kde.org/applications/multimedia/org.kde.kmix
license    :
    - GPL-2.0-or-later
component  : desktop.kde
summary    : KDE volume control program
description: |
    KDE volume control program.
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(libcanberra)
    - pkgconfig(libpulse)
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kglobalaccel-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-kwidgetsaddons-devel
    - kf6-kwindowsystem-devel
    - kf6-kxmlgui-devel
    - kf6-solid-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING*

    # remove docs
    rm -rfv $installdir/usr/share/doc
