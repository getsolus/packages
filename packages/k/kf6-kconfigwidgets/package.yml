# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kconfigwidgets
version    : 6.27.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.27/kconfigwidgets-6.27.0.tar.xz : 404ed0606dfb13cc44c36deaf5f880eeec75018ae878125dabf83f32efeb0a7f
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : desktop.library
summary    : Widgets for configuration dialogs
description: |
    Widgets for configuration dialogs
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - extra-cmake-modules
    - kf6-kcodecs-devel
    - kf6-kcolorscheme-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kwidgetsaddons-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcodecs-devel
        - kf6-kcolorscheme-devel
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
        - kf6-kguiaddons-devel
        - kf6-ki18n-devel
        - kf6-kwidgetsaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
