# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kalzium
version    : 25.12.3
release    : 43
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kalzium-25.12.3.tar.xz : 59d8d5138f75f3979df62a18a4fc9ed12c1d2adfeb455aded8cb3acd41aee9cb
homepage   : https://apps.kde.org/kalzium/
license    : GPL-2.0-or-later
component  : desktop
summary    : Periodic Table of Elements
description: |
    Periodic Table of Elements
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6StateMachine)
    - pkgconfig(Qt6Svg)
    - eigen3
    - kf6-karchive-devel
    - kf6-kdoctools-devel
    - kf6-kparts-devel
    - kf6-kplotting-devel
    - kf6-ktextwidgets-devel
    - kf6-kunitconversion-devel
    - ocaml
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
