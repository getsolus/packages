# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kalzium
version    : 26.04.1
release    : 44
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kalzium-26.04.1.tar.xz : 493f915d85e769cb189539bebb527ad3ebfc3d9a1d938644b06436ce0fbfc006
homepage   : https://apps.kde.org/kalzium/
license    : GPL-2.0-or-later
component  : desktop
summary    : Periodic Table of Elements
description: |
    Periodic Table of Elements
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6StateMachine)
    - pkgconfig(Qt6Svg)
    - eigen3
    - kf6-karchive-devel
    - kf6-kdoctools-devel
    - kf6-kparts-devel
    - kf6-kplotting-devel
    - kf6-ktextwidgets-devel
    - kf6-kunitconversion-devel
    - ocaml
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
