# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kalzium
version    : 26.04.3
release    : 46
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kalzium-26.04.3.tar.xz : d79114a42fc3582962bec85ac2d877217708a9491d51f731b166c36c87ed1a23
homepage   : https://apps.kde.org/kalzium/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop
summary    : Periodic Table of Elements
description: |
    Periodic Table of Elements
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6StateMachine)
    - pkgconfig(Qt6Svg)
    - eigen3
    - kf6-karchive-devel
    - kf6-kdoctools-devel
    - kf6-kparts-devel
    - kf6-kplotting-devel
    - kf6-ktextwidgets-devel
    - kf6-kunitconversion-devel
    - ocaml
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
