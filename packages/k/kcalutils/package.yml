# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcalutils
version    : 25.12.3
release    : 96
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kcalutils-25.12.3.tar.xz : 8d54dfef43b7929c9d9b52ba2b6234f94537923e4ff94984611bf7489502a234
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : This library provides a set of utility functions that help applications access and use calendar data via the KCalCore library
description: |
    This library provides a set of utility functions that help applications access and use calendar data via the KCalCore library.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - kf6-kiconthemes-devel
    - kf6-ktexttemplate-devel
    - kidentitymanagement-devel
rundeps    :
    - devel :
        - kf6-kcalendarcore-devel
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
