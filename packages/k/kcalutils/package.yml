# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcalutils
version    : 26.04.1
release    : 97
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kcalutils-26.04.1.tar.xz : bf5492583f4e56f7c1a98e32315e50def4df01daa5b5de12812d85150c7c7725
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : This library provides a set of utility functions that help applications access and use calendar data via the KCalCore library
description: |
    This library provides a set of utility functions that help applications access and use calendar data via the KCalCore library.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - kf6-kiconthemes-devel
    - kf6-ktexttemplate-devel
    - kidentitymanagement-devel
rundeps    :
    - devel :
        - kf6-kcalendarcore-devel
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
