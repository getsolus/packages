# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kgamma
version    : 6.6.5
release    : 47
source     :
    - https://download.kde.org/stable/plasma/6.6.5/kgamma-6.6.5.tar.xz : fab70445c88c98ce907e896d8c71cbf7771044880b5ef116fee969863e53360a
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Adjust your monitor's gamma settings
description: |
    Adjust your monitor's gamma settings.
builddeps  :
    - pkgconfig(xxf86vm)
    - kf6-kcmutils-devel
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rfv $installdir/usr/share/doc

    %install_license LICENSES/*
replaces   :
    - kgamma5
    - dbginfo : kgamma5-dbginfo
