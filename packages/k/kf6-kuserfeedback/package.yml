# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kuserfeedback
version    : 6.26.0
release    : 39
source     :
    - https://download.kde.org/stable/frameworks/6.26/kuserfeedback-6.26.0.tar.xz : 6cc18dca65a24af2ac262cb9c8761991701c8081a7133487b4ec936003f3f864
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - MIT
component  : desktop.library
summary    : Framework for collecting user feedback for applications via telemetry and surveys
description: |
    Framework for collecting user feedback for applications via telemetry and surveys
builddeps  :
    - pkgconfig(Qt6Charts)
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6Svg)
    - extra-cmake-modules
    - php-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_TESTING=OFF \
               -DENABLE_CONSOLE=ON \
               -DENABLE_CLI=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
