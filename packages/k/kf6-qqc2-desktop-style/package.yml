# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-qqc2-desktop-style
version    : 6.26.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.26/qqc2-desktop-style-6.26.0.tar.xz : 1805fa31355ff86c02158fd2b8d396fd88835d01db97d8700314c48ee3360986
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.theme
summary    : QtQuickControls 2 style that integrates with the desktop
description: |
    This is a style for QtQuickControls 2 that uses QWidget's QStyle for painting, making possible to achieve an higher deree of consistency between QWidget-based and QML-based apps.
builddeps  :
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(x11)
    - kf6-kconfigwidgets-devel
    - kf6-kiconthemes-devel
    - kf6-kirigami-devel
    - kf6-sonnet-devel
    - qt6-base-private-devel
rundeps    :
    - kf6-sonnet
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
