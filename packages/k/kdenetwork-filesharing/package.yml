# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdenetwork-filesharing
version    : 25.12.3
release    : 90
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kdenetwork-filesharing-25.12.3.tar.xz : 269de47fccf26ce1c989a4b66d432c4306913d1a814199c5ffce533c67305696
homepage   : https://kde.org/
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : network.clients
summary    : Network file sharing integration for dolphin
description: |
    Network file sharing integration for dolphin.
builddeps  :
    - pkgconfig(packagekitqt6)
    - clang-devel
    - kf6-kauth-devel
    - kf6-kio-devel
    - qcoro-qt6-devel
    - qt6-base-private-devel
    - samba
rundeps    :
    - samba
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DSAMBA_INSTALL=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
