# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdenetwork-filesharing
version    : 26.04.1
release    : 92
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kdenetwork-filesharing-26.04.1.tar.xz : 76665219c66ba71137f00634036427028903cc146226d3d2c933aac3d232e757
homepage   : https://kde.org/
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : network.clients
summary    : Network file sharing integration for dolphin
description: |
    Network file sharing integration for dolphin.
builddeps  :
    - pkgconfig(packagekitqt6)
    - clang-devel
    - kf6-kauth-devel
    - kf6-kio-devel
    - qcoro-qt6-devel
    - qt6-base-private-devel
    - samba
rundeps    :
    - samba
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DSAMBA_INSTALL=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
