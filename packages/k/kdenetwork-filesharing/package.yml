# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdenetwork-filesharing
version    : 26.04.2
release    : 93
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kdenetwork-filesharing-26.04.2.tar.xz : d05b43808dd8de0c8b36ad6f76af447ad7525c9c37fbc2969f72dfc4a5c4712a
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : network.clients
summary    : Network file sharing integration for dolphin
description: |
    Network file sharing integration for dolphin.
builddeps  :
    - pkgconfig(packagekitqt6)
    - clang-devel
    - kf6-kauth-devel
    - kf6-kio-devel
    - qcoro-qt6-devel
    - qt6-base-private-devel
    - samba
rundeps    :
    - samba
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DSAMBA_INSTALL=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
