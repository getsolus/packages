# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kde-inotify-survey
version    : 26.04.1
release    : 22
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kde-inotify-survey-26.04.1.tar.xz : 33d040ad63251699d0c020b439014054e56c2d24e6191890a327c17fec230499
homepage   : https://invent.kde.org/system/kde-inotify-survey
license    : LGPL-2.0-or-later
component  : desktop.kde.core
summary    : Tooling for monitoring inotify limits
description: |
    Tooling for monitoring inotify limits and informing the user when they have been or about to be reached
builddeps  :
    - kf6-kauth-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
