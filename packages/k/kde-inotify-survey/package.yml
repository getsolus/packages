# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kde-inotify-survey
version    : 26.04.2
release    : 23
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kde-inotify-survey-26.04.2.tar.xz : cef84126bfacbf31bdeea405be7ad3a37cf1f5be554d20e82b61de1e9113688b
homepage   : https://invent.kde.org/system/kde-inotify-survey
license    :
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde.core
summary    : Tooling for monitoring inotify limits
description: |
    Tooling for monitoring inotify limits and informing the user when they have been or about to be reached
builddeps  :
    - kf6-kauth-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
