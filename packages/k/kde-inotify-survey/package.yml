# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kde-inotify-survey
version    : 25.12.3
release    : 21
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kde-inotify-survey-25.12.3.tar.xz : 05c0204ddc166df04a5bd396f5af0408c0305fd34a7ff83619e86c87096c90e3
homepage   : https://invent.kde.org/system/kde-inotify-survey
license    : LGPL-2.0-or-later
component  : desktop.kde.core
summary    : Tooling for monitoring inotify limits
description: |
    Tooling for monitoring inotify limits and informing the user when they have been or about to be reached
builddeps  :
    - kf6-kauth-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
