# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kde-inotify-survey
version    : 26.04.3
release    : 24
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kde-inotify-survey-26.04.3.tar.xz : 6e5f628d5b92db7efca91fbff1c1647e94654b43d09e862276a3cc78cf92559a
homepage   : https://invent.kde.org/system/kde-inotify-survey
license    :
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde.core
summary    : Tooling for monitoring inotify limits
description: |
    Tooling for monitoring inotify limits and informing the user when they have been or about to be reached
builddeps  :
    - kf6-kauth-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
