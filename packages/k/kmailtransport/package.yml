# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmailtransport
version    : 26.04.3
release    : 104
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmailtransport-26.04.3.tar.xz : fea7cd107ddc2199e8c104eba00eb8469ffaaccd67ce4e403917971d23e4c675
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
component  : desktop.library
summary    : Mail Transport Service
description: |
    Mail Transport Service.
builddeps  :
    - kf6-kio-devel
    - ksmtp-devel
    - libkgapi-devel
    - qtkeychain-qt6-devel
rundeps    :
    - devel :
        - kf6-kconfig-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
