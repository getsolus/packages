# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kompare
version    : 26.04.1
release    : 88
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kompare-26.04.1.tar.xz : dc75f75b52cad9415d5c0fa83da5f53fbea298559f4ad8daa404fa9716ce7f3d
homepage   : https://kde.org/applications/development/org.kde.kompare
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : programming.tools
summary    : File Comparator
description: |
    Tool to visualize changes between two versions of a file.
builddeps  :
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-kparts-devel
    - kf6-ktexteditor-devel
    - libkomparediff2-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove doc
    rm -rfv $installdir/usr/share/doc
