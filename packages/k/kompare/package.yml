# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kompare
version    : 26.04.2
release    : 89
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kompare-26.04.2.tar.xz : 7130ee492da6b12f0b33e705b70514cd5eb11019b5799c96376f995ca052fa37
homepage   : https://kde.org/applications/development/org.kde.kompare
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
component  : programming.tools
summary    : File Comparator
description: |
    Tool to visualize changes between two versions of a file.
builddeps  :
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-kparts-devel
    - kf6-ktexteditor-devel
    - libkomparediff2-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
