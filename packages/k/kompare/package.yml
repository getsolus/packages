# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kompare
version    : 25.12.3
release    : 86
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kompare-25.12.3.tar.xz : 97b01230aa06ba7e3bfff5e2c2ac4cc43b87ed18e4ae98851d5fb4a1314dc353
homepage   : https://kde.org/applications/development/org.kde.kompare
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : programming.tools
summary    : File Comparator
description: |
    Tool to visualize changes between two versions of a file.
builddeps  :
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-kparts-devel
    - kf6-ktexteditor-devel
    - libkomparediff2-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove doc
    rm -rfv $installdir/usr/share/doc
