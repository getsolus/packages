# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdeconnect
version    : 26.04.2
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kdeconnect-kde-26.04.2.tar.xz : 45a197a2f2e7e400e6cf42f351cf92ca06807f1023f17378f128a3314c7fc176
homepage   : https://kdeconnect.kde.org/
license    :
    - Apache-2.0
    - BSD-3-Clause
    - CC-BY-SA-4.0
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : desktop.kde
summary    : KDE Connect adds communication between KDE and your smartphone.
description: |
    KDE Connect is a multi-platform app that allows your devices to communicate (eg: your phone and your computer).
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(KF6PulseAudioQt)
    - pkgconfig(Qt6Bluetooth)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(libei-1.0)
    - pkgconfig(libevdev)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
    - pkgconfig(xtst)
    - kf6-kcmutils-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-kitemmodels-devel
    - kf6-knotifications-devel
    - kf6-kpackage-devel
    - kf6-kpeople-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-modemmanager-qt-devel
    - kf6-qqc2-desktop-style-devel
    - kirigami-addons-devel
    - libfakekey-devel
    - qt6-base-private-devel
rundeps    :
    - kf6-kirigami
    - kf6-qqc2-desktop-style
    - kirigami-addons
    - sshfs-fuse
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    # https://bugs.kde.org/show_bug.cgi?id=481870
    %cmake_kf6 -DBLUETOOTH_ENABLED=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # ?
    rm -f $installdir/usr/lib64/libkdeconnectinterfaces.a
