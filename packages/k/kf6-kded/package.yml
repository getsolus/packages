# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kded
version    : 6.28.0
release    : 35
source     :
    - https://download.kde.org/stable/frameworks/6.28/kded-6.28.0.tar.xz : 31ba5c920b199dd13fff634001d22c993df3d639a8df989e0a55ec1d13a8279f
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
component  : programming.library
summary    : Central daemon of KDE work spaces
description: |
    KDED runs in the background and performs a number of small tasks. Some of these tasks are built in, others are started on demand.
builddeps  :
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kservice-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
