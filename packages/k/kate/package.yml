# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kate
version    : 26.04.1
release    : 114
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kate-26.04.1.tar.xz : 74cce1dc7f488a6e1f0a4412abe5bc42edb4506b418c2f940b7ed11258022198
homepage   : https://apps.kde.org/kate
license    :
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : desktop.kde.core
summary    :
    - KDE advanced text editor
description:
    - Kate is a multi-document, multi-view text editor by KDE. It features stuff like codefolding, syntaxhighlighting, dynamic word wrap, an embedded console, an extensive plugin interface and some prelimentary scripting support.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-knewstuff-devel
    - kf6-ktexteditor-devel
    - kf6-kuserfeedback-devel
    - kf6-kwallet-devel
    - qt6-base-private-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove docs
    rm -rfv $installdir/usr/share/doc

    # causes issues with appstream-builder, subpackage if you want to provide it
    rm $installdir/usr/share/metainfo/org.kde.kwrite.appdata.xml
