# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kitemmodels
version    : 6.28.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.28/kitemmodels-6.28.0.tar.xz : e03c5dbfc97fa298de9be58bfeb686518a52ae1236389fbc2436ff84165e7e2b
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
component  : desktop.library
summary    : Set of item models extending the Qt model-view framework.
description: |
    Set of item models extending the Qt model-view framework.
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Quick)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
