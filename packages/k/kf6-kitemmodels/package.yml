# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kitemmodels
version    : 6.27.0
release    : 36
source     :
    - https://download.kde.org/stable/frameworks/6.27/kitemmodels-6.27.0.tar.xz : f5aec7198b161562616c139ed037e562e7ae6822b839f67c8c2e2f97678fc58e
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
component  : desktop.library
summary    : Set of item models extending the Qt model-view framework.
description: |
    Set of item models extending the Qt model-view framework.
