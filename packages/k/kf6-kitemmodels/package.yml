# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kitemmodels
version    : 6.26.0
release    : 35
source     :
    - https://download.kde.org/stable/frameworks/6.26/kitemmodels-6.26.0.tar.xz : a996201062ff7d21f9db972debc2d9615762ddb0fd9da069a42b7fd7bba1e61d
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
component  : desktop.library
