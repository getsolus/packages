# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ktexttemplate
version    : 6.28.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.28/ktexttemplate-6.28.0.tar.xz : a184163f7d5d2ac4cd4a71d04bee830020332552bfa9eb5159ced57b20edd527
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.library
summary    : Separates the structure of documents from their data
description: |
    The goal of KTextTemplate is to make it easier for application developers to separate the structure of documents from the data they contain, opening the door for theming and advanced generation of other text such as code.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6UiTools)
    - extra-cmake-modules
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
