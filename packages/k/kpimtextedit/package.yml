# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpimtextedit
version    : 26.04.1
release    : 98
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kpimtextedit-26.04.1.tar.xz : 2670cc61039c82b3e19ec36686cfa73ac81f19ae18f4cf885a0ace4b3df80582
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : KPIMTextedit is a library that provides an enchanced text edit class, see TextEdit
description: |
    KPIMTextedit is a library that provides an enchanced text edit class, see TextEdit.
builddeps  :
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - kf6-sonnet-devel
    - kf6-syntax-highlighting-devel
    - ktextaddons-devel
rundeps    :
    - devel :
        - ktextaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
