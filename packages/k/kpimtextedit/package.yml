# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpimtextedit
version    : 25.12.3
release    : 97
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kpimtextedit-25.12.3.tar.xz : 100f5dd703adea988f63f2975034a0eff3d4e7d55d088009b02031dc0e47b9c5
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : KPIMTextedit is a library that provides an enchanced text edit class, see TextEdit
description: |
    KPIMTextedit is a library that provides an enchanced text edit class, see TextEdit.
builddeps  :
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - kf6-sonnet-devel
    - kf6-syntax-highlighting-devel
    - ktextaddons-devel
rundeps    :
    - devel :
        - ktextaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
