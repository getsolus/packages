# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kamoso
version    : 26.04.3
release    : 30
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kamoso-26.04.3.tar.xz : 11c361923764e5d33db524e204b45b83d1a84d223bcf605c2bd9c8b653e9cb66
homepage   : https://apps.kde.org/kamoso
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
component  : desktop.kde
summary    : Use your webcam to take pictures and make videos
description: |
    Kamoso is a simple and friendly program to use your camera. Use it to take pictures and make videos to share.
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(gstreamer-video-1.0)
    - kf6-kconfig-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-knotifications-devel
    - kf6-purpose-devel
rundeps    :
    - kf6-kirigami
    - kf6-purpose
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove docs
    rm -rfv $installdir/usr/share/doc
