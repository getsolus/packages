# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : krita
version    : 6.0.2
release    : 111
source     :
    - https://download.kde.org/stable/krita/6.0.2/krita-6.0.2.tar.xz : 1910d68a52b812314f2ebcea1d4ef494882dad6b02225fdec40d4b81fa691766
    - https://github.com/vanyossi/gmic/releases/download/v3.7.4.1/gmic-3.7.4.1.tar.gz#gmic-patched.tar.gz : 15674b544264fbc3f020be6fae27477aee6ac49316416f538e578a18ddb23879
    # Vendored build deps. Should always be on the latest version
    - https://github.com/arximboldi/immer/archive/refs/tags/v0.9.1.tar.gz#immer.tar.gz : b18b92ba60ec3186dc36ef671d3c2ae542cbb63eb6dc0e258476c6111a67c971
    - https://github.com/arximboldi/zug/archive/refs/tags/v0.1.2.tar.gz#zug.tar.gz : 75ff666a4ce1615b3ca26abbb17b10f5cb5cf5f86c9c293ec430c34750d3ea27
    - https://github.com/arximboldi/lager/archive/refs/tags/v0.1.3.tar.gz#lager.tar.gz : 55d3442d2d4306aad78fa2af5d3db01af65f4fdbfc58c4620fba13dbde82e599
homepage   : https://krita.org
license    : GPL-3.0-or-later
component  : multimedia.graphics
summary    : Free and open source digital painting application
description: |
    Krita is a professional FREE and open source painting program. It is made by artists that want to see affordable art tools for everyone.
patterns   : /*
networking : true
builddeps  :
    - pkgconfig(OpenColorIO)
    - pkgconfig(OpenEXR)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools) # For gmic-qt, needs lrelease
    - pkgconfig(Qt6WaylandCompositor)
    - pkgconfig(catch2)
    - pkgconfig(eigen3)
    - pkgconfig(exiv2)
    - pkgconfig(fftw3)
    - pkgconfig(fribidi)
    - pkgconfig(gsl)
    - pkgconfig(harfbuzz)
    - pkgconfig(kseexpr)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(libmypaint)
    - pkgconfig(libopenjp2)
    - pkgconfig(libpng)
    - pkgconfig(libraw)
    - pkgconfig(libssh)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libunibreak)
    - pkgconfig(libwebp)
    - pkgconfig(mlt++-7)
    - pkgconfig(poppler-qt6)
    - pkgconfig(python3)
    - pkgconfig(quazip1-qt6)
    - pkgconfig(sdl2)
    - pkgconfig(xcb-atom)
    - pkgconfig(xcb-keysyms)
    - pkgconfig(xi)
    - pkgconfig(xsimd)
    - pkgconfig(xtl)
    - giflib-devel
    - gmic-devel
    - kdesignerplugin-devel
    - kf6-kcolorscheme-devel
    - kf6-kcompletion-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kguiaddons-devel
    - kf6-ki18n-devel
    - kf6-kitemmodels-devel
    - kf6-kitemviews-devel
    - kf6-kwidgetsaddons-devel
    - kf6-kwindowsystem-devel
    - libboost-devel
    - libkdcraw-devel
    - python-qt6
    - python-sip
    - qt6-base-private-devel
    - qt6-tools
    - subversion
    - vc
rundeps    :
    - breeze
    - ffmpeg
    - python-qt6
setup      : |
    mkdir gmic-patched
    tar -xf $sources/gmic-patched.tar.gz -C gmic-patched --strip-components 1
    sed -i 's|lrelease-qt5|lrelease6|g' gmic-patched/gmic-qt/translations/lrelease.sh

    ## Krita is the only thing that currently uses these, and they're headers-only libs. Let's just build them here rather than having extra packages
    libs_prefix="/sollibs"
    mkdir zug
    tar -xf $sources/zug.tar.gz -C zug --strip-components 1
    cmake -Dzug_BUILD_EXAMPLES=FALSE \
          -Dzug_BUILD_DOCS=FALSE \
          -B zug-build -S zug
    DESTDIR=$(pwd) cmake --install zug-build --prefix $libs_prefix

    mkdir immer
    tar -xf $sources/immer.tar.gz -C immer --strip-components 1
    cmake -Dimmer_BUILD_DOCS=FALSE \
          -Dimmer_BUILD_EXAMPLES=FALSE \
          -Dimmer_BUILD_EXTRAS=FALSE \
          -B immer-build -S immer
    DESTDIR=$(pwd) cmake --install immer-build --prefix $libs_prefix

    mkdir lager
    tar -xf $sources/lager.tar.gz -C lager --strip-components 1
    cmake -Dlager_BUILD_EXAMPLES=FALSE \
          -Dlager_BUILD_DEBUGGER_EXAMPLES=FALSE \
          -Dlager_BUILD_DOCS=FALSE \
          -DCMAKE_PREFIX_PATH="$(pwd)/$libs_prefix" \
          -B lager-build -S lager
    DESTDIR=$(pwd) cmake --install lager-build --prefix $libs_prefix

    # Now onto krita, finally
    # Note to packagers: fix is in `master` but not yet released. Check at next
    # update.
    sed -i 's|set(abi_version "13.0")|set(abi_version "13.8")|' cmake/modules/SIPMacros.cmake 

    %cmake_ninja -L \
      -DBUILD_TESTING=OFF \
      -DBUILD_WITH_QT6=ON \
      -DALLOW_UNSTABLE=QT6 \
      -DENABLE_UPDATERS=OFF \
      -DFETCH_TRANSLATIONS=ON \
      -DBUILD_KRITA_QT_DESIGNER_PLUGINS=ON \
      -DKDE_INSTALL_CONFDIR=/usr/share/defaults/krita \
      -DCMAKE_PREFIX_PATH="$(pwd)/$libs_prefix"
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rfv $installdir/usr/share/applications/krita*.desktop

    # Note to packagers: only uncomment if version mismatch is too large and
    # gmic-qt refuses to pickup the system gmic through CMake detection. This
    # removes bundled gmic source and forces gmic-qt to build against the system
    # one.
    # rm -rf gmic-patched/src
    %cmake_ninja -S gmic-patched/gmic-qt \
                 -B gmic-build \
                 -DCMAKE_PREFIX_PATH=$installdir/usr \
                 -DENABLE_LTO=ON \
                 -DENABLE_SYSTEM_GMIC=ON \
                 -DGMIC_QT_HOST=krita-plugin

    %ninja_build -C gmic-build
    %ninja_install -C gmic-build
    rm -fv $installdir/usr/share/gmic/gmic_cluts.gmz

    # No need for headers
    rm -rfv $installdir/usr/include

    %install_license LICENSES/*
