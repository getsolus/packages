# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpkpass
version    : 25.12.3
release    : 83
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kpkpass-25.12.3.tar.xz : f916bdc37c11740cc527ee76a1326d3457ed9bf153d609cdb5ea7bb581885df9
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : programming.library
summary    : Apple Wallet Pass reader
description: |
    Library to deal with Apple Wallet pass files.
builddeps  :
    - kf6-karchive-devel
