# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpkpass
version    : 26.04.1
release    : 84
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kpkpass-26.04.1.tar.xz : 1080d0fd3aeac7b19398181e0e12f06cf420f1497e80e5bb055f24048a827eb1
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : programming.library
summary    : Apple Wallet Pass reader
description: |
    Library to deal with Apple Wallet pass files.
builddeps  :
    - kf6-karchive-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
