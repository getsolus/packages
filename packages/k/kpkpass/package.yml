# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpkpass
version    : 26.04.2
release    : 85
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kpkpass-26.04.2.tar.xz : 75e5d6a591d35edb56ff5a03793d50be7c62790b2cfccb88d72ecc68742323d0
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : programming.library
summary    : Apple Wallet Pass reader
description: |
    Library to deal with Apple Wallet pass files.
builddeps  :
    - kf6-karchive-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
