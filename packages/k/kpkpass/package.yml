# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpkpass
version    : 26.04.3
release    : 86
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kpkpass-26.04.3.tar.xz : fb03b04fa7d9b9097ff3570a45ca03aafd5da5f33ead17e5ceecb7b3ecc5cb87
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : programming.library
summary    : Apple Wallet Pass reader
description: |
    Library to deal with Apple Wallet pass files.
builddeps  :
    - kf6-karchive-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
