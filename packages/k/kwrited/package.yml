name       : kwrited
version    : 6.2.1
release    : 106
source     :
    - https://download.kde.org/stable/plasma/6.2.1/kwrited-6.2.1.tar.xz : d234f2995e1cddaa247c69193bdaaaadd7d06092d7f04f1a0f2ce610b1dbdbff
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE daemon listening for wall and write messages
description: |
    KDE daemon listening for wall and write messages.
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kpty-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
