name       : kwrited
version    : 6.2.0
release    : 105
source     :
    - https://download.kde.org/stable/plasma/6.2.0/kwrited-6.2.0.tar.xz : 4b4890637029b8db05ff80e3225d8d8d78a95bb44802aa46d526ae2784f56029
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE daemon listening for wall and write messages
description: |
    KDE daemon listening for wall and write messages.
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kpty-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
