# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ki18n
version    : 6.26.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.26/ki18n-6.26.0.tar.xz : 484aad486bfafef6c86d8d5b26529258e67c74c96250c1ac212ddf568448c7c0
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - ODbL-1.0
component  : programming.tools
summary    : KDE Gettext-based UI text internationalization.
description: |
    KDE Gettext-based UI text internationalization.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
