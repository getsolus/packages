# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ki18n
version    : 6.28.0
release    : 40
source     :
    - https://download.kde.org/stable/frameworks/6.28/ki18n-6.28.0.tar.xz : 820ce5858c6db732d68da53572a0e7db8353e4372d2122debcfb0f9ff10b85db
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - ODbL-1.0
component  : programming.tools
summary    : KDE Gettext-based UI text internationalization.
description: |
    KDE Gettext-based UI text internationalization.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
