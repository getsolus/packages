# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kactivitymanagerd
version    : 6.7.3
release    : 140
source     :
    - https://download.kde.org/stable/plasma/6.7.3/kactivitymanagerd-6.7.3.tar.xz : 5336d9addebc89e85d3b613ff1136c7c842f74ca986dd1d46c0a2f7733dc095a
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.kde.core
summary    : Core components for the KDE Activity concept
description: |
    Core components for the KDE Activity concept.
libsplit   : false
builddeps  :
    - kf6-kcrash-devel
    - kf6-kglobalaccel-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - libboost-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
