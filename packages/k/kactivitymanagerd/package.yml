name       : kactivitymanagerd
version    : 6.3.1
release    : 114
source     :
    - https://download.kde.org/stable/plasma/6.3.1/kactivitymanagerd-6.3.1.tar.xz : b435fb044f66648b7c976979cbb8de1567fce3a511e84d61276d1637119cdea4
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - GPL-2.0-or-later
