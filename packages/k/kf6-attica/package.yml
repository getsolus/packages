# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-attica
version    : 6.26.0
release    : 33
source     :
    - https://download.kde.org/stable/frameworks/6.26/attica-6.26.0.tar.xz : eb2d3d2d8b12c2ab4d192c4ae6f07b0188a40aa002b3056db6369b47b2f9df96
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
