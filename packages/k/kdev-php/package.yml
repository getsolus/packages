# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdev-php
version    : 26.04.2
release    : 56
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kdev-php-26.04.2.tar.xz : ad336937b6e148a848d5794ea300e7f28426cf35d0cea63f5a728c2b96ad98b9
homepage   : https://apps.kde.org/kdev-php/
license    :
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
component  : programming.tools
summary    : PHP support for KDevelop
description: |
    KDevelop plugin which provides PHP language support.
libsplit   : false
builddeps  :
    - pkgconfig(Qt6Core)
    - kdevelop-devel
    - kdevelop-pg-qt-devel
    - kf6-kcmutils-devel
    - kf6-ki18n-devel
    - kf6-ktexteditor-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
