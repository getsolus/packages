# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdev-php
version    : 26.04.1
release    : 55
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kdev-php-26.04.1.tar.xz : 26c660e0e27b23460e9400a4b91fe730fb2ee8dc8ac300dcae2374a190614d8b
homepage   : https://apps.kde.org/kdev-php/
license    : GPL-2.0-or-later
component  : programming.tools
summary    : PHP support for KDevelop
description: |
    KDevelop plugin which provides PHP language support.
libsplit   : false
builddeps  :
    - pkgconfig(Qt6Core)
    - kdevelop-devel
    - kdevelop-pg-qt-devel
    - kf6-kcmutils-devel
    - kf6-ki18n-devel
    - kf6-ktexteditor-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
