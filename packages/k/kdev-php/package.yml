# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdev-php
version    : 25.12.3
release    : 54
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kdev-php-25.12.3.tar.xz : b011e0e5a92d4853c57b97dd6b8cb9407bcdd1bc54a9e34e219d14ce2725b56d
homepage   : https://apps.kde.org/kdev-php/
license    : GPL-2.0-or-later
component  : programming.tools
summary    : PHP support for KDevelop
description: |
    KDevelop plugin which provides PHP language support.
libsplit   : false
builddeps  :
    - pkgconfig(Qt6Core)
    - kdevelop-devel
    - kdevelop-pg-qt-devel
    - kf6-kcmutils-devel
    - kf6-ki18n-devel
    - kf6-ktexteditor-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
