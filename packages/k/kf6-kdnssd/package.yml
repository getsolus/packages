# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdnssd
version    : 6.26.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.26/kdnssd-6.26.0.tar.xz : 8439daed9c4b942a74393daf23c8d97fdaabd81b93dc347f91bbb45a2bf85248
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Network service discovery using Zeroconf
description: |
    Network service discovery using Zeroconf
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(avahi-core)
    - extra-cmake-modules
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
