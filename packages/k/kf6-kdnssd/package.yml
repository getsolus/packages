# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdnssd
version    : 6.28.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.28/kdnssd-6.28.0.tar.xz : f4fe731aad56ae010c2b42f2bd56d4499339bb0839ae2251035132f1a3708df2
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
