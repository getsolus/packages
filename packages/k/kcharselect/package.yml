# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcharselect
version    : 26.04.2
release    : 91
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kcharselect-26.04.2.tar.xz : 4e4e1037da17e3374a83615089cb9a51935675a2eb2409ff22ad98f7578fdd6e
homepage   : https://kde.org/applications/utilities/org.kde.kcharselect
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Character Selector
description: |
    KCharSelect is a tool to select special characters from all installed fonts and copy them into the clipboard.
builddeps  :
    - kf6-kbookmarks-devel
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove docs
    rm -rfv $installdir/usr/share/doc
