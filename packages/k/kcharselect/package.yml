# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcharselect
version    : 26.04.1
release    : 90
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kcharselect-26.04.1.tar.xz : 9a8af0148b9f1686f6a3c9746f553ecd8107e386acacaed34018b25269cdec1d
homepage   : https://kde.org/applications/utilities/org.kde.kcharselect
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Character Selector
description: |
    KCharSelect is a tool to select special characters from all installed fonts and copy them into the clipboard.
builddeps  :
    - kf6-kbookmarks-devel
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    #remove docs
    rm -rfv $installdir/usr/share/doc
