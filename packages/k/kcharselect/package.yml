# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcharselect
version    : 26.04.3
release    : 92
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kcharselect-26.04.3.tar.xz : 376a31bf03ea2d6a231fdc012c793f608f48c0172e3543b84a44e0e9b87a6651
homepage   : https://kde.org/applications/utilities/org.kde.kcharselect
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Character Selector
description: |
    KCharSelect is a tool to select special characters from all installed fonts and copy them into the clipboard.
builddeps  :
    - kf6-kbookmarks-devel
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove docs
    rm -rfv $installdir/usr/share/doc
