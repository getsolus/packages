# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kwidgetsaddons
version    : 6.24.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.24/kwidgetsaddons-6.24.0.tar.xz : dfe563e58b0d8c72e8a1da4f379f03610552d8663eac613e47a2a6a384c20107
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-or-later
