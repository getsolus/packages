# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kwidgetsaddons
version    : 6.27.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.27/kwidgetsaddons-6.27.0.tar.xz : 4cba86999331960b3fddac8ed02cccb31fc49406422360217135f6bf3fbca8d9
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - LGPL-3.0-or-later
component  : desktop.library
summary    : Large set of desktop widgets.
description: |
    Large set of desktop widgets.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
