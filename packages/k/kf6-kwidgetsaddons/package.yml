# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kwidgetsaddons
version    : 6.26.0
release    : 36
source     :
    - https://download.kde.org/stable/frameworks/6.26/kwidgetsaddons-6.26.0.tar.xz : 65044882e30b305fe9fb20331a354cd811ca9d80b5c7f9fa722639f3334fe630
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - LGPL-3.0-or-later
component  : desktop.library
summary    : Large set of desktop widgets.
description: |
    Large set of desktop widgets.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
