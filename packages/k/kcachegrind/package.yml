# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcachegrind
version    : 26.04.1
release    : 54
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kcachegrind-26.04.1.tar.xz : 7b35afb0a796e7d54c1fb06940b58de60aa8eeb7badec6a14eb848add7072dcf
homepage   : https://apps.kde.org/kcachegrind/
license    : GPL-2.0-only
component  : desktop.kde
summary    : Visualization of Performance Profiling Data
description: |
    kcachegrind is a KDE GUI to visualize profiling data. It's mainly used as visualization frontend for data measured by Cachegrind/Callgrind tools from the Valgrind package, but there are converters for other measurement tools available.
builddeps  :
    - kf6-karchive-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-kwidgetsaddons-devel
    - kf6-kxmlgui-devel
    - qt6-base-private-devel
rundeps    :
    - valgrind
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
patterns   :
    - docs : /usr/share/doc
