# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kglobalaccel
version    : 6.24.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.24/kglobalaccel-6.24.0.tar.xz : 9dc5d1f495e951b5402713cc61b01617f586fdc39dbda3ef7e12e661a9b5af0a
homepage   : https://community.kde.org/Frameworks
license    :
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
component  : desktop.library
summary    : Global desktop keyboard shortcuts
description: |
    KGlobalAccel allows you to have global accelerators that are independent of the focused window. Unlike regular shortcuts, the application's window does not need focus for them to be activated.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
