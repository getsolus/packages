# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kglobalaccel
version    : 6.27.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.27/kglobalaccel-6.27.0.tar.xz : e7ba1601a159ea79f424a4d53647415393f90dbeda1e3216d023eeb5420837d3
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Global desktop keyboard shortcuts
description: |
    KGlobalAccel allows you to have global accelerators that are independent of the focused window. Unlike regular shortcuts, the application's window does not need focus for them to be activated.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
