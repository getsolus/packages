# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kfilemetadata
version    : 6.28.0
release    : 40
source     :
    - https://download.kde.org/stable/frameworks/6.28/kfilemetadata-6.28.0.tar.xz : 015be4aa6986642d3f13903b47c1aae7183d3218888dc4353afe1b1e9dd64c1e
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Simple library for extracting the text and metadata
description: |
    Simple library for extracting the text and metadata
builddeps  :
    - pkgconfig(exiv2)
    - pkgconfig(libattr)
    - pkgconfig(libavformat)
    - pkgconfig(poppler-qt6)
    - pkgconfig(taglib)
    - ebook-tools-devel
    - kdegraphics-mobipocket-devel
    - kf6-karchive-devel
    - kf6-kcodecs-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    # TODO add catdoc, libappimage
rundeps    :
    - devel :
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
