# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdenlive
version    : 26.04.3
release    : 133
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kdenlive-26.04.3.tar.xz : c8dbc88f6c0fb739e38fa3840f3212a0e36aa9dc273911bc19ebddb1f83f2e4e
homepage   : https://kdenlive.org
license    :
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - BSL-1.0
    - CC-BY-SA-4.0
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-3.0-only
    - LGPL-3.0-or-later
    - MIT
component  : multimedia.video
summary    : Video editing application, based on MLT Framework and KF6
description: |
    Video editing application, based on MLT Framework and KDE Frameworks 6.
builddeps  :
    - pkgconfig(Imath)
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6NetworkAuth)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6Svg)
    - pkgconfig(libavutil)
    - pkgconfig(libv4l2)
    - pkgconfig(mlt-framework-7)
    - kddockwidgets-devel
    - kf6-karchive-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kfilemetadata-devel
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-knewstuff-devel
    - kf6-knotifications-devel
    - kf6-knotifyconfig-devel
    - kf6-ktextwidgets-devel
    - kf6-kxmlgui-devel
    - kf6-purpose-devel
    - opentimelineio-devel
    - qt6-base-private-devel
rundeps    :
    - breeze-icons
    - dvgrab
    - frei0r
    - kf6-qqc2-desktop-style
    - qt6-imageformats
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %patch -p1 -i $pkgfiles/0001-Unset-QPA_PLATFORMTHEME-to-prevent-starting-with-gtk.patch
    %patch -p1 -i $pkgfiles/0001-Add-StartupWMClass-to-desktop-file.patch
    %cmake_kf6 \
               -DFETCH_OTIO=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING LICENSES/*

    # Remove doc
    rm -rfv $installdir/usr/share/doc
