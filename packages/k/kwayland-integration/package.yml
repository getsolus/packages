name       : kwayland-integration
version    : 6.2.0
release    : 108
source     :
    - https://download.kde.org/stable/plasma/6.2.0/kwayland-integration-6.2.0.tar.xz : 6ae7ba5ec5f065f36603c0612341ddbd0d9445b72fc6fba6b62cbedcd4fa9ff0
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : LGPL-2.1-only
component  : desktop.kde.core
summary    : Provides integration plugins for various KDE frameworks
description: |
    Provides integration plugins for various KDE frameworks.
builddeps  :
    - pkgconfig(KF5WaylandClient)
    - pkgconfig(Qt5WaylandClient)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
    - kwindowsystem-devel
    - plasma-wayland-protocols-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
