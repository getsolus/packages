# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcolorscheme
version    : 6.26.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.26/kcolorscheme-6.26.0.tar.xz : 74149a0379bd8bf6590d3c1f7f8c503665e0f3adafc2adbd44fc6bb764c969f1
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC-BY-SA-4.0
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : multimedia.graphics
summary    : Classes to read and interact with KColorScheme
description: |
    Classes to read and interact with KColorScheme
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - kf6-kconfig-devel
    - kf6-ki18n-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
