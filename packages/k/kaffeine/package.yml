# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kaffeine
version    : 2.0.19
release    : 15
source     :
    - https://invent.kde.org/multimedia/kaffeine/-/archive/v2.0.19/kaffeine-v2.0.19.tar.gz : db296c440c81a23b8babbd06a40cb723ceab2f375971e38c0451cbc68db99cd0
homepage   : https://apps.kde.org/en-gb/kaffeine
license    : GPL-2.0-or-later
component  : desktop.multimedia
summary    : Kaffeine Media Player
description: |
    Kaffeine is a media player. What makes it different from the others is its excellent support of digital TV (DVB). Kaffeine has user-friendly interface, so that even first time users can start immediately playing their movies: from DVD (including DVD menus, titles, chapters, etc.), VCD, or a file.
builddeps  :
    - pkgconfig(Qt5Gui)
    - pkgconfig(Qt5X11Extras)
    - pkgconfig(libdvbv5)
    - pkgconfig(libvlc)
    - pkgconfig(xscrnsaver)
    - extra-cmake-modules
    - kdbusaddons-devel
    - kdoctools-devel
    - ki18n-devel
    - kio-devel
    - kwindowsystem-devel
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
