# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdebugsettings
version    : 26.04.3
release    : 86
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kdebugsettings-26.04.3.tar.xz : 13ee5dbf92fbb9d7a037e7af0d4d8e8282191545bedc4843434ca9a38caedee9
homepage   : https://kde.org/applications/development/org.kde.kdebugsettings
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
component  : desktop.kde
summary    : Application to enable/disable qCDebug
description: |
    An application to enable/disable qCDebug.
builddeps  :
    - kf6-kcompletion-devel
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kwidgetsaddons-devel
    - kf6-kwindowsystem-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # Fix appstream processing
    install -Dm00644 $workdir/logo.png $installdir/usr/share/icons/hicolor/128x128/apps/debug-run.png
