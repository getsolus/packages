# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kitinerary
version    : 26.04.2
release    : 114
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kitinerary-26.04.2.tar.xz : 86eea983c969fa1fed2bdc22a46f800c02b66c512087da6f0072324d28e6d5c6
homepage   : https://kde.org/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
    - ODbL-1.0
component  : programming.library
summary    : Data Model and Extraction System for Travel Reservation information
description: |
    A library containing itinerary data model and itinerary extraction code.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(poppler)
    - pkgconfig(zxing)
    - kf6-kcontacts-devel
    - kmime-devel
    - kpkpass-devel
    - libphonenumber-devel
rundeps    :
    - devel :
        - kf6-kcalendarcore-devel
        - kf6-kcontacts-devel
        - kmime-devel
        - kpkpass-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
