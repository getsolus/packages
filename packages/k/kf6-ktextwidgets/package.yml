# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ktextwidgets
version    : 6.24.0
release    : 30
source     :
    - https://download.kde.org/stable/frameworks/6.24/ktextwidgets-6.24.0.tar.xz : ba8f7d21014aabcdfa13e0cc1ff5a1db6c04761e080670caa76b7e4163086d15
homepage   : https://community.kde.org/Frameworks
license    :
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.library
