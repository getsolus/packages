# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ktextwidgets
version    : 6.27.0
release    : 33
source     :
    - https://download.kde.org/stable/frameworks/6.27/ktextwidgets-6.27.0.tar.xz : 03c35d8899559efc17b4f74e86eefd8358dafd7aa9311c89b9c09f7b35700756
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Text editing widgets.
description: |
    Text editing widgets.
builddeps  :
    - pkgconfig(Qt6TextToSpeech)
    - kf6-kcompletion-devel
    - kf6-kconfig-devel
    - kf6-ki18n-devel
    - kf6-kwidgetsaddons-devel
    - kf6-sonnet-devel
rundeps    :
    - devel :
        - kf6-ki18n-devel
        - kf6-sonnet-devel
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
