# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kquickimageeditor
version    : 0.6.1
release    : 11
source     :
    - https://download.kde.org/stable/kquickimageeditor/kquickimageeditor-0.6.1.tar.xz : b868800bb9bb814ee36c9d696be9ccec9a22ab6f975d789e248b75fbd1ba99fa
license    :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.1-or-later
component  : programming.library
homepage   : https://invent.kde.org/libraries/kquickimageeditor
summary    : KQuickImageEditor is a set of QtQuick components providing basic image editing capabilities.
description: |
    KQuickImageEditor is a set of QtQuick components providing basic image editing capabilities.
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(opencv4)
    - extra-cmake-modules
    - kf6-kconfig-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
