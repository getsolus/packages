# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kquickcharts
version    : 6.28.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.28/kquickcharts-6.28.0.tar.xz : c5d361d90861b4cd3db861568da5279ae2b1cb953e874126c15abbd7138378e5
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : desktop.library
summary    : A QtQuick plugin providing high-performance charts
description: |
    A QtQuick plugin providing high-performance charts
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6ShaderTools)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
