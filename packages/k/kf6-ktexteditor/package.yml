# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-ktexteditor
version    : 6.28.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.28/ktexteditor-6.28.0.tar.xz : 63b7bbd9325cfda64e2c8f862e2327270ef7a9d1f887b5c6585f372511d33f8d
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Full text editor component.
description: |
    Full text editor component.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6TextToSpeech)
    - pkgconfig(editorconfig)
    - kf6-karchive-devel
    - kf6-kauth-devel
    - kf6-kconfig-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kparts-devel
    - kf6-kxmlgui-devel
    - kf6-sonnet-devel
    - kf6-syntax-highlighting-devel
rundeps    :
    - devel :
        - kf6-kparts-devel
        - kf6-syntax-highlighting-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
patterns   :
    - devel :
        - /usr/share/kdevappwizard
