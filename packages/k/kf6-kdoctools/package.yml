# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdoctools
version    : 6.24.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.24/kdoctools-6.24.0.tar.xz : aee351c52f783813c6c114ade520c8578c570ee6dc25ecbd64c83e3d2d9660d4
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-2.1-only
component  : programming.library
summary    : Create documentation from DocBook.
description: |
    Create documentation from DocBook
builddeps  :
    - pkgconfig(libxslt)
    - docbook-xml
    - kf6-karchive-devel
    - kf6-ki18n-devel
    - perl-uri
rundeps    :
    - devel :
        - libxslt-devel
    - docbook-xml
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
