# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdoctools
version    : 6.26.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.26/kdoctools-6.26.0.tar.xz : 3fbea5de215076130007f3c18e16b870774ffa4fc85ddace201ac020d0245fb6
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : programming.library
summary    : Create documentation from DocBook.
description: |
    Create documentation from DocBook
builddeps  :
    - pkgconfig(libxslt)
    - docbook-xml
    - kf6-karchive-devel
    - kf6-ki18n-devel
    - perl-uri
rundeps    :
    - devel :
        - libxslt-devel
    - docbook-xml
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
