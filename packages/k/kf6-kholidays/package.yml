# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kholidays
version    : 6.28.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.28/kholidays-6.28.0.tar.xz : 6960e2040c148d878466f40c1c3bdcfa8c84fff456f4c8ce7456065bd0745d6c
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : KDE library for regional holiday information
description: |
    KDE library for regional holiday information
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Quick)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
