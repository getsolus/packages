# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kholidays
version    : 6.24.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.24/kholidays-6.24.0.tar.xz : 94a3c4ea003b82e0307ff81a665f957bb5ab9a6043e60faf1a2aee727519b7be
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : KDE library for regional holiday information
description: |
    KDE library for regional holiday information
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Quick)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
