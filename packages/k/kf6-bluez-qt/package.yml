# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-bluez-qt
version    : 6.28.0
release    : 39
source     :
    - https://download.kde.org/stable/frameworks/6.28/bluez-qt-6.28.0.tar.xz : ae4410142170e84df104ef9723c7307de1d5ab68b2874c4ccdb0af99e00ae806
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Qt wrapper for BlueZ 5 DBus API
description: |
    BluezQt is a library for communication with BlueZ system and session daemons.
    * Manager class is used to communicate with system daemon - org.bluez
    * ObexManager class is used to communicate with session daemon - org.bluez.obex
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - qt6-base-private-devel
rundeps    :
    - bluez
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
