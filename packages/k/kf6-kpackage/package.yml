# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kpackage
version    : 6.27.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.27/kpackage-6.27.0.tar.xz : 5fa4b07f729c3ff6b7f362d318374810fa55b13a922d2b240462eb8efc1045e8
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming.library
summary    : Installation and loading of additional content as packages
description: |
    Installation and loading of additional content (scripts, images...) as packages.
builddeps  :
    - kf6-karchive-devel
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
