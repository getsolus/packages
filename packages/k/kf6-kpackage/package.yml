# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kpackage
version    : 6.28.0
release    : 35
source     :
    - https://download.kde.org/stable/frameworks/6.28/kpackage-6.28.0.tar.xz : 2d04bcbc3492229cfc240884b04e7b220fa2022019c8f9d87f9f7814ea94c382
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming.library
summary    : Installation and loading of additional content as packages
description: |
    Installation and loading of additional content (scripts, images...) as packages.
builddeps  :
    - kf6-karchive-devel
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
