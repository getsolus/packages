# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmime
version    : 26.04.2
release    : 99
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmime-26.04.2.tar.xz : 7473522f42d84684cd71fe7549cc668a1fcfd91716a72860dc9bcbaa8569ed6d
homepage   : https://kde.org/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - CC-BY-SA-4.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
component  : desktop.library
summary    : KMime is a library for handling mail messages and newsgroup articles
description: |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps  :
    - kf6-kcodecs-devel
rundeps    :
    - devel :
        - kf6-kcodecs-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
