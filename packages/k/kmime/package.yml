# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmime
version    : 25.12.3
release    : 97
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kmime-25.12.3.tar.xz : fce3c603cac3fec9a3f0e101c49785c32ace07b8f60b52739b638d329f43826d
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : KMime is a library for handling mail messages and newsgroup articles
description: |
    KMime is a library for handling mail messages and newsgroup articles.
builddeps  :
    - kf6-kcodecs-devel
rundeps    :
    - devel :
        - kf6-kcodecs-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
