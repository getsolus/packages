# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmail-account-wizard
version    : 26.04.2
release    : 107
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmail-account-wizard-26.04.2.tar.xz : 58efaf3ab546d0824f05d397272553547dfc47b8184ef59976d7d35620f7d65d
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : programming
summary    : KMail Account Wizard
description: |
    An application which assists you with the configuration of accounts in KMail.
builddeps  :
    - akonadi-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-ktexteditor-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - kmime-devel
    - qt6-base-private-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
