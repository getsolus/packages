# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmail-account-wizard
version    : 25.12.3
release    : 103
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kmail-account-wizard-25.12.3.tar.xz : 0a41268e6b153700c4c815da1baa40637efa61943f4e387f66cf5599d8e8d502
homepage   : https://kde.org/
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
