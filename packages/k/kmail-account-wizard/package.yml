# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmail-account-wizard
version    : 26.04.3
release    : 108
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmail-account-wizard-26.04.3.tar.xz : 6bc54db7057e5fd4e83f71d6817a81bd36377a41cc734e079f55df3619e70461
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : programming
summary    : KMail Account Wizard
description: |
    An application which assists you with the configuration of accounts in KMail.
builddeps  :
    - akonadi-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-ktexteditor-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - kmime-devel
    - qt6-base-private-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
