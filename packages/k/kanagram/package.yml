# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kanagram
version    : 26.04.3
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kanagram-26.04.3.tar.xz : ef08ea3ed240c2a163e2b2abf1a19fcfbda079c8f000f9dd1e14fab44851fd0d
homepage   : https://kde.org/applications/education/org.kde.kanagram
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : games.puzzle
summary    : Letter Order Game
description: |
    Kanagram is a game based on anagrams of words: the puzzle is solved
    when the letters of the scrambled word are put back in the correct
    order.
    There is no limit on either time taken, or the amount of attempts
    to solve the word.
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6TextToSpeech)
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-knewstuff-devel
    - kf6-kxmlgui-devel
    - kf6-sonnet-devel
    - libkeduvocdocument-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING*

    # remove doc
    rm -rfv $installdir/usr/share/doc
