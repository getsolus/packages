# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kfind
version    : 26.04.2
release    : 58
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kfind-26.04.2.tar.xz : 2902110890a9dd96a017e71fae9b0c28ae53c946b977f3ff5f53b30e8932b553
homepage   : https://www.kde.org/applications/utilities/kfind
license    : GPL-2.0-or-later
component  : system.utils
summary    : Find Files/Folders
description: |
    KFind allows you to search for directories and files
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - kf6-karchive-devel
    - kf6-kdoctools-devel
    - kf6-kfilemetadata-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove HTML docs
    rm -rfv $installdir/usr/share/doc
