name       : ksshaskpass
version    : 6.3.1
release    : 113
source     :
    - https://download.kde.org/stable/plasma/6.3.1/ksshaskpass-6.3.1.tar.xz : ecc16c4dc23198ae0298f6d3f41fcd1bdd24c1ecce1e822ab0abbab0fcfcab1f
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Front-end for ssh-add which stores the password of the ssh key in KWallet
description: |
    Front-end for ssh-add which stores the password of the ssh key in KWallet.
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kwallet-devel
    - kf6-kwidgetsaddons-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
