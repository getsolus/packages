# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ktnef
version    : 26.04.2
release    : 96
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/ktnef-26.04.2.tar.xz : 0fb838f125c7e952c95eb4eca5a0dd83b52b9fc9f5c91476df56c37e04b1ee56
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
component  : programming.library
summary    : API for handling TNEF data
description: |
    API for handling TNEF data.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - kcalutils-devel
    - kf6-kcontacts-devel
