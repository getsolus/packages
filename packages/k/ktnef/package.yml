# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ktnef
version    : 26.04.3
release    : 97
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/ktnef-26.04.3.tar.xz : 09d45fbd407ab9a9ecb1b45d203732a7460e25e93aa3b5f30b1df198f3f0ce28
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
component  : programming.library
