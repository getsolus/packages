# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-solid
version    : 6.24.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.24/solid-6.24.0.tar.xz : 2f506908ff32ffcdd9918879070b666c9384b079493c25f80735553e332a53fd
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - LGPL-2.1-only
