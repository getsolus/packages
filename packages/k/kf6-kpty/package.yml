# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kpty
version    : 6.27.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.27/kpty-6.27.0.tar.xz : ad06bfda8df019bb2b33567ce3df539bcc107e0dfe004281e5ff9ae4617c6ecc
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Interfacing with pseudo terminal devices
description: |
    Interfacing with pseudo terminal devices
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - libutempter-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
    - libutempter
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
