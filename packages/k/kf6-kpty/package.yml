# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kpty
version    : 6.28.0
release    : 35
source     :
    - https://download.kde.org/stable/frameworks/6.28/kpty-6.28.0.tar.xz : 5a08d641e43fa8fd071d759d84e930251aa111973b362edce14d49032aa731d1
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Interfacing with pseudo terminal devices
description: |
    Interfacing with pseudo terminal devices
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - libutempter-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
    - libutempter
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
