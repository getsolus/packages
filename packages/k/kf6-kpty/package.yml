# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kpty
version    : 6.26.0
release    : 33
source     :
    - https://download.kde.org/stable/frameworks/6.26/kpty-6.26.0.tar.xz : 7613c26cfaa7465a2fe28a22762ceb38266414e7f4a94a127c09dc0628625553
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Interfacing with pseudo terminal devices
description: |
    Interfacing with pseudo terminal devices
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - libutempter-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
    - libutempter
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
