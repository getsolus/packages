# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcontacts
version    : 6.26.0
release    : 35
source     :
    - https://download.kde.org/stable/frameworks/6.26/kcontacts-6.26.0.tar.xz : dce9af34050fcf09c8b4ece6df5a0abedbaf02fe85039fc371c5e11e91443cf0
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - MIT
    - Unicode-DFS-2016
component  : desktop.library
summary    : Address book API for KDE
description: |
    Address book API for KDE
builddeps  :
    - pkgconfig(Qt6Quick)
    - kf6-kcodecs-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcodecs-devel
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
        - kf6-ki18n-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
