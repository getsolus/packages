# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcontacts
version    : 6.24.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.24/kcontacts-6.24.0.tar.xz : 7ffc5c0e6c7966d47c996dd778a47d2cd1bb711baa4b63be441c941a334ab48b
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Address book API for KDE
description: |
    Address book API for KDE
builddeps  :
    - pkgconfig(Qt6Quick)
    - kf6-kcodecs-devel
