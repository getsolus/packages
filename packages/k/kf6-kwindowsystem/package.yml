# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kwindowsystem
version    : 6.27.0
release    : 39
source     :
    - https://download.kde.org/stable/frameworks/6.27/kwindowsystem-6.27.0.tar.xz : 401e5700ab36530a605410464268bf726c898da42c6f7d7bf05a9db00ccfe172
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - MIT
component  : programming.library
summary    : Access to the windowing system.
description: |
    Access to the windowing system.
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - pkgconfig(x11)
    - pkgconfig(xcb)
    - pkgconfig(xcb-icccm)
    - pkgconfig(xcb-keysyms)
    - pkgconfig(xfixes)
    - extra-cmake-modules
    - plasma-wayland-protocols-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - extra-cmake-modules
        - libx11-devel
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
