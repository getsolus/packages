# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kamera
version    : 26.04.1
release    : 98
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kamera-26.04.1.tar.xz : d98de5e7c57a6c3d8625d5b3d84a16c99598e91a993c4e4aa94dce3ba2ebf0c8
homepage   : https://kde.org/applications/utilities/org.kde.kamera
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE integration for gphoto2 cameras
description: |
    KDE integration for gphoto2 cameras.
builddeps  :
    - pkgconfig(libgphoto2)
    - kf6-kcmutils-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    #remove docs
    rm -rfv $installdir/usr/share/doc
