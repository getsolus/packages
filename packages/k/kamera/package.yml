# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kamera
version    : 26.04.3
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kamera-26.04.3.tar.xz : 6b695382b8bf27deea190c48b29c63ffeae416f84da014de105cc8f86b7a7ae6
homepage   : https://kde.org/applications/utilities/org.kde.kamera
license    :
    - BSD-3-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE integration for gphoto2 cameras
description: |
    KDE integration for gphoto2 cameras.
builddeps  :
    - pkgconfig(libgphoto2)
    - kf6-kcmutils-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove docs
    rm -rfv $installdir/usr/share/doc
