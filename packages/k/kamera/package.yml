# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kamera
version    : 26.04.2
release    : 99
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kamera-26.04.2.tar.xz : 73166f0bd638a40b041715e11aca1fac606dfbc654a413efca8f864c06f04eaf
homepage   : https://kde.org/applications/utilities/org.kde.kamera
license    :
    - BSD-3-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE integration for gphoto2 cameras
description: |
    KDE integration for gphoto2 cameras.
builddeps  :
    - pkgconfig(libgphoto2)
    - kf6-kcmutils-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove docs
    rm -rfv $installdir/usr/share/doc
