# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kamera
version    : 25.12.3
release    : 97
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kamera-25.12.3.tar.xz : fdeff4611a2ee78b4b43152256232dc23208c72bec49938c0f742742ff998063
homepage   : https://kde.org/applications/utilities/org.kde.kamera
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE integration for gphoto2 cameras
description: |
    KDE integration for gphoto2 cameras.
builddeps  :
    - pkgconfig(libgphoto2)
    - kf6-kcmutils-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    #remove docs
    rm -rfv $installdir/usr/share/doc
