# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdegraphics-mobipocket
version    : 26.04.1
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kdegraphics-mobipocket-26.04.1.tar.xz : de353837314402f4983893226483a88a9026266b53ddf64b07ef234d149ff7bd
homepage   : https://invent.kde.org/graphics/kdegraphics-mobipocket/
license    : GPL-2.0-or-later
component  : programming
summary    : Plugins for mobpocket
description: |
    A collection of plugins to handle mobipocket files.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
