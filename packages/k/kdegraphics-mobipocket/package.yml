# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdegraphics-mobipocket
version    : 26.04.3
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kdegraphics-mobipocket-26.04.3.tar.xz : 26cf058d441ec1a23768a47026960a0b7b77ca40dc7de51c89a9b4d463851f92
homepage   : https://invent.kde.org/graphics/kdegraphics-mobipocket/
license    : GPL-2.0-or-later
component  : programming
summary    : Plugins for mobpocket
description: |
    A collection of plugins to handle mobipocket files.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
    %install_license LICENSES/*
install    : |
    %ninja_install
