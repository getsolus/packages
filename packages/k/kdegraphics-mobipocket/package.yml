# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdegraphics-mobipocket
version    : 25.12.3
release    : 99
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kdegraphics-mobipocket-25.12.3.tar.xz : fbe6c0a2a15c124fa8f6052ec44329d3de2850018f4c25edbef8c163626b1e56
homepage   : https://invent.kde.org/graphics/kdegraphics-mobipocket/
license    : GPL-2.0-or-later
component  : programming
