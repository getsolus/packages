# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdegraphics-mobipocket
version    : 26.04.2
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kdegraphics-mobipocket-26.04.2.tar.xz : 118819389efd2d254e4e6586fd086ff3c4061199d77a873490cd2cc8c761e39a
homepage   : https://invent.kde.org/graphics/kdegraphics-mobipocket/
license    : GPL-2.0-or-later
component  : programming
summary    : Plugins for mobpocket
description: |
    A collection of plugins to handle mobipocket files.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - extra-cmake-modules
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
    %install_license LICENSES/*
install    : |
    %ninja_install
