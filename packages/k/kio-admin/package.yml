# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kio-admin
version    : 26.04.2
release    : 30
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kio-admin-26.04.2.tar.xz : d8e5260c29490e07df04c1772ed1782dfc25d3dc2650acfd8f8e04c536a7c036
homepage   : https://invent.kde.org/system/kio-admin
license    :
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde
summary    : Manage files as administrator using the admin:// KIO protocol.
description: |
    Manage files as administrator using the admin:// KIO protocol.
builddeps  :
    - pkgconfig(polkit-qt6-1)
    - kf6-ki18n-devel
    - kf6-kio-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DQT_MAJOR_VERSION=6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
