# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kio-admin
version    : 26.04.3
release    : 31
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kio-admin-26.04.3.tar.xz : b3dde0893625bf6866e40e4295344c647d4968b3f47711d15ac1c134196e4014
homepage   : https://invent.kde.org/system/kio-admin
license    :
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde
summary    : Manage files as administrator using the admin:// KIO protocol.
description: |
    Manage files as administrator using the admin:// KIO protocol.
builddeps  :
    - pkgconfig(polkit-qt6-1)
    - kf6-ki18n-devel
    - kf6-kio-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DQT_MAJOR_VERSION=6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
