# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kaccounts-providers
version    : 25.12.3
release    : 89
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kaccounts-providers-25.12.3.tar.xz : 0ce6455e601c122ad1179d3808a12d44c5d36377cf0ce5556520d0f8eee3e6bc
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : programming.library
summary    : KDE Providers
description: |
    KDE providers for accounts sign-on Provides additional configuration files for libaccounts and libsignon to recognize online services such as Facebook and Google.
builddeps  :
    - pkgconfig(Qt6WebEngineCore)
    - kaccounts-integration-devel
    - kf6-kio-devel
    - kf6-kpackage-devel
    - qcoro-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
