# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kaccounts-providers
version    : 26.04.1
release    : 90
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kaccounts-providers-26.04.1.tar.xz : d50bc3e14d3591cc9e23454cb789d514e5f47a2e86e6500ee80de1b6e73eb9b7
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : programming.library
summary    : KDE Providers
description: |
    KDE providers for accounts sign-on Provides additional configuration files for libaccounts and libsignon to recognize online services such as Facebook and Google.
builddeps  :
    - pkgconfig(Qt6WebEngineCore)
    - kaccounts-integration-devel
    - kf6-kio-devel
    - kf6-kpackage-devel
    - qcoro-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
