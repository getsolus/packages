# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kstars
version    : 3.8.2
release    : 32
source     :
    - https://cdn.download.kde.org/stable/kstars/3.8.2/kstars-3.8.2.tar.xz : aca3f662c06371c3eefcd553a3a687c94ba58a7ae460d0c63907f6cb9f69ced9
homepage   : https://kstars.kde.org/
license    : GPL-2.0-or-later
component  : office.scientific
summary    : A Desktop Planetarium for KDE
description: |
    It provides an accurate graphical simulation of the night sky, from any location on Earth, at any date and time. The display includes up to 100 million stars, 13,000 deep-sky objects,all 8 planets, the Sun and Moon, and thousands of comets, asteroids, supernovae, and satellites.
builddeps  :
    - pkgconfig(Qt6DataVisualization)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6WebSockets)
    - pkgconfig(cfitsio)
    - pkgconfig(eigen3)
    - pkgconfig(gsl)
    - pkgconfig(libcurl)
    - pkgconfig(libindi)
    - pkgconfig(libraw)
    - pkgconfig(opencv4)
    - pkgconfig(stellarsolver)
    - pkgconfig(wcslib)
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-knewstuff-devel
    - kf6-knotifications-devel
    - kf6-knotifyconfig-devel
    - kf6-kplotting-devel
    - kf6-kxmlgui-devel
    - libnova-devel
    - qtkeychain-qt6-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
        -DBUILD_TESTING=OFF \
        -DDATA_INSTALL_DIR=/usr/share \
        -DOpenGL_GL_PREFERENCE=GLVND \
        -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %qml6_cache
    rm -rf $installdir/%libdir%
    rm -rf $installdir/usr/share/doc
