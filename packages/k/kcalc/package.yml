# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcalc
version    : 26.04.2
release    : 96
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kcalc-26.04.2.tar.xz : dbdf29db1774d884e2d7ee543c6b919cd0f578dbd517a449a794bf854509b30d
homepage   : https://kde.org/applications/utilities/org.kde.kcalc
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Scientific calculator by KDE
description: |
    KCalc is a calculator which offers many more mathematical functions than meet the eye on a first glance.
libsplit   : false
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(gmp)
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove docs
    rm -rfv $installdir/usr/share/doc
