# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kcalc
version    : 26.04.1
release    : 95
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/kcalc-26.04.1.tar.xz : 8b50fa8ac9b3cfd56597492f2c6bbdd06c752f5f9dfeed708710924ad60bc22c
homepage   : https://kde.org/applications/utilities/org.kde.kcalc
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Scientific calculator by KDE
description: |
    KCalc is a calculator which offers many more mathematical functions than meet the eye on a first glance.
libsplit   : false
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(gmp)
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove docs
    rm -rfv $installdir/usr/share/doc
