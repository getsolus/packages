# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmines
version    : 26.04.3
release    : 29
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmines-26.04.3.tar.xz : a1ba7b35da8b8a9bf51f227838485b8d9d2424b3c048d4539256f4fd0b2fc825
homepage   : https://apps.kde.org/kmines/
license    :
    - BSD-3-Clause
    - CC-BY-SA-4.0
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : games.puzzle
summary    : A Minesweeper game.
description: |
    KMines is a classic Minesweeper game. The idea is to uncover all the squares without blowing up any mines. When a mine is blown up, the game is over.
builddeps  :
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-ktextwidgets-devel
    - kf6-kwidgetsaddons-devel
    - kf6-kxmlgui-devel
    - libkdegames-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
