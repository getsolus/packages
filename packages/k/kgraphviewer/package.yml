# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kgraphviewer
version    : 26.04.2
release    : 25
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kgraphviewer-26.04.2.tar.xz : afae2f0e4befde8125c55b52be69089ebb02b5a1fd60075ac7536c3bf0d01c7e
homepage   : https://apps.kde.org/kgraphviewer/
license    : GPL-2.0-only
component  : multimedia.graphics
summary    : Graphviz dot graph file viewer
description: |
    Graphviz dot graph file viewer
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Svg)
    - pkgconfig(libgvc)
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kparts-devel
    - kf6-kwidgetsaddons-devel
    - libboost-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    # https://invent.kde.org/graphics/kgraphviewer/-/merge_requests/22
    %patch -p1 -i $pkgfiles/add-svg-logo.patch
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    # remove docs
    rm -rfv $installdir/usr/share/doc

    install -Dm00644 logo.svg $installdir/usr/share/icons/hicolor/scalable/apps/kgraphviewer.svg
