# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kunifiedpush
version    : 26.04.3
release    : 17
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kunifiedpush-26.04.3.tar.xz : 247ccc7bcc4277e2fc63a753c367d0ca10efe3b4916f60a44d9ca2da403c4fe5
homepage   : https://invent.kde.org/libraries/kunifiedpush
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
component  : programming.library
summary    : UnifiedPush client library
description: |
    UnifiedPush client library and distributor daemon
builddeps  :
    - pkgconfig(Qt6WebSockets)
    - kf6-kcmutils-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-ki18n-devel
    - kf6-kservice-devel
    - kf6-solid-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
