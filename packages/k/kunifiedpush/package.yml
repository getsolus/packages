# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kunifiedpush
version    : 25.12.3
release    : 14
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kunifiedpush-25.12.3.tar.xz : 3ebd6ef38fafb0abd3ec434ccf79468453ea53897f69dccf18226dd5f122c229
