# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-knotifications
version    : 6.27.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.27/knotifications-6.27.0.tar.xz : eeb067fab001dd24735ad56e8ec4808fca76e5ecdf003cf614246c9abe1c3e19
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : Desktop notifications.
description: |
    Desktop notifications.
builddeps  :
    - pkgconfig(libcanberra)
    - kf6-kconfig-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kconfig-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
