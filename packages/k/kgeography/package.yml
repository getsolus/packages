# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kgeography
version    : 26.04.2
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kgeography-26.04.2.tar.xz : 3bd27fe577ece70dc63c942c5635c035c00d7743236c259e4abc92e3c29a8e8c
homepage   : https://kde.org/applications/education/org.kde.kgeography
license    :
    - GPL-2.0-or-later
component  : games.learning
summary    : KGeography is a geography learning tool
description: |
    KGeography is a geography learning tool
builddeps  :
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    #remove docs
    rm -rfv $installdir/usr/share/doc
