# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdegraphics-thumbnailers
version    : 26.04.3
release    : 96
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kdegraphics-thumbnailers-26.04.3.tar.xz : bd44c4c13e22dc69366e76d05b3d65629d07507a38e5ba42d60267756d73edcf
homepage   : https://apps.kde.org/kdegraphics_thumbnailers/
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.kde
summary    : Thumbnailers for various graphics file formats
description: |
    Thumbnailers for various graphics file formats.
builddeps  :
    - pkgconfig(Qt6Core)
    - kdegraphics-mobipocket-devel
    - kf6-karchive-devel
    - kf6-kio-devel
    - libkdcraw-devel
    - libkexiv2-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
