# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdegraphics-thumbnailers
version    : 25.12.3
release    : 93
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/kdegraphics-thumbnailers-25.12.3.tar.xz : 05eb9e268c161d25c6899f1affdb99acaf8ec506a11083fea807e335a5de18f9
homepage   : https://apps.kde.org/kdegraphics_thumbnailers/
license    : GPL-2.0-or-later
component  : desktop.kde
summary    : Thumbnailers for various graphics file formats
description: |
    Thumbnailers for various graphics file formats.
builddeps  :
    - pkgconfig(Qt6Core)
    - kdegraphics-mobipocket-devel
    - kf6-karchive-devel
    - kf6-kio-devel
    - libkdcraw-devel
    - libkexiv2-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
