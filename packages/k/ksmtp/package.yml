# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ksmtp
version    : 26.04.3
release    : 94
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/ksmtp-26.04.3.tar.xz : 6e1bcb1094b38f536c89e7c1005a493c267b2402f3a4f456181769bf2f300992
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
component  : programming.library
summary    : Job-based library to send email through an SMTP server
description: |
    Job-based library to send email through an SMTP server.
builddeps  :
    - pkgconfig(libsasl2)
    - kf6-kio-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
