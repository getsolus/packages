# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ksmtp
version    : 26.04.2
release    : 93
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/ksmtp-26.04.2.tar.xz : 2facacb2009588da2283695d9a351048d478920aeb9188c932164985fc7ef686
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
component  : programming.library
summary    : Job-based library to send email through an SMTP server
description: |
    Job-based library to send email through an SMTP server.
builddeps  :
    - pkgconfig(libsasl2)
    - kf6-kio-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
