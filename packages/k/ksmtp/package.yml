# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ksmtp
version    : 26.04.1
release    : 92
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/ksmtp-26.04.1.tar.xz : 81bf1e19757671b1b69cb7790b422fe4814bfb13fac7264059201b032454c1f1
homepage   : https://kde.org/
license    : LGPL-2.1-or-later
component  : programming.library
summary    : Job-based library to send email through an SMTP server
description: |
    Job-based library to send email through an SMTP server.
builddeps  :
    - pkgconfig(libsasl2)
    - kf6-kio-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
