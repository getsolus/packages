# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-knewstuff
version    : 6.28.0
release    : 40
source     :
    - https://download.kde.org/stable/frameworks/6.28/knewstuff-6.28.0.tar.xz : dc479d74def4e2d3e96f320f19285dcf88ec3ec6d39229f14ecb362983e305bd
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : programming.library
