description: |
    Framework for downloading and sharing additional application data.
builddeps  :
    - kf6-attica-devel
    - kf6-karchive-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kirigami-devel
    - kf6-kpackage-devel
    - kf6-kwidgetsaddons-devel
    - kf6-syndication-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-attica-devel
        - kf6-karchive-devel
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
        - kf6-ki18n-devel
        - kf6-kpackage-devel
        - kf6-syndication-devel
        - qt6-base-devel
        - qt6-declarative-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
