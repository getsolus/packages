# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kjobwidgets
version    : 6.27.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.27/kjobwidgets-6.27.0.tar.xz : 3149cd07d82204c6bfa8d86c590bf0c92905e1b5b075c7b543540916a61d7a03
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Widgets for showing progress of asynchronous jobs.
description: |
    Widgets for showing progress of asynchronous jobs.
builddeps  :
    - pkgconfig(x11)
    - kf6-kcoreaddons-devel
    - kf6-knotifications-devel
    - kf6-kwidgetsaddons-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
