# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kjobwidgets
version    : 6.26.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.26/kjobwidgets-6.26.0.tar.xz : 8057b7bd132cc2b469ac406f95ba22bc3cfc240c1031485f19fa072ab942f71e
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : Widgets for showing progress of asynchronous jobs.
description: |
    Widgets for showing progress of asynchronous jobs.
builddeps  :
    - pkgconfig(x11)
    - kf6-kcoreaddons-devel
    - kf6-knotifications-devel
    - kf6-kwidgetsaddons-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
