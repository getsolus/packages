# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ksystemstats
version    : 6.6.2
release    : 69
source     :
    - https://download.kde.org/stable/plasma/6.6.2/ksystemstats-6.6.2.tar.xz : cec107edeee7a715a358fb801f89b34b0f8e5422a5dd1bd9938551bf2f8eda33
homepage   : https://invent.kde.org/plasma/ksystemstats
license    :
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.1-only
component  : programming.library
summary    : A plugin based system monitoring daemon
description: |
    A plugin based system monitoring daemon
builddeps  :
    - pkgconfig(libnl-3.0)
    - kf6-kcrash-devel
    - kf6-kio-devel
    - kf6-networkmanager-qt-devel
    - libksysguard-devel
    - lm_sensors-devel
rundeps    :
    - libksysguard
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
