# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ksystemstats
version    : 6.7.2
release    : 74
source     :
    - https://download.kde.org/stable/plasma/6.7.2/ksystemstats-6.7.2.tar.xz : b4f6dedd0db69ce5b2e4a56500664c6409802b6986096febed3ceb8a49e04f2f
homepage   : https://invent.kde.org/plasma/ksystemstats
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
component  : programming.library
summary    : A plugin based system monitoring daemon
description: |
    A plugin based system monitoring daemon
builddeps  :
    - pkgconfig(libnl-3.0)
    - kf6-kcrash-devel
    - kf6-kio-devel
    - kf6-networkmanager-qt-devel
    - libksysguard-devel
    - lm_sensors-devel
rundeps    :
    - libksysguard
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
