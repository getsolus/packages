# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kicad-packages3d
version    : 10.0.4
release    : 22
source     :
    - https://gitlab.com/kicad/libraries/kicad-packages3D/-/archive/10.0.4/kicad-packages3D-10.0.4.tar.gz : 6cbd3ad93bdfc37a162ad4ed6fdba6f6782c2d2b18ce56021f45f296f9a87fdd
homepage   : https://www.kicad.org/
license    : CC-BY-SA-4.0
component  : office.scientific
summary    : Official KiCad 3D model libraries for rendering and MCAD integration
