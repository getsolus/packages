name       : kicad-packages3d
version    : 10.0.3
release    : 21
source     :
    - https://gitlab.com/kicad/libraries/kicad-packages3D/-/archive/10.0.3/kicad-packages3D-10.0.3.tar.gz : 192dcdeca4cbfe85ec39656c6fdf0a3aab44d5345044597463e286ddecc21511
homepage   : https://www.kicad.org/
license    : CC-BY-SA-4.0
