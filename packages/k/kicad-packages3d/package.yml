# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kicad-packages3d
version    : 10.0.1
release    : 21
source     :
    - https://gitlab.com/kicad/libraries/kicad-packages3D/-/archive/10.0.1/kicad-packages3D-10.0.1.tar.gz : cedea2da6f72420c0391994d377cefba4fcba36993788c0270e017b5dd2fde1a
homepage   : https://www.kicad.org/
license    : CC-BY-SA-4.0
component  : office.scientific
summary    : Official KiCad 3D model libraries for rendering and MCAD integration
description: |
    Contains 3D models for rendering and MCAD integration, for use with KiCAD EDA software. The model needs a mechanical model source (a manually-modelled or script-generated file); its WRL counterpart file must be obtained as a conversion from the MCAD model.
setup      : |
    %cmake
install    : |
    %make_install
    %install_license LICENSE.md
