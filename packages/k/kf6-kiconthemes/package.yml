# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kiconthemes
version    : 6.27.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.27/kiconthemes-6.27.0.tar.xz : 6fe86f0c0ff41044f44d1f37f9ae001b8d2c1a5a8bc06c41c43ed574138af5be
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : Icon GUI utilities.
description: |
    Icon GUI utilities.
builddeps  :
    - pkgconfig(Qt6Svg)
    - breeze-icons-devel
    - kf6-karchive-devel
    - kf6-kconfigwidgets-devel
    - kf6-ki18n-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - breeze-icons-devel
        - kf6-karchive-devel
        - kf6-kconfigwidgets-devel
        - kf6-ki18n-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
