# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kiconthemes
version    : 6.26.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.26/kiconthemes-6.26.0.tar.xz : ed6c0c0bfed517dd5b6462d9b1c84ebe7bc99c7a75214921b5978f086df8653d
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : Icon GUI utilities.
description: |
    Icon GUI utilities.
builddeps  :
    - pkgconfig(Qt6Svg)
    - breeze-icons-devel
    - kf6-karchive-devel
    - kf6-kconfigwidgets-devel
    - kf6-ki18n-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - breeze-icons-devel
        - kf6-karchive-devel
        - kf6-kconfigwidgets-devel
        - kf6-ki18n-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
