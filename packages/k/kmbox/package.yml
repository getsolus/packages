# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmbox
version    : 26.04.3
release    : 98
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kmbox-26.04.3.tar.xz : ff39d6616f9d56a318cbb4e029bd42960f8a115579bdce7785e0af6f1fe5ee59
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : KMBox provides API to access emails in storages in the MBox format
description: |
    KMBox provides API to access emails in storages in the MBox format.
builddeps  :
    - kmime-devel
rundeps    :
    - devel :
        - kmime-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
