# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmbox
version    : 26.04.2
release    : 97
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmbox-26.04.2.tar.xz : 27e796610b7e7a2249b4673fd8a27b59c92d5a6fe1a9af9e35ecd6308cde8f15
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : KMBox provides API to access emails in storages in the MBox format
description: |
    KMBox provides API to access emails in storages in the MBox format.
builddeps  :
    - kmime-devel
rundeps    :
    - devel :
        - kmime-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
