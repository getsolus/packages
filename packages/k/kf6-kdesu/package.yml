# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdesu
version    : 6.26.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.26/kdesu-6.26.0.tar.xz : 37df33a1236850b6bebd773a1aeab56ca597e347432924ca5855369337d4be24
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : User interface for running shell commands with root privileges
description: |
    User interface for running shell commands with root privileges
builddeps  :
    - pkgconfig(x11)
    - kf6-ki18n-devel
    - kf6-kpty-devel
    - kf6-kservice-devel
rundeps    :
    - devel :
        - kf6-kpty-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
