# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kdesu
version    : 6.27.0
release    : 33
source     :
    - https://download.kde.org/stable/frameworks/6.27/kdesu-6.27.0.tar.xz : a8a0c5103cb43dc62952aab76bb7e576e8643dbb31672e2ac2988279ab571700
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : User interface for running shell commands with root privileges
description: |
    User interface for running shell commands with root privileges
builddeps  :
    - pkgconfig(x11)
    - kf6-ki18n-devel
    - kf6-kpty-devel
    - kf6-kservice-devel
rundeps    :
    - devel :
        - kf6-kpty-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
