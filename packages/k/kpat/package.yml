# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kpat
version    : 26.04.3
release    : 86
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kpat-26.04.3.tar.xz : 562ab74043bfb77ec57970f757f107ded9d8e3fe13748324009720077ad719cb
license    :
    - BSD-2-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
homepage   : https://kde.org/applications/games/org.kde.kpat
component  : games.card
summary    : KDE patience game
description: |
    KDE patience game.
libsplit   : false
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Svg)
    - pkgconfig(libblack-hole-solver)
    - pkgconfig(libfreecell-solver)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-knewstuff-devel
    - kf6-kxmlgui-devel
    - libkdegames-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING* LICENSES/*

    #remove doc
    rm -rfv $installdir/usr/share/doc
