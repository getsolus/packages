# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kdevelop
version    : 26.04.3
release    : 94
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/kdevelop-26.04.3.tar.xz : a940a83b0752578fb04b700b8d274044e23543a68850cbc448dbdcb874ae75f4
homepage   : https://kdevelop.org/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - MIT
component  : programming.ide
summary    : KDevelop IDE and Platform
description: |
    C++ IDE using KDE technologies based on KDevelop Platform.
libsplit   : false
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6WebEngineCore)
    - pkgconfig(libedit)
    - clang-devel
    - cppcheck
    - heaptrack-devel
    - kdevelop-pg-qt-devel
    - kf6-karchive-devel
    - kf6-kcmutils-devel
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kguiaddons-devel
    - kf6-kiconthemes-devel
    - kf6-kitemmodels-devel
    - kf6-knewstuff-devel
    - kf6-knotifications-devel
    - kf6-knotifyconfig-devel
    - kf6-krunner-devel
    - kf6-ktexteditor-devel
    - kf6-ktexttemplate-devel
    - kf6-ktextwidgets-devel
    - kf6-purpose-devel
    - kf6-sonnet-devel
    - kf6-threadweaver-devel
    - libboost-devel
    - libkomparediff2-devel
    - libksysguard-devel
    - libplasma-devel
    - qt6-base-private-devel
    - subversion-devel
rundeps    :
    - cppcheck
    - devel :
        - kf6-threadweaver-devel
        - qt6-5compat-devel
        - qt6-webengine-devel
    - heaptrack
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # Remove HTML docs
    rm -rfv $installdir/usr/share/doc
