# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-threadweaver
version    : 6.26.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.26/threadweaver-6.26.0.tar.xz : ad32daeafac62077590885f3abc4bcac1abbc6faeb34c20b32f6040648f7de1b
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Helper for multithreaded programming
description: |
    Helper for multithreaded programming
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
