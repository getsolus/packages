# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kmahjongg
version    : 26.04.2
release    : 79
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/kmahjongg-26.04.2.tar.xz : d6c063da23f5e5b6f34b81e0c3bdc52a430f7332becffa4eb1aa51e58e8740da
homepage   : https://kde.org/applications/games/org.kde.kmahjongg
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : games.puzzle
summary    : Plasma's version of the famous Mahjongg solitaire game
description: |
    Mahjongg is a solitaire (one player) version of the classic Eastern tile game, Mahjongg.
    This game is part of the Plasma desktop environment.
builddeps  :
    - pkgconfig(Qt6Svg)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-knewstuff-devel
    - kf6-kxmlgui-devel
    - libkdegames-devel
    - libkmahjongg-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
