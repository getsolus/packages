# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kimageformats
version    : 6.24.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.24/kimageformats-6.24.0.tar.xz : 7e9d35863e2227e37623f390f0e53a216931cd17920582cfc8282a42e04f16e2
homepage   : https://community.kde.org/Frameworks
license    :
    - GPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-2.1-only
component  : desktop.library
summary    : A fast and easy to use image viewer
description: |
    A fast and easy to use image viewer
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(libavif)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(libopenjp2)
    - pkgconfig(libraw)
    - kf6-karchive-devel
rundeps    :
    - qt6-imageformats
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DKIMAGEFORMATS_HEIF=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
