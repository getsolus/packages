# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kimageformats
version    : 6.25.0
release    : 37
source     :
    - https://download.kde.org/stable/frameworks/6.25/kimageformats-6.25.0.tar.xz : dfa0e9b16a288a8f94233afcbaffc87c1c5ddc037aca643943aab5a67685f26b
homepage   : https://community.kde.org/Frameworks
license    :
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : A fast and easy to use image viewer
description: |
    A fast and easy to use image viewer
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(libavif)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(libopenjp2)
    - pkgconfig(libraw)
    - kf6-karchive-devel
rundeps    :
    - qt6-imageformats
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DKIMAGEFORMATS_HEIF=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
