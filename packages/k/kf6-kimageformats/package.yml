# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kimageformats
version    : 6.27.0
release    : 41
source     :
    - https://download.kde.org/stable/frameworks/6.27/kimageformats-6.27.0.tar.xz : 6a9f40936ba946279063cbdaea473b9eb735b53047b0124c88aca7db17ccabac
homepage   : https://community.kde.org/Frameworks
license    :
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.library
summary    : A fast and easy to use image viewer
description: |
    A fast and easy to use image viewer
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(libavif)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(libopenjp2)
    - pkgconfig(libraw)
    - pkgconfig(libsharpyuv)
    - kf6-karchive-devel
rundeps    :
    - qt6-imageformats
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 \
        -DKIMAGEFORMATS_HEIF:BOOL=ON \
        -DKIMAGEFORMATS_JXR:BOOL=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
