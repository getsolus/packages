# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : jp2a
version    : 1.3.3
release    : 5
source     :
    - https://github.com/Talinx/jp2a/archive/refs/tags/v1.3.3.tar.gz : 8c62f02051f0aa588b592ff8cc7d9ca799b312e47274044d46e70fe038018fd1
homepage   : https://github.com/cslarsen/jp2a
license    : GPL-2.0-or-later
component  : multimedia.graphics
summary    : jp2a is a simple JPEG to ASCII converter
description: |
    jp2a is a simple JPEG to ASCII converter
builddeps  :
    - pkgconfig(libcurl)
    - pkgconfig(libexif)
    - pkgconfig(libpng)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libwebp)
setup      : |
    %reconfigure --enable-curl
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSES
