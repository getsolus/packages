# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : jtreg
version    : 8.2.1
release    : 6
source     :
    - https://github.com/openjdk/jtreg/archive/refs/tags/jtreg-8.2.1+1.tar.gz#jtreg8.tar.gz : 1c18b10c6f6675c4b71aa3011a07b7d8e285b6d57d25a7395cb2e29aeb99a1a5
extract    : false
homepage   : https://openjdk.org/projects/code-tools/jtreg/
license    : GPL-2.0-only WITH Classpath-exception-2.0
summary    : Test harness for testing the JDK
description: |
    Test harness for testing the JDK.
component  : programming.java
networking : true
builddeps  :
    - openjdk-25
    - wget
environment: |
    export JAVA_HOME=/usr/lib64/openjdk-25
    export PATH=$JAVA_HOME/bin:$PATH

    unset LD_PRELOAD
setup      : |
    mkdir 8
    tar --strip-components=1 -xf $sources/jtreg8.tar.gz -C 8
build      : |
    bash make/build.sh --jdk $JAVA_HOME
install    : |
    install -dm00755 $installdir/usr/share/jtreg8

    cp -r --preserve=mode,timestamps build/images/jtreg/* $installdir/usr/share/jtreg8
