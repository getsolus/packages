# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : jbig2dec
version    : '0.20'
release    : 3
source     :
    - https://github.com/ArtifexSoftware/jbig2dec/archive/0.20.tar.gz : a9705369a6633aba532693450ec802c562397e1b824662de809ede92f67aff21
homepage   : https://jbig2dec.com/
license    : AGPL-3.0-or-later
component  : multimedia.library
summary    : A decoder implementation of the JBIG2 image compression format
description: |
    jbig2dec is a decoder library and example utility implementing the JBIG2 bi-level image compression spec.
builddeps  :
    - pkgconfig(libpng)
setup      : |
    %autogen --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING LICENSE
