# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : jsoncpp
version    : 1.9.6
release    : 7
source     :
    - https://github.com/open-source-parsers/jsoncpp/archive/1.9.6.tar.gz : f93b6dd7ce796b13d02c108bc9f79812245a82e577581c4c9aabe57075c90ea2
homepage   : https://github.com/open-source-parsers/jsoncpp
license    : MIT
component  : programming.library
summary    : A C++ library for interacting with JSON.
description: |
    JsonCpp is a C++ library that allows manipulating JSON values, including serialization and deserialization to and from strings. It can also preserve existing comment in unserialization/serialization steps, making it a convenient format to store user input files.
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install

    # https://github.com/open-source-parsers/jsoncpp/issues/1568
    rm -r $installdir/%libdir%/cmake
check      : |
    %ninja_check
