# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : jpegoptim
version    : 1.5.6
release    : 5
source     :
    - https://github.com/tjko/jpegoptim/archive/refs/tags/v1.5.6.tar.gz : 661a808dfffa933d78c6beb47a2937d572b9f03e94cbaaab3d4c0d72f410e9be
homepage   : https://github.com/tjko/jpegoptim
license    : GPL-2.0-or-later
component  : system.utils
summary    : Utility to optimize jpeg files.
description: |
    Provides lossless optimization of jpeg files (based on optimizing the Huffman tables) and "lossy" optimization based on setting maximum quality factor.
builddeps  :
    - pkgconfig(libturbojpeg)
setup      : |
    %configure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYRIGHT LICENSE
