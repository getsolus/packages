# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mailimporter
version    : 26.04.2
release    : 96
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/mailimporter-26.04.2.tar.xz : 4ba31c1e91ee917a96dea553dcc38c2a8473e77a17e9ce543beb6b0d4217bf93
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Mail importer library
description: |
    Mail importer library.
builddeps  :
    - akonadi-mime-devel
    - kf6-karchive-devel
    - kf6-kcontacts-devel
    - kf6-kio-devel
    - pimcommon-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
