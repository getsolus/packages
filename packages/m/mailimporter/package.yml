# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mailimporter
version    : 26.04.3
release    : 97
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/mailimporter-26.04.3.tar.xz : 47face1e8f0b2ad7158f6a1f033338856848a5599faf5a286887c69be8114b69
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Mail importer library
description: |
    Mail importer library.
builddeps  :
    - akonadi-mime-devel
    - kf6-karchive-devel
    - kf6-kcontacts-devel
    - kf6-kio-devel
    - pimcommon-devel
rundeps    :
    - devel :
        - kf6-karchive-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
