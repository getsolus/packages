# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : meld
version    : 3.24.0
release    : 39
source     :
    - https://download.gnome.org/sources/meld/3.24/meld-3.24.0.tar.xz : 19f036297e7c89514516bcd2e56182db2bb2ba13b4850893c1ce597445018b94
homepage   : https://meldmerge.org/
license    : GPL-2.0-or-later
component  : programming.tools
summary    : Meld is a visual diff and merge tool targeted at developers.
description: |
    Meld is a visual diff and merge tool targeted at developers.
builddeps  :
    - pkgconfig(gtksourceview-4)
    - pkgconfig(py3cairo)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(python3)
    - desktop-file-utils
    - itstool
rundeps    :
    - libgtksourceview4
    - python-gobject
    - python3-dbus
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %python3_compile
