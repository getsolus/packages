# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mutt
version    : 2.3.2
release    : 37
source     :
    - https://gitlab.com/muttmua/mutt/-/archive/mutt-2-3-2-rel/mutt-mutt-2-3-2-rel.tar.gz : e9fdae5a27fc401f46a561192506f04e49e497104a798a14f29681a8e7de8757
homepage   : https://gitlab.com/muttmua/mutt
license    : GPL-2.0-or-later
component  : network.mail
summary    : Mutt (Small, powerful text based email client)
description: |
    Mutt is a small but powerful text-based mail client for Unix operating systems. It was originally based on ELM, and was written by Michael Elkins.
builddeps  :
    - pkgconfig(gpgme)
    - pkgconfig(libassuan)
    - pkgconfig(libsasl2)
    - pkgconfig(ncursesw)
    - gdbm-devel
    - gnupg
rundeps    :
    - vim
setup      : |
    %reconfigure \
        --sysconfdir=/etc/mutt \
        --enable-compressed \
        --enable-gpgme \
        --enable-hcache \
        --enable-imap \
        --enable-locales-fix \
        --enable-pop \
        --enable-sidebar \
        --enable-smtp \
        --with-curses \
        --with-homespool=/var/spool/ \
        --with-regex \
        --with-sasl \
        --with-ssl
build      : |
    %make
install    : |
    %make_install
    %install_license GPL
