# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mkfontscale
version    : 1.2.4
release    : 16
source     :
    - https://www.x.org/releases/individual/app/mkfontscale-1.2.4.tar.gz : 076cedba00195e81d055fb39eff94c057f97326ac2403cf71460fc613cd200bf
license    : MIT
component  : xorg.apps
