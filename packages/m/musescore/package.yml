# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : musescore
version    : 4.7.1
release    : 37
source     :
    - https://github.com/musescore/MuseScore/archive/refs/tags/v4.7.1.tar.gz : 629b40177d04b2af8e382367a9e7e61d16454a7d548bbdbfd6e09bd2ff3a2559
homepage   : https://musescore.org/
license    : GPL-3.0-only
component  : multimedia.audio
summary    : MuseScore is an open source and free music notation software
description: |
    MuseScore is an open source and free music notation software
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Gui)
    - pkgconfig(Qt6Linguist)
    - pkgconfig(Qt6Network)
    - pkgconfig(Qt6NetworkAuth)
    - pkgconfig(Qt6OpenGL)
    - pkgconfig(Qt6PrintSupport)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6QuickWidgets)
    - pkgconfig(Qt6ShaderTools)
    - pkgconfig(Qt6StateMachine)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(Qt6Xml)
    - pkgconfig(alsa)
    - pkgconfig(freetype2)
    - pkgconfig(gl)
    - pkgconfig(harfbuzz)
    - pkgconfig(jack)
    - pkgconfig(libpulse)
    - pkgconfig(libssl)
    - pkgconfig(portaudio-2.0)
    - pkgconfig(sndfile)
    - pkgconfig(xcb)
    - extra-cmake-modules
    - git
    - lame-devel
    - portmidi-devel
    - qt6-base-private-devel
setup      : |
    %cmake_ninja -DCMAKE_BUILD_TYPE=Release \
                 -DMUE_BUILD_IMPEXP_MNX_MODULE=OFF \
                 -DMUE_COMPILE_USE_SYSTEM_FREETYPE=ON \
                 -DMUE_COMPILE_USE_SYSTEM_HARFBUZZ=ON \
                 -DMUE_DOWNLOAD_SOUNDFONT=OFF \
                 -DMUSE_APP_BUILD_MODE=release \
                 -DMUSE_ENABLE_UNIT_TESTS=OFF \
                 -DMUSE_MODULE_DIAGNOSTICS_CRASHPAD_CLIENT=OFF \
                 -DMUSE_MODULE_UPDATE=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.txt
    %qml6_cache

    # Remove unnecessary headers
    rm -rvf ${installdir}/usr/include

    # Remove unneccesary cmake artifacts
    rm -rvf ${installdir}/usr/lib64
