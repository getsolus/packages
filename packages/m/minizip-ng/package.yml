# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : minizip-ng
version    : 4.2.1
release    : 12
source     :
    - https://github.com/zlib-ng/minizip-ng/archive/refs/tags/4.2.1.tar.gz : 3cc35c2cb925dbe67cc801e3234b31b0f30197812a99377352fa1b551ab3d011
license    : Zlib
homepage   : https://github.com/zlib-ng/minizip-ng
component  : system.utils
summary    : Fork of the zlib zip library
description: |
    Fork of the popular zip manipulation library found in the zlib distribution
clang      : true
optimize   :
    - lto
    - speed
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(libcrypto)
    - pkgconfig(liblzma)
    - pkgconfig(libzstd)
    - pkgconfig(zlib-ng)
replaces   :
    - zlib-minizip
    - devel : zlib-minizip-devel
rundeps    :
    - devel :
        - bzip2-devel
        - xz-devel
        - zlib-ng-devel
        - zstd-devel
setup      : |
    %cmake_ninja -B compat \
                 -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                 -DBUILD_SHARED_LIBS=ON \
                 -DMZ_LIBBSD=OFF \
                 -DMZ_COMPAT=ON \
                 -DMZ_PPMD=OFF

    %cmake_ninja -B regular \
                 -DBUILD_SHARED_LIBS=ON \
                 -DMZ_LIBBSD=OFF \
                 -DMZ_COMPAT=OFF \
                 -DMZ_PPMD=OFF
build      : |
    %ninja_build -C compat
    %ninja_build -C regular
install    : |
    %ninja_install -C compat
    %ninja_install -C regular
    %install_license LICENSE
# TODO Split the compat library out to a different package.
