# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mumble
version    : 1.5.901
release    : 46
source     :
    - https://github.com/mumble-voip/mumble/releases/download/v1.5.901/mumble-1.5.901.tar.gz : fd8d31add7458d157a1087b2b163ccbd340db35708bb2fac16f10e22cbb120b9
homepage   : https://www.mumble.info
license    : BSD-3-Clause
component  : network.clients
summary    : High quality voice chat software
description: |
    Mumble is an open source, low-latency, high quality voice chat software primarily intended for use while gaming.
builddeps  :
    - pkgconfig(Qt5Svg)
    - pkgconfig(Qt5UiTools)
    - pkgconfig(alsa)
    - pkgconfig(avahi-compat-libdns_sd)
    - pkgconfig(harfbuzz)
    - pkgconfig(libcap)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpulse)
    - pkgconfig(libutf8proc)
    - pkgconfig(nlohmann_json)
    - pkgconfig(opus)
    - pkgconfig(protobuf)
    - pkgconfig(sndfile)
    - pkgconfig(speex)
    - pkgconfig(xi)
    - libboost-devel
    - microsoft-gsl
    - poco-devel
setup      : |
    export CXXFLAGS="${CXXFLAGS} -Wno-error=deprecated-declarations"
    %cmake_ninja \
        -DCMAKE_C_STANDARD=17 \
        -Dbundle-qt-translations=OFF \
        -Dbundled-gsl=OFF \
        -Dbundled-json=OFF \
        -Dbundled-renamenoise=ON \
        -Dbundled-speex=OFF \
        -Dice=OFF \
        -Doverlay-xcompile=OFF \
        -Dserver=OFF \
        -Dspeechd=OFF \
        -Dupdate=OFF \
        -Dwarnings-as-errors=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
