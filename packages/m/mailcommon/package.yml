# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mailcommon
version    : 26.04.1
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/mailcommon-26.04.1.tar.xz : fa7c24f54f185cad3c3a23131f2cf14bdc4df2e24247bec75dbd1b9a6a62589a
homepage   : https://kde.org/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : programming.library
summary    : MailCommon Library
description: |
    MailCommon Library.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6WebEngineWidgets)
    - akonadi-contacts-devel
    - akonadi-mime-devel
    - kdesignerplugin-devel
    - kf6-kdbusaddons-devel
    - kf6-kiconthemes-devel
    - kf6-ktextwidgets-devel
    - kf6-kxmlgui-devel
    - kf6-syntax-highlighting-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - ktextaddons-devel
    - libkdepim-devel
    - mailimporter-devel
    - messagelib-devel
    - pimcommon-devel
rundeps    :
    - devel :
        - akonadi-devel
        - akonadi-mime-devel
        - kf6-kcompletion-devel
        - libkdepim-devel
        - messagelib-devel
        - pimcommon-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
