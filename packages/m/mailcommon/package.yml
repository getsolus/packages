# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mailcommon
version    : 26.04.2
release    : 104
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/mailcommon-26.04.2.tar.xz : b65177ebaee6447a1d60cfb994eb2a03e3afd62b6010504ce45d99439ccc9ccc
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-3.0-only
    - MIT
component  : programming.library
summary    : MailCommon Library
description: |
    MailCommon Library.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6WebEngineWidgets)
    - akonadi-contacts-devel
    - akonadi-mime-devel
    - kdesignerplugin-devel
    - kf6-kdbusaddons-devel
    - kf6-kiconthemes-devel
    - kf6-ktextwidgets-devel
    - kf6-kxmlgui-devel
    - kf6-syntax-highlighting-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - ktextaddons-devel
    - libkdepim-devel
    - mailimporter-devel
    - messagelib-devel
    - pimcommon-devel
rundeps    :
    - devel :
        - akonadi-devel
        - akonadi-mime-devel
        - kf6-kcompletion-devel
        - libkdepim-devel
        - messagelib-devel
        - pimcommon-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
