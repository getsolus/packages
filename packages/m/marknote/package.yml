# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : marknote
version    : 1.5.2
release    : 6
source     :
    - https://download.kde.org/stable/marknote/marknote-1.5.2.tar.xz : bc5a0a82be7a24cdbcfb8b28e41c4a2003e0254d6a898296b74347b476e3eeb7
homepage   : https://apps.kde.org/marknote
license    : 
    - BSD-3-Clause
    - CC0-1.0
    - CC-BY-SA-4.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - LGPL-3.0-or-later
component  : desktop.kde
summary    : A simple markdown note management app
description: |
    Marknote lets you create rich text notes and easily organise them into notebooks. You can personalise your notebooks by choosing an icon and accent color for each one, making it easy to distinguish between them and keep your notes at your fingertips. Your notes are saved as Markdown files in your Documents folder, making it easy to use your notes outside of Marknote as well as inside the app.
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6Svg)
    - pkgconfig(md4c)
    - kf6-kcolorscheme-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kirigami-devel
    - kf6-knotifications-devel
    - kf6-krunner-devel
    - kf6-kwindowsystem-devel
    - kf6-syntax-highlighting-devel
    - kirigami-addons-devel
    - kmime-devel
rundeps    :
    - kf6-kirigami
    - kf6-kitemmodels
    - kf6-qqc2-desktop-style
    - kirigami-addons
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
replaces   :
    - knotes
