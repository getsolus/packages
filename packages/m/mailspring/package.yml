# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mailspring
version    : 1.23.0
release    : 53
source     :
    - git|https://github.com/Foundry376/Mailspring.git : 5b37181118243439d7777e863faf6e7138de60b0
homepage   : https://getmailspring.com/
license    : GPL-3.0-only
component  : network.mail
summary    : Mailspring email client
description: |
    Mailspring email client. The best email app for people and teams at work.
networking : true
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(atspi-2)
    - pkgconfig(cairo)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(pango)
    - pkgconfig(xcomposite)
    - pkgconfig(xdamage)
    - pkgconfig(xfixes)
    - pkgconfig(xkbcommon)
    - pkgconfig(xrandr)
    - cups-devel
    - git
    - make
    - nodejs
setup      : |
    # Disable the in-app update notification banner for distro packaging
    %patch -p1 -i $pkgfiles/0001-Disable-update-notifications.patch

    # node 24 fix: Inject an npm override for 'yauzl' to fix the extract-zip deadlock
    node -e "const fs = require('fs'); ['package.json', 'app/package.json'].forEach(file => { if(fs.existsSync(file)) { const pkg = JSON.parse(fs.readFileSync(file)); pkg.overrides = pkg.overrides || {}; pkg.overrides.yauzl = '^3.3.2'; fs.writeFileSync(file, JSON.stringify(pkg, null, 2)); } });"
    
    # This forces the download of mailsync.
    # Since we are using a Git source, the postinstall.js will successfully read the submodule hash.
    rm -rf mailsync

    npm install
build      : |
    npm run build -- --skip-installers

    # Remove unneeded dependency on libsasldb to prevent runtime errors
    rm -v app/dist/mailspring-linux-x64/resources/app.asar.unpacked/libsasldb.so* || true
install    : |
    # Install the main application files
    install -d -m00755 $installdir/usr/share/mailspring
    cp -a app/dist/mailspring-linux-x64/* $installdir/usr/share/mailspring/

    # Create the executable symlink
    install -d -m00755 $installdir/usr/bin
    ln -srv $installdir/usr/share/mailspring/mailspring $installdir/usr/bin/mailspring

    # Generate the .desktop and appdata.xml files from their .in templates
    for i in "Mailspring.desktop" "mailspring.metainfo.xml"; do
        sed -e "s|<%= productName %>|Mailspring|g" \
            -e "s|<%= name %>|mailspring|g" \
            -e "s|<%= description %>|The best email app for people and teams at work|g" \
            app/build/resources/linux/${i}.in > ./$i
    done

    # Install standard Linux desktop integration files
    install -D -m00644 Mailspring.desktop $installdir/usr/share/applications/Mailspring.desktop
    install -D -m00644 mailspring.metainfo.xml $installdir/usr/share/metainfo/mailspring.metainfo.xml

    # Install the application icons
    for i in 16 32 64 128 256 512; do
        install -D -m00644 app/build/resources/linux/icons/${i}.png $installdir/usr/share/icons/hicolor/${i}x${i}/apps/mailspring.png
    done
    %install_license LICENSE.md
