# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : msedit
version    : 2.0.0
release    : 5
source     :
    - https://github.com/microsoft/edit/archive/refs/tags/v2.0.0.tar.gz : f35da309c5f3d92b10e5c4b2267e4d5e29d809b2aa460e80326b11f7feba72a5
homepage   : https://github.com/microsoft/edit
license    : MIT
component  : editor
networking : true
summary    : Microsoft Edit - A simple editor for simple needs
description: |
    This editor pays homage to the classic MS-DOS Editor, but with a modern
    interface and input controls similar to VS Code. The goal is to provide an
    accessible editor that even users largely unfamiliar with terminals can
    easily use.
builddeps  :
    - rust
rundeps    :
    - libicu
environment: |
    export EDIT_CFG_ICUUC_SONAME=libicuuc.so.78
    export EDIT_CFG_ICUI18N_SONAME=libicui18n.so.78
    export EDIT_CFG_ICU_RENAMING_VERSION=78
setup      : |
    # Patch the desktop file so it matches the alternative binary name
    sed -i 's/=edit/=msedit/' assets/com.microsoft.edit.desktop
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %install_license LICENSE
    install -Dm00755 ${workdir}/target/release/edit ${installdir}/usr/bin/msedit
    install -Dm00644 assets/edit.svg ${installdir}/usr/share/icons/hicolor/scalable/apps/msedit.svg
    install -Dm00644 assets/com.microsoft.edit.desktop ${installdir}/usr/share/applications/com.microsoft.edit.desktop
    install -Dm00644 ${pkgfiles}/com.microsoft.edit.metainfo.xml ${installdir}/usr/share/metainfo/com.microsoft.edit.metainfo.xml
    install -Dm00644 assets/manpage/edit.1 ${installdir}/usr/share/man/man1/msedit.1
check      : |
    %cargo_test -- --ignored
