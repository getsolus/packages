# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : magic-wormhole
version    : 0.24.0
release    : 19
source     :
    - https://github.com/magic-wormhole/magic-wormhole/archive/refs/tags/0.24.0.tar.gz : b69f8f25c3462e1e3205bd1e581564f0a0fbdb530ad33f9d9625def7fd34e135
homepage   : https://github.com/magic-wormhole/magic-wormhole
license    : MIT
component  : network
summary    : Securely transfer data between computers
description: |
    Securely transfer data between computers.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-versioneer
    - python-wheel
rundeps    :
    - python-autobahn
    - python-click
    - python-humanize
    - python-idna
    - python-iterable-io
    - python-pynacl
    - python-qrcode
    - python-service-identity
    - python-spake2
    - python-tqdm
    - python-txtorcon
    - python-zipstream-ng
setup      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE

    # install completions
    install wormhole_complete.bash -Dm00644 $installdir/usr/share/bash-completion/completions/wormhole
    install wormhole_complete.fish -Dm00644 $installdir/usr/share/fish/vendor_completions.d/wormhole.fish
    install wormhole_complete.zsh  -Dm00644 $installdir/usr/share/zsh/site-functions/_wormhole
    rm $installdir/usr/wormhole_complete.*
