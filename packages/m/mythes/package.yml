# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mythes
version    : 1.2.6
release    : 4
source     :
    - https://github.com/hunspell/mythes/archive/refs/tags/v1.2.6.tar.gz : 7ebc9d32e4d37c1da7fb9dd9673dec2deda9607470a84ebcab2c0d08dc3c7d6c
homepage   : https://hunspell.github.io/
license    : BSD-3-Clause
component  : office
summary    : Simple thesaurus library
description: |
    MyThes is a simple thesaurus that uses a structured text data file and an index file with binary search to lookup words and phrases and return information on part of speech, meanings, and synonyms.
environment: |
     CXXFLAGS="$CXXFLAGS -Wno-sign-compare"
builddeps  :
    - pkgconfig(hunspell)
setup      : |
    %autogen --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
