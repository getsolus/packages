# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : milou
version    : 6.7.2
release    : 141
source     :
    - https://download.kde.org/stable/plasma/6.7.2/milou-6.7.2.tar.xz : 75162402168082cce5ad8be41331fc9f55cb74f5e27326b6233eeaf5c6aba6d1
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.kde.core
summary    : A dedicated search application built on top of Baloo
description: |
    A dedicated search application built on top of Baloo.
builddeps  :
    - pkgconfig(Qt6Qml)
    - kf6-kconfig-devel
    - kf6-ki18n-devel
    - kf6-kirigami-devel
    - kf6-krunner-devel
    - kf6-ksvg-devel
    - libplasma-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
