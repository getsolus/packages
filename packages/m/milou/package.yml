# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : milou
version    : 6.6.2
release    : 135
source     :
    - https://download.kde.org/stable/plasma/6.6.2/milou-6.6.2.tar.xz : 748f25a728d01fb7f6bcc875fac3a441498f592b33ab9bcb2572ec973a109818
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-only
component  : desktop.kde.core
summary    : A dedicated search application built on top of Baloo
description: |
    A dedicated search application built on top of Baloo.
builddeps  :
    - pkgconfig(Qt6Qml)
    - kf6-kconfig-devel
    - kf6-ki18n-devel
    - kf6-kirigami-devel
    - kf6-krunner-devel
    - kf6-ksvg-devel
    - libplasma-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
