# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mpg123
version    : 1.33.6
release    : 26
source     :
    - https://sourceforge.net/projects/mpg123/files/mpg123/1.33.6/mpg123-1.33.6.tar.bz2 : 929a7c18ba662b8927aed4de229ad9ae8ab2b4806dd0f30b90113eb1b4e2195a
homepage   : https://www.mpg123.de/
component  :
    - multimedia.codecs
    - bin : multimedia.codecs
license    : LGPL-2.1-only
summary    : Console based mp3 decoder
description: |
    mpg123 is a fast and Free real time MPEG Audio Layer 1, 2 and 3 decoding library and console player. It uses floating point or integer math, along with several special optimizations (3DNow, SSE, ARM, ...) to make it most efficient.
emul32     : true
patterns   :
    - bin :
        - /usr/bin
        - /usr/share/man
replaces   :
    - libmpg123
    - devel : libmpg123-devel
builddeps  :
    - pkgconfig32(alsa)
    - pkgconfig32(json-c)
    - pkgconfig32(libpulse)
    - pkgconfig32(sndfile)
setup      : |
    %configure --enable-int-quality
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
