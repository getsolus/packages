# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : malcontent
version    : 0.14.0
release    : 1
source     :
    - https://tecnocode.co.uk/downloads/malcontent/malcontent-0.14.0.tar.xz : 951c2732106254b2f4d22c06061d1a813d8b6310a045afc638c1e1a0c97e4e69
homepage   : https://gitlab.freedesktop.org/pwithnall/malcontent/
license    : LGPL-2.1-or-later
component  : desktop.gnome
summary    : Parental control support for applications
description: |
    libmalcontent implements parental controls support which can be used by applications to filter or limit the access of child accounts to inappropriate content.
networking : true
builddeps  :
    - pkgconfig(accountsservice)
    - pkgconfig(flatpak)
    - pkgconfig(gi-docgen)
    - pkgconfig(gnome-desktop-4)
    - pkgconfig(gsystemservice-0)
    - pkgconfig(gtk-doc)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libsoup-3.0)
    - desktop-file-utils
    - itstool
    - git
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
