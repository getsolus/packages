# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mtr
version    : '0.96'
release    : 10
source     :
    - https://github.com/traviscross/mtr/archive/refs/tags/v0.96.tar.gz : 73e6aef3fb6c8b482acb5b5e2b8fa7794045c4f2420276f035ce76c5beae632d
homepage   : https://www.bitwizard.nl/mtr/
license    : GPL-2.0-or-later
component  : network.utils
summary    : Combines the functionality of traceroute and ping into one tool (CLI version)
description: |
    Combines the functionality of traceroute and ping into one tool (CLI version)
builddeps  :
    - pkgconfig(libcap)
setup      : |
    echo $version > .tarball-version
    %reconfigure --sbindir=/usr/bin --without-gtk
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
