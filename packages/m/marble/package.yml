# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : marble
version    : 26.04.2
release    : 115
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/marble-26.04.2.tar.xz : 8b1f4b1fba722c42852150427803bb28f800e5c217d9a2a8549b122646ef2d44
homepage   : https://kde.org/applications/education/org.kde.marble
license    :
    - Apache-2.0
    - BSD-3-Clause
    - BSL-1.0
    - CC0-1.0
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - MIT
    - ODbL-1.0
component  :
    - network.web
    - libs : programming.library
summary    : Virtual Globe and World Atlas
description: |
    Marble is a Virtual Globe and World Atlas that you can use to learn more about Earth: You can pan and zoom around and you can look up places and roads.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Positioning)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6SerialPort)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6WebChannel)
    - pkgconfig(Qt6WebEngineWidgets)
    - pkgconfig(phonon4qt6)
    - pkgconfig(protobuf)
    - pkgconfig(shapelib)
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kparts-devel
    - kf6-krunner-devel
    - libplasma-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_MARBLE_TOOLS=YES \
               -DBUILD_TOUCH=ON \
               -DMOBILE=OFF \
               -DQT_PLUGINS_DIR=lib64/qt6/plugins
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove docs
    rm -rfv $installdir/usr/share/doc

    # Not compatible with Plasma 6. Bring back once ported to Qt6
    rm -rfv $installdir/usr/share/plasma/plasmoids \
            $installdir/usr/share/kservices5/plasma*.desktop

    %install_license LICENSE.txt LICENSES/*
patterns   :
    - libs :
        - /usr/lib64/lib*.so.*
        - /usr/lib64/libmarbledeclarative.so
        - /usr/lib64/marble/plugins
