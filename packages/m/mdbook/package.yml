# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mdbook
version    : 0.5.4
release    : 52
source     :
    - https://github.com/rust-lang/mdBook/archive/refs/tags/v0.5.4.tar.gz : 107614330c35c77d53b6f6ce7826c50eed087650efe5646a4d0a16ca6bf5544b
homepage   : https://github.com/rust-lang/mdBook
license    : MPL-2.0
component  : programming.tools
summary    : Create books from markdown files
description: |
    mdBook is a command line tool to create book from markdown files. Like Gitbook but implemented in Rust.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install
    %install_license LICENSE
