# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : massif-visualizer
version    : 26.04.1
release    : 18
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/massif-visualizer-26.04.1.tar.xz : 3f550daa08468226dfc8eab2a67f8f9f9e8f244fc4173e1612342f0a5e484798
homepage   : https://apps.kde.org/massif_visualizer/
license    : GPL-2.0-or-later
component  : system.utils
summary    : Visualizer for Valgrind Massif data files
description: |
    Visualizer for Valgrind Massif data files
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Svg)
    - kdiagram-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kparts-devel
    - kgraphviewer-devel
    - libboost-devel
rundeps    :
    - kgraphviewer
    - valgrind
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove docs
    rm -rfv $installdir/usr/share/doc
