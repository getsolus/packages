# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : massif-visualizer
version    : 26.04.3
release    : 21
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/massif-visualizer-26.04.3.tar.xz : 63496ba8810f938d77c56bc97c1ace23bd422ac64405d68f094b00154d3345e3
homepage   : https://apps.kde.org/massif_visualizer/
license    : GPL-2.0-or-later
component  : system.utils
summary    : Visualizer for Valgrind Massif data files
description: |
    Visualizer for Valgrind Massif data files
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Svg)
    - kdiagram-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kparts-devel
    - kgraphviewer-devel
    - libboost-devel
rundeps    :
    - kgraphviewer
    - valgrind
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    # remove docs
    rm -rfv $installdir/usr/share/doc
