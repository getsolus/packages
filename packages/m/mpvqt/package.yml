# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mpvqt
version    : 1.2.0
release    : 5
source     :
    - https://download.kde.org/stable/mpvqt/mpvqt-1.2.0.tar.xz : 8660ad79c0d60fed77f29b36e1742841466af5405de702c81a121e6eeb625ebb
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC-BY-SA-4.0
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : multimedia.library
homepage   : https://invent.kde.org/libraries/mpvqt
summary    : MpvQt is a libmpv wrapper for QtQuick2 and QML
description: |
    MpvQt is a libmpv wrapper for QtQuick2 and QML
builddeps  :
    - pkgconfig(Qt6Quick)
    - extra-cmake-modules
    - mpv-libs-devel
rundeps    :
    - devel :
        - mpv-libs-devel
        - qt6-declarative-devel
clang      : true
optimize   :
    - thin-lto
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
