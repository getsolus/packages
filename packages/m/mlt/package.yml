# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mlt
version    : 7.38.0
release    : 54
source     :
    - https://github.com/mltframework/mlt/releases/download/v7.38.0/mlt-7.38.0.tar.gz : b8f0a23c89e9250edc5038d745537c382367bf2ad3dad5d5c7cd13b0fe1c4144
homepage   : https://www.mltframework.org/
license    :
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LGPL-2.1-or-later
component  : multimedia.library
summary    : Multimedia framework designed for television broadcasting.
description: |
    Multimedia framework designed for television broadcasting.
patterns   :
    - python :
        - /usr/lib/python3.*/site-packages/*
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Svg)
    - pkgconfig(SDL2_image)
    - pkgconfig(alsa)
    - pkgconfig(fftw3)
    - pkgconfig(frei0r)
    - pkgconfig(gl)
    - pkgconfig(jack)
    - pkgconfig(libarchive)
    - pkgconfig(libavformat)
    - pkgconfig(libexif)
    - pkgconfig(libpulse)
    - pkgconfig(movit)
    - pkgconfig(opencv4)
    - pkgconfig(python3)
    - pkgconfig(rubberband)
    - pkgconfig(samplerate)
    - pkgconfig(sox)
    - pkgconfig(vidstab)
    - pkgconfig(vorbis)
    - pkgconfig(x11)
    - ladspa-devel
    - swig
rundeps    :
    - frei0r
setup      : |
    %cmake_ninja \
        -DMOD_GDK=OFF \
        -DMOD_GLAXNIMATE=ON \
        -DMOD_GLAXNIMATE_QT6=ON \
        -DMOD_OPENCV=ON \
        -DMOD_QT6=ON \
        -DSWIG_PYTHON=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING GPL GPLv3
