# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : marp-cli
version    : 4.4.1
release    : 21
homepage   : https://marp.app/
source     :
    - https://github.com/marp-team/marp-cli/archive/refs/tags/v4.4.1.tar.gz : ce87fdb74b73a3aad06b53d233c38e9f2c11b284f7d0adf588e92ebc3caece31
license    : MIT
component  : office
summary    : A CLI interface for Marp and Marpit based converters
description: |
    A CLI interface for Marp and any slide deck converter based on Marpit framework. It can convert Marp / Marpit Markdown files into static HTML / CSS, PDF, PowerPoint document, and image(s) easily.
networking : true
strip      : false
debug      : false
builddeps  :
    - git
    - nodejs
    - yarn
setup      : |
    yarn install
build      : |
    yarn build
    yarn run pkg . \
        --out-path ./bin \
        --targets host \
        --compress Brotli
install    : |
    install -Dm0755 bin/marp-cli $installdir/usr/bin/marp
    %install_license LICENSE
