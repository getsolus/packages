# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : muon
version    : 0.6.0
release    : 5
source     :
    - https://muon.build/releases/v0.6.0/muon-v0.6.0.tar.gz : 90a8428bc2178c59b9f7ddd1cb1cc6355f4df0c3ac023f7eefd159ae4f054024
homepage   : https://muon.build/
license    : GPL-3.0-only
component  : system.devel
summary    : A meson-compatible build system.
description: |
    muon is an implementation of the meson build system in c99 with minimal dependencies.
builddeps  :
    - pkgconfig(libarchive)
    - pkgconfig(libcurl)
    - pkgconfig(libpkgconf)
    - pkgconfig(scdoc)
    - git
    - meson
patterns   :
    - /*
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
