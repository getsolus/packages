# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : i3lock
version    : '2.16'
release    : 19
source     :
    - https://github.com/i3/i3lock/archive/refs/tags/2.16.tar.gz : d62e81d3ab0bdd66363eec3671f2da24c7f662775705e4b33fd712796ba7e257
license    : BSD-3-Clause
component  : desktop.i3
homepage   : https://i3wm.org/i3lock/
summary    : i3lock is a simple screen locker like slock.
description: |
    i3lock is a simple screen locker like slock.
builddeps  :
    - pkgconfig(cairo)
    - pkgconfig(xcb-image)
    - pkgconfig(xcb-xrm)
    - pkgconfig(xinerama)
    - pkgconfig(xkbcommon-x11)
    - libev-devel
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install

    rm -v $installdir/etc/pam.d/i3lock

    install -Dm00644 $pkgfiles/i3lock.pam $installdir/usr/share/defaults/etc/pam.d/i3lock

    # Cleanup
    find $installdir -type d -empty -print -delete
