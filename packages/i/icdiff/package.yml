# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : icdiff
version    : 2.0.10
release    : 4
source     :
    - https://files.pythonhosted.org/packages/source/i/icdiff/icdiff-2.0.10.tar.gz : 75a3de5c9af35ab45fb0504df59770c514a12c0d2b2c99e5f9c5c2429957e133
homepage   : https://www.jefftk.com/icdiff
license    : PSF-2.0
component  : system.utils
summary    : Improved Color Diff
description: |
    Your terminal can display color, but most diff tools don't make good use of it. By highlighting changes, icdiff can show you the differences between similar files without getting in the way. This is especially helpful for identifying and understanding small changes within existing lines.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
build      : |
    %python3_setup
install    : |
    %python3_install
