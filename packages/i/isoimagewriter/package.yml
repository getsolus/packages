# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : isoimagewriter
version    : 26.04.3
release    : 35
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/isoimagewriter-26.04.3.tar.xz : c4f89045a0d272077b2fd16016195419e58c7228af7d47678428fd7f12c1ee38
license    : GPL-3.0-or-later
component  : system.utils
homepage   : https://apps.kde.org/isoimagewriter/
summary    : ISO Image Writer is a KDE tool to write a .iso file to a USB disk.
description: |
    ISO Image Writer is a KDE tool to write a .iso file to a USB disk.
builddeps  :
    - gpgmeqt-qt6-devel
    - kf6-karchive-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kwidgetsaddons-devel
    - kf6-solid-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %patch -p1 -i $pkgfiles/0001-isoverifier-Remove-hardcoded-ubuntu-ism-in-verifyWit.patch
    %patch -p1 -i $pkgfiles/0002-isoverifier-Add-support-for-verifying-Solus-ISOs.patch

    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
