# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : iverilog
version    : '13_0'
release    : 7
source     :
    - https://github.com/steveicarus/iverilog/archive/v13_0.tar.gz : c897bbfa9848688982c6d5c30529fc29d68df0b9ff22ffa73bad89db73a7ce49
homepage   : https://steveicarus.github.io/iverilog/
license    : LGPL-2.1-or-later
component  : office.scientific
summary    : a Verilog simulation and synthesis tool
description: |
    Icarus Verilog is a Verilog simulation and synthesis tool. It operates as a compiler, compiling source code written in Verilog (IEEE-1364) into some target format. For batch simulation, the compiler can generate an intermediate form called vvp assembly. This intermediate form is executed by the ``vvp'' command. For synthesis, the compiler generates netlists in the desired format.
patterns   :
    - /usr/include
    - /usr/lib64
builddeps  :
    - gperf
setup      : |
    chmod +x autoconf.sh
    ./autoconf.sh
    %configure
build      : |
    %make
install    : |
    %make_install -j1
check      : |
    %make check
    %install_license COPYING
    rm ${installdir}/usr/lib64/libvpi.a
