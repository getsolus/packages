# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ivpn
version    : 3.15.0
release    : 1
source     :
    - git|https://github.com/ivpn/desktop-app.git : ac4a1f4b1d14c9c8f1070bfc7c1bb9958a7b9a4d
homepage   : https://www.ivpn.net/en/apps-linux/
license    : GPL-3.0-or-later
component  : network.clients
summary    : A desktop VPN client that connects to IVPN's servers.
description: |
    IVPN for Desktop is the official IVPN app for desktop platforms. Some of the features include: multiple protocols (OpenVPN, WireGuard), Kill-switch, Multi-Hop, Trusted Networks, AntiTracker, Custom DNS, Dark mode, and more.
networking: true
environment: |
    export IVPN_BUILD_SKIP_GLIBC_VER_CHECK=1
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libdrm)
    - pkgconfig(liboqs)
    - pkgconfig(xkbcommon)
    - dnscrypt-proxy
    - golang
    - nodejs
    - wireguard-tools
    - wireless-tools-devel
rundeps    :
    - dnscrypt-proxy
    - liboqs
    - openvpn
    - wireguard-tools
    - wireless-tools
setup      : |
    %patch -p1 -i $pkgfiles/solus_references.patch
build      : |
    %workdir%/cli/References/Linux/compile-cli.sh -v %version%
    %workdir%/daemon/References/Linux/scripts/build-daemon.sh -v %version%
    %workdir%/daemon/References/Linux/scripts/build-kem-helper.sh -v %version%
    %workdir%/daemon/References/Linux/scripts/build-obfs4proxy.sh -v %version%
    %workdir%/daemon/References/Linux/scripts/build-v2ray.sh -v %version%
    
    cd %workdir%/ui && npm install
    
    %workdir%/ui/References/Linux/compile-ui.sh -v %version%
install    : |
    install -Dm00700 $workdir/daemon/References/Linux/scripts/_out_bin/ivpn-service $installdir/usr/bin/ivpn-service

    install -Dm00700 $workdir/daemon/References/Linux/etc/client.down $installdir/%libdir%/ivpn/etc/client.down
    install -Dm00700 $workdir/daemon/References/Linux/etc/client.up $installdir/%libdir%/ivpn/etc/client.up
    install -Dm00700 $workdir/daemon/References/Linux/etc/firewall.sh $installdir/%libdir%/ivpn/etc/firewall.sh
    install -Dm00700 $workdir/daemon/References/Linux/etc/splittun.sh $installdir/%libdir%/ivpn/etc/splittun.sh
    
    install -Dm00755 $workdir/daemon/References/Linux/_deps/kem-helper/kem-helper-bin/kem-helper $installdir/%libdir%/ivpn/kem/kem-helper
    install -Dm00755 $workdir/daemon/References/Linux/_deps/obfs4proxy_inst/obfs4proxy $installdir/%libdir%/ivpn/obfsproxy/obfs4proxy
    install -Dm00755 $workdir/daemon/References/Linux/_deps/v2ray_inst/v2ray $installdir/%libdir%/ivpn/v2ray/v2ray
    
    install -Dm00400 $workdir/daemon/References/common/etc/ca.crt $installdir/%libdir%/ivpn/etc/ca.crt
    install -Dm00400 $workdir/daemon/References/common/etc/dnscrypt-proxy-template.toml $installdir/%libdir%/ivpn/etc/dnscrypt-proxy-template.toml
    install -Dm00600 $workdir/daemon/References/common/etc/servers.json $installdir/%libdir%/ivpn/etc/servers.json
    install -Dm00400 $workdir/daemon/References/common/etc/ta.key $installdir/%libdir%/ivpn/etc/ta.key
    
    install -Dm00755 $workdir/cli/References/Linux/_out_bin/ivpn $installdir/usr/bin/ivpn
    install -Dm00644 $workdir/cli/References/Linux/_out_bin/ivpn.bash-completion $installdir/usr/share/bash-completion/completions/ivpn
    
    mkdir -p $installdir/usr/share/ivpn/bin
    cp -fr $workdir/ui/dist/linux-unpacked/* $installdir/usr/share/ivpn/bin
    
    install -Dm00644 "$workdir/ui/References/Linux/ui/ivpnicon.svg" "$installdir/usr/share/ivpn/ivpnicon.svg"
    install -Dm00644 $pkgfiles/IVPN.desktop $installdir/usr/share/ivpn/IVPN.desktop
    
    install -Dm00644 "$pkgfiles/IVPN.desktop" "$installdir/usr/share/applications/IVPN.desktop"
    install -Dm00644 "$workdir/ui/References/Linux/ui/ivpnicon.svg" "$installdir/usr/share/icons/hicolor/scalable/apps/ivpnicon.svg"
    
    install -Dm00644 $pkgfiles/ivpn.metainfo.xml $installdir/usr/share/metainfo/ivpn.metainfo.xml
    
    install -Dm00644 $pkgfiles/ivpn-service.service $installdir/%libdir%/systemd/system/ivpn-service.service
    
    install -Dm00644 $pkgfiles/ivpn.preset $installdir/%libdir%/systemd/system-preset/ivpn.preset
    
    %install_license LICENSE.md
