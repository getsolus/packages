name       : icestorm
version    : 20230218
release    : 1
source     :
    - git|https://github.com/YosysHQ/icestorm : d20a5e9001f46262bf0cef220f1a6943946e421d
homepage   : https://clifford.at/icestorm
license    : ISC
component  : office.scientific
summary    : A collection of tools and documentation for iCE40 FPGAs.
description: |
    Project IceStorm aims at documenting the bitstream format of Lattice iCE40 FPGAs and providing simple tools for analyzing and creating bitstream files. See https://clifford.at/icestorm for more information.
strip      : no
builddeps  :
    - pkgconfig(eigen3)
    - pkgconfig(libffi)
    - pkgconfig(libftdi1)
    - pkgconfig(python3)
    - pkgconfig(readline)
    - pkgconfig(tcl)
    - libboost-devel
    - graphviz
    - qt5-base
environment: |
    export PREFIX=/usr
build      : |
    %make 
install    : |
    %make_install
    install -dm00644 $installdir/usr/bin/
    install -dm00644 $installdir/usr/share/icebox
    install -Dm00644 $pkgfiles/53-lattice-ftdi.rules /$installdir/etc/udev/rules.d/53-lattice-ftdi.rules
