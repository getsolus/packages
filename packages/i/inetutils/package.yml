# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : inetutils
version    : '2.8'
release    : 17
source     :
    - https://mirror.ibcp.fr/pub/gnu/inetutils/inetutils-2.8.tar.gz : 57b3cf4f77555992881e5ba2a09a63b05aa2c56342a60ed4305b5f45938390b5
homepage   : https://www.gnu.org/software/inetutils
license    :
    - GPL-3.0-or-later
component  :
    - system.base
    - ^ifconfig : network.util
summary    :
    - A collection of common network programs
    - ^ifconfig : The deprecated ifconfig command
description:
    - A collection of common network programs
    - ^ifconfig : The deprecated ifconfig command.
optimize   :
    - lto
builddeps  :
    - help2man
environment: |
    # gcc 14
    export CFLAGS="${CFLAGS} -Wno-implicit-function-declaration"
setup      : |
    %configure --disable-logger \
               --disable-ping \
               --disable-ping6 \
               --disable-servers \
               --disable-whois
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
    install -Dm00644 COPYING ${installdir}/usr/share/licenses/ifconfig/COPYING

    # Cleanup
    rmdir -v $installdir/%libdir%/${package} \
             $installdir/%libdir%
    find $installdir -type d -empty -delete -print
patterns   :
    - ^ifconfig :
        - /usr/bin/ifconfig
        - /usr/share/licenses/ifconfig/COPYING
        - /usr/share/man/man1/ifconfig.1*
