# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : innoextract
version    : '1.9'
release    : 15
source     :
    - https://github.com/dscharrer/innoextract/releases/download/1.9/innoextract-1.9.tar.gz : 6344a69fc1ed847d4ed3e272e0da5998948c6b828cb7af39c6321aba6cf88126
homepage   : https://constexpr.org/innoextract/
license    : Zlib
component  : system.utils
summary    : A tool to unpack installers created by Inno Setup
description: |
    A tool to unpack installers created by Inno Setup
builddeps  :
    - pkgconfig(liblzma)
    - libboost-devel
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-CMake-Fix-build-with-Boost-1.89.0.patch
    %patch -p1 -i ${pkgfiles}/0002-cmake-Fix-warning-with-newer-cmake-versions.patch
    %patch -p1 -i ${pkgfiles}/0003-Fix-build-with-boost-1.85.patch

    %cmake_ninja \
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
