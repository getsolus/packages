# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : iso-codes
version    : 4.20.1
release    : 16
source     :
    - https://salsa.debian.org/iso-codes-team/iso-codes/-/archive/v4.20.1/iso-codes-v4.20.1.tar.gz : 2d7d9f6084ab9ce6c534ce71a3dd5144b6e474f3c97616459a88f73f44a64bff
license    : LGPL-2.1-only
component  : system.base
homepage   : https://salsa.debian.org/iso-codes-team/iso-codes
summary    : Central database of ISO codes
description: |
    The ISO Codes package contains a list of country, language and currency names and it is used as a central database for accessing this data.
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
patterns   :
    - /usr/share/pkgconfig
