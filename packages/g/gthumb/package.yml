# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gthumb
version    : 3.12.10
release    : 50
source     :
    - https://gitlab.gnome.org/GNOME/gthumb/-/archive/3.12.10/gthumb-3.12.10.tar.gz : 531522686e0a39e5620f53644dabe6a9296ce693e547d28e785f3ae26c46db69
homepage   : https://gitlab.gnome.org/GNOME/gthumb/
license    : GPL-2.0-or-later
component  : multimedia.graphics
summary    : Image viewer and browser utility
description: |
    gthumb is an application for viewing, editing, and organizing collections of images.
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(champlain-0.12)
    - pkgconfig(clutter-gtk-1.0)
    - pkgconfig(colord)
    - pkgconfig(exiv2)
    - pkgconfig(gsettings-desktop-schemas)
    - pkgconfig(gstreamer-plugins-base-1.0)
    - pkgconfig(libbrasero-media3)
    - pkgconfig(libheif)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(libraw)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libssh)
    - pkgconfig(libwebp)
    - desktop-file-utils
    - itstool
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
