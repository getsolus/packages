# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : git
version    : 2.54.0
release    : 143
source     :
    - https://www.kernel.org/pub/software/scm/git/git-2.54.0.tar.gz : 45e8107643a44e3ce46f5665beb35af3932fb0d70017687905ab5d4e3aafa8eb
homepage   : https://git-scm.com/
license    :
    - GPL-2.0-only
    - LGPL-2.1-or-later
component  : programming.tools
summary    : fast, scalable, distributed revision control system
description: |
    Git is a fast, scalable, distributed revision control system with an
    unusually rich command set that provides both high-level operations
    and full access to internals.
builddeps  :
    - pkgconfig(expat)
    - pkgconfig(gobject-2.0)
    - pkgconfig(libcurl)
    - pkgconfig(libpcre2-8)
    - pkgconfig(libsecret-1)
    - pkgconfig(libxcrypt)
    - pkgconfig(openssl)
    - pkgconfig(zlib)
    - asciidoc
    - perl-error
    - xmlto
rundeps    :
    - envsubst
    - perl-authen-sasl
    - perl-error
    - perl-io-socket-ssl
    - tk
environment: |
    MAKE_OPTS="INSTALL_SYMLINKS=1 NO_GITWEB=1"
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-t-test-lib.sh-Don-t-clobber-LD_PRELOAD-if-already-se.patch

    %reconfigure \
        --disable-static \
        --with-libpcre2
build      : |
    %make $MAKE_OPTS
    %make $MAKE_OPTS man
    %make $MAKE_OPTS -C contrib/subtree
    %make $MAKE_OPTS -C contrib/credential/libsecret
install    : |
    %make_install $MAKE_OPTS install-man
    %make_install $MAKE_OPTS -C contrib/subtree
    %install_license COPYING

    # Completions
    install -Dm00644 contrib/completion/git-completion.bash ${installdir}/usr/share/bash-completion/completions/git
    install -Dm00644 contrib/completion/git-prompt.sh ${installdir}/%libdir%/git/git-core/git-sh-prompt
    install -Dm00644 contrib/completion/git-completion.zsh ${installdir}/usr/share/zsh/site-functions/_git

    # Credential helper
    install -Dm00755 contrib/credential/libsecret/git-credential-libsecret ${installdir}/%libdir%/git/git-core/git-credential-libsecret

    # git-archive-all, used in most Solus tarball generation scripts
    install -Dm00755 $pkgfiles/git-archive-all ${installdir}/usr/bin/git-archive-all
# A couple of tests fail with new gettext,
# and skipping doesn't seem to work.
# check      : |
#     # These tests failed on the server
#     GIT_SKIP_TESTS="t5562.9 t5562.16 t1301 t5324.29"
#     # These tests fail with gettext 1.0
#     ${GIT_SKIP_TESTS}+=" t0213.9 t0213.13"
#     export GIT_SKIP_TESTS
#
#     %make test
patterns   :
    - /usr/share/man
