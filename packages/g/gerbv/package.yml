# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gerbv
version    : 2.11.1
release    : 10
source     :
    - git|https://github.com/gerbv/gerbv.git : v2.11.1
homepage   : https://gerbv.github.io/
license    : GPL-2.0-or-later
summary    :
    - A Free/Open Source Gerber Viewer
    - examples : Example Gerber files and sample projects for gerbv
component  : office.scientific
description: |
    This is a maintained fork of gerbv, carrying mostly bugfixes. Gerbv is a viewer for Gerber RS-274X files, Excellon drill files, and CSV pick-and-place files.
builddeps  :
    - pkgconfig(gtk+-2.0)
    - gettext-devel
rundeps    :
    - examples : gerbv
environment: |
    export CFLAGS="${CFLAGS} -D_GNU_SOURCE"
    export CXXFLAGS="${CXXFLAGS} -D_GNU_SOURCE"
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
patterns   :
    - examples :
        - /usr/share/doc/gerbv
