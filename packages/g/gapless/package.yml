# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gapless
version    : 4.6.2
release    : 23
source     :
    - https://gitlab.gnome.org/neithern/g4music/-/archive/v4.6.2/g4music-v4.6.2.tar.gz : d2ce998df5c5c5ee08997298755f8b149dd33a254e6d1a9ec23ed41139b23747
homepage   : https://gitlab.gnome.org/neithern/g4music
license    : GPL-3.0-or-later
component  : multimedia.audio
summary    : Play your music elegantly
description: |
    Gapless (AKA: G4Music) is a lightweight music player written in GTK4, with a beautiful and adaptive user interface, focuses on high performance for large music collection.
builddeps  :
    - pkgconfig(gstreamer-tag-1.0)
    - pkgconfig(libadwaita-1)
    - desktop-file-utils
    - vala
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
replaces   :
    - g4music
    - dbginfo : g4music-dbginfo
