# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnupg
version    : 2.5.21
release    : 52
source     :
    - https://gnupg.org/ftp/gcrypt/gnupg/gnupg-2.5.21.tar.bz2 : e3af2c8caa46a66a9329fa7c6880af260451914d819595beabc2c26597b31352
license    : GPL-3.0-or-later
homepage   : https://www.gnupg.org
summary    : Complete and free implementation of OpenPGP
component  : security
description: |
    GnuPG is a complete and free implementation of OpenPGP standard as defined by RFC4880. It allows encryption and signing of data and communications, a key management system, and access modules for public key directories.
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(gnutls)
    - pkgconfig(gpg-error)
    - pkgconfig(ksba)
    - pkgconfig(libassuan)
    - pkgconfig(libgcrypt)
    - pkgconfig(sqlite3)
    - npth-devel
    - pinentry
rundeps    :
    - pinentry
setup      : |
    %configure \
               --enable-symcryptrun \
               --enable-gpgtar \
               --enable-all-tests
build      : |
    %make
install    : |
    %make_install DESTDIR=$installdir
    %install_license COPYING*
    ln -s /usr/bin/gpg $installdir/usr/bin/gpg2
check      : |
    # If tests last too long, you can remove --enable-all-tests
    %make check
