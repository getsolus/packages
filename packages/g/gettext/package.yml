# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gettext
version    : '1.0'
release    : 23
source     :
    - https://ftp.gnu.org/pub/gnu/gettext/gettext-1.0.tar.gz : 85d99b79c981a404874c02e0342176cf75c7698e2b51fe41031cf6526d974f1a
homepage   : https://www.gnu.org/software/gettext
license    : GPL-3.0-or-later
component  :
    - devel : system.devel
    - docs : programming.docs
    - ^envsubst : system.base
    - libs : system.base
    - ^libtextstyle : system.base
    - ^libtextstyle-devel : system.devel
    - system.base
summary    :
    - docs : Documentation for gettext
    - ^envsubst : Substitutes the values of environment variables
    - libs : Library files for gettext
    - ^libtextstyle : Text styling library
    - ^libtextstyle-devel : Development files for libtextstyle
    - Localisation support for programs
description:
    - docs : Documentation for gettext
    - ^envsubst : Substitutes the values of environment variables
    - libs : Library files for gettext
    - ^libtextstyle : Text styling library
    - ^libtextstyle-devel : Development files for libtextstyle
    - The Gettext package contains utilities for internationalization and localization. These allow programs to be compiled with NLS (Native Language Support), enabling them to output messages in the user's native language.
autodep    : false # Prevent circular dependencies with stuff
builddeps  :
    - pkgconfig(libxml-2.0)
    - pkgconfig(ncursesw)
    - libunistring-devel
rundeps    :
    - ^libtextstyle-devel :
        - libtextstyle
    - devel :
        - gettext
        - gettext-libs
        - libtextstyle-devel
    - envsubst
    - gettext-libs
    - libtextstyle
setup      : |
    %configure \
        --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING

    # Clean up examples which aren't particularly helpful
    rm -rf ${installdir}/usr/share/doc/gettext/examples
check      : |
    %make check
patterns   :
    - libs :
        - /usr/lib64/libasprintf.so.0*
        - /usr/lib64/libgettextpo.so.0*
        - /usr/lib64/libgettextlib-*.*.so
        - /usr/lib64/libgettextsrc-*.*.so
    - devel :
        - /usr/bin/autopoint
        - /usr/bin/gettextize
        - /usr/lib/preloadable_libintl.so
        - /usr/share/gettext/config.rpath
        - /usr/share/gettext/*.h
        - /usr/share/gettext/msgunfmt*
        - /usr/share/gettext/m4
        - /usr/share/gettext/projects
        - /usr/share/gettext/javaversion.class
        - /usr/share/info/autosprintf*
        - /usr/share/man/man1/autopoint*
        - /usr/share/man/man1/gettextize*
    - docs :
        - /usr/share/doc/*
    - ^envsubst :
        - /usr/bin/envsubst
        - /usr/share/man/man1/envsubst*
    - ^libtextstyle :
        - /usr/lib64/libtextstyle.so.*
    - ^libtextstyle-devel :
        - /usr/include/textstyle.h
        - /usr/include/textstyle/
        - /usr/lib64/libtextstyle.so
        - /usr/share/info/libtextstyle*
        - /usr/share/doc/libtextstyle
