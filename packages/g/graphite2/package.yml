# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : graphite2
version    : 1.3.15
release    : 9
source     :
    - https://github.com/silnrsi/graphite/releases/download/1.3.15/graphite2-1.3.15.tgz : c6bc8b4252724665297f7cad0c55897285c673f9b8e6db3522ace833593fe0b1
homepage   : https://graphite.sil.org/
license    : LGPL-2.1-or-later
component  : xorg.fonts
summary    : Rendering engine for graphite fonts
description: |
    Rendering engine for graphite fonts
builddeps  :
    - pkgconfig32(freetype2)
emul32     : true
setup      : |
    %cmake . -DLIB_SUFFIX=%LIBSUFFIX% \
        -DGRAPHITE2_COMPARE_RENDERER=OFF \
        -DCMAKE_C_FLAGS:STRING="${CFLAGS}"
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
