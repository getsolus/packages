# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : glances
version    : 4.5.4
release    : 61
source     :
    - https://github.com/nicolargo/glances/archive/refs/tags/v4.5.4.tar.gz : a4f421c608d6c40e926c0256f915f0e820d92e5837e6b5a9eea582cf9b241c4a
homepage   : https://nicolargo.github.io/glances/
license    : LGPL-3.0-or-later
component  : system.utils
summary    : Glances is a cross-platform system monitoring tool written in Python
description: |
    Glances is a cross-platform monitoring tool which aims to present a large amount of monitoring information through a curses or Web based interface. The information dynamically adapts depending on the size of the user interface.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - python-bottle
    - python-defusedxml
    - python-future
    - python-jinja
    - python-orjson
    - python-packaging
    - python-psutil
    - python-pydantic  # optional
    - python-shtab
setup      : |
    %patch -p1 -i $pkgfiles/no-check-update.patch
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license COPYING
    rm -rf $installdir/usr/share/doc/glances/{AUTHORS,CONTRIBUTING.md,COPYING,NEWS.rst,README.rst}
