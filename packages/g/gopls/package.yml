# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gopls
version    : 0.22.0
release    : 10
source     :
    - https://github.com/golang/tools/archive/refs/tags/gopls/v0.22.0.tar.gz : 249dc0c4b9f3e853f6a7fb6f3528db2f48793e7c54323f3b32aa38f6432f088a
homepage   : https://pkg.go.dev/golang.org/x/tools/gopls
license    : BSD-3-Clause
component  : programming.tools
summary    : Go language server (LSP)
description: |
    gopls (pronounced "Go please") is the official Go language server developed by the Go team. It provides IDE features to any LSP-compatible editor.
networking : true
builddeps  :
    - golang
environment: |
    export CGO_CPPFLAGS="${CPPFLAGS}"
    export CGO_CFLAGS="${CFLAGS}"
    export CGO_CXXFLAGS="${CXXFLAGS}"
    export CGO_LDFLAGS="${LDFLAGS}"
    export GOFLAGS="-buildmode=pie -trimpath -ldflags=-linkmode=external -mod=readonly -modcacherw"
    cd gopls
build      : |
    go build -o gopls -ldflags="-X 'main.version=v%version%'"
install    : |
    install -Dm00755 gopls -t $installdir/usr/bin/
    %install_license ../LICENSE ../PATENTS
