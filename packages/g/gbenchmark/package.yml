# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gbenchmark
version    : 1.9.5
release    : 5
source     :
    - https://github.com/google/benchmark/archive/v1.9.5/benchmark-v1.9.5.tar.gz : 9631341c82bac4a288bef951f8b26b41f69021794184ece969f8473977eaa340
homepage   : https://github.com/google/benchmark
license    : Apache-2.0
component  : programming.library
summary    : A microbenchmark support library
description: |
    A library that benchmarks code snippets, similar to unit tests.
setup      : |
    %cmake_ninja -DBUILD_SHARED_LIBS=ON \
                 -DBENCHMARK_ENABLE_LTO=ON \
                 -DBENCHMARK_ENABLE_GTEST_TESTS=OFF \
                 -DBENCHMARK_INSTALL_DOCS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
