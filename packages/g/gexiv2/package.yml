# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gexiv2
version    : 0.16.1
release    : 28
source     :
    - https://download.gnome.org/sources/gexiv2/0.16/gexiv2-0.16.1.tar.xz : 18e9a05c637a77e800b001d87f70e4d02a7ba41b7745400a314a1072a1ddc943
homepage   : https://gitlab.gnome.org/GNOME/gexiv2
license    : GPL-2.0-or-later
component  : desktop.library
summary    : GObject wrapper around libexiv2
description: |
    gexiv2 is a GObject wrapper around the Exiv2 photo metadata library. It allows for GNOME applications to easily inspect and update EXIF, IPTC, and XMP metadata in photo and video files of various formats.
builddeps  :
    - pkgconfig(exiv2)
    - pkgconfig(gtk-doc)
    - pkgconfig(pygobject-3.0)
    - python-setuptools
    - vala
setup      : |
    %meson_configure -Dpython3=false
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
