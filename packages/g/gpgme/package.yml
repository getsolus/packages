# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gpgme
version    : 2.0.1
release    : 34
source     :
    - https://gnupg.org/ftp/gcrypt/gpgme/gpgme-2.0.1.tar.bz2 : 821ab0695c842eab51752a81980c92b0410c7eadd04103f791d5d2a526784966
homepage   : https://gnupg.org/software/gpgme/index.html
license    :
    - GPL-3.0-or-later
    - LGPL-2.1-or-later
    - MIT
component  : security
summary    : Language library in C for cryptography support
description: |
    GPGME (GnuPG Made Easy) is a C language library that allows to add support for cryptography to a program. It is designed to make access to public key crypto engines like GnuPG or GpgSM easier for applications. GPGME provides a high-level crypto API for encryption, decryption, signing, signature verification and key management.
builddeps  :
    - pkgconfig(gpg-error)
    - pkgconfig(libassuan)
    - gnupg
rundeps    :
    - gnupg
setup      : |
    export LDFLAGS="${LDFLAGS} -lassuan"

    %configure \
        --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING* LICENSES

    # Not sure why these are ending up in the build
    rm -rfv ${installdir}/usr/share/common-lisp/
check      : |
    %make check
