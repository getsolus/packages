# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : graphicsmagick
version    : 1.3.47
release    : 30
source     :
    - https://sourceforge.net/projects/graphicsmagick/files/graphicsmagick/1.3.47/GraphicsMagick-1.3.47.tar.xz : 95fb682dab0206a9db168d065963f4ffdf5a60b0b2a375aca1f4492fb18d0627
homepage   : https://graphicsmagick.sourceforge.io/index.html
license    :
    - BSD-2-Clause
    - MIT
component  : multimedia.graphics
summary    : GraphicsMagick provides a set of commandline tools and programming APIs for manipulating, editing, and converting raster and vector images.
description: |
    GraphicsMagick provides a set of commandline tools and programming APIs for manipulating, editing, and converting raster and vector images. It is derived from ImageMagick, with the objective of providing better stability and performance than ImageMagick.
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(freetype2)
    - pkgconfig(lcms2)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libwebp)
    - pkgconfig(x11)
lastrip    : false
setup      : |
    %reconfigure --disable-static \
                 --enable-shared=yes \
                 --with-modules \
                 --with-quantum-depth=16
build      : |
    %make
install    : |
    %make_install
