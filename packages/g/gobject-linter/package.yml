# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gobject-linter
version    : 0.1.2
release    : 1
source     :
    - https://github.com/bilelmoussaoui/gobject-linter/archive/refs/tags/0.1.2.tar.gz : 7a80bac2eda8c4b7bcb852853e46e7812b1fb10dcf37e4d774f6c19d390557c4
homepage   : https://bilelmoussaoui.github.io/gobject-linter
license    : MIT
component  : programming.tools
summary    : A fast tree-sitter-based linter for GObject/C code
description: |
    A fast tree-sitter-based linter for GObject/C code.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build \
        --bin gobject-linter \
        --bin gobject-linter-lsp \
        --features lsp
install    : |
    %cargo_install gobject-linter gobject-linter-lsp
    %install_license LICENSE
check      : |
    %cargo_test
