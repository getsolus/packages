# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gramps
version    : 6.0.6
release    : 30
source     :
    - https://github.com/gramps-project/gramps/archive/refs/tags/v6.0.6.tar.gz : a1812a9b02e69dc49a9cdbc1b628f0af6c34115f5134d66f02e36f3fe75b2b77
homepage   : https://gramps-project.org
license    : GPL-2.0-or-later
component  : office.scientific
summary    : Gramps genealogical research software
description: |
    Gramps is a free software project and community. We strive to produce a genealogy program that is both intuitive for hobbyists and feature-complete for professional genealogists. It is a community project, created, developed and governed by genealogists.
builddeps  :
    - pkgconfig(gexiv2)
    - pkgconfig(gtkspell3-3.0)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(python3)
    - python-setuptools
rundeps    :
    - gexiv2-0.14
    - goocanvas
    - graphviz
    - osm-gps-map
    - pyicu
    - python-bsddb3
    - python-gobject
    - python-orjson
    - python-pillow
    - pyxdg
build      : |
    %python3_setup
install    : |
    %python3_install
