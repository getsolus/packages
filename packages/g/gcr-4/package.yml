name       : gcr-4
version    : 4.2.1
release    : 7
source     :
    - https://download.gnome.org/sources/gcr/4.2/gcr-4.2.1.tar.xz : ed783b5c80373cd058c02ea9e3e2a64e558599ca190a5abd598122e479967de5
homepage   : https://gitlab.gnome.org/GNOME/gcr
license    : GPL-3.0-or-later
component  : desktop.gnome.core
summary    : The Gcr package contains libraries used for displaying certificates and accessing key stores. It also provides the viewer for crypto files on the GNOME Desktop.
description: |
    The Gcr package contains libraries used for displaying certificates and accessing key stores. It also provides the viewer for crypto files on the GNOME Desktop.
builddeps  :
    - pkgconfig(gtk4)
    - pkgconfig(libgcrypt)
    - pkgconfig(libsecret-1)
    - pkgconfig(p11-kit-1)
    - gnupg
    - openssh
    - vala
setup      : |
    %meson_configure -Dgtk_doc=false
build      : |
    %ninja_build
install    : |
    %ninja_install
