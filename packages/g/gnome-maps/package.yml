# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnome-maps
version    : '50.2'
release    : 74
source     :
    - https://download.gnome.org/sources/gnome-maps/50/gnome-maps-50.2.tar.xz : 28a4467d1ec9fe38eb7f862674c199e884086e25e4c0b0d80eb504568202cebf
homepage   : https://apps.gnome.org/Maps/
license    : GPL-2.0-or-later
component  : office
summary    : Find places around the world
description: |
    Maps gives you quick access to maps all across the world. It allows you to quickly find the place you’re looking for by searching for a city or street, or locate a place to meet a friend. Maps uses the collaborative OpenStreetMap database, made by hundreds of thousands of people across the globe.
builddeps  :
    - pkgconfig(geoclue-2.0)
    - pkgconfig(gjs-1.0)
    - pkgconfig(gweather4)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libportal)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(rest-1.0)
    - pkgconfig(shumate-1.0)
    - blueprint-compiler
    - desktop-file-utils
rundeps    :
    - geoclue
    - gjs
    - libgeocode-glib2
    - libgweather
    - librest
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
