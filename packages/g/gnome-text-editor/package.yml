name       : gnome-text-editor
version    : '46.0'
release    : 5
source     :
    - https://download.gnome.org/sources/gnome-text-editor/46/gnome-text-editor-46.0.tar.xz : c018d0b3792c044c1558d1d0dd92b09fb0a96c9e2d25e1ae1f4cf91f7eab4614
homepage   : https://apps.gnome.org/TextEditor/
license    : GPL-3.0-or-later
