# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gource
version    : '0.56'
release    : 24
source     :
    - https://github.com/acaudwell/Gource/releases/download/gource-0.56/gource-0.56.tar.gz : 332d89b9a979b17417fbce0edd72b19914f1409fd126a13d11787d0e15dc0d79
homepage   : https://gource.io/
license    : GPL-3.0-or-later
component  : programming.tools
summary    : Software version control visualization
description: |
    OpenGL-based 3D visualisation tool for source control repositories.
builddeps  :
    - pkgconfig(SDL2_image)
    - pkgconfig(freetype2)
    - pkgconfig(glew)
    - pkgconfig(glm)
    - pkgconfig(libpcre)
    - pkgconfig(tinyxml)
    - pkgconfig(x11)
    - libboost-devel
rundeps    :
    - font-freefont-ttf
setup      : |
    %configure \
        --enable-ttf-font-dir=/usr/share/fonts/truetype/freefont/ \
        --with-tinyxml
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
