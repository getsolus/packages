# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gpgmeqt
version    : 2.0.0
release    : 1
source     :
    - https://github.com/gpg/gpgmeqt/archive/refs/tags/gpgmeqt-2.0.0.tar.gz : 307572eaf3fe977a6ba28ff41d6573d97de6f008244e787038ffe5ca6b2222da
homepage   : https://gnupg.org/software/gpgme/index.html
license    : GPL-2.0-or-later
component  :
    - qt6 : security
    - qt6-devel : programming.devel
    - security
summary    :
    - qt6 : Qt6 bindings for gpgme
    - qt6-devel : Development files for gpgmeqt-qt6
    - Qt bindings for gpgme
description: |
    GPGME (GnuPG Made Easy) is a C language library that allows to add support for cryptography to a program. It is designed to make access to public key crypto engines like GnuPG or GpgSM easier for applications. GPGME provides a high-level crypto API for encryption, decryption, signing, signature verification and key management.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(gpgmepp)
rundeps    :
    - qt6-devel :
        - gpgmepp-devel
        - gpgmeqt-qt6
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install

    for i in 6; do
        install -Dm00644 COPYING -t ${installdir}/usr/share/licenses/${package}-qt${i}/
    done
patterns   :
    - qt6 :
        - /usr/lib64/libqgpgmeqt6.so.*
        - /usr/share/licenses/gpgmeqt-qt6/
    - qt6-devel :
        - /usr/include/qgpgme-qt6/
        - /usr/lib64/cmake/QGpgmeQt6/
        - /usr/lib64/libqgpgmeqt6.so
replaces :
    - qt6 :
        - gpgme-qt6
