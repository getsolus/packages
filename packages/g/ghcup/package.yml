# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ghcup
version    : 0.2.3.0
release    : 5
source     :
    - https://github.com/haskell/ghcup-hs/archive/refs/tags/v0.2.3.0.tar.gz : b037c2c6de805bca16694492a5eb40aa87368badd62d092605aa2b029b5803bb
homepage   : https://www.haskell.org/ghcup/
license    : LGPL-3.0-only
component  : programming.haskell
summary    : GHCup is the main installer for the general purpose language Haskell.
description: |
    GHCup is the main installer for the general purpose language Haskell.
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(gmp)
    - ghc
    - haskell-cabal-install
networking : true
rundeps    :
    - libffi-devel
    - ncurses-devel
setup      : |
    %cabal_configure -f+tar -f+tui --enable-tests
build      : |
    cabal build %JOBS%
install    : |
    mkdir -p $installdir/usr/bin
    cabal install --installdir=$installdir/usr/bin --install-method=copy exe:ghcup
    %install_license LICENSE
