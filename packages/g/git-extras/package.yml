# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : git-extras
version    : 7.5.0
release    : 15
source     :
    - https://github.com/tj/git-extras/archive/refs/tags/7.5.0.tar.gz : bcfe0eabdccc806e53a10130fed6fb02373720ddeb670eecc5cc84d041d79880
homepage   : https://github.com/tj/git-extras
license    : MIT
component  : programming.tools
summary    : Little git extras.
description: |
    Little git extras.
builddeps  :
    - git
rundeps    :
    - git
install    : |
    %make_install PREFIX=/usr
    %install_license LICENSE

    install -Dm0644 etc/git-extras.fish $installdir/usr/share/fish/vendor_conf.d/git-extras.fish
    install -Dm0644 etc/git-extras-completion.zsh $installdir/usr/share/git-extras/site-functions/_git-extras
