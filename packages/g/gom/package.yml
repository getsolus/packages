# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gom
version    : 0.5.6
release    : 17
source     :
    - https://download.gnome.org/sources/gom/0.5/gom-0.5.6.tar.xz : 4d7a5e268698c8e7e40603e36e9e3a2b76133931ce1b637c1136301491b54cc3
homepage   : https://gitlab.gnome.org/GNOME/gom
license    : LGPL-2.1-or-later
component  : desktop.gnome.core
summary    : GObject Data Mapper
description: |
    Gom provides an object mapper from GObjects to SQLite. It helps you write applications that need to store structured data as well as make complex queries upon that data.
builddeps  :
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(sqlite3)
    - python-setuptools
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
