# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gaupol
version    : '1.16'
release    : 27
source     :
    - https://github.com/otsaloma/gaupol/archive/refs/tags/1.16.tar.gz : ea45025d8de5f5a089d4626085a4f1ed7d7e021462a30aa777728e32327d71ca
license    : GPL-3.0-or-later
homepage   : https://otsaloma.io/gaupol/
component  : multimedia.video
summary    : Editor for text-based subtitle files.
description: |
    Gaupol is an editor for text-based subtitle files. It supports multiple subtitle file formats and provides means of creating, editing and translating subtitles and timing subtitles to match video.
builddeps  :
    - pkgconfig(python3)
    - python-setuptools
rundeps    :
    - gspell
    - gstreamer-plugins-bad
    - gstreamer-plugins-good
    - iso-codes
    - python-charset-normalizer
    - python-gobject
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license COPYING
