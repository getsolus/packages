# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gssdp
version    : 1.6.5
release    : 24
source     :
    - https://download.gnome.org/sources/gssdp/1.6/gssdp-1.6.5.tar.xz : 34fd824c36ef9f575594d5572728412ddb8c522f606b6c913ef8b5a800aafc4e
homepage   : https://gitlab.gnome.org/GNOME/gssdp
license    : LGPL-2.0-only
component  : network.util
summary    : A GObject-based API for handling resource discovery and announcement over SSDP.
description: |
    A GObject-based API for handling resource discovery and announcement over SSDP.
builddeps  :
    - pkgconfig(gi-docgen)
    - pkgconfig(gtk4)
    - pkgconfig(libsoup-3.0)
    - pandoc
    - vala
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
# Horiffic workaround otherwise we'd have a cyclic dependency which eopkg can't handle yet
autodep    : false
