# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gcovr
version    : '8.6'
release    : 10
source     :
    - https://github.com/gcovr/gcovr/archive/refs/tags/8.6.tar.gz : d8fa0bb17df5cbb2d95df95aad8abf5f48885f2b5820e97a3584273789613321
homepage   : https://gcovr.com/
license    : BSD-3-Clause
component  : programming.tools
summary    : Management tool for GNU gcov
description: |
    Gcovr provides a utility for managing the use of the GNU gcov utility and generating summarized code coverage results.
rundeps    :
    - pygments
    - python-colorlog
    - python-jinja
    - python-lxml
builddeps  :
    - python-build
    - python-hatch-fancy-pypi-readme
    - python-hatch-vcs
    - python-hatchling
    - python-installer
setup      : |
    # Remove upstream's strict version pins
    sed -i -E 's/==[0-9.]+//g' pyproject.toml
build      : |
    # Provide the version explicitly
    export SETUPTOOLS_SCM_PRETEND_VERSION="$version"
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE.txt
