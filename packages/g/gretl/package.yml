# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gretl
version    : 2026b
release    : 23
source     :
    - https://sourceforge.net/projects/gretl/files/gretl-2026b.tar.xz : fb57f4922da546067c8be542aafc5a26be77faf2668b40e651ee8c90b702563d
homepage   : https://gretl.sourceforge.net/
license    : GPL-3.0-or-later
component  : office.maths
summary    : GNU regression, econometrics and time-series library
description: |
    Gretl (GNU regression, econometrics and time-series library) comprises libgretl, a shared library which provides various functions relating to econometric estimation, a command-line client program and a gui client, using GTK+.
builddeps  :
    - pkgconfig(fftw3)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gtksourceview-3.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(lapack)
    - pkgconfig(libR)
    - pkgconfig(libcurl)
    - gnuplot
rundeps    :
    - gnuplot
setup      : |
    %configure --disable-avx
build      : |
    %make
install    : |
    %make_install -j1
    %install_license COPYING
