name       : gnome-nibbles
version    : 4.0.3
release    : 14
source     :
    - https://download.gnome.org/sources/gnome-nibbles/4.0/gnome-nibbles-4.0.3.tar.xz : bf08538b25b445fb92a60099f7294f66fd32b1c021a4f48a389021e17bcb1f3b
homepage   : https://wiki.gnome.org/Apps/Nibbles
license    : GPL-3.0-or-later
component  : games.arcade
summary    : Guide a worm around a maze
description: |
    Nibbles is a Snake game for GNOME. The aim of the game is to swallow as many objects as you can while avoiding maze walls and other worms. You have to complete 26 levels to finish the game.
builddeps  :
    - pkgconfig(appstream-glib)
    - pkgconfig(clutter-gtk-1.0)
    - pkgconfig(gee-0.8)
    - pkgconfig(gsound)
    - pkgconfig(libgnome-games-support-2)
    - desktop-file-utils
    - itstool
    - vala
    - yelp-tools
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
