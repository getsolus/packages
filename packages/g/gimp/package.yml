# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gimp
version    : 3.2.4
release    : 93
source     :
    - https://download.gimp.org/gimp/v3.2/gimp-3.2.4.tar.xz : 7312bc53e9c6d2d0056ca7b93f1c6b98707946dd934f714c21b8746ecb601588
license    : GPL-3.0-or-later
component  : multimedia.graphics
homepage   : https://www.gimp.org/
summary    : GNU Image Manipulation Program
description: |
    GIMP is a mature image editor with many advanced features and plugin support.
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(alsa)
    - pkgconfig(appstream)
    - pkgconfig(bzip2)
    - pkgconfig(cfitsio)
    - pkgconfig(dbus-glib-1)
    - pkgconfig(gegl-0.4)
    - pkgconfig(gexiv2)
    - pkgconfig(gjs-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(lcms2)
    - pkgconfig(libarchive)
    - pkgconfig(libcurl)
    - pkgconfig(libexif)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(libmypaint)
    - pkgconfig(libopenjp2)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libwebp)
    - pkgconfig(mypaint-brushes-2.0)
    - pkgconfig(poppler)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(xmu)
    - pkgconfig(xpm)
    - aalib-devel
    - ghostscript-devel
    - gi-docgen
    - glib-networking
    - poppler-utils
rundeps    :
    - mypaint-brushes
    - python-gobject
    - xdg-utils
environment: |
    export CFLAGS+=" -Wno-implicit-function-declaration -Wno-int-conversion"
setup      : |
    %patch -p1 -i ${pkgfiles}/girepository-2.0.patch

    %meson_configure \
        -Dcheck-update=no \
        -Dbug-report-url='https://github.com/getsolus/packages/issues'
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING LICENSE
