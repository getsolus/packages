# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gumbo-parser
version    : 0.13.2
release    : 3
source     :
    - https://codeberg.org/gumbo-parser/gumbo-parser/archive/0.13.2.tar.gz : dbdc159dc8e5c6f3f254e50bce689dd9e439064ff06c165d5653410a5714ab66
homepage   : https://codeberg.org/gumbo-parser/gumbo-parser
license    : Apache-2.0
component  : programming.library
summary    : An HTML5 parsing library in pure C99
description: |
    Gumbo is an implementation of the HTML5 parsing algorithm implemented as a pure C99 library with no outside dependencies.
setup      : |
    %reconfigure --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license doc/COPYING
