# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : openxr
version    : 1.1.57
release    : 6
source     :
    - https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-1.1.57/OpenXR-SDK-Source-release-1.1.57.tar.gz : 26ae052eda904af41a483492a48fc0671d468c39410a80cc96caabf3e5e86986
homepage   : https://www.khronos.org/openxr/
license    : Apache-2.0
component  : multimedia.library
summary    : An open standard for virtual reality and augmented reality platforms and devices
description: |
    An open standard for virtual reality and augmented reality platforms and devices
builddeps  :
    - pkgconfig(jsoncpp)
    - pkgconfig(libglvnd)
    - pkgconfig(vulkan)
    - pkgconfig(x11)
    - pkgconfig(xrandr)
    - pkgconfig(xxf86vm)
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
