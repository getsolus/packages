# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : openxr
version    : 1.1.60
release    : 7
source     :
    - https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-1.1.60/OpenXR-SDK-Source-release-1.1.60.tar.gz : 89105178608351340325177b9d54922cf38db2c0bbf5e13e9b0dc88e9e49f397
homepage   : https://www.khronos.org/openxr/
license    : Apache-2.0
component  : multimedia.library
summary    : An open standard for virtual reality and augmented reality platforms and devices
description: |
    An open standard for virtual reality and augmented reality platforms and devices
builddeps  :
    - pkgconfig(jsoncpp)
    - pkgconfig(libglvnd)
    - pkgconfig(vulkan)
    - pkgconfig(x11)
    - pkgconfig(xrandr)
    - pkgconfig(xxf86vm)
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
