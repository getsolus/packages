# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : oxygen-icons
version    : 6.28.0
release    : 3
source     :
    - https://download.kde.org/stable/frameworks/6.28/oxygen-icons-6.28.0.tar.xz : d1dec052a8a02fcda4e584ba060ca4ac9e7b0433f259b4a2d32c5098d22fb614
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-3.0-or-later
component  : desktop.theme
summary    : Oxygen icon theme
description: |
    Oxygen Icons is a freedesktop.org compatible icon theme originally developed for the KDE Plasma desktop environment in combination with the Oxygen Style
builddeps  :
    - pkgconfig(Qt6Core)
    - extra-cmake-modules
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
