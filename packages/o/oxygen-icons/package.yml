# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : oxygen-icons
version    : 6.27.0
release    : 1
source     :
    - https://download.kde.org/stable/frameworks/6.27/oxygen-icons-6.27.0.tar.xz : f36a0884e6b9e554721c0f8cbd40c20ed4ff1a1b7d7e293c67d3d11d0b72cf9a
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-3.0-or-later
component  : desktop.theme
summary    : Oxygen icon theme
description: |
    Oxygen Icons is a freedesktop.org compatible icon theme originally developed for the KDE Plasma desktop environment in combination with the Oxygen Style
builddeps  :
    - pkgconfig(Qt6Core)
    - extra-cmake-modules
setup      : |
    %cmake_kf6
build      : |
    %ninja_install
install    : |
    %ninja_install
    %install_license LICENSES/*
