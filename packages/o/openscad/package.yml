# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : openscad
version    : '20260621'
release    : 25
source     :
    - git|https://github.com/openscad/openscad.git : fb3d125fc17debb48080cd3551e944fcb8d97701 # 2026-06-21
homepage   : https://openscad.org/
license    : GPL-2.0-or-later
component  : multimedia.graphics
summary    : OpenSCAD is a software for creating solid 3D CAD objects
description: |
    OpenSCAD is a software for creating solid 3D CAD objects. Unlike most free software for creating 3D models (such as the famous application Blender) it does not focus on the artistic aspects of 3D modeling but instead on the CAD aspects. Thus it might be the application you are looking for when you are planning to create 3D models of machine parts but pretty sure is not what you are looking for when you are more interested in creating computer-animated movies.
clang      : true
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(cairo)
    - pkgconfig(eigen3)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(glew)
    - pkgconfig(glib-2.0)
    - pkgconfig(harfbuzz)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libzip)
    - pkgconfig(openssl)
    - pkgconfig(tbb)
    - pkgconfig(x11)
    - CGAL-devel
    - bison
    - double-conversion-devel
    - flex
    - git
    - libboost-devel
    - opencsg-devel
    - qscintilla-devel
setup      : |
    # CGAL 5.6 expects boost::mpl::if_c without including the defining header.
    export CXXFLAGS="${CXXFLAGS} -include boost/mpl/if.hpp"

    %cmake_ninja \
        -DCMAKE_REQUIRE_FIND_PACKAGE_Lib3MF=OFF \
        -DENABLE_TESTS=OFF \
        -DUSE_MIMALLOC=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
