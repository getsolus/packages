# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : opencv
version    : 4.13.0
release    : 44
source     :
    - https://github.com/opencv/opencv/archive/refs/tags/4.13.0.tar.gz : 1d40ca017ea51c533cf9fd5cbde5b5fe7ae248291ddf2af99d4c17cf8e13017d
    - https://github.com/opencv/opencv_contrib/archive/4.13.0/opencv_contrib-4.13.0.tar.gz : 1e0077a4fd2960a7d2f4c9e49d6ba7bb891cac2d1be36d7e8e47aa97a9d1039b
homepage   : https://opencv.org
license    : Apache-2.0
component  : programming.library
summary    : OpenCV is an open source computer vision and machine learning software library
description: |
    OpenCV (Open Source Computer Vision Library) is an open source computer vision and machine learning software library.
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(freetype2)
    - pkgconfig(gflags)
    - pkgconfig(gstreamer-plugins-base-1.0)
    - pkgconfig(harfbuzz)
    - pkgconfig(hdf5)
    - pkgconfig(lapack)
    - pkgconfig(libavcodec)
    - pkgconfig(libavif)
    - pkgconfig(libglog)
    - pkgconfig(libopenjp2)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libv4l2)
    - pkgconfig(libva)
    - pkgconfig(libwebp)
    - pkgconfig(openblas)
    - pkgconfig(protobuf)
    - pkgconfig(python3)
    - numpy
    - vulkan-headers
rundeps    :
    - ^python-opencv :
        - numpy
    - devel :
        - opencv-bgsegm
        - opencv-calib3d
        - opencv-core
        - opencv-dnn
        - opencv-features2d
        - opencv-flann
        - opencv-highgui
        - opencv-imgcodecs
        - opencv-imgproc
        - opencv-ml
        - opencv-objdetect
        - opencv-optflow
        - opencv-photo
        - opencv-plot
        - opencv-stitching
        - opencv-tracking
        - opencv-video
        - opencv-videoio
        - opencv-ximgproc
        - qt6-base-devel
clang      : true
setup      : |
    tar xf ${sources}/opencv_contrib-*.tar.gz
    mv opencv_contrib* contrib

    # Don't require all VTK optdepends
    %patch -p1 -i ${pkgfiles}/vtk9.patch

    %patch -p1 -i ${pkgfiles}/fix-cuda-flags.patch

    pushd contrib
    # https://github.com/opencv/opencv_contrib/issues/4045
    %patch -p1 -i ${pkgfiles}/fix-cudacodec-dependencies.patch
    popd

    # Using `BUILD_OPENCV_*` options we disable all extra modules from opencv_contrib that we don't explicitly need
    # To make this easier on ourselves let's allowlist the modules we want and disable every other one
    # Technically we don't need plot but tracking checks for it so it can build samples (which we don't end up installing anyway)
    modules=(bgsegm optflow plot tracking ximgproc)
    contrib_cmake_args=""
    pushd contrib/modules
    directories=(*)
    for dir in "${directories[@]}"
    do
        if [ -d "$dir" ]; then
            if [[ " ${modules[*]} " =~ " ${dir} " ]]; then
                contrib_cmake_args+="-DBUILD_opencv_${dir}=ON "
            else
                contrib_cmake_args+="-DBUILD_opencv_${dir}=OFF "
            fi
        fi
    done
    popd

    %cmake_ninja \
        -DBUILD_DOCS=OFF \
        -DBUILD_EXAMPLES=OFF \
        -DBUILD_PERF_TESTS=OFF \
        -DBUILD_PROTOBUF=OFF \
        -DBUILD_TESTS=OFF \
        -DCMAKE_CXX_STANDARD=17 \
        -DINSTALL_C_EXAMPLES=OFF \
        -DINSTALL_PYTHON_EXAMPLES=OFF \
        -DLAPACK_LIBRARIES="/usr/lib/liblapack.so;/usr/lib/libopenblas.so" \
        -DLAPACK_CBLAS_H=/usr/include/cblas.h \
        -DLAPACK_LAPACKE_H=/usr/include/lapacke.h \
        -DOPENCV_ENABLE_NONFREE=OFF \
        -DOPENCV_EXTRA_MODULES_PATH=contrib/modules \
        -DOPENCV_GENERATE_PKGCONFIG=ON \
        -DOPENCV_GENERATE_SETUPVARS=OFF \
        -DOPENCV_SKIP_FEATURES2D_DOWNLOADING=OFF \
        -DPROTOBUF_UPDATE_FILES=ON \
        -DWITH_ADE=OFF \
        -DWITH_FLATBUFFERS=OFF \
        -DWITH_GPHOTO2=ON \
        -DWITH_IPP=ON \
        -DWITH_LAPACK=ON \
        -DWITH_OPENCL=ON \
        -DWITH_OPENGL=ON \
        -DWITH_OPENMP=ON \
        -DWITH_QT=ON \
        -DWITH_VULKAN=ON \
        -DVULKAN_INCLUDE_DIRS=/usr/include/vulkan \
        ${contrib_cmake_args}
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
patterns   :
    - bgsegm:
        - /usr/lib64/libopencv_bgsegm.so.*
    - calib3d:
        - /usr/lib64/libopencv_calib3d.so.*
    - core:
        - /usr/lib64/libopencv_core.so.*
    - dnn:
        - /usr/lib64/libopencv_dnn.so.*
    - features2d:
        - /usr/lib64/libopencv_features2d.so.*
    - flann:
        - /usr/lib64/libopencv_flann.so.*
    - highgui:
        - /usr/lib64/libopencv_highgui.so.*
    - imgcodecs:
        - /usr/lib64/libopencv_imgcodecs.so.*
    - imgproc:
        - /usr/lib64/libopencv_imgproc.so.*
    - ml:
        - /usr/lib64/libopencv_ml.so.*
    - objdetect:
        - /usr/lib64/libopencv_objdetect.so.*
    - optflow:
        - /usr/lib64/libopencv_optflow.so.*
    - photo:
        - /usr/lib64/libopencv_photo.so.*
    - plot:
        - /usr/lib64/libopencv_plot.so.*
    - stitching:
        - /usr/lib64/libopencv_stitching.so.*
    - tracking:
        - /usr/lib64/libopencv_tracking.so.*
    - video:
        - /usr/lib64/libopencv_video.so.*
    - videoio:
        - /usr/lib64/libopencv_videoio.so.*
    - ximgproc:
        - /usr/lib64/libopencv_ximgproc.so.*
    - ^python-opencv:
        - /usr/lib/python3*
    - devel:
        - /usr/share/opencv4/*.supp
