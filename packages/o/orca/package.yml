# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : orca
version    : '50.2'
release    : 45
source     :
    - https://download.gnome.org/sources/orca/50/orca-50.2.tar.xz : 0714421cde8ec4baf47f18e4b4a12b4e5c4a3cfe3b161569e070fe037713fd04
homepage   : https://gitlab.gnome.org/GNOME/orca
license    : LGPL-2.1-or-later
component  : desktop.gnome
summary    : Orca Screen Reader
description: |
    Orca is a free, open source, flexible, and extensible screen reader that provides access to the graphical desktop via user-customizable combinations of speech and/or braille.
builddeps  :
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(libwnck-3.0)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(python3)
    - pkgconfig(speech-dispatcher)
    - itstool
    - python-dasbus
    - yelp-tools
rundeps    :
    - pyatspi2
    - python-dasbus
    - speech-dispatcher
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    # Stateless XDG
    mv $installdir/etc/xdg $installdir/usr/share/.
    rmdir $installdir/etc
