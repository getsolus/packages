# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ostree
version    : '2026.1'
release    : 26
source     :
    - https://github.com/ostreedev/ostree/releases/download/v2026.1/libostree-2026.1.tar.xz : 8e77c285dd6fa5ec5fb063130390977be727fe11107335ed8778a40385069e95
homepage   : https://ostreedev.github.io/ostree/
license    : LGPL-2.0-or-later
component  : system.utils
summary    : Git-like filesystem management
description: |
    Operating system and container binary deployment and upgrades
patterns   :
    - docs : /usr/share/man
builddeps  :
    - pkgconfig(e2p)
    - pkgconfig(fuse)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(gpgme)
    - pkgconfig(libarchive)
    - pkgconfig(libassuan)
    - pkgconfig(liblzma)
    - pkgconfig(libsoup-3.0)
    - docbook-xml
setup      : |
    %configure --disable-static --with-soup3
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
    # Remove files only relevant to OSTree based OS images
    rm -r $installdir/etc/grub.d/
    rm -r $installdir/usr/lib
