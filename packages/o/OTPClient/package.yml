# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : OTPClient
version    : 4.4.1
release    : 14
source     :
    - https://github.com/paolostivanin/OTPClient/archive/refs/tags/v4.4.1.tar.gz : d0de26c77fd0aaf0bd6eeef9a5854ec0422bd5a57e3c5a660cf69071621c792a
homepage   : https://github.com/paolostivanin/OTPClient
license    : GPL-3.0-or-later
component  : security
summary    : Highly secure and easy to use OTP client written in C/GTK that supports both TOTP and HOTP
description: |
    Highly secure and easy to use GTK+ software for two-factor authentication that supports both Time-based One-time Passwords (TOTP) and HMAC-Based One-Time Passwords (HOTP).
builddeps  :
    - pkgconfig(cotp)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(jansson)
    - pkgconfig(libgcrypt)
    - pkgconfig(libpng)
    - pkgconfig(libprotobuf-c)
    - pkgconfig(libqrencode)
    - pkgconfig(libsecret-1)
    - pkgconfig(protobuf)
    - pkgconfig(zbar)
    - crossguid-devel
setup      : |
    %cmake_ninja -DCMAKE_BUILD_TYPE=Release
build      : |
    %ninja_build
install    : |
    %ninja_install
