# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : onionshare-cli
version    : 2.6.4
release    : 11
source     :
    - https://github.com/onionshare/onionshare/releases/download/v2.6.4/onionshare-2.6.4.tar.gz : 5803324de2936fefacc1084fcb701b8e512329f224d4f166288b048acdb4d9b5
homepage   : https://onionshare.org
license    : GPL-3.0-or-later
component  : network.util
summary    : Lets you securely and anonymously share a file of any size with someone
description: |
    OnionShare lets you securely and anonymously share files of any size. It works by starting a web server, making it accessible as a Tor Onion Service, and generating an unguessable URL to access and download the files. It does not require setting up a separate server or using a third party file-sharing service. You host the files on your own computer and use a Tor Onion Service to make it temporarily accessible over the internet. The receiving user just needs to open the URL in Tor Browser to download the file.
builddeps  :
    - python-build
    - python-installer
    - python-poetry
    - python-setuptools
checkdeps  :
    - python-cepa
    - python-colorama
    - python-flask-compress
    - python-flask-socketio
    - python-psutil
    - python-pynacl
    - python-pytest
    - python-qrcode
    - python-requests
    - python-unidecode
    - python-waitress
    - tor
rundeps    :
    - python-cepa
    - python-click
    - python-colorama
    - python-eventlet
    - python-flask-compress
    - python-flask-socketio
    - python-gevent-websocket
    - python-psutil
    - python-pynacl
    - python-qrcode
    - python-requests
    - python-unidecode
    - python-waitress
    - tor
build      : |
    pushd cli
        %python3_setup
    popd
install    : |
    pushd cli
        %python3_install
    popd
    %install_license LICENSE.txt
check      : |
    pushd cli
        # test_curl: live_server uses multiprocessing with a nested function, unpickleable on 3.14
        %python3_test pytest -v -k 'not test_curl and not test_wget and not test_httpie' tests/
    popd
