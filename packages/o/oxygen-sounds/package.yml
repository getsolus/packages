# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : oxygen-sounds
version    : 6.7.1
release    : 46
source     :
    - https://download.kde.org/stable/plasma/6.7.1/oxygen-sounds-6.7.1.tar.xz : bff16bf69f9d7657237c67e0ec32c21188cdc96f004157c0c7f3dbb8d39c8894
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-2-Clause
    - CC0-1.0
    - CC-BY-3.0
    - LGPL-3.0-or-later
component  : desktop.theme
summary    : The Oxygen Sound Theme
description: The Oxygen Sound Theme
