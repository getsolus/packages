# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : oxygen-sounds
version    : 6.6.5
release    : 45
source     :
    - https://download.kde.org/stable/plasma/6.6.5/oxygen-sounds-6.6.5.tar.xz : 4c648555fe7ccb9bcf46fb0b4452da85c5821201445eb72ec45b5d95e57942f6
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-2-Clause
    - CC0-1.0
    - CC-BY-3.0
    - LGPL-3.0-or-later
component  : desktop.theme
summary    : The Oxygen Sound Theme
