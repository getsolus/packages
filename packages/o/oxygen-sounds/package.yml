# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : oxygen-sounds
version    : 6.7.3
release    : 48
source     :
    - https://download.kde.org/stable/plasma/6.7.3/oxygen-sounds-6.7.3.tar.xz : 799a12bc37b630ca0fd65082e2e7d891aff76cfdf81406ff8c76ceb487bcd657
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-2-Clause
    - CC0-1.0
    - CC-BY-3.0
    - LGPL-3.0-or-later
component  : desktop.theme
summary    : The Oxygen Sound Theme
description: The Oxygen Sound Theme
builddeps  :
    - pkgconfig(Qt6Core)
