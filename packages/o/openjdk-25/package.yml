name       : openjdk-25
version    : 25.0.2
release    : 2
source     :
    - https://github.com/openjdk/jdk25u/archive/refs/tags/jdk-25.0.3-ga.tar.gz : 24080b39d5bb28c34d1fa738e8704db411c6fc7dac0962cc33305536b0391b9e
    # Detection seems broken, we can't use system gtest (TODO fix this)
    - https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz : 8ad598c73ad796e0d8280b082cebd82a630d73e73cd3c70057938a6501bba5d7
license    : GPL-2.0-only WITH Classpath-exception-2.0
component  : programming.java
homepage   : https://openjdk.org/
summary    : Open implementation of Oracle's Java Development Kit, major version 25
description: |
    Open implementation of Oracle's Java Development Kit, major version 25. This package includes the JDK, the JRE is not separately provided.
clang      : true
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(fontconfig)
    - pkgconfig(gtest)
    - pkgconfig(harfbuzz)
    - pkgconfig(lcms2)
    - pkgconfig(libjpeg)
    - pkgconfig(x11)
    - pkgconfig(xext)
    - pkgconfig(xrandr)
    - pkgconfig(xrender)
    - pkgconfig(xt)
    - pkgconfig(xtst)
    - pkgconfig(xxf86vm)
    - cups-devel
    - giflib-devel
    - jtreg
    - openjdk-25
checkdeps  :
    - pkgconfig(gtest)
patterns   :
    - devel :
        - /usr/lib64/openjdk-25/include/
mancompress: true
environment: |
    # ccache needs to be enabled via conf option, not by setting the path
    if [[ " ${PATH[*]} " =~ "ccache" ]]; then
        export PATH="${PATH//\/usr\/lib64\/ccache\/bin:/}"
        export extra_conf_opts="--enable-ccache"
    fi
setup      : |
    # Setup gtest
    tar xf $sources/v1.14.0.tar.gz
    mv googletest-1.14.0 gtest-local

    chmod +x configure
    %configure --prefix="/usr" \
        --with-jvm-variants=client \
        --with-jvm-features="compiler2" \
        --with-boot-jdk="/usr/lib64/openjdk-25" \
        --with-native-debug-symbols=internal \
        --with-toolchain-type=clang \
        --with-version-build="13" \
        --with-version-pre="" \
        --with-version-opt="solus" \
        --with-stdc++lib=dynamic \
        --with-freetype=system \
        --with-giflib=system \
        --with-gtest=./gtest-local \
        --with-harfbuzz=system \
        --with-lcms=system \
        --with-libjpeg=system \
        --with-libpng=system \
        --with-zlib=system \
        --with-vendor-name=Solus \
        --with-vendor-url=https://getsol.us/ \
        --with-vendor-bug-url=https://github.com/getsolus/packages/issues \
        --with-vendor-vm-bug-url=https://github.com/getsolus/packages/issues \
        --enable-unlimited-crypto \
        --disable-warnings-as-errors \
        --disable-absolute-paths-in-output \
        --with-extra-cflags="${CFLAGS}" \
        --with-extra-cxxflags="${CXXFLAGS}" \
        --with-extra-ldflags="${LDFLAGS}" \
        --with-jobs=%YJOBS% \
        $extra_conf_opts
build      : |
    # Build OpenJDK
    make images test-image
install    : |
    install -Ddm00755 $installdir/%libdir%/openjdk-25/
    cp -ra build/linux-x86_64-client-release/images/jdk/* $installdir/%libdir%/openjdk-25/

    # Headers
    install -dm00755 $installdir/usr/include/openjdk-25/
    mv $installdir/%libdir%/openjdk-25/include/* $installdir/usr/include/openjdk-25/
    ln -srvf $installdir/usr/include/openjdk-25/ $installdir/%libdir%/openjdk-25/include/

    # Man pages
    if [ -d $installdir/%libdir%/openjdk-25/man ]; then
        mv $installdir/%libdir%/openjdk-25/man/ $installdir/usr/share/
        find $installdir/usr/share/man/ -type f -print -exec rename -- ".1" "-25.1" {} \;
    fi

    # Link system JVM installations
    install -dm00755 $installdir/%libdir%/jvm
    ln -srv $installdir/%libdir%/openjdk-25 $installdir/%libdir%/jvm/openjdk-25
# Tests take a long time so should be disabled before pushing
# Note that some of these tests can OOM if you don't have enough system memory (32GB+ recommended)
# If you still get OOMs even with that much memory try reducing the number of jobs in eopkg.conf,
# or closing running applications so as to appease the openjdk (yes, it's that bad)
# check      : |
#     # You can add "RUN_PROBLEM_LISTS=true;" to the JTREG key below to run all tests in the ProblemList instead of excluding them.
#     # This is useful to see if any tests have been fixed in a new version
#     make test TEST="tier1 gtest:all" JTREG="EXTRA_PROBLEM_LISTS=$pkgfiles/ProblemList.txt"

