# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : opensnitch
version    : 1.8.0
release    : 9
source     :
    - https://github.com/evilsocket/opensnitch/archive/refs/tags/v1.8.0.tar.gz : bddcfff04202f3ef7713944a69ca8ebaab19ee32e8f01e5a55995bff54f412b7
homepage   : https://github.com/evilsocket/opensnitch
license    : GPL-3.0-or-later
component  : network.util
summary    : OpenSnitch is a GNU/Linux application firewall.
description: |
    OpenSnitch is a GNU/Linux interactive application firewall inspired by Little Snitch.
networking : true
clang      : true
builddeps  :
    - pkgconfig(Qt5UiPlugin)
    - pkgconfig(grpc)
    - pkgconfig(libnetfilter_queue)
    - pkgconfig(libnftnl)
    - pkgconfig(protobuf)
    - git
    - golang
    # pip TODO 3.14
    - protobuf
    - python-grpcio
    - python-grpcio-tools
    - python-inotify
    - python-notify2
    - python-protobuf
    - python-qt-material
    - python-qt6
    - python-setuptools
    - python-slugify
    - python-wheel
    - qt6-tools-devel
rundeps    :
    - iptables
    - python-asn1
    - python-grpcio
    - python-inotify
    - python-notify2
    - python-packaging
    - python-protobuf
    - python-qt-material
    - python-qt6
    - python-slugify
setup      : |
    %apply_patches
build      : |
    # From https://github.com/evilsocket/opensnitch/blob/master/.github/workflows/go.yml#L34
    go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.1
    go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
    export PATH="$PATH:$(go env GOPATH)/bin"

    # Fix socket path in translation files/etc
    find . -type f -exec sed -i 's|unix:///tmp/osui.sock|unix:///run/opensnitch/osui.sock|g' {} +

    %make PREFIX=%PREFIX%
install    : |
    %make_install PREFIX=%PREFIX%

    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/20-opensnitch.preset

    # install the ui separately
    pushd ui
    %python3_install
    popd

    %install_license LICENSE

    # remove test files
    rm -rfv $installdir/usr/lib/python%python3_version%/site-packages/tests/

    # need this or else the gui will not launch
    sed -i 's.#!python.#!/usr/bin/env python3.' $installdir/usr/bin/opensnitch-ui

    # install these so the socket directory is created & create the opensnitch group
    install -Dm00644 $pkgfiles/opensnitch.sysusers $installdir/usr/lib/sysusers.d/opensnitch.conf
    install -Dm00644 $pkgfiles/opensnitch.tmpfile $installdir/usr/lib/tmpfiles.d/opensnitch.conf
    install -Dm00644 $pkgfiles/opensnitch_group_update.toml $installdir/usr/share/defaults/qol-assist.d/opensnitch_group_update.toml
