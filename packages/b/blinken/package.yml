# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : blinken
version    : 26.04.2
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/blinken-26.04.2.tar.xz : fe6182b27fa31e5b2cc257644f1ce40cbbaf500de161ab3498fe3ab18e05fffb
homepage   : https://kde.org/applications/education/org.kde.blinken
license    :
    - CC0-1.0
    - GFDL-1.2-only
    - GPL-2.0-or-later
component  : games.action
summary    : Blinken is based on an electronic game released in 1978, which challenges players to remember sequences of increasing length
description: |
    Blinken is based on an electronic game released in 1978, which challenges players to remember sequences of increasing length
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Svg)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kxmlgui-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    #remove docs
    rm -rf $installdir/usr/share/doc
