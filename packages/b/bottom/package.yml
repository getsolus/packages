# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : bottom
version    : 0.14.6
release    : 38
source     :
    - https://github.com/ClementTsang/bottom/archive/refs/tags/0.14.6.tar.gz : ec899586164423377ceaf0d15975b8cb4430e47f3c84db0394411048755c1412
    - https://github.com/ClementTsang/bottom/releases/download/0.14.6/completion.tar.gz : 1badcb95d13022a0d4210d06b5b90eb9b6a898dc2d86ff04af12a2ba12ca39fb
    - https://github.com/ClementTsang/bottom/releases/download/0.14.6/manpage.tar.gz : 593c30115b4f781761981f29ff6718083e9732acf726dd6930fa0eaf77a9cd98
homepage   : https://clementtsang.github.io/bottom
license    : MIT
component  : system.utils
summary    : Yet another cross-platform graphical process/system monitor.
description: |
    A cross-platform graphical process/system monitor with a customizable interface and a multitude of features. Supports Linux, macOS, and Windows. Inspired by both gtop and gotop.
networking : true
builddeps  :
    - rust
setup      : |
    tar -xf ${sources}/completion.tar.gz .
    tar -xf ${sources}/manpage.tar.gz .

    %cargo_fetch
build      : |
    %cargo_build --bin btm
install    : |
    %cargo_install btm
    %install_license LICENSE

    # Completions
    install -Dm00644 btm.bash $installdir/usr/share/bash-completion/completions/btm
    install -Dm00644 _btm $installdir/usr/share/zsh/site-functions/_btm
    install -Dm00644 btm.fish $installdir/usr/share/fish/vendor_completions.d/btm.fish

    # Manpages
    install -Dm00644 btm.1.gz $installdir/usr/share/man/man1/btm.1.gz

    # Desktop
    install -Dm00644 desktop/bottom.desktop $installdir/usr/share/applications/bottom.desktop

    # Icon
    install -Dm00644 assets/icons/bottom-system-monitor.svg $installdir/usr/share/icons/hicolor/scalable/apps/bottom-system-monitor.svg
