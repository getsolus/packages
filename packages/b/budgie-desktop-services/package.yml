# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : budgie-desktop-services
version    : 1.0.2
release    : 1
source     :
    - https://forge.moderndesktop.dev/BuddiesOfBudgie/budgie-desktop-services/archive/1.0.2.tar.gz : 2304b2958abde6b75af678f1fd523ee6afba84c1f54d20c6eb4738415fffb799
homepage   : https://buddiesofbudgie.org
license    : MPL-2.0
component  : desktop.budgie
summary    : Future central hub and orchestrator for Budgie Desktop
description: |
    Budgie Desktop Services is the future central hub and orchestrator for Budgie Desktop (with a focus on Budgie 11). Today, it primarily provides Wayland-native display configuration for Budgie 10.10; over time it will coordinate broader desktop logic for Budgie 11.
builddeps  :
    - pkgconfig(KWaylandClient)
    - pkgconfig(Qt6WaylandClient)
    - extra-cmake-modules
    - qt6-base-private-devel
    - toml11
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
