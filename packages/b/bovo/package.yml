# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : bovo
version    : 26.04.3
release    : 100
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/bovo-26.04.3.tar.xz : bb38f2f9c3c3694d3b9869f5d1d97eda2b1621374f5a85ce2b30a4aefa53549d
homepage   : https://kde.org/applications/games/org.kde.bovo
license    :
    - BSD-3-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : games.strategy
summary    : A Gomoku like game for two players
description: |
    Bovo is a Gomoku like game for two players, where the opponents alternate in placing their respective pictogram on the game board. Also known as Connect Five, Five in a row, X and O, Naughts and Crosses.
builddeps  :
    - pkgconfig(Qt6Svg)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kxmlgui-devel
    - libkdegames-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING* LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
