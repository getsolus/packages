# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : bitfocus-companion
version    : 4.3.2
release    : 1
source     :
    - git|https://github.com/bitfocus/companion.git : 1b1835a3e234df39873caeef3bf56d4b54d4c0e9
homepage   : https://companion.free/
license    : MIT
component  : system.utils
networking : true
summary    : Versatile shotbox for everybody
description: |
    Companion elevates the affordable Elgato Stream Deck and similar devices into professional control surfaces for an extensive range of equipment and applications. From presentation switchers and broadcast equipment to video playback software and home automation systems, Companion delivers studio-grade control, putting powerful workflows right at your fingertips.
environment: |
    export PATH="/usr/lib64/nodejs-22/bin/:$PATH"
    # Because apparently this is how we tell the build system we're building the stable release.
    export GITHUB_REF="refs/tags/v$version"
    export GITHUB_REF_NAME="v$version"
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(atkmm-1.6)
    - pkgconfig(atkmm-2.36)
    - pkgconfig(cairo)
    - pkgconfig(cups)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(pango)
    - pkgconfig(xcomposite)
    - pkgconfig(xdamage)
    - pkgconfig(xfixes)
    - pkgconfig(xrandr)
    - egl-gbm-devel
    - git
    - glibc-devel
    - nodejs-22
setup      : |
    corepack-22 enable
    yarn install
    yarn rebuild
build      : |
    yarn lindist
install    : |
    # Remove ARM/BSD/musl/darwin stuff because it breaks strip and confuses the dependency resolver
    rm -rf electron-output/linux-unpacked/resources/builtin-surfaces/elgato-stream-deck/prebuilds/*arm64*
    rm -rf electron-output/linux-unpacked/resources/builtin-surfaces/elgato-stream-deck/prebuilds/*darwin*
    rm -rf electron-output/linux-unpacked/resources/builtin-surfaces/elgato-stream-deck/prebuilds/*win32*
    rm -rf electron-output/linux-unpacked/resources/builtin-surfaces/xkeys/prebuilds/*arm64*
    rm -rf electron-output/linux-unpacked/resources/builtin-surfaces/xkeys/prebuilds/*darwin*
    rm -rf electron-output/linux-unpacked/resources/builtin-surfaces/xkeys/prebuilds/*win32*
    rm -rf electron-output/linux-unpacked/resources/node_modules/@serialport/bindings-cpp/prebuilds/*arm*
    rm -rf electron-output/linux-unpacked/resources/node_modules/@serialport/bindings-cpp/prebuilds/linux-x64/*musl*
    rm -rf electron-output/linux-unpacked/resources/node_modules/usb/prebuilds/*arm*
    rm -rf electron-output/linux-unpacked/resources/node_modules/usb/prebuilds/linux-ia32
    rm -rf electron-output/linux-unpacked/resources/node_modules/usb/prebuilds/linux-x64/*musl*
    rm -rf electron-output/linux-unpacked/resources/node_modules/usb/prebuilds/win32*
    rm -rf electron-output/linux-unpacked/resources/node_modules/bufferutil/prebuilds/*darwin*
    rm -rf electron-output/linux-unpacked/resources/node_modules/bufferutil/prebuilds/*win32*
    rm -rf electron-output/linux-unpacked/resources/prebuilds/*arm*
    rm -rf electron-output/linux-unpacked/resources/prebuilds/*darwin*
    rm -rf electron-output/linux-unpacked/resources/prebuilds/*freebsd*
    rm -rf electron-output/linux-unpacked/resources/prebuilds/*musl*
    rm -rf electron-output/linux-unpacked/resources/prebuilds/*win32*

    # Clean up Node nonsense; should fix this properly but can't be bothered
    chown -R root:root electron-output/linux-unpacked/resources/node-runtimes
    chown -R root:root electron-output/linux-unpacked/resources/builtin-surfaces

    # Install the actual application
    install -dm00755 $installdir/usr/share/bitfocus-companion
    cp -va electron-output/linux-unpacked/* $installdir/usr/share/bitfocus-companion
    %install_license LICENSE.md

    # Symlink executables
    install -dm00755 $installdir/usr/bin
    ln -s /usr/share/bitfocus-companion/companion-launcher $installdir/usr/bin/companion-launcher
    ln -s /usr/share/bitfocus-companion/companion_headless.sh $installdir/usr/bin/companion_headless.sh

    # Install icon
    install -Dm00644 launcher/assets/icon.png $installdir/usr/share/icons/hicolor/256x256/apps/io.bitfocus.bitfocus_companion.png

    # Install .desktop file
    install -Dm00644 $pkgfiles/io.bitfocus.bitfocus_companion.desktop $installdir/usr/share/applications/io.bitfocus.bitfocus_companion.desktop

    # Install appstream metainfo
    install -Dm00644 $pkgfiles/io.bitfocus.bitfocus_companion.metainfo.xml $installdir/usr/share/metainfo/io.bitfocus.bitfocus_companion.metainfo.xml
