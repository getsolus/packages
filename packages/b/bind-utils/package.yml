# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# Make sure to update the Anitya ID if changing this from the 9.20.x LTS series
name       : bind-utils
version    : 9.20.26
release    : 41
source     :
    - https://downloads.isc.org/isc/bind9/9.20.26/bind-9.20.26.tar.xz : 55248def0f870c4c46b3de72978ea972615131516663188a4564dca1d20bf350
homepage   : https://www.isc.org/bind/
license    : MPL-2.0
component  : network.util
summary    : Client side programs nslookup, dig and host.
description: |
    BIND (Berkeley Internet Name Domain) is a complete, highly portable implementation of the Domain Name System (DNS) protocol.
builddeps  :
    - pkgconfig(json-c)
    - pkgconfig(krb5)
    - pkgconfig(libedit)
    - pkgconfig(libidn2)
    - pkgconfig(libmaxminddb)
    - pkgconfig(libnghttp2)
    - pkgconfig(liburcu)
    - pkgconfig(libuv)
    - python-sphinx
libsplit   : false
networking : true
setup      : |
    %reconfigure \
        --disable-static \
        --with-readline=libedit \
        --with-json-c \
        --with-libidn2 \
        --with-libxml2 \
        --with-zlib
build      : |
    %make -C lib
    %make bind.keys.h
    %make -C bin/delv
    %make -C bin/dig
    %make -C bin/nsupdate
    %make -C doc/man
install    : |
    %make_install -C lib
    %make_install -C bin/delv
    %make_install -C bin/dig
    %make_install -C bin/nsupdate
    %install_license COPYING COPYRIGHT LICENSE

    for _f in delv.1 dig.1 host.1 nslookup.1 nsupdate.1; do
        install -Dm 00644 -t ${installdir}/usr/share/man/man1 doc/man/${_f}
    done
