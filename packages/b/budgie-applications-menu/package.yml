# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : budgie-applications-menu
version    : 2.5.0
release    : 3
source     :
    - git|https://github.com/UbuntuBudgie/applications-menu.git : 248be05094891f2b341b8c6b17af8a0c52deba32
homepage   : https://github.com/UbuntuBudgie/applications-menu
license    : GPL-3.0-or-later
component  : desktop.budgie
summary    : A Budgie Desktop applications menu
description: |
    Lightweight and stylish app launcher for Budgie Desktop.
builddeps  :
    - pkgconfig(budgie-3.0)
    - pkgconfig(granite)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libhandy-1)
    - pkgconfig(zeitgeist-2.0)
    - vala
setup      : |
    %meson_configure \
        -Dfor-wayland=true \
        -Dwith-zeitgeist=true
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
