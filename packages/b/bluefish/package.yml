# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : bluefish
version    : 2.4.1
release    : 24
source     :
    - https://sourceforge.net/projects/bluefish/files/bluefish/2.4.1/bluefish-2.4.1.tar.bz2 : 540b0e4f5a595fc418c41125a6a282b69f10cf01513bedde80906d25a56d0cc9
license    : GPL-3.0-or-later
homepage   : https://bluefish.openoffice.nl/index.html
component  : programming.ide
summary    : Bluefish Editor
description: |
    An open-source editor for experienced web designers and programmers, supporting many programming and markup languages, but focusing on creating dynamic and interactive websites.
builddeps  :
    - pkgconfig(enchant-2)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gucharmap-2.90)
    - pkgconfig(python3)
setup      : |
    %configure --disable-update-databases
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
