# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : bluefish
version    : 2.4.2
release    : 25
source     :
    - https://sourceforge.net/projects/bluefish/files/bluefish/2.4.2/bluefish-2.4.2.tar.bz2 : b2641f9ff8033719e02c519c5ddb4bdadbd7ff73ef252e9287d512c4770377c5
license    : GPL-3.0-or-later
homepage   : https://bluefish.openoffice.nl/index.html
component  : programming.ide
summary    : Bluefish Editor
description: |
    An open-source editor for experienced web designers and programmers, supporting many programming and markup languages, but focusing on creating dynamic and interactive websites.
builddeps  :
    - pkgconfig(enchant-2)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gucharmap-2.90)
    - pkgconfig(python3)
setup      : |
    %configure --disable-update-databases
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
