# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : burp
version    : 3.2.0
release    : 12
source     :
    - https://github.com/grke/burp/archive/refs/tags/3.2.0.tar.gz : 38e65411292510429261999b4370cb7a7713f57ba24bde806bec8f66c17f5b90
homepage   : https://burp.grke.org/
license    : AGPL-3.0-or-later
component  : system.utils
summary    : Burp is a network backup and restore program
description: |
    Burp is a network backup and restore program.
builddeps  :
    - pkgconfig(check)
    - pkgconfig(libacl)
    - pkgconfig(libxcrypt)
    - pkgconfig(uthash)
    - librsync-devel
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install
    install -D -m 00644 $pkgfiles/burp.tmpfiles $installdir/%libdir%/tmpfiles.d/burp.conf

    # Stateless
    rmdir -v $installdir/var/spool/burp \
             $installdir/var/spool \
             $installdir/var \
             $installdir/run
    %install_license LICENSE
