# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : baloo-widgets
version    : 26.04.2
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/baloo-widgets-26.04.2.tar.xz : 7daf3e6821b9988c171a316cb547591fba2caca78818c2da1d409603ea93c00a
homepage   : https://community.kde.org/Baloo
license    :
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
component  : desktop.kde
summary    : Widgets for the Baloo search engine
description: |
    Widgets for the Baloo search engine.
builddeps  :
    - kf6-baloo-devel
    - kf6-kio-devel
    - qt6-base-private-devel
clang      : true
optimize   :
