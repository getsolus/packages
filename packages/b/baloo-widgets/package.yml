# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : baloo-widgets
version    : 26.04.3
release    : 104
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/baloo-widgets-26.04.3.tar.xz : fa5288d216d3ed9ed0926385dbc0b266b60317a60c231a6dccaff4bcd810d9fc
