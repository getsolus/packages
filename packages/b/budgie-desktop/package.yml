# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : budgie-desktop
version    : 10.10.2
release    : 284
source     :
    - https://github.com/BuddiesOfBudgie/budgie-desktop/releases/download/v10.10.2/budgie-desktop-v10.10.2.tar.xz : 2463773c7d3090052f54ade075998475f88b4615bddc0c0c9f22cc2e6decf248
homepage   : https://blog.buddiesofbudgie.org
license    :
    - GPL-2.0-only
    - LGPL-2.1-only
summary    : A luxurious home computing experience
description: |
    Budgie Desktop is a modern desktop environment developed by the Buddies of Budgie.
component  : desktop.budgie
builddeps  :
    - pkgconfig(accountsservice)
    - pkgconfig(alsa)
    - pkgconfig(gee-0.8)
    - pkgconfig(gnome-desktop-3.0)
    - pkgconfig(gnome-settings-daemon)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gtk-doc)
    - pkgconfig(gtk-layer-shell-0)
    - pkgconfig(ibus-1.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libcanberra)
    - pkgconfig(libnotify)
    - pkgconfig(libpeas-2)
    - pkgconfig(libpulse-mainloop-glib)
    - pkgconfig(libwacom)
    - pkgconfig(libxfce4windowing-0)
    - pkgconfig(upower-glib)
    - gammastep
    - grim
    - gtklock
    - mesa-demos
    - sassc
    - slurp
    - swaybg
    - swayidle
    - vala
    - wlopm
rundeps    :
    - budgie-control-center
    - budgie-desktop-services
    - budgie-session
    - gammastep
    - gnome-settings-daemon
    - grim
    - gtklock
    - labwc
    - mesa-demos
    - mutter-common
    - network-manager-applet
    - pipewire
    - python-psutil
    - python-systemd
    - slurp
    - swaybg
    - swayidle
    - switcheroo-control
    - wlopm
    - xdg-desktop-portal-gtk
    - xdg-desktop-portal-wlr
setup      : |
    %patch -p1 -i ${pkgfiles}/budgie-10.10.2-fix-pc-gir.patch
    %patch -p1 -i ${pkgfiles}/budgie-10.10.2-screenshot-scale-fix.patch
    %patch -p1 -i ${pkgfiles}/budgie-10.10.2-fix-tasklist-minimize.patch
    %patch -p1 -i ${pkgfiles}/budgie-10.10.2-fix-tasklist-workspace-change.patch
    %patch -p1 -i ${pkgfiles}/budgie-10.10.2-add-support-for-setting-primary-monitor.patch

    # We have to override the usual Solus libexexdir
    # because Budgie needs to know where other package's
    # binaries in libexecdir are.
    %meson_configure \
        --libexecdir="lib%LIBSUFFIX%" \
        -Dgsd-libexecdir="/usr/lib64/budgie-session" \
        -Dwith-stateless=true
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE LICENSE.*
