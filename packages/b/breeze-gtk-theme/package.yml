name       : breeze-gtk-theme
version    : 6.2.1
release    : 113
source     :
    - https://download.kde.org/stable/plasma/6.2.1/breeze-gtk-6.2.1.tar.xz : 8b5478d6b705683f0c2c075ce83e1137ad97ed644d1a339d8f982c4dc123ef0e
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - LGPL-2.1-only
component  : desktop.theme
summary    : A GTK Theme Built to Match KDE's Breeze
description: |
    A GTK Theme Built to Match KDE's Breeze
builddeps  :
    - pkgconfig(Qt6Core)
    - breeze-devel
    - extra-cmake-modules
    - python3-cairo
    - sassc
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
