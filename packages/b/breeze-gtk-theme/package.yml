name       : breeze-gtk-theme
version    : 6.3.1
release    : 120
source     :
    - https://download.kde.org/stable/plasma/6.3.1/breeze-gtk-6.3.1.tar.xz : 40ca5e4188b127aa762fc4972a270741c32f6ceb1849c41df5692b8c4e2a27a5
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - LGPL-2.1-only
component  : desktop.theme
summary    : A GTK Theme Built to Match KDE's Breeze
description: |
    A GTK Theme Built to Match KDE's Breeze
builddeps  :
    - pkgconfig(Qt6Core)
    - breeze-devel
    - extra-cmake-modules
    - python3-cairo
    - sassc
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
