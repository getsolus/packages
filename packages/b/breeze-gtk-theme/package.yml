name       : breeze-gtk-theme
version    : 6.2.0
release    : 112
source     :
    - https://download.kde.org/stable/plasma/6.2.0/breeze-gtk-6.2.0.tar.xz : a611e444aeca34f16fe6e09011e9014fcf2bb5d9422dd644011f440ccc5375b8
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - LGPL-2.1-only
component  : desktop.theme
summary    : A GTK Theme Built to Match KDE's Breeze
description: |
    A GTK Theme Built to Match KDE's Breeze
builddeps  :
    - pkgconfig(Qt6Core)
    - breeze-devel
    - extra-cmake-modules
    - python3-cairo
    - sassc
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
