# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : byobu
version    : '6.14'
release    : 10
source     :
    - https://github.com/dustinkirkland/byobu/archive/refs/tags/6.14.tar.gz : 478e15a38a57678e4bd2cd55994ea1edece2d10bb6bf0a3de8f0b2dd8df35485
homepage   : https://www.byobu.org/
license    : GPL-3.0-or-later
component  : system.utils
summary    : Byobu is an enhancement for the GNU Screen or Tmux
description: |
    Byobu includes an enhanced profile, configuration utilities, and system status notifications for the GNU screen window manager as well as the Tmux terminal multiplexer.
rundeps    :
    - newt
    - tmux
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    make -j1 install DESTDIR=%installroot%
    %install_license COPYING
