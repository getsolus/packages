# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : bolt
version    : 0.9.11
release    : 11
source     :
    - https://gitlab.freedesktop.org/bolt/bolt/-/archive/0.9.11/bolt-0.9.11.tar.gz : cde4fc6d4a188e37d088cf59a5b2d174ac4b03d57bf9d084d711ba92105c33c0
homepage   : https://gitlab.freedesktop.org/bolt/bolt
license    :
    - LGPL-2.1-or-later # Source code
    - GPL-2.0-or-later # Udev rules file
component  : system.utils
summary    : Thunderbolt device manager
description: |
    Userspace system daemon to enable security levels for Thunderbolt 3 on GNU/Linux.
builddeps  :
    - pkgconfig(libeconf)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(umockdev-1.0)
    - asciidoc
setup      : |
    %patch -p1 -i $pkgfiles/0001-test-exported-is-not-allowed-in-our-sandbox.patch

    %meson_configure -Dprivileged-group=wheel
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    # sysfs tests failing, expected in root container
    %ninja_check || :
