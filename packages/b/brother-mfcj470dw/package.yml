# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : brother-mfcj470dw
version    : 3.0.0
release    : 1
source     :
    - http://download.brother.com/welcome/dlf006866/mfcj470dw_cupswrapper_GPL_source_3.0.0-1.tar.gz : b88f9b592723a00c024129560367f40a560ca3cba06fd99512ab368dd6855853
    - http://download.brother.com/welcome/dlf006842/mfcj470dwlpr-3.0.0-1.i386.rpm : 0158691ad3945dafc425302d7f14e2b9a522987d54c81de91545f6daa9552e24
homepage   : https://global.brother
license    :
    - Distributable
    - GPL-2.0-or-later
component  : drivers.printer
strip      : false
summary    : Printer driver for Brother MFC-J470DW
description: |
    Printer driver for Brother MFC-J470DW.
    Note that some portions are binary and provided for hardware enablement so may not meet typical Solus packaging standards for paths.
builddeps  :
    - rpm
rundeps    :
    - a2ps
    - ghostscript
    - glibc-32bit
    - psutils
setup      : |
    %patch -p1 -i $pkgfiles/0001-Fix-build-files.patch
    # Extract rpms
    for i in $sources/*.rpm; do
        rpm2cpio ${i} | cpio -idmv
    done
build      : |
    %make -C brcupsconfpt1
install    : |
    install -d -m 00755 $installdir
    # Install rpm files
    mv usr $installdir/
    mv opt $installdir/

    # Install required cups files
    install -D -m 00644 PPD/brother_mfcj470dw_printer_en.ppd $installdir/usr/share/cups/model/Brother/brother_mfcj470dw_printer_en.ppd
    install -D -m 00755 cupswrapper/brother_lpdwrapper_mfcj470dw $installdir/%libdir%/cups/filter/brother_lpdwrapper_mfcj470dw
    install -D -m 00755 brcupsconfpt1/brcupsconfpt1 $installdir/opt/brother/Printers/mfcj470dw/cupswrapper/brcupsconfpt1
    ln -sf ../../../../opt/brother/Printers/mfcj470dw/lpd/filtermfcj470dw $installdir/usr/lib64/cups/filter/filtermfcj470dw
