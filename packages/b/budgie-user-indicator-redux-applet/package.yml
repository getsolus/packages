# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : budgie-user-indicator-redux-applet
version    : 1.1.0
release    : 6
source     :
    - https://github.com/EbonJaeger/budgie-user-indicator-redux/archive/refs/tags/v1.1.0.tar.gz : bd35087749983b4cf2873c8b92e203c28bf573a25c32058b9cfd01cfce9a02a4
homepage   : https://github.com/EbonJaeger/budgie-user-indicator-redux
license    : GPL-2.0-or-later
component  : desktop.budgie
summary    : Manage your user session from the Budgie panel
description: |
    Recreates the old user indicator applet functionality of Budgie Desktop to manage your user session directly from the panel menu, instead of opening the Power Dialog.
builddeps  :
    - pkgconfig(accountsservice)
    - pkgconfig(budgie-3.0)
    - pkgconfig(gee-0.8)
    - sassc
    - vala
setup      : |
    %patch -p1 -i ${pkgfiles}/budgie-10-10.patch

    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    %ninja_check
