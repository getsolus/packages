# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rizin
version    : 0.9.1
release    : 38
source     :
    - https://github.com/rizinorg/rizin/releases/download/v0.9.1/rizin-src-v0.9.1.tar.xz : 7ac1cd7daca7afdda742e15478b1f747fc1f813e496fee71839d1e109e543dca
homepage   : https://rizin.re/
license    :
    - LGPL-3.0-or-later
    - GPL-3.0-or-later
component  : programming.tools
summary    : UNIX-like reverse engineering framework and command-line toolset
description: |
    A free and open-source Reverse Engineering framework, providing a complete binary analysis experience with features like Disassembler, Hexadecimal editor, Emulation, Binary inspection, Debugger, and more.
replaces   :
    - radare2
    - devel :
        - radare2-devel
builddeps  :
    - pkgconfig(capstone)
    - pkgconfig(liblz4)
    - pkgconfig(liblzma)
    - pkgconfig(libmagic)
    - pkgconfig(libmspack)
    - pkgconfig(libpcre2-8)
    - pkgconfig(libxxhash)
    - pkgconfig(libzip)
    - pkgconfig(libzstd)
    - pkgconfig(openssl)
    - pkgconfig(tree-sitter)
    - pkgconfig(zlib)
setup      : |
    %meson_configure \
        -Dchecks_level=1 \
        -Denable_rz_test=false \
        -Denable_tests=false \
        -Dlocal=disabled \
        -Dpackager=Solus \
        -Dpackager_version=$version-$release \
        -Duse_sys_capstone=enabled \
        -Duse_sys_libmspack=enabled \
        -Duse_sys_libzip=enabled \
        -Duse_sys_libzstd=enabled \
        -Duse_sys_lz4=enabled \
        -Duse_sys_lzma=enabled \
        -Duse_sys_magic=enabled \
        -Duse_sys_openssl=enabled \
        -Duse_sys_pcre2=enabled \
        -Duse_sys_tree_sitter=enabled \
        -Duse_sys_xxhash=enabled \
        -Duse_sys_zlib=enabled
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING* LICENSES/*
