# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rocm-hipify
version    : 7.2.0
release    : 7
source     :
    # tag: rocm-7.0.2
    - https://github.com/ROCm/HIPIFY/archive/refs/tags/rocm-7.2.0.tar.gz : ddea52cc4b624f5a48413cc390d0308c9b889d9dd6699077f4cfb7d014417a9f
homepage   : https://github.com/ROCm-Developer-Tools/HIPIFY
license    : MIT
component  : programming.tools
summary    : Convert CUDA to Portable C++ Code
description: |
    Tools to translate CUDA source code into portable HIP C++ automatically.
patterns   : /*
builddeps  :
    - rocm-cmake
    - rocm-llvm
environment: |
    export ROCM_PATH=/usr
    export CMAKE_PREFIX_PATH=/usr/lib64/llvm-rocm
setup      : |
    %cmake_ninja -L
build      : |
    %ninja_build
install    : |
    %ninja_install 
    # For some reason...
    chmod +x $installdir/usr/bin/hipify-perl
