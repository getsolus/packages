# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rocrand
version    : 7.2.0
release    : 7
source     :
    - https://github.com/ROCm/rocm-libraries/archive/refs/tags/rocm-7.2.0.tar.gz : 8ad5f4a11f1ed8a7b927f2e65f24083ca6ce902a42021a66a815190a91ccb654
homepage   : https://github.com/ROCmSoftwarePlatform/rocRAND
license    : MIT
component  : programming.library
summary    : RAND library for HIP programming language
description: |
    rocRAND provides functions that generate pseudo-random and quasi-random numbers. It is implemented in the HIP programming language and optimised for AMD's latest discrete GPUs. It is designed to run on top of AMD's Radeon Open Compute ROCm runtime, but it also works on CUDA enabled GPUs.
builddeps  :
    - pkgconfig(tbb)
    - rocm-cmake
    - rocm-hip
    - rocm-llvm
environment: |
    export CXXFLAGS="${CXXFLAGS/-D_FORTIFY_SOURCE=2 -fstack-protector-strong --param=ssp-buffer-size=32/-fcf-protection=none}"

    export ROCM_PATH=/usr
    export HIP_DEVICE_LIB_PATH=/usr/lib64/amdgcn/bitcode
    export HIP_CLANG_PATH=/usr/lib64/llvm-rocm/bin
setup      : |
    %cmake_ninja -S projects/rocrand -L \
      -DCMAKE_C_COMPILER=$HIP_CLANG_PATH/clang \
      -DCMAKE_CXX_COMPILER=$HIP_CLANG_PATH/clang++ \
      -DCMAKE_INSTALL_LIBDIR=lib%LIBSUFFIX% \
      -DROCM_SYMLINK_LIBS=OFF \
      -DAMDGPU_TARGETS="%AMDGPUTARGETS%"
build      : |
    %ninja_build
install    : |
    %ninja_install
