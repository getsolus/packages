# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rocm-info
version    : 7.2.0
release    : 9
source     :
    - https://github.com/ROCm/rocm-systems/archive/refs/tags/rocm-7.2.0.tar.gz : 728ea7e9bf16e6ed217a0fd1a8c9afaba2dae2e7908fa4e27201e67c803c5638
homepage   : https://github.com/RadeonOpenCompute/rocminfo/
license    : NCSA
component  : programming.devel
summary    : ROCm Application for Reporting System Info
description: |
    ROCm Application for Reporting System Info
environment: |
    export ROCM_PATH=/usr
builddeps  :
    - rocm-cmake
    - rocm-runtime-devel
replaces   :
    - rocminfo
setup      : |
    %cmake_ninja -S projects/rocminfo -L \
      -DROCM_DIR=$ROCM_PATH \
      -DROCRTST_BLD_TYPE=Release \
      -DROCRTST_BLD_BITS=64
build      : |
    %ninja_build
install    : |
    %ninja_install
