# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rr
version    : 5.9.0
release    : 6
source     :
    - https://github.com/rr-debugger/rr/archive/refs/tags/5.9.0.tar.gz : e3a7ea10fc72a74fe9949baa8f2598192c4ee77e50ed229b88d6c3ee34381a39
homepage   : https://rr-project.org/
license    :
    - MIT
    # The entire source code is MIT with the exceptions of
    # files in following directories:
    - BSD-2-Clause
    #   src/external/tree.h
    #   third-party/proc-service
    - Zlib
    #   src/test/dlchecksum.c
    - CC0-1.0
    #   third-party/blake2
    - FSFAP-no-warranty-disclaimer
    #   third-party/gdb
    - GPL-2.0-only
    #   third-party/zen-pmu-workaround
component  : programming.tools
summary    : rr is a lightweight tool for recording, replaying and debugging execution of applications
description: |
    rr is a lightweight tool for recording, replaying and debugging execution of applications (trees of processes and threads).
builddeps  :
    - pkgconfig(capnp)
    - gdb
    - lldb
    - python-pexpect
setup      : |
    %apply_patches
    %cmake_ninja -Ddisable32bit=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
