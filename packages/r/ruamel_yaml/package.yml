# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ruamel_yaml
version    : 0.19.1
release    : 9
source     :
    - https://pypi.debian.net/ruamel.yaml/ruamel_yaml-0.19.1.tar.gz : 53eb66cd27849eff968ebf8f0bf61f46cdac2da1d1f3576dd4ccee9b25c31993
homepage   : https://yaml.readthedocs.io/en/latest/
license    : MIT
summary    : ruamel.yaml is a YAML 1.2 loader/dumper package for Python.
component  : programming.python
description: |
    ruamel.yaml is a YAML parser/emitter that supports roundtrip preservation of comments, seq/map flow style, and map key order
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - ruamel-yaml-clib
build      : |
    python3 -m build --wheel --skip-dependency-check --no-isolation
install    : |
    python3 -m installer --destdir="$installdir" dist/*.whl
