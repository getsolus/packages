# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : re2c
version    : '4.4'
release    : 10
homepage   : https://re2c.org/
source     :
    - https://github.com/skvadrik/re2c/releases/download/4.4/re2c-4.4.tar.lz : 069dacd5e4da3e543ebee27418ae106810d36cda14279bf4bf3a8566ce8b4e6b
license    : Public-Domain
component  : programming.tools
