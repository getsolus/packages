# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : r
version    : 4.5.2
release    : 57
source     :
    - https://cran.r-project.org/src/base/R-4/R-4.5.2.tar.gz : 0d71ff7106ec69cd7c67e1e95ed1a3cee355880931f2eb78c530014a9e379f20
homepage   : https://www.r-project.org/
license    : GPL-2.0-or-later
component  : programming
summary    : R is a system for statistical computation and graphics.
description: |
    R is a system for statistical computation and graphics.
optimize   :
    - speed
    - lto
patterns   :
    - /usr/include/R
    - /usr/lib64/pkgconfig
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(icu-io)
    - pkgconfig(lapack)
    - pkgconfig(libcurl)
    - pkgconfig(liblzma)
    - pkgconfig(libpcre2-posix)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(pangocairo)
    - pkgconfig(tk)
    - pkgconfig(xmu)
    - pkgconfig(xscrnsaver)
    - gfortran
    - libiconv-devel
    - openblas-devel
    - xdg-utils
extract    : false
environment: |
    unset LD_AS_NEEDED
setup      : |
    # manually extract to work around https://github.com/getsolus/solbuild/issues/126
    tar --strip-components=1 -xf $sources/R-%version%.tar.gz

    %configure \
        --enable-R-shlib \
        --with-blas="-lopenblas" \
        --with-lapack \
        --with-tcltk \
        rdocdir=/usr/share/doc/R \
        rincludedir=/usr/include/R \
        rsharedir=/usr/share/R
build      : |
    %make
install    : |
    %make_install
