# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ruamel-yaml-clib
version    : 0.2.15
release    : 4
source     :
    - https://files.pythonhosted.org/packages/source/r/ruamel_yaml_clib/ruamel_yaml_clib-0.2.15.tar.gz : 46e4cc8c43ef6a94885f72512094e482114a8a706d3c555a34ed4b0d20200600
homepage   : https://sourceforge.net/projects/ruamel-yaml-clib/
license    : MIT
component  : programming.python
summary    : C version of reader, parser and emitter for ruamel.yaml
description: |
    C version of reader, parser and emitter for ruamel.yaml
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
environment: |
    export CFLAGS="${CFLAGS} -Wno-incompatible-pointer-types"
build      : |
    %python3_setup
install    : |
    %python3_install
