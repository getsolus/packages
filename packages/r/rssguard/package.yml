# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rssguard
version    : 5.1.2
release    : 23
source     :
    - https://github.com/martinrotter/rssguard/releases/download/5.1.2/rssguard-5.1.2-src.tar.gz : 0cdc8f83852cff51e8bc9c5e0edeb664b0c3f37c22c55d4c175f3dcc33d98dfb
license    : GPL-3.0-or-later
homepage   : https://github.com/martinrotter/rssguard
component  : network.news
summary    : Simple (yet powerful) Qt feed reader
description: |
    Simple (yet powerful) Qt feed reader
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6WebEngineWidgets)
    - pkgconfig(mpv)
    - golang
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %patch -p1 -i $pkgfiles/0001-default-settings.patch
    %cmake_ninja -DNO_UPDATE_CHECK=ON \
                 -DREVISION_FROM_GIT=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.md
patterns   :
    - /usr/lib64/librssguard.so
