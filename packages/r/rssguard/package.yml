# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rssguard
version    : 5.2.0
release    : 24
source     :
    - https://github.com/martinrotter/rssguard/releases/download/5.2.0/rssguard-5.2.0-src.tar.gz : 9d5b4ebec8b72d725cdb8be7ddd19dfa0616139abb21b36d3886cb0ba2e50098
license    : GPL-3.0-or-later
homepage   : https://github.com/martinrotter/rssguard
component  : network.news
summary    : Simple (yet powerful) Qt feed reader
description: |
    Simple (yet powerful) Qt feed reader
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6WebEngineWidgets)
    - pkgconfig(mpv)
    - golang
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %patch -p1 -i $pkgfiles/0001-default-settings.patch
    %cmake_ninja -DNO_UPDATE_CHECK=ON \
                 -DREVISION_FROM_GIT=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.md
patterns   :
    - /usr/lib64/librssguard.so
