# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rssguard
version    : 5.1.1
release    : 22
source     :
    - https://github.com/martinrotter/rssguard/releases/download/5.1.1/rssguard-5.1.1-src.tar.gz : afcfd5a576ea573bbe05207d5a2a5158e44dbfcab9858469771d5f906c787c74
license    : GPL-3.0-or-later
homepage   : https://github.com/martinrotter/rssguard
component  : network.news
summary    : Simple (yet powerful) Qt feed reader
description: |
    Simple (yet powerful) Qt feed reader
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6WebEngineWidgets)
    - pkgconfig(mpv)
    - golang
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %patch -p1 -i $pkgfiles/0001-default-settings.patch
    %cmake_ninja -DNO_UPDATE_CHECK=ON \
                 -DREVISION_FROM_GIT=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
patterns   :
    - /usr/lib64/librssguard.so
