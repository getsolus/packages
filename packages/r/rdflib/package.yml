# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rdflib
version    : 7.6.0
release    : 15
source     :
    - https://github.com/RDFLib/rdflib/archive/refs/tags/7.6.0.tar.gz : 6b25bf33285300de5d93f8ab35a1692e70511caf95d264c4feb0266a21dbc7bd
homepage   : https://github.com/RDFLib/rdflib
license    : BSD-3-Clause
component  : programming.python
summary    : A Python library for working with RDF, a simple yet powerful language for representing information
description: |
    RDFLib is a Python library for working with RDF, a simple yet powerful language for representing information.
builddeps  :
    - python-build
    - python-installer
    - python-poetry
checkdeps  :
    - pyparsing
    - python-isodate
    - python-pytest
rundeps    :
    - pyparsing
    - python-html5lib # optional
    - python-isodate
build      : |
    %python3_setup
install    : |
    %python3_install
networking : true # check
check      : |
    %python3_test pytest -v --deselect test/test_misc/test_plugins.py
