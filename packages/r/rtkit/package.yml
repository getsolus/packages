# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : rtkit
version    : '0.14'
release    : 6
source     :
    - https://gitlab.freedesktop.org/pipewire/rtkit/-/archive/v0.14/rtkit-v0.14.tar.gz : 55dd379b11f52b81655e2dc676de9d602d050cb0beb18ef01f0f65569f0a5e59
homepage   : https://gitlab.freedesktop.org/pipewire/rtkit
license    :
    - GPL-3.0-or-later
    - MIT # rtkit.c
component  : system.utils
summary    : Realtime Policy and Watchdog Daemon
description: |
    RealtimeKit is a D-Bus system service that changes the scheduling policy of user processes/threads to SCHED_RR (i.e. realtime scheduling mode) on request
builddeps  :
    - pkgconfig(libcap)
    - vim # Needs xxd which is part of this package
setup      : |
    %meson_configure -Dsystemd_systemunitdir=%libdir%/systemd/system/ \
                     -Dinstalled_tests=false
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE GPL

    # Start by default
    install -Dm00644 $pkgfiles/rtkit-daemon.service $installdir/%libdir%/systemd/system/rtkit-daemon.service
    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/20-rtkit.preset
