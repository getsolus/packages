# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : erlang
version    : 29.0.2
release    : 52
source     :
    - https://github.com/erlang/otp/archive/refs/tags/OTP-29.0.2.tar.gz : 54e9b51659e604482a1b21ba25d91d500b62b0d0570f0b6d66317e0533087e86
homepage   : https://www.erlang.org/
license    : Apache-2.0
component  : programming
summary    : Erlang is a programming language used to build massively scalable systems.
description: |
    Erlang is a programming language used to build massively scalable soft real-time systems with requirements on high availability.
builddeps  :
    - pkgconfig(glu)
    - pkgconfig(x11)
    - perl
    - wxwidgets-devel
setup      : |
    ./otp_build setup
    %configure \
        --disable-static \
        --enable-shared
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE.txt LICENSES/*

    # Remove static libraries
    find ${installdir}/usr/lib64 -name "*.a" -delete
