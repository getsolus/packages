# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : erlang
version    : 29.0.3
release    : 53
source     :
    - https://github.com/erlang/otp/archive/refs/tags/OTP-29.0.3.tar.gz : edef13778a449490bc183134e442a955b134d69c56075d97765d8d4951d8d2bb
homepage   : https://www.erlang.org/
license    : Apache-2.0
component  : programming
summary    : Erlang is a programming language used to build massively scalable systems.
description: |
    Erlang is a programming language used to build massively scalable soft real-time systems with requirements on high availability.
builddeps  :
    - pkgconfig(glu)
    - pkgconfig(x11)
    - perl
    - wxwidgets-devel
setup      : |
    ./otp_build setup
    %configure \
        --disable-static \
        --enable-shared
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE.txt LICENSES/*

    # Remove static libraries
    find ${installdir}/usr/lib64 -name "*.a" -delete
