# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : erlang
version    : 28.5.0.1
release    : 51
source     :
    - https://github.com/erlang/otp/archive/refs/tags/OTP-28.5.0.1.tar.gz : f4d5c8cbf125ad139d29eeef05add22cf9da5a670833ea9716d89ac21cfce047
homepage   : https://www.erlang.org/
license    : Apache-2.0
component  : programming
summary    : Erlang is a programming language used to build massively scalable systems.
description: |
    Erlang is a programming language used to build massively scalable soft real-time systems with requirements on high availability.
builddeps  :
    - pkgconfig(glu)
    - pkgconfig(odbc)
    - pkgconfig(x11)
    - perl
    - wxwidgets-devel
setup      : |
    ./otp_build setup
    %configure --disable-static --enable-shared
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE.txt LICENSES/*

    # Remove static libraries
    find $installdir/usr/lib64 -name "*.a" -delete
