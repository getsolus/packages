# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : expat
version    : 2.8.2
release    : 40
source     :
    - https://github.com/libexpat/libexpat/releases/download/R_2_8_2/expat-2.8.2.tar.xz : 3ad89b8588e6644bd4e49981480d48b21289eebbcd4f0a1a4afb1c29f99b6ab4
homepage   : https://libexpat.github.io/
license    : MIT
component  :
    - system.base
    - devel : system.devel
summary    : XML Parsing Library
description: |
    The Expat package contains a stream oriented C library for parsing XML.
emul32     : true
setup      : |
    %configure --disable-static
build      : |
    %make
profile    : |
    %make check
install    : |
    %make_install
    %install_license COPYING
check      : |
    %make check
