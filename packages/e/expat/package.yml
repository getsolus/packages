# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : expat
version    : 2.8.1
release    : 39
source     :
    - https://github.com/libexpat/libexpat/releases/download/R_2_8_1/expat-2.8.1.tar.bz2 : f5833dd2e1cd7739ec9182804a1a29c4f0cc7c2f26b633d3a2188b7766a88ecb
homepage   : https://libexpat.github.io/
license    : MIT
component  :
    - system.base
    - devel : system.devel
summary    : XML Parsing Library
description: |
    The Expat package contains a stream oriented C library for parsing XML.
emul32     : true
setup      : |
    %configure --disable-static
build      : |
    %make
profile    : |
    %make check
install    : |
    %make_install
    %install_license COPYING
check      : |
    %make check
