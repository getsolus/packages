# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : etcher
version    : 2.1.5
release    : 40
source     :
    - https://github.com/balena-io/etcher/archive/refs/tags/v2.1.5.tar.gz : f5d80b61107b34ca4c2c8fd1051cbd1875e491d0006d7c75a76897979f8d5dcd
homepage   : https://www.balena.io/etcher/
license    : Apache-2.0
component  : system.utils
summary    : Flash OS images to SD cards & USB drives, safely and easily
description: |
    Etcher is a powerful OS image flasher built with web technologies to ensure flashing an SDCard or USB drive is a pleasant and safe experience. It protects you from accidentally writing to your hard-drives, ensures every byte of data was written correctly and much more.
networking : true
# Prebuilt Electron app; skip debuginfo split.
debug      : false
# Stripping can break Electron.
strip      : false
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(gbm)
    - pkgconfig(gdk-3.0)
    - pkgconfig(xscrnsaver)
    - git
    - nodejs-20
environment: |
    export PATH=/usr/lib64/nodejs-20/bin:${PATH}
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-Disable-update-checking.patch
build      : |
    npm ci
    npm run package
install    : |
    install -dm00755 ${installdir}/usr/share/etcher
    cp -a out/balenaEtcher-linux-x64/* ${installdir}/usr/share/etcher

    # forge postPackage uses `ln -s` with an absolute builddir path; use a relative link for the installed tree
    ln -sfn balena-etcher ${installdir}/usr/share/etcher/balenaEtcher

    install -dm00755 ${installdir}/usr/bin
    ln -sv /usr/share/etcher/balena-etcher ${installdir}/usr/bin/etcher

    for size in 16x16 32x32 48x48 128x128 256x256 512x512; do
        install -Dm00644 assets/iconset/$size.png ${installdir}/usr/share/icons/hicolor/$size/apps/etcher.png
    done

    install -Dm00644 ${pkgfiles}/etcher.desktop -t ${installdir}/usr/share/applications
    install -Dm00644 ${pkgfiles}/io.balena.etcher.metainfo.xml -t ${installdir}/usr/share/metainfo
    %install_license LICENSE
