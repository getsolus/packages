# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : element
version    : 1.12.17
release    : 215
homepage   : https://element.io/
source     :
    - git|https://github.com/element-hq/element-web.git : a8cac85cf10ea72984a54b23738dc1ecd2109d08
license    :
    - AGPL-3.0-or-later
    - GPL-3.0-or-later
component  : network.im
networking : true
summary    : A glossy Matrix collaboration client for desktop.
description: |
    All-in-one secure chat app for teams, friends and organisations. Keeps conversations in your control, safe from data-mining and ads. Talk to everyone through the open global Matrix network, protected by proper end-to-end encryption.
replaces   :
    - riot
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(atspi-2)
    - pkgconfig(gbm)
    - pkgconfig(gconf-2.0)
    - pkgconfig(gdk-3.0)
    - pkgconfig(libeconf)
    - pkgconfig(libsecret-1)
    - pkgconfig(pango)
    - pkgconfig(sqlcipher)
    - pkgconfig(xcomposite)
    - pkgconfig(xcursor)
    - pkgconfig(xrandr)
    - pkgconfig(xscrnsaver)
    - pkgconfig(xtst)
    - git
    - jq
    - libxcrypt-compat
    - nodejs-22
    - pnpm
    - rust
    - yarn
rundeps    :
    - libsecret
    - sqlcipher
environment: |
    export PATH="/usr/lib64/nodejs-22/bin/:$PATH"
setup      : |
    %apply_patches

    # Disable updates/tracking, enable labs settings
    jq '.update_base_url = null | .posthog = null | .show_labs_settings = true' \
        apps/desktop/element.io/release/config.json > config.json

    # Perform pnpm install on both
    pnpm install --frozen-lockfile
    pnpm -C apps/desktop install --frozen-lockfile

    # Symlink node so the correct version is used instead of /usr/bin/node
    ln -s /usr/lib64/nodejs-22/bin/node apps/desktop/node_modules/.bin/node
    ln -s /usr/lib64/nodejs-22/bin/node node_modules/.bin/node
build      : |
    # Build element-web while working around https://github.com/nrwl/nx/issues/22445
    script -c "pnpm -C apps/web build" /dev/null

    # Build native components
    pnpm -C apps/desktop run build:native

    # Build while working around https://github.com/nrwl/nx/issues/22445
    script -c "pnpm -C apps/desktop run build --publish never" /dev/null
install    : |
    # Installdir for Element
    element_installdir=$installdir/usr/share/element
    install -dm00644 $element_installdir/resources

    pushd apps/web
    cp -Rv webapp $element_installdir/resources/webapp
    popd

    # Wrapper script
    install -Dm00755 $pkgfiles/electron-desktop.sh $installdir/usr/bin/element-desktop

    # Install configuration
    install -Dm00644 config.json $element_installdir/resources/webapp/config.json

    pushd apps/desktop
    cp -Rv dist/linux-unpacked/* $element_installdir

    # Install Icons
    install -Dm00644 build/icon.png $installdir/usr/share/icons/hicolor/512x512/apps/element-desktop.png
    popd

    # Symlink for existing .desktop files
    ln -s element-desktop.png $installdir/usr/share/icons/hicolor/512x512/apps/element.png

    # Fix Wayland appid
    package_json=$element_installdir/resources/app.asar.unpacked/package.json
    tmp=$(mktemp)
    jq ".desktopName = \"im.riot.Riot.desktop\"" $package_json > "$tmp" && mv "$tmp" $package_json
    chmod 644 $package_json

    # Desktop File
    install -Dm00644 $pkgfiles/im.riot.Riot.desktop $installdir/usr/share/applications/im.riot.Riot.desktop

    # metainfo (AppStream)
    install -Dm00644 $pkgfiles/element.metainfo.xml $installdir/usr/share/metainfo/element.metainfo.xml

    %install_license LICENSE-AGPL-3.0 LICENSE-GPL-3.0
