# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : enchant
version    : 2.8.18
release    : 29
source     :
    - https://github.com/rrthomas/enchant/releases/download/v2.8.18/enchant-2.8.18.tar.gz : 
        883a16f0898c7b1af38046d8bce5c658156698498541e9344c60e317e8d48f2a
homepage   : https://rrthomas.github.io/enchant/
license    : LGPL-2.1-or-later
component  : office.spelling
summary    : Spell check library wrapper program
description: |
    Enchant is a library wrapper program that allows the use of mulitple spell checker backends at the same time.
builddeps  :
    - pkgconfig(hunspell)
    - pkgconfig(libvoikko)
    - groff
setup      : |
    %configure --disable-static --with-system-myspell=yes \
               --with-myspell-dir=/usr/share/hunspell
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING.LIB
