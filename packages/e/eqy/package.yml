# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : eqy
version    : '0.59'
release    : 3
source     :
    - https://github.com/YosysHQ/eqy/archive/refs/tags/v0.59.tar.gz : 3b19d1ada0c6212bf4a1e83e6585b3d93d1af0ec1a9b52b2d78944171e3ae4fc
homepage   : https://yosyshq.readthedocs.io/projects/eqy/en/latest/
license    : ISC
component  : office.scientific
summary    : Equivalence checking with Yosys
description: |
    Equivalence Checking with Yosys (EQY) is a front-end driver program for Yosys-based formal hardware verification flows.
clang      : true
builddeps  :
    - pkgconfig(python3)
    - pkgconfig(tcl)
    - libboost-devel
    - sby
    - yosys-devel
rundeps    :
    - yosys
build      : |
    %make
install    : |
    %make_install
