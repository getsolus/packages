# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : eqy
version    : 0.67
release    : 4
source     :
    - https://github.com/YosysHQ/eqy/archive/refs/tags/v0.67.tar.gz : adfda8bd661b702c7128a3094c6727f4bbafbda6585cacb94010b67020226ddd
homepage   : https://yosyshq.readthedocs.io/projects/eqy/en/latest/
license    : ISC
component  : office.scientific
summary    : Equivalence checking with Yosys
description: |
    Equivalence Checking with Yosys (EQY) is a front-end driver program for Yosys-based formal hardware verification flows.
clang      : true
builddeps  :
    - pkgconfig(python3)
    - pkgconfig(tcl)
    - libboost-devel
    - sby
    - yosys-devel
rundeps    :
    - yosys
build      : |
    %make
install    : |
    %make_install
