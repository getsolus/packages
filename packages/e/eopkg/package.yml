# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : eopkg
version    : 4.5.0
release    : 44
source     :
    - https://github.com/getsolus/eopkg/archive/refs/tags/v4.5.0.tar.gz : 32d2b34cf6a3dc8d9d714d6c4cad3a00cd41796c4e886e8de3b6e75c074f11ab
    - git|https://github.com/PackageKit/PackageKit.git : cf89311412a109098d186b238793368907c48d95 # v1.3.6
homepage   : https://github.com/getsolus/eopkg
license    : GPL-2.0-or-later
component  :
    - system.base
    - ^python-eopkg : programming.python
summary    :
    - The Solus package manager (nuitka-compiled version)
    - ^python-eopkg : The Solus package manager (python version)
description:
    - The Solus package manager (nuitka-compiled version)
    - ^python-eopkg : The Solus package manager (python version)
strip      : false # strip breaks nuitka compiled binaries
debug      : false # debug breaks nuitka compiled binaries
builddeps  :
    - pkgconfig(packagekit-glib2)
    - pkgconfig(python3)
    - iksemel-devel
    - nuitka
    - pandoc
    - patchelf
    - python-build
    - python-installer
    - python-jeepney
    - python-lzma-mt
    - python-magic
    - python-ordered-set
    - python-packaging
    - python-setuptools
    - python-wheel
    - python-xattr
    - python-zstandard
rundeps    :
    - ^python-eopkg :
        - iksemel
        - python-jeepney
        - python-lzma-mt
        - python-magic
        - python-ordered-set
        - python-xattr
environment: |
    # This prevents the dynamic loader and glibc from attempting to resolve shared objects via hwcaps,
    # and effectively forces nuitka to build with x86_64-v1 (OG AMD64). Note that more flags may need
    # to be added in the future to guard against either x86_64-v2, x86_64-v3 or x86_64-v4 hwcaps being used.
    export GLIBC_TUNABLES=glibc.cpu.hwcaps=-AVX
setup      : |
    %patch -p1 -i $pkgfiles/fully-trusted-tar.patch
    %patch -p1 -i $pkgfiles/0001-db-filesdb-Refactor-for-try-except-workflow.patch
    %patch -p1 -i $pkgfiles/0001-db-filesdb-Default-to-gbm.gnu-shelve-if-available.patch
    %patch -p1 -i $pkgfiles/shutil-get-terminal-size.patch
    %patch -p1 -i $pkgfiles/0001-cli-history-Rewrite-LessPager-to-be-used-in-contextl.patch

    %python3_setup
build      : |
    # Note: we need to ensure that ca-certs, libmagic, openssl, and zlib are included
    #       in the standalone package (all are part of system.base, so not listed in
    #       builddeps for now).
    #       The context is that the py3 ssl module depends on openssl and openssl needs
    #       ca-certs to be able to check https connections.

    # Build eopkg
    # We're not actually using self-execution. In this case, eopkg is using the -c flag as shorthand for --component, rather than for passing the program as a string (as is default python behavior).
    nuitka \
        --onefile \
        --include-module=dbm.gnu \
        --user-package-configuration-file=$pkgfiles/iksemel.nuitka-package.config.yml \
        --include-data-dir=build/lib/pisi/data/locale=pisi/data/locale \
        --show-scons \
        --no-deployment-flag=self-execution \
        --report=eopkg-nuitka-report.xml \
        eopkg.py

    # Build lseopkg
    nuitka \
        --onefile \
        --user-package-configuration-file=$pkgfiles/iksemel.nuitka-package.config.yml \
        --include-data-dir=build/lib/pisi/data/locale=pisi/data/locale \
        --show-scons \
        --include-module=dbm.gnu \
        --report=lseopkg-nuitka-report.xml \
        pisi/scripts/lseopkg.py

    # Build uneopkg
    nuitka \
        --onefile \
        --user-package-configuration-file=$pkgfiles/iksemel.nuitka-package.config.yml \
        --include-data-dir=build/lib/pisi/data/locale=pisi/data/locale \
        --show-scons \
        --include-module=dbm.gnu \
        --report=uneopkg-nuitka-report.xml \
        pisi/scripts/uneopkg.py

    # Build eopkg packagekit backend
    nuitka \
        --onefile \
        --user-package-configuration-file=$pkgfiles/iksemel.nuitka-package.config.yml \
        --include-module=dbm.gnu \
        --report=pk-nuitka-report.xml \
        $sources/PackageKit.git/backends/eopkg/eopkgBackend.py
install    : |
    %python3_install

    # Add .py extension
    for exe in eopkg lseopkg uneopkg; do
        mv -v $installdir/usr/bin/${exe} $installdir/usr/bin/${exe}.py
    done

    # install the nuitka-compiled eopkg PackageKit backend (TODO: move this to packagekit)
    install -Dm0755 ./eopkgBackend.bin $installdir/usr/share/PackageKit/helpers/eopkg/eopkgBackend.bin

    # install the compiled eopkg.bin nuitka standalone thing
    install -Dm0755 ./eopkg.bin $installdir/usr/bin/eopkg.bin

    # install nuitka compiled lseopkg and uneopkg
    for exe in lseopkg uneopkg; do
      install -Dm0755 ./${exe}.bin $installdir/usr/bin/${exe}.bin
    done

    # Install Bash completions
    install -Dm0755 $workdir/dist/completions/bash/eopkg $installdir/usr/share/bash-completion/completions/eopkg

    # Install Zsh completions
    install -Dm0755 $workdir/dist/completions/zsh/_eopkg $installdir/usr/share/zsh/site-functions/_eopkg

    # Symlink all the eopkg commands
    ln -srv $installdir/usr/bin/eopkg.bin $installdir/usr/bin/eopkg
    ln -srv $installdir/usr/bin/eopkg.bin $installdir/usr/bin/eopkg-cli
    ln -srv $installdir/usr/bin/lseopkg.bin $installdir/usr/bin/lseopkg
    ln -srv $installdir/usr/bin/lseopkg.bin $installdir/usr/bin/lspisi
    ln -srv $installdir/usr/bin/uneopkg.bin $installdir/usr/bin/uneopkg
    ln -srv $installdir/usr/bin/uneopkg.bin $installdir/usr/bin/unpisi

    # man page is re-generated by eopkg_build.py if pandoc is in builddeps
    install -Dm0644 ./dist/man/eopkg.1 $installdir/usr/share/man/man1/eopkg.1

    # install default eopkg config files (eopkg.conf will be overridden)
    install -Dm0644 $installdir/usr/lib/python%python3_version%/site-packages/pisi/data/eopkg.conf $installdir/usr/share/defaults/eopkg/eopkg.conf
    install -Dm0644 $pkgfiles/mirrors.conf $installdir/usr/share/defaults/eopkg/mirrors.conf
    install -Dm0644 $pkgfiles/mirrors.conf $installdir/usr/share/defaults/eopkg/sandbox.conf
patterns   :
    - ^python-eopkg :
        - /usr/lib/python3.*/site-packages/eopkg*
        - /usr/lib/python3.*/site-packages/pisi
        - /usr/bin/*eopkg.py
