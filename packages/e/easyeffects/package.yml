# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : easyeffects
version    : 8.2.2
release    : 29
source     :
    - https://github.com/wwmm/easyeffects/archive/refs/tags/v8.2.2.tar.gz : 291b6b1913d828164dda77d37f74a3c2171884cecdcf8b29458dec78df62572f
homepage   : https://github.com/wwmm/easyeffects
license    : GPL-3.0-or-later
component  : multimedia.audio
summary    : Audio effects for PipeWire applications
description: |
    Limiter, compressor, convolver, equalizer and auto volume and many other plugins for PipeWire applications
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6DBus)
    - pkgconfig(Qt6Graphs)
    - pkgconfig(Qt6Gui)
    - pkgconfig(Qt6Network)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(fftw3)
    - pkgconfig(fftw3f)
    - pkgconfig(gsl)
    - pkgconfig(libbs2b)
    - pkgconfig(libebur128)
    - pkgconfig(libmysofa)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libportal)
    - pkgconfig(libportal-qt6)
    - pkgconfig(lilv-0)
    - pkgconfig(nlohmann_json)
    - pkgconfig(rnnoise)
    - pkgconfig(sndfile)
    - pkgconfig(soundtouch)
    - pkgconfig(speexdsp)
    - pkgconfig(tbb)
    - pkgconfig(webrtc-audio-processing-2)
    - extra-cmake-modules
    - kf6-kcolorscheme-devel
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kirigami-devel
    - kf6-qqc2-desktop-style-devel
    - kirigami-addons-devel
    - ladspa-devel
    - zita-convolver-devel
rundeps    :
    - calf
    - deepfilternet
    - fmt
    - kf6-qqc2-desktop-style
    - kirigami-addons
    - lsp-plugins
    - mda-lv2
    - qt6-graphs
    - yelp
    - zam-plugins
clang      : true
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
replaces   :
    - pulseeffects
    - dbginfo : pulseeffects-dbginfo
