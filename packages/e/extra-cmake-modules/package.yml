# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : extra-cmake-modules
version    : 6.27.0
release    : 109
source     :
    - https://download.kde.org/stable/frameworks/6.27/extra-cmake-modules-6.27.0.tar.xz : f3b5af578017a6a0f127fb1c31609db2e4f016e99b900d5a11f6ffb6c55006a3
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - MIT
component  : programming.devel
summary    : Extra cmake modules and scripts for KF5/KF6.
description: |
    Extra cmake modules and scripts for KF5/KF6.
builddeps  :
    - pkgconfig(Qt6Designer)
    - doxygen
    - python-sphinx
    - python-sphinxcontrib-qthelp
rundeps    :
    - doxygen
setup      : |
    %apply_patches
    %cmake_kf6 -DBUILD_QTHELP_DOCS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
    rm -rfv $installdir/usr/share/doc/ECM/html
