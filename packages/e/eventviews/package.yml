# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : eventviews
version    : 26.04.3
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/eventviews-26.04.3.tar.xz : 84fc3901f320f435bbff7c94859eeb84f056839d1aeeac5c6390a75dcc624d2f
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : desktop.library
summary    : Library for creating events
description: |
    Library for creating events.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(KF6GuiAddons)
    - akonadi-calendar-devel
    - calendarsupport-devel
    - kcalutils-devel
    - kdiagram-devel
    - kf6-kcompletion-devel
    - kf6-kcontacts-devel
    - kf6-kholidays-devel
    - kf6-kiconthemes-devel
    - kf6-kservice-devel
    - kmime-devel
    - libkdepim-devel
rundeps    :
    - devel :
        - akonadi-calendar-devel
        - akonadi-devel
        - calendarsupport-devel
        - kcalutils-devel
        - kf6-kcalendarcore-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
