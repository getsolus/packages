name       : pango
version    : 1.52.1
release    : 59
source     :
    - https://download.gnome.org/sources/pango/1.52/pango-1.52.1.tar.xz : 58728a0a2d86f60761208df9493033d18ecb2497abac80ee1a274ad0c6e55f0f
homepage   : http://www.pango.org
license    : LGPL-2.0-or-later
component  : desktop.library
summary    : pango (Library for laying out and rendering text)
description: |
    Pango is a library used for laying out and rendering text with an emphasis on internationalization.
emul32     : yes
optimize   :
    - speed
    - lto
builddeps  :
    - pkgconfig32(cairo)
    - pkgconfig32(expat)
    - pkgconfig32(fontconfig)
    - pkgconfig32(freetype2)
    - pkgconfig32(fribidi)
    - pkgconfig32(gobject-2.0)
    - pkgconfig32(harfbuzz)
    - pkgconfig32(json-glib-1.0)
    - pkgconfig32(x11)
    - pkgconfig32(xft)
    - pkgconfig32(xrender)
    - pkgconfig32(xshmfence)
    - pkgconfig(gtk-doc)
setup      : |
    if [[ ! -z "${EMUL32BUILD}" ]]; then
        build_gobject="disabled"
    else
        build_gobject="enabled"
    fi
    %meson_configure -Dgtk_doc=false -Dintrospection=$build_gobject
build      : |
    %ninja_build
profile    : |
    %ninja_check || :
install    : |
    %ninja_install
check      : |
    %ninja_check || :
