# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pim-data-exporter
version    : 26.04.3
release    : 95
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/pim-data-exporter-26.04.3.tar.xz : 2c0ecfb883267f5c18fdde254c7702c28fbb5c579d2633bf622c2de6d50c9560
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : office
summary    : Application to archive PIM data
description: |
    Application to assist you with backing up and archiving PIM data, including the necessary configuration, for archival or transfer to another computer.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - kf6-karchive-devel
    - kf6-kcontacts-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-knotifications-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-kuserfeedback-devel
    - kf6-kxmlgui-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - ktextaddons-devel
    - mailcommon-devel
    - pimcommon-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |-
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rf $installdir/usr/share/doc
