# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : packagekit-qt
version    : 1.1.4
release    : 5
source     :
    - https://github.com/PackageKit/PackageKit-Qt/archive/refs/tags/v1.1.4.tar.gz : bbb8398d0f98c46e2ed7fd3ce526d4f7fc8476f5a449e89269f01b1bc751c4ad
homepage   : https://github.com/PackageKit/PackageKit-Qt
license    : LGPL-2.1-or-later
component  : desktop.qt
summary    :
    Qt bindings for PackageKit
description: |
    Qt bindings for PackageKit
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(packagekit-glib2)
clang      : true
optimize   : lto
setup      : |
    %patch -p1 -i $pkgfiles/0001-Add-bindings-for-download-size-property.patch
    %patch -p1 -i $pkgfiles/fix-offline-property-invalidation.patch

    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
replaces:
    - packagekit-qt-qt5
    - packagekit-qt-qt6
    - devel :
        - packagekit-qt-qt5-devel
        - packagekit-qt-qt6-devel

