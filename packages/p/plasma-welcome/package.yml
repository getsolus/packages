# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-welcome
version    : 6.6.5
release    : 35
source     :
    - https://download.kde.org/stable/plasma/6.6.5/plasma-welcome-6.6.5.tar.xz : bc9427d739cdc8ba7f49fe62d02a716351a772df1b2b696c6c1f08695c4126a2
homepage   : https://invent.kde.org/plasma/plasma-welcome
license    :
    - BSD-2-Clause
    - CC-BY-SA-4.0
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
component  : desktop.kde
summary    : Plasma Welcome
description: |
    A Friendly onboarding wizard for Plasma.
builddeps  :
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6Svg)
    - kf6-kcmutils-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-knewstuff-devel
    - kf6-kservice-devel
    - kf6-ksvg-devel
    - kf6-kuserfeedback-devel
    - kf6-kwindowsystem-devel
    - kirigami-addons-devel
    - libplasma-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
rundeps    :
    - kf6-kuserfeedback
    - kirigami-addons
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    rm -v $installdir/usr/lib64/libplasma-welcome-publicplugin.a
