# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : protobuf
version    : '35.1'
release    : 30
source     :
    - https://github.com/protocolbuffers/protobuf/releases/download/v35.1/protobuf-35.1.tar.gz : f0b6838e7522a8da96126d487068c959bc624926368f3024ac8fd03abd0a1ac4
homepage   : https://developers.google.com/protocol-buffers/
license    : BSD-3-Clause
component  :
    - programming
    - ^python-protobuf : programming.python
summary    :
    - Protocol Buffers - Google's data interchange format
    - ^python-protobuf : Python bindings for Protobuf
description: |
    Protocol Buffers - Google's data interchange format
networking : true
builddeps  :
    - pkgconfig(absl_base)
    - pkgconfig(python3)
    - bazelisk
    - openjdk-25
    - python-installer
    - python-wheel
checkdeps  :
    - gtest
rundeps    :
    - ^python-protobuf : protobuf
clang      : true
environment: |
    export JAVA_HOME=/usr/lib64/openjdk-25
setup      : |
    %cmake_ninja -D protobuf_BUILD_SHARED_LIBS=ON \
                 -D protobuf_BUILD_TESTS=ON \
                 -D protobuf_USE_EXTERNAL_GTEST=ON \
                 -D protobuf_ABSL_PROVIDER=package \
                 -D protobuf_LOCAL_DEPENDENCIES_ONLY=ON \
                 -W no-dev
build      : |
    %ninja_build
    bazel build \
        --action_env=CC=/usr/bin/${CC} \
        --action_env=CXX=/usr/bin/${CXX} \
        --repo_env=CC=/usr/bin/${CC} \
        --repo_env=CXX=/usr/bin/${CXX} \
        //python/dist:binary_wheel
install    : |
    %ninja_install
    python3 -m installer --destdir=${installdir} bazel-bin/python/dist/*.whl
    %install_license LICENSE
check      : |
    ctest --test-dir solusBuildDir
patterns   :
    - ^python-protobuf :
        - /usr/lib*/python*
    - devel :
        - /usr/bin/*
