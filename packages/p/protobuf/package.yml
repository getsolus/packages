# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : protobuf
version    : '34.0'
release    : 19
source     :
    - https://github.com/protocolbuffers/protobuf/releases/download/v34.0/protobuf-34.0.tar.gz : e540aae70d3b4f758846588768c9e39090fab880bc3233a1f42a8ab8d3781efd
homepage   : https://developers.google.com/protocol-buffers/
license    : BSD-3-Clause
component  : programming
summary    : Protocol Buffers - Google's data interchange format
description: |
    Protocol Buffers - Google's data interchange format
builddeps  :
    - pkgconfig(absl_base)
checkdeps  :
    - gtest
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_ninja -D protobuf_BUILD_SHARED_LIBS=ON \
                 -D protobuf_USE_EXTERNAL_GTEST=ON \
                 -D protobuf_ABSL_PROVIDER=package \
                 -W no-dev
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    ctest --test-dir solusBuildDir
patterns   :
    - devel :
        - /usr/bin/*
