# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-systemmonitor
version    : 6.7.3
release    : 82
source     :
    - https://download.kde.org/stable/plasma/6.7.3/plasma-systemmonitor-6.7.3.tar.xz : 5c1190c61d20a254ce8f369de55a837df2ee33366e78124b015cbb3d62d1490c
homepage   : https://kde.org/plasma-desktop
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - LGPL-3.0-or-later
component  : desktop.kde.core
summary    : New version of KSysGuard built on top of the new KStats daemon and using QML for its UI
description: |
    New version of KSysGuard built on top of the new KStats daemon and using QML for its UI
libsplit   : false
builddeps  :
    - kf6-kdbusaddons-devel
    - kf6-kglobalaccel-devel
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-kitemmodels-devel
    - kf6-knewstuff-devel
    - kirigami-addons-devel
    - ksystemstats
    - libksysguard-devel
    - qt6-base-private-devel
rundeps    :
    - kf6-kiconthemes
    - kf6-kirigami
    - kirigami-addons
    - ksystemstats
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
