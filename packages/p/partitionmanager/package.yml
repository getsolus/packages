# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : partitionmanager
version    : 26.04.3
release    : 70
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/partitionmanager-26.04.3.tar.xz : e13af35e2bc7991d407f70abdc42c3ab7a3789b28bb02e241ae6cee789880f6d
homepage   : https://apps.kde.org/partitionmanager/
license    :
    - CC-BY-4.0
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
    - MIT
component  : system.utils
summary    : KDE utility to help you manage disk devices
description: |
    KDE Partition Manager is a utility program to help you manage the disk devices, partitions and file systems on your computer. It allows you to easily create, copy, move, delete, resize without losing data, backup and restore partitions.
builddeps  :
    - pkgconfig(polkit-qt6-1)
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - kpmcore-devel
rundeps    :
    - smartmontools
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove HTML docs
    rm -rfv $installdir/usr/share/doc
