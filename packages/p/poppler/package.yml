# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : poppler
version    : 26.05.0
release    : 59
source     :
    - https://gitlab.freedesktop.org/poppler/poppler/-/archive/poppler-26.05.0/poppler-poppler-26.05.0.tar.bz2 : 7825b8acdb842d018f47bc1ff28c0b172e5c70f39bf73c0b0e2391454e6d564e
    - git|https://gitlab.freedesktop.org/poppler/test.git : b85e4d1ce75636b3e727555a9d31da34ad771c1c
homepage   : https://poppler.freedesktop.org/
license    : GPL-2.0-or-later
component  :
    - desktop.library
    - qt5 : desktop.library
    - qt6 : desktop.library
    - utils : office
summary    : PDF Rendering Library
description: |
    This is Poppler, a library for rendering PDF files, and examining or modifying their structure.
optimize   :
    - lto
    - speed
builddeps  :
    - pkgconfig(Qt5Core)
    - pkgconfig(Qt6Core)
    - pkgconfig(fontconfig)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(gpgme)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(lcms2)
    - pkgconfig(libcurl)
    - pkgconfig(libopenjp2)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(nss)
    - pkgconfig(poppler-data)
    - libboost-devel
rundeps    :
    - devel :
        - poppler-utils
    - poppler-data
    - qt5-devel :
        - poppler-qt5
    - qt6-devel :
        - poppler-qt6
    - urw-core35-fonts
setup      : |
    %cmake_ninja \
        -DTESTDATADIR=${sources}/test.git \
        -DLIB_SUFFIX=%LIBSUFFIX% \
        -DENABLE_UNSTABLE_API_ABI_HEADERS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING*
profile    : |
    ctest \
        --test-dir solusBuildDir \
        --verbose \
        --parallel %JOBS% \
        --output-on-failure \
        --force-new-ctest-process \
        --exclude-regex 'check_qt5_signature_basics|check_qt6_signature_basics'
check      : |
    # These tests have been failing since https://gitlab.freedesktop.org/poppler/poppler/-/commit/2df6cf6e5c5dccecefc4b6f1dfba8c65c3aa94b0
    # for an unknown reason. Are we perhaps not initializing a database or something?
    ctest \
        --test-dir solusBuildDir \
        --verbose \
        --parallel %JOBS% \
        --output-on-failure \
        --force-new-ctest-process \
        --exclude-regex 'check_qt5_signature_basics|check_qt6_signature_basics'
patterns   :
    - qt5 :
        - /usr/lib64/lib*qt5*.so.*
    - qt5-devel :
        - /usr/include/poppler/qt5/
        - /usr/lib64/lib*qt5*.so
        - /usr/lib64/pkgconfig/*qt5*.pc
    - qt6 :
        - /usr/lib64/lib*qt6*.so.*
    - qt6-devel :
        - /usr/include/poppler/qt6/
        - /usr/lib64/lib*qt6*.so
        - /usr/lib64/pkgconfig/*qt6*.pc
    - utils :
        - /usr/bin
        - /usr/share/man
