# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pangomm
version    : 2.46.5
release    : 23
source     :
    - https://download.gnome.org/sources/pangomm/2.46/pangomm-2.46.5.tar.xz : 38ca0b050b065de4e3da0c182df657437757063bbf0c4b6c9567ddba019b1d68
homepage   : https://www.gtkmm.org/
license    : LGPL-2.0-or-later
component  : desktop.library
summary    : C++ bindings to pango
description: |
    C++ bindings to pango
optimize   : speed
builddeps  :
    - pkgconfig(cairomm-1.0)
    - pkgconfig(glibmm-2.4)
    - pkgconfig(pangocairo)
patterns   :
    - devel : /usr/lib64/pangomm-1.4
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
