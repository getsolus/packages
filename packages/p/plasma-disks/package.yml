# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-disks
version    : 6.7.3
release    : 85
source     :
    - https://download.kde.org/stable/plasma/6.7.3/plasma-disks-6.7.3.tar.xz : c7a7604581d646b04e2aa4e2ce0e30f7dde204a853dc958ccb392acf89cce259
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-3.0-only
component  : system.utils
summary    : Monitors S.M.A.R.T. capable devices for imminent failure
description: |
    Monitors S.M.A.R.T. capable devices for imminent failure
builddeps  :
    - kf6-kauth-devel
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-kio-devel
    - kf6-knotifications-devel
    - smartmontools-devel
rundeps    :
    - smartmontools
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
