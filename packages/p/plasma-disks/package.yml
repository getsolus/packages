# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-disks
version    : 6.7.1
release    : 83
source     :
    - https://download.kde.org/stable/plasma/6.7.1/plasma-disks-6.7.1.tar.xz : 80cc66bfebaf8489cb800d3d15f0e27f01107a0cf36ca165900c61c0ebfee3bd
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-3.0-only
component  : system.utils
summary    : Monitors S.M.A.R.T. capable devices for imminent failure
description: |
    Monitors S.M.A.R.T. capable devices for imminent failure
builddeps  :
    - kf6-kauth-devel
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-kio-devel
    - kf6-knotifications-devel
    - smartmontools-devel
rundeps    :
    - smartmontools
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
