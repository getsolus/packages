name       : plasma-activities-stats
version    : 6.2.0
release    : 17
source     :
    - https://download.kde.org/stable/plasma/6.2.0/plasma-activities-stats-6.2.0.tar.xz : 215d7728537b890a1f319f13caa6038c02dc4e3e64d99cf40ce08fc82f465dfd
homepage   : https://invent.kde.org/plasma/plasma-activities-stats
license    :
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : A library for accessing the usage data collected by the activities system.
