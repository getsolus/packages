# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-activities-stats
version    : 6.7.2
release    : 49
source     :
    - https://download.kde.org/stable/plasma/6.7.2/plasma-activities-stats-6.7.2.tar.xz : 1928355838356bcd59790701cb8d470849b0dc4bec183e3eae26d12f789459b4
homepage   : https://invent.kde.org/plasma/plasma-activities-stats
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : A library for accessing the usage data collected by the activities system.
description: |
    A library for accessing the usage data collected by the activities system.
builddeps  :
