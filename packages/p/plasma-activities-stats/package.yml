# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-activities-stats
version    : 6.7.1
release    : 48
source     :
    - https://download.kde.org/stable/plasma/6.7.1/plasma-activities-stats-6.7.1.tar.xz : 62f4b80965f0d616e50b95d7eecfce4abb92b426190f8ce76d929b94106c38f5
homepage   : https://invent.kde.org/plasma/plasma-activities-stats
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : A library for accessing the usage data collected by the activities system.
description: |
    A library for accessing the usage data collected by the activities system.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-kconfig-devel
    - plasma-activities-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
