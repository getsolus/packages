# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-activities
version    : 6.7.1
release    : 50
source     :
    - https://download.kde.org/stable/plasma/6.7.1/plasma-activities-6.7.1.tar.xz : d9e38efa6a0ab8b50c208c08acac7bfe23c9e8f7cafcc180a164724ad6819804
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : programming.library
summary    : Core components for the KDE Activity concept
description: |
    Plasma Activities provides the infrastructure needed to manage a user's activites, allowing them to switch between tasks, and for applications to update their state to match the user's current activity. This includes a daemon, a library for interacting with that daemon, and plugins for integration with other frameworks.
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Quick)
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - libboost-devel
    - qt6-base-private-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
