# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-activities
version    : 6.6.2
release    : 45
source     :
    - https://download.kde.org/stable/plasma/6.6.2/plasma-activities-6.6.2.tar.xz : 1315b11497b682a1881ae99c40d7af43177046dda3fff76e7b5bbcb598d9b3ef
homepage   : https://community.kde.org/Frameworks
license    :
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - MIT
component  : programming.library
summary    : Core components for the KDE Activity concept
description: |
    Plasma Activities provides the infrastructure needed to manage a user's activites, allowing them to switch between tasks, and for applications to update their state to match the user's current activity. This includes a daemon, a library for interacting with that daemon, and plugins for integration with other frameworks.
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Quick)
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - libboost-devel
    - qt6-base-private-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
