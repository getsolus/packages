# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : packagekit
version    : 1.3.6
release    : 46
source     :
    - git|https://github.com/PackageKit/PackageKit.git : 61e115bae31a4aea8a7c6874b8e46ad59058ae72
license    : GPL-2.0-or-later
component  : programming.library
homepage   : https://www.freedesktop.org/software/PackageKit/
summary    : A D-BUS abstraction layer that allows the user to manage packages in a secure way using a cross-distro, cross-architecture API.
description: |
    PackageKit is a DBUS abstraction layer that allows the session user to manage packages in a secure way using a cross-distro, cross-architecture API.
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(bash-completion)
    - pkgconfig(gio-2.0)
    - pkgconfig(gmodule-2.0)
    - pkgconfig(gstreamer-plugins-base-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(jansson)
    - pkgconfig(libsystemd)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(python3)
    - pkgconfig(sqlite3)
    - docbook-xml
    - python-setuptools
    - vala
setup      : |
    %patch -p1 -i $pkgfiles/0001-spawn-Set-LC_CTYPE-to-C.UTF-8-in-environment.patch

    %patch -p1 -i $pkgfiles/0001-spawned-Add-support-for-emitting-update-severity.patch
    %patch -p1 -i $pkgfiles/0002-backends-eopkg-Mark-security-updates-with-critical-s.patch

    %meson_configure \
        -Dpackaging_backend=eopkg \
        -Dbash_command_not_found=false
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    # Reproducibility /var/lib/PackageKit/transactions.db
    rm -rv $installdir/var/
