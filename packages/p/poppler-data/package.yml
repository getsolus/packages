# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : poppler-data
version    : 0.4.12
release    : 6
source     :
    - https://poppler.freedesktop.org/poppler-data-0.4.12.tar.gz : c835b640a40ce357e1b83666aabd95edffa24ddddd49b8daff63adb851cdab74
    - https://dev.gentoo.org/~sam/distfiles/app-text/poppler-data/poppler-data-0.4.11-2-extra.tar.xz#poppler-data-extra.tar.gz : 2f62dc1d20e1646e9c92e6fc35ba26f7d12b7cacee3577e5fd4a85511bfc6603
license    :
    - BSD-3-Clause
    - GPL-2.0-only
    - MIT
component  : desktop.library
homepage   : https://poppler.freedesktop.org/
summary    : encoding data for the poppler PDF rendering library
description: |
    This package consists of encoding files for use with poppler. The encoding files are optional and poppler will automatically read them if they are present. When installed, the encoding files enables poppler to correctly render CJK and Cyrrilic properly.
patterns   : /usr/share/pkgconfig/poppler-data.pc
setup      : |
    mkdir ../poppler-data-extra
    tar -xf ${sources}/poppler-data-extra.tar.gz -C ../poppler-data-extra --strip-components=1
    ls -la ../poppler-data-extra

    %cmake_ninja
install    : |
    %ninja_install

    # Additional cMaps for ghostscript
    cp ../poppler-data-extra/Identity-* ${installdir}/usr/share/poppler/cMap/

    # Add symlinks to cMaps
    pushd ${installdir}/usr/share/poppler/cMap
        find ../cMap -type f -exec ln -s {} . \;
    popd

    %install_license COPYING COPYING.adobe
