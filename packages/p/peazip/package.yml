# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : peazip
version    : 10.9.0
release    : 1
source     :
    - https://github.com/peazip/PeaZip/releases/download/10.9.0/peazip-10.9.0.src.zip : dbe224ac916f9c9e5fc1afa176eb47ff3694ee7be83fc12e2337459141369906
homepage   : https://peazip.github.io
license    : LGPL-3.0-or-later
component  : system.utils
summary    : Free Zip / Unzip software and Rar file extractor. Cross-platform file and archive manager.
description: |
    PeaZip is an Open Source, cross-platform archive manager and file manager utility, written with Lazarus / FreePascal IDE. This package is built natively utilizing the Qt6 widgetset.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Gui)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(x11)
    - brotli
    - fpc
    - lazarus
    - p7zip
    - qt6pas-devel
    - zstd
rundeps    :
    - brotli
    - p7zip
    - qt6-svg
    - qt6-wayland
    - zstd
build      : |
    lazbuild --lazarusdir=/usr/lib64/lazarus --add-package dev/metadarkstyle/metadarkstyle.lpk
    lazbuild --lazarusdir=/usr/lib64/lazarus --widgetset=qt6 dev/project_peach.lpi
    lazbuild --lazarusdir=/usr/lib64/lazarus --widgetset=qt6 dev/project_pea.lpi
install    : |
    install -dm00755 $installdir/usr/lib/peazip
    cp -a res $installdir/usr/lib/peazip/
    install -m00755 dev/peazip $installdir/usr/lib/peazip/
    install -m00755 dev/pea $installdir/usr/lib/peazip/
    
    # Clean up unnecessary Windows and macOS specific integration files
    rm -rf "$installdir/usr/lib/peazip/res/share/batch/Windows"
    rm -rf "$installdir/usr/lib/peazip/res/share/batch/macOS service menus"
    
    # Use bash wrappers instead of symlinks to appease ypkg's strict validation ---
    # Clear out any dummy/placeholder files in the source's bin folder
    rm -rf $installdir/usr/lib/peazip/res/bin/*
    
    # Wrapper for system 7z
    install -dm00755 $installdir/usr/lib/peazip/res/bin/7z
    echo '#!/bin/bash' > $installdir/usr/lib/peazip/res/bin/7z/7z
    echo 'exec /usr/bin/7z "$@"' >> $installdir/usr/lib/peazip/res/bin/7z/7z
    chmod +x $installdir/usr/lib/peazip/res/bin/7z/7z
    
    # Wrapper for system Brotli
    install -dm00755 $installdir/usr/lib/peazip/res/bin/brotli
    echo '#!/bin/bash' > $installdir/usr/lib/peazip/res/bin/brotli/brotli
    echo 'exec /usr/bin/brotli "$@"' >> $installdir/usr/lib/peazip/res/bin/brotli/brotli
    chmod +x $installdir/usr/lib/peazip/res/bin/brotli/brotli
    
    # Wrapper for system Zstd
    install -dm00755 $installdir/usr/lib/peazip/res/bin/zstd
    echo '#!/bin/bash' > $installdir/usr/lib/peazip/res/bin/zstd/zstd
    echo 'exec /usr/bin/zstd "$@"' >> $installdir/usr/lib/peazip/res/bin/zstd/zstd
    chmod +x $installdir/usr/lib/peazip/res/bin/zstd/zstd
    
    install -dm00755 $installdir/usr/bin
    ln -s /usr/lib/peazip/peazip $installdir/usr/bin/peazip
    
    install -dm00755 $installdir/usr/share/applications
    install -m00644 res/share/batch/freedesktop_integration/peazip.desktop $installdir/usr/share/applications/
    install -dm00755 $installdir/usr/share/icons/hicolor/256x256/apps
    install -m00644 res/share/icons/peazip.png $installdir/usr/share/icons/hicolor/256x256/apps/
    sed -i 's|^TryExec=.*|TryExec=/usr/bin/peazip|g' $installdir/usr/share/applications/peazip.desktop
    sed -i 's|^Exec=peazip|Exec=/usr/bin/peazip|g' $installdir/usr/share/applications/peazip.desktop
    sed -i 's|^Icon=.*|Icon=peazip|g' $installdir/usr/share/applications/peazip.desktop

    # Install appstream metadata
    install -Dm00644 $pkgfiles/io.github.peazip.peazip.metainfo.xml -t $installdir/usr/share/metainfo
    
    # Peazip does not include LICENSE file in Linux src zip \
    # Explicitly install the LICENSE file to the correct directory for the pspec.xml manifest
    install -dm00755 $installdir/usr/share/licenses/peazip
    install -Dm00644 $pkgfiles/LICENSE -t $installdir/usr/share/licenses/peazip
