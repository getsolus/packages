# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : polkit-kde-agent
version    : 6.7.1
release    : 138
source     :
    - https://download.kde.org/stable/plasma/6.7.1/polkit-kde-agent-1-6.7.1.tar.xz : 1af2f2b2b33e18384eb120c7422f6d28ff3c7855b33a988e1777dee482d678a7
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Daemon providing a polkit authentication for KDE
description: |
    Daemon providing a polkit authentication for KDE.
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(polkit-qt6-1)
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
