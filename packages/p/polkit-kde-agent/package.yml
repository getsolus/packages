name       : polkit-kde-agent
version    : 6.3.1
release    : 115
source     :
    - https://download.kde.org/stable/plasma/6.3.1/polkit-kde-agent-1-6.3.1.tar.xz : f8acd2570de8937605d57171017896575b86f2d5d56e6088ede73f106d9f0bb2
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Daemon providing a polkit authentication for KDE
description: |
    Daemon providing a polkit authentication for KDE.
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(polkit-qt6-1)
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
