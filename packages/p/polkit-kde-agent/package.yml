# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : polkit-kde-agent
version    : 6.6.2
release    : 134
source     :
    - https://download.kde.org/stable/plasma/6.6.2/polkit-kde-agent-1-6.6.2.tar.xz : 2659f0e2882e0b013b30ca9e23e3f69062998f358815e7d3736fc35f4fcdb812
