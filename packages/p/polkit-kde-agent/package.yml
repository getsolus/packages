name       : polkit-kde-agent
version    : 6.2.0
release    : 107
source     :
    - https://download.kde.org/stable/plasma/6.2.0/polkit-kde-agent-1-6.2.0.tar.xz : c6650c57de4e1d59cc5148edb2b8d7f17a66c20785613ec30535174a7b6dcb10
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Daemon providing a polkit authentication for KDE
description: |
    Daemon providing a polkit authentication for KDE.
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(polkit-qt6-1)
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
clang      : yes
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
