# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : poedit
version    : 3.8.2
release    : 51
source     :
    - https://github.com/vslavik/poedit/releases/download/v3.8.2-oss/poedit-3.8.2.tar.gz : 118adbf8114bedb182568ba9c8bdf97bb235ca84e6b963831cb9bfe741376bff
homepage   : https://poedit.net
license    : MIT
component  : editor
summary    : Cross-platform gettext catalogs (.po files) translation editor
description: |
    This program is a simple translations editor for PO and XLIFF files. It also serves as a GUI frontend to more GNU gettext utilities (win32 version is part of the distribution) and catalogs editor/source code parser. It helps with translating applications into another language.
builddeps  :
    - pkgconfig(gtkspell3-3.0)
    - pkgconfig(icu-uc)
    - pkgconfig(liblucene++)
    - pkgconfig(pugixml)
    - pkgconfig(webkit2gtk-4.1)
    - libboost-devel
    - wxwidgets-devel
environment: |
    # REMOVE me on libboost upgrade
    export CFLAGS="${CFLAGS} -Wno-template-body"
    export CXXFLAGS="${CXXFLAGS} -Wno-template-body"
setup      : |
    %configure
build      : |
    %make
install    : |
    %make_install
