# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pangomm-2.48
version    : 2.56.2
release    : 5
source     :
    - https://download.gnome.org/sources/pangomm/2.56/pangomm-2.56.2.tar.xz : f1e984c85a85b6a0e61616366521f51dd8282a072bb45d15b5084762b62f4c0e
homepage   : https://gtkmm.org
license    : LGPL-2.0-or-later
component  : desktop.library
summary    : C++ bindings to pango
description: |
    C++ bindings to pango
optimize   : speed
builddeps  :
    - pkgconfig(cairomm-1.16)
    - pkgconfig(glibmm-2.68)
    - pkgconfig(mm-common-util)
    - pkgconfig(pangocairo)
    - pkgconfig(sigc++-3.0)
    - doxygen
    - graphviz
patterns   :
    devel : /usr/lib64/pangomm-2.48
setup      : |
    %meson_configure -Dmaintainer-mode=true
build      : |
    %ninja_build
install    : |
    %ninja_install
