# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : polkit
version    : '127'
release    : 36
source     :
    - https://github.com/polkit-org/polkit/archive/refs/tags/127.tar.gz : 9b7bc16f086479dcc626c575976568ba4a85d34297a750d8ab3d2e57f6d8b988
homepage   : https://github.com/polkit-org/polkit
license    : GPL-2.0-or-later
summary    : Application-level authorization toolkit
component  :
    - system.base
    - devel : system.devel
description: |
    polkit is an application-level toolkit for defining and handling the policy that allows unprivileged processes to speak to privileged processes: It is a framework for centralizing the decision making process with respect to granting access to privileged operations for unprivileged applications. See the polkit(8) manual page for more detailed information.
builddeps  :
    - pkgconfig(duktape)
    - pkgconfig(expat)
    - pkgconfig(gtk-doc)
    - pkgconfig(udev)
    - docbook-xml
checkdeps  :
    - python-dbusmock
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-pkexec-Support-a-stateless-configuration.patch
    %patch -p1 -i ${pkgfiles}/0001-meson-Pass-polkitd_uid-to-meson_post_install.py.patch

    %meson_configure \
        -Dos_type=redhat \
        -Dsession_tracking=logind \
        -Dexamples=true \
        -Dman=true \
        -Dgtk_doc=true \
        -Dpolkitd_uid=27 \
        -Dpolkitd_user=polkitd \
        -Dtests=true \
        -Dprivileged_group=wheel
build      : |
    %ninja_build
install    : |
    %ninja_install

    install -Ddm00755 "${installdir}"/usr/share/defaults/etc/pam.d/
    mv "${installdir}"/usr/lib/pam.d/* "${installdir}"/usr/share/defaults/etc/pam.d/

    # Stateless
    find $installdir -type d -empty -print -delete

    %install_license COPYING
check      : |
    %ninja_check
