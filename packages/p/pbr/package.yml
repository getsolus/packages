# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pbr
version    : 7.0.3
release    : 20
source     :
    - https://pypi.python.org/packages/source/p/pbr/pbr-7.0.3.tar.gz : b46004ec30a5324672683ec848aed9e8fc500b0d261d40a3229c2d2bbfcedc29
homepage   : https://opendev.org/openstack/pbr
license    : Apache-2.0
component  : programming.python
summary    : Python Build Reasonableness
description: |
    PBR is a library to automatically do a bunch of standard things you want in your setup.py without you having to repeat them every time. It will set versions, process requirements files and generate AUTHORS and ChangeLog file all from git information.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
build      : |
    %python3_setup
install    : |
    %python3_install
