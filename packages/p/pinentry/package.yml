# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pinentry
version    : 1.3.2
release    : 12
source     :
    - https://gnupg.org/ftp/gcrypt/pinentry/pinentry-1.3.2.tar.bz2 : 8e986ed88561b4da6e9efe0c54fa4ca8923035c99264df0b0464497c5fb94e9e
homepage   : https://gnupg.org/related_software/pinentry/
license    : GPL-2.0-or-later
summary    : Pin or pass-phrase entry dialog
description: |
    Pinentry is a collection of simple PIN or passphrase entry dialogs which utilize the Assuan protocol.
component  : security
# We don't want to install libraries for plugins that are not already present
# Also doing so would introduce cyclic dependencies
autodep    : false
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Core)
    - pkgconfig(gcr-4)
    - pkgconfig(libassuan)
    - pkgconfig(libsecret-1)
    - gettext-devel # reconfigure
rundeps    :
    - glib2
    - libassuan
    - libsecret
    - ncurses
clang      : true
optimizee  :
    - thin-lto
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-qt-qt5-Install-icon-to-non-legacy-location.patch

    export LDFLAGS="${LDFLAGS} -lassuan"
    export ACLOCAL_PATH=/usr/share/gettext/m4/
    %reconfigure \
        --enable-fallback-curses \
        --enable-libsecret \
        --enable-pinentry-curses \
        --enable-pinentry-gnome3 \
        --enable-pinentry-qt \
        --enable-pinentry-tty \
        --disable-pinentry-gtk2 \
        --disable-pinentry-qt5
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING

    # Router for pinentry
    install -Dm00755 ${pkgfiles}/pinentry ${installdir}/usr/bin/pinentry
