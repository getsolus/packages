# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plymouth
version    : 26.134.222
release    : 17
source     :
    - https://www.freedesktop.org/software/plymouth/releases/plymouth-26.134.222.tar.xz : 6ee1068216c5047923fabf0f6aa583e9d77cab383077358df3fc22f2ee398bb0
homepage   : https://www.freedesktop.org/wiki/Software/Plymouth/
license    : GPL-2.0-or-later
component  : system.boot
summary    : Plymouth is an application that runs very early in the boot process that provides a graphical boot animation while the boot process happens in the background.
description: |
    Plymouth is an application that runs very early in the boot process (even before the root filesystem is mounted!) that provides a graphical boot animation while the boot process happens in the background. It is designed to work on systems with DRM modesetting drivers. The idea is that early on in the boot process the native mode for the computer is set, plymouth uses that mode, and that mode stays throughout the entire boot process up to and after X starts. Ideally, the goal is to get rid of all flicker during startup.
builddeps  :
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libdrm)
    - pkgconfig(libevdev)
    - pkgconfig(libpng)
    - pkgconfig(xkeyboard-config)
    - docbook-xml
    - solus-artwork
setup      : |
    %patch -p1 -i ${pkgfiles}/0001-Set-plymouth-defaults.patch

    # https://gitlab.freedesktop.org/plymouth/plymouth/-/merge_requests/388
    %patch -p1 -i ${pkgfiles}/0001-ply-device-manager-fix-default-XKB-keymap-fallback.patch

    # Stateless
    %patch -p1 -i ${pkgfiles}/plymouth-26-134-222-stateless.patch

    %meson_configure \
        -Dsystemd-integration=true \
        -Dlogo=/usr/share/icons/hicolor/scalable/places/distributor-logo-solus.svg
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    install -Dm 00644 ${pkgfiles}/10-splash.cmdline $installdir/%libdir%/kernel/cmdline.d/10-splash.conf

    # Tempfiles
    install -Dm 00644 ${pkgfiles}/plymouth.tmpfiles ${installdir}/usr/lib/tmpfiles.d/plymouth.conf

    # Stateless cleanup
    rm -rvf \
        ${installdir}/etc \
        ${installdir}/run \
        ${installdir}/var
