# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-keyboard
version    : 6.7.1
release    : 7
source     :
    - https://download.kde.org/stable/plasma/6.7.1/plasma-keyboard-6.7.1.tar.xz : acf36a8d36150c6a0ecee2eeb0f70c4f1226cae3fedf47f38e06d765b6388047
homepage   : https://kde.org/plasma-desktop/
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - FSFAP
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.kde
summary    : Virtual keyboard for Plasma
description: |
    Virtual keyboard for Plasma
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6VirtualKeyboard)
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(wayland-protocols)
    - extra-cmake-modules
    - kf6-kcmutils-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-ki18n-devel
    - kf6-kirigami-devel
    - libplasma-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    %install_license LICENSES/*
