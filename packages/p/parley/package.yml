# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : parley
version    : 26.04.3
release    : 101
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/parley-26.04.3.tar.xz : cecbbb130ef203b3bc53b758bb0635b4c9843a914056d7268554e3693c589cbc
homepage   : https://kde.org/applications/education/org.kde.parley
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - GPL-3.0-only
    - MIT
component  : desktop
summary    : Parley is a vocabulary trainer
description: |
    Parley is a vocabulary trainer. It helps you to memorize your vocabulary, for example when you are trying to learn a foreign language. It supports many language specific features, but can be used for other learning tasks as well. It uses the spaced repetition learning method, which makes learning optimal. Vocabulary collections can be downloaded by "Get Hot New Stuff" or created with the built-in editor.
builddeps  :
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6WebEngineCore)
    - pkgconfig(libxslt)
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-knewstuff-devel
    - kf6-knotifications-devel
    - kf6-ktextwidgets-devel
    - kf6-kxmlgui-devel
    - libkeduvocdocument-devel
rundeps    :
    - kf6-kcmutils
    - kf6-kirigami
    - translate-shell
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
