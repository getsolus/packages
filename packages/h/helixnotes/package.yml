# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : helixnotes
version    : 1.2.9
release    : 4
source     :
    - https://codeberg.org/ArkHost/HelixNotes/archive/v1.2.9.tar.gz : ca1aabb2e97a7537f00799d6f3db4843684d74d8af3a5a234ef2d0ba3c303878
homepage   : https://helixnotes.com/
license    : AGPL-3.0-only
component  : office.notes
summary    : Local-first Markdown note-taking app
description: |
    HelixNotes is a local-first markdown note-taking app built with Tauri, SvelteKit, and Rust. Your notes are stored as standard Markdown files on your local filesystem. No cloud, no lock-in.
networking : true
builddeps  :
    - pkgconfig(ayatana-appindicator3-0.1)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(webkit2gtk-4.1)
    - nodejs
    - pnpm
    - rust
rundeps    :
    - libayatana-appindicator
    - libgtk-3
    - librsvg
    - libwebkit-gtk41
    - openssl
setup      : |
    %patch -p1 -i $pkgfiles/disable-updater.patch
    pnpm install --ignore-scripts
build      : |
    npx tauri build --no-bundle
install    : |
    install -Dm00755 src-tauri/target/release/helixnotes $installdir/usr/bin/helixnotes
    %install_license LICENSE

    install -Dm00644 $pkgfiles/helixnotes.desktop $installdir/usr/share/applications/helixnotes.desktop
    install -Dm00644 $pkgfiles/io.codeberg.arkhost.helixnotes.metainfo.xml $installdir/usr/share/metainfo/io.codeberg.arkhost.helixnotes.metainfo.xml
    install -Dm00644 src-tauri/icons/128x128@2x.png $installdir/usr/share/icons/hicolor/128x128@2/apps/helixnotes.png
    install -Dm00644 src-tauri/icons/128x128.png $installdir/usr/share/icons/hicolor/128x128/apps/helixnotes.png
    install -Dm00644 src-tauri/icons/64x64.png $installdir/usr/share/icons/hicolor/64x64/apps/helixnotes.png
    install -Dm00644 src-tauri/icons/32x32.png $installdir/usr/share/icons/hicolor/32x32/apps/helixnotes.png
