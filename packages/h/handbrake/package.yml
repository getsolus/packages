# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : handbrake
version    : 1.11.0
release    : 49
source     :
    - https://github.com/HandBrake/HandBrake/releases/download/1.11.0/HandBrake-1.11.0-source.tar.bz2 : c5de77365b083f519c76b9edcc0685d8bda9ce04fc0ad59c3c38145355ef1b17
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : multimedia.video
homepage   : https://handbrake.fr/
networking : true
summary    : Video Converter
description: |
    HandBrake is a tool for converting video from nearly any format to a selection of modern, widely supported codecs.
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(ffnvcodec)
    - pkgconfig(gtk4)
    - pkgconfig(jansson)
    - pkgconfig(libass)
    - pkgconfig(libdrm)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libva)
    - pkgconfig(opus)
    - pkgconfig(speex)
    - pkgconfig(theora)
    - pkgconfig(vorbis)
    - pkgconfig(vpl)
    - pkgconfig(vpx)
    - pkgconfig(x264)
    - pkgconfig(x265)
    - cargo-c
    # - git
    - lame-devel
    - llvm-clang
rundeps    :
    - libvpl
setup      : |
    # configure doesn't like stuff
    ./configure \
        --build=x86_64-solus-linux \
        --enable-nvdec \
        --enable-nvenc \
        --enable-qsv \
        --enable-vce \
        --enable-x265 \
        --disable-numa \
        --harden \
        --prefix=/usr
build      : |
    %make -C x86_64-solus-linux
install    : |
    %make_install -C x86_64-solus-linux
    %install_license AUTHORS.markdown COPYING LICENSE THANKS.markdown
