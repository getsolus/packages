# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hyphen
version    : 2.8.9
release    : 5
source     :
    - https://github.com/hunspell/hyphen/releases/download/v2.8.9/hyphen-2.8.9.tar.gz : 783743daf477de8c4d16e3c74b4d2827377017718d8e17e2d9440210246f6abe
homepage   : https://hunspell.github.io/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
    - MPL-1.1
component  :
    - programming.library
    - en : office
summary    :
    - hyphenation library to use converted TeX hyphenation patterns
    - en : English hyphenation rules
description: |
    hyphenation library to use converted TeX hyphenation patterns.
patterns   :
    - en : /usr/share/hyphen
rundeps    :
    - en : hyphen
setup      : |
    %configure_no_runstatedir --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING*

    pushd $installdir/usr/share/hyphen/
        en_US_aliases="en_AG en_AU en_BS en_BW en_BZ en_CA en_DK en_GB en_GH en_HK en_IE en_IN en_JM en_MW en_NA en_NZ en_PH en_SG en_TT en_ZA en_ZM en_ZW"
        for lang in $en_US_aliases; do
            ln -s hyph_en_US.dic hyph_$lang.dic
        done
    popd
check      : |
    %make check
