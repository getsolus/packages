# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : helix
version    : 25.07.1
release    : 10
source     :
    - https://github.com/helix-editor/helix/releases/download/25.07.1/helix-25.07.1-source.tar.xz : 2d0cf264ac77f8c25386a636e2b3a09a23dec555568cc9a5b2927f84322f544e
homepage   : https://helix-editor.com/
license    : MPL-2.0
component  : editor
summary    : post-modern text editor
description: |
    A post-modern text editor.
    It's a joke. If Neovim is the modern Vim, then Helix is post-modern.
networking : true
builddeps  :
    - git
    - rust
environment: |
    export HELIX_DEFAULT_RUNTIME=/usr/lib/helix/runtime
setup      : |
    git config --global --add safe.directory '*'
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    mkdir -p ${installdir}/usr/lib/helix
    rm -rf runtime/grammars/sources
    cp -r runtime ${installdir}/usr/lib/helix

    install -Dm00755 target/release/hx ${installdir}/usr/lib/helix/hx
    install -Dm00755 contrib/hx_launcher.sh ${installdir}/usr/bin/hx

    install -Dm00644 contrib/Helix.desktop ${installdir}/usr/share/applications/Helix.desktop
    install -Dm00644 contrib/Helix.appdata.xml ${installdir}/usr/share/metainfo/Helix.metainfo.xml
    install -Dm00644 contrib/helix.png ${installdir}/usr/share/icons/hicolor/256x256/apps/helix.png

    install -Dm00644 contrib/completion/hx.bash ${installdir}/usr/share/bash-completion/completions/hx
    install -Dm00644 contrib/completion/hx.fish ${installdir}/usr/share/fish/vendor_completions.d/hx.fish
    install -Dm00644 contrib/completion/hx.zsh ${installdir}/usr/share/zsh/site-functions/_hx
