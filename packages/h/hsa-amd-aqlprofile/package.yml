# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hsa-amd-aqlprofile
version    : 7.2.0
release    : 7
source     :
    # tag rocm-7.0.2
    # Build requires git.
    - git|https://github.com/ROCm/rocm-systems.git : fc0010cf6a5a972d42b276df946510f30343d493
homepage   : https://github.com/ROCm/rocm-systems
license    : 
    - MIT
component  : programming.library
summary    : AQLPROFILE library for AMD HSA runtime API extension support
description: |
    AQLPROFILE library for AMD HSA runtime API extension support.
builddeps  :
    - pkgconfig(libdrm_amdgpu)
    - pkgconfig(numa)
    # replace with pkgconfig(libhsakmt) once hsakmt is deprecated
    - rocm-runtime-devel
setup      : |
    %cmake_ninja -S projects/aqlprofile -L \
      -DCMAKE_INSTALL_LIBDIR=lib%LIBSUFFIX%
build      : |
    %ninja_build
install    : |
    %ninja_install
