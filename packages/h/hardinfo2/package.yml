# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hardinfo2
version    : 2.3.1
release    : 3
source     :
    - https://github.com/hardinfo2/hardinfo2/archive/refs/tags/release-2.3.1.tar.gz : 59b30378127dde8e0af92de1a23ebcee706820a862581a603543a99c357bcecb
homepage   : https://hardinfo2.org/
license    :
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LGPL-2.1-or-later
component  : system.utils
summary    : System Information and Benchmark for Linux
description: |
    - Hardinfo2 offers System Information and Benchmark for Linux Systems. It is able to obtain information from both hardware and basic software. It can benchmark your system and compare to other machines online.
builddeps  :
    - pkgconfig(Qt5Core)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libdecor-0)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(vulkan)
    - glslang-devel
setup      : |
    %cmake_ninja -DCMAKE_BUILD_TYPE=Release
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE*
