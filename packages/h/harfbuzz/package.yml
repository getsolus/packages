# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : harfbuzz
version    : 14.2.0
release    : 86
source     :
    - https://github.com/harfbuzz/harfbuzz/releases/download/14.2.0/harfbuzz-14.2.0.tar.xz : 94017020f96d025bb66ae91574e4cf334bcad23e8175a8a40565b3721bc2eaff
license    :
    - MIT
    - HPND
homepage   : https://harfbuzz.github.io/
component  : xorg.fonts
summary    : HarfBuzz is a text shaping library
description: |
    HarfBuzz is a software development library for text shaping, which is the process of converting Unicode text to glyph indices and positions.
emul32     : true
avx2       : true
optimize   :
    - speed
builddeps  :
    - pkgconfig32(freetype2)
    - pkgconfig32(glib-2.0)
    - pkgconfig32(graphite2)
    - pkgconfig32(icu-io)
setup      : |
    if [[ ! -z "${EMUL32BUILD}" ]]; then
        build_gobject="disabled"
    else
        build_gobject="enabled"
    fi

    %patch -p1 -i $pkgfiles/0001-test-fuzzing-Increase-timeout.patch

    %meson_configure -Dbenchmark=disabled -Dgraphite2=enabled -Dintrospection=$build_gobject
build      : |
    %ninja_build
profile    : |
    %ninja_check
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    %ninja_check
