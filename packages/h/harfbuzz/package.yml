# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : harfbuzz
version    : 13.1.1
release    : 85
source     :
    - https://github.com/harfbuzz/harfbuzz/releases/download/13.1.1/harfbuzz-13.1.1.tar.xz : e7f3b8bac3fdcc529985be8e84fbd65c675ac47ee58512b15a5dd620c79ffe2a
license    :
    - MIT
    - HPND
homepage   : https://harfbuzz.github.io/
component  : xorg.fonts
summary    : HarfBuzz is a text shaping library
description: |
    HarfBuzz is a software development library for text shaping, which is the process of converting Unicode text to glyph indices and positions.
emul32     : true
avx2       : true
optimize   :
    - lto
    - speed
builddeps  :
    - pkgconfig32(freetype2)
    - pkgconfig32(glib-2.0)
    - pkgconfig32(graphite2)
    - pkgconfig32(icu-io)
setup      : |
    if [[ ! -z "${EMUL32BUILD}" ]]; then
        build_gobject="disabled"
    else
        build_gobject="enabled"
    fi

    %patch -p1 -i $pkgfiles/0001-test-fuzzing-Increase-timeout.patch

    %meson_configure -Dbenchmark=disabled -Dgraphite=enabled -Dintrospection=$build_gobject
build      : |
    %ninja_build
profile    : |
    %ninja_check
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    %ninja_check
