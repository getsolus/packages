# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : harfbuzz
version    : 14.2.1
release    : 87
source     :
    - https://github.com/harfbuzz/harfbuzz/releases/download/14.2.1/harfbuzz-14.2.1.tar.xz : a54a5d8e9380a41fbb762ce367bcbf7704792dfca0d93f1bbca86c5a57902e0e
homepage   : https://harfbuzz.github.io/
license    :
    - MIT
    - HPND
component  : xorg.fonts
summary    : HarfBuzz is a text shaping library
description: |
    HarfBuzz is a software development library for text shaping, which is the process of converting Unicode text to glyph indices and positions.
emul32     : true
avx2       : true
optimize   :
    - speed
builddeps  :
    - pkgconfig32(freetype2)
    - pkgconfig32(glib-2.0)
    - pkgconfig32(graphite2)
    - pkgconfig32(icu-io)
setup      : |
    if [[ ! -z "${EMUL32BUILD}" ]]; then
        build_gobject="disabled"
    else
        build_gobject="enabled"
    fi

    %patch -p1 -i ${pkgfiles}/0001-test-fuzzing-Increase-timeout.patch

    %meson_configure \
        -Dbenchmark=disabled \
        -Dgraphite2=enabled \
        -Dintrospection=${build_gobject}
build      : |
    %ninja_build
profile    : |
    %ninja_check
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    %ninja_check
