# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : htop
version    : 3.5.2
release    : 29
source     :
    - https://github.com/htop-dev/htop/releases/download/3.5.2/htop-3.5.2.tar.xz : 225128e697c4a8c8a878fd0078c965ff8bd5fb24913bfc8473b8edbd50f843f8
homepage   : https://htop.dev
license    : GPL-2.0-or-later
component  : system.utils
summary    : htop (interactive process viewer for Linux)
description: |
    htop is an interactive process viewer for Linux.
builddeps  :
    - lm_sensors-devel
rundeps    :
    - lm_sensors
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
    install -Dm00644 $pkgfiles/htop.metainfo.xml -t $installdir/usr/share/metainfo
