# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ulauncher
version    : 6.0.0_30b
release    : 28
source     :
    - https://github.com/Ulauncher/Ulauncher/releases/download/v6.0.0-beta30/ulauncher-6.0.0-beta30.tar.gz : 57c3ebd8677f6e33cb41e8f6f089713e75124e4dc6f6e1833d43cc1386d98397
homepage   : https://ulauncher.io/
license    : GPL-3.0-or-later
component  : desktop
summary    : Linux Application Launcher
description: |
    Ulauncher is a fast application launcher for Linux. It's is written in Python, using GTK+.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools-scm
rundeps    :
    - keybinder
    - libwebkit-gtk41
    - python-gobject
    - python-inotify
    - python-levenshtein
    - python-pygithub
    - python-websocket-client
    - python-xlib
    - python3-dbus
    - pyxdg
build      : |
    %python3_setup
install    : |
    %python3_install

    # We don't have wmctrl because it is DOA
    rm -f $installdir/usr/bin/ulauncher-toggle
