# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : upower
version    : 1.91.3
release    : 32
source     :
    - https://gitlab.freedesktop.org/upower/upower/-/archive/v1.91.3/upower-v1.91.3.tar.gz : 6cef641ce39f13efc09e12afbb889128d4e9b3596a1faeaaa1b619fdf72403a9
homepage   : https://upower.freedesktop.org/
license    :
    - GPL-2.0-or-later
component  : desktop.core
summary    : UPower is an abstraction for enumerating power devices, listening to device events and querying history and statistics.
description: |
    UPower is an abstraction for enumerating power devices, listening to device events and querying history and statistics.
builddeps  :
    - pkgconfig(gudev-1.0)
    - pkgconfig(libimobiledevice-1.0)
    - pkgconfig(libusb-1.0)
    - docbook-xml
    - python-packaging # Check
    - python3-dbus # Check
setup      : |
    %apply_patches
    %meson_configure -Didevice=enabled \
                     -Dgtk-doc=false \
                     -Dman=false \
                     -Dinstalled_tests=false
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/20-upower.preset

    # Stateless (this data directory is created by the systemd service unit)
    rmdir -v $installdir/var/lib/upower \
             $installdir/var/lib \
             $installdir/var/
check      : |
    %ninja_check
