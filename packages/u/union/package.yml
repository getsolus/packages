# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : union
version    : 6.7.2
release    : 1
source     :
    - https://download.kde.org/stable/plasma/6.7.2/union-6.7.2.tar.xz : d67436c579077ad5ac2fac4a333873c5983666746d45c7e780d6384d9a0f8de6
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-2-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : desktop.kde.core
summary    : A Qt style supporting both QtQuick and QtWidgets
description: |
    A Qt style supporting both QtQuick and QtWidgets
builddeps  :
    - pkgconfig(Qt6ShaderTools)
    - breeze-devel
    - cxx-rust-cssparser-devel
    - extra-cmake-modules
    - kf6-kcolorscheme-devel
    - kf6-kcoreaddons-devel
    - kf6-kguiaddons-devel
    - kf6-kiconthemes-devel
    - kf6-kirigami-devel
rundeps    :
    - breeze
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 \
        -DBUILD_OUTPUT_QTWIDGETS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
