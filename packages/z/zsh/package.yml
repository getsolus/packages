# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zsh
version    : 5.9.1
release    : 37
source     :
    - https://sourceforge.net/projects/zsh/files/zsh/5.9.1/zsh-5.9.1.tar.xz : 5d20bec03f981dc4e9a09ec245e7415388ff641f79c5c5c416b5042e58d8280d
homepage   : https://www.zsh.org/
license    : MIT
summary    : The Z Shell
component  : system.utils
description: |
    Z shell (zsh) is a Unix shell that can be used as an interactive login shell and powerful command interpreter. It can be viewed as an extended Bourne shell with a number of improvements sourced from bash, tcsh, and ksh.
builddeps  :
    - pkgconfig(libcap)
    - pkgconfig(libpcre2-8)
    - gdbm-devel
    - groff # Can probably be removed in next version
setup      : |
    %patch -p1 -i ${pkgfiles}/upstream/0001-51207-fix-for-read-d-when-the-delimiter-is-a-byte-0x.patch
    %patch -p1 -i ${pkgfiles}/upstream/0002-51214-handle-read-d-and-a-delimiter-that-can-t-be-de.patch
    %patch -p1 -i ${pkgfiles}/upstream/0003-51483-Enable-assignment-and-expansion-of-parameters-.patch
    %patch -p1 -i ${pkgfiles}/upstream/0004-51484-Extend-named-reference-handling-for-special-pa.patch
    %patch -p1 -i ${pkgfiles}/upstream/0005-51889-fix-module-loading-problem-with-full-RELRO.patch

    # Reconfigure until pcre2 patch is upstream
    %reconfigure --bindir=/usr/bin \
               --enable-cap \
               --enable-gdbm \
               --enable-multibyte \
               --enable-pcre \
               --with-tcsetpgrp \
               --enable-etcdir=/usr/share/defaults/etc/zsh \
               --enable-zshenv=/usr/share/defaults/etc/zsh/zshenv \
               --enable-zlogin=/usr/share/defaults/etc/zsh/zlogin \
               --enable-zlogout=/usr/share/defaults/etc/zsh/zlogout \
               --enable-zprofile=/usr/share/defaults/etc/zsh/zprofile \
               --enable-fndir=/usr/share/zsh/functions \
               --enable-scriptdir=/usr/share/zsh/scripts
build      : |
    %make
install    : |
    %make_install
    %install_license LICENCE
    rmdir $installdir/usr/share/zsh/site-functions
    install -dm00644 $installdir/usr/share/defaults/etc/zsh/
    cp $pkgfiles/z* $installdir/usr/share/defaults/etc/zsh/

    # Install defaults to /etc/skel
    install -Dm0644 -t $installdir/etc/skel $pkgfiles/skel/.zshrc
check      : |
    unset LD_PRELOAD
    %make check
