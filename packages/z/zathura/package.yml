# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zathura
version    : 2026.05.20
release    : 30
source     :
    - https://pwmt.org/projects/zathura/download/zathura-2026.05.20.tar.xz : e2e6dc695ebb0170eaa3d39d295c6997c93f23061e6c2b7d3347e03415a2254b
    - https://pwmt.org/projects/zathura-pdf-poppler/download/zathura-pdf-poppler-2026.05.10.tar.xz : 364c38634273c06252087324bf01dbde2885b932795265aee44006aa2701fe23
    - https://pwmt.org/projects/zathura-djvu/download/zathura-djvu-2026.05.10.tar.xz : a0815efe0e0f9dd01bda9b1348a0202e38b52284039f9f1b406b604f58bd0947
    - https://pwmt.org/projects/zathura-cb/download/zathura-cb-2026.05.10.tar.xz : 32b2fa420fbb8a55f6baca6501fce2820a2acc900453f9b993a3ef84026ae251
    - https://pwmt.org/projects/zathura-ps/download/zathura-ps-2026.02.03.tar.xz : b3556ff2960b7a5d014e873bd0474c37f3f082e370c6ed8efb9487ba6167eda8
    - https://pwmt.org/projects/zathura-pdf-mupdf/download/zathura-pdf-mupdf-2026.05.10.tar.xz : e57c046e80b65e0a8df82cb04b537102099c38b3ed4d7f30161c2e7dcd9a6e28
homepage   : https://pwmt.org/projects/zathura/
license    : Zlib
component  :
    - office.viewers
    - mupdf : office.viewers
    - poppler : office.viewers
summary    : zathura is a highly customizable and functional document viewer
description:
    - zathura is a highly customizable and functional document viewer based on the girara user interface library and several document libraries
    - mupdf : mupdf plugin for zathura
    - poppler : poppler plugin for zathura
builddeps  :
    - pkgconfig(cairo)
    - pkgconfig(ddjvuapi)
    - pkgconfig(gio-unix-2.0)
    - pkgconfig(girara)
    - pkgconfig(glib-2.0)
    - pkgconfig(gmodule-no-export-2.0)
    - pkgconfig(gthread-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gumbo)
    - pkgconfig(jbig2dec)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libarchive)
    - pkgconfig(libmagic)
    - pkgconfig(libopenjp2)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libseccomp)
    - pkgconfig(libspectre)
    - pkgconfig(libturbojpeg)
    - pkgconfig(poppler-glib)
    - pkgconfig(sqlite3)
    - pkgconfig(synctex)
    - desktop-file-utils
    - intltool
    - mupdf-devel
    - python-sphinx
rundeps    :
    - mupdf :
        - zathura
    - poppler :
        - zathura
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE

    export PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${installdir}/%libdir%/pkgconfig
    # Build the remaining plugins
    mkdir plugin_build
    pushd plugin_build
        for plugin in \
            zathura-cb-2026.05.10 \
            zathura-ps-2026.02.03 \
            zathura-djvu-2026.05.10 \
            zathura-pdf-poppler-2026.05.10 \
            zathura-pdf-mupdf-2026.05.10 ; do
            tar xf "${sources}/${plugin}.tar.xz"
            pushd "${plugin}"
            if [[ "${plugin}" == zathura-pdf-mupdf-* ]]; then
                # Remove mupdfthird references - Solus links mupdf externally
                perl -pi -e 's/^\s*mupdfthird\s*=.*\n//;' -e 's/, mupdfthird\]/]/;' meson.build
            fi
            CFLAGS="$CFLAGS -I${installdir}/usr/include" %meson_configure
            %ninja_build
            %ninja_install
            popd
        done
    popd

    # due to a limitation in the SC
    rm -v ${installdir}/usr/share/metainfo/org.pwmt.zathura-*.metainfo.xml

    # Keep file associations for plugins shipped in the main package without
    # showing one launcher per plugin in file manager "Open With" menus.
    desktop_file=${installdir}/usr/share/applications/org.pwmt.zathura.desktop
    for mime_type in $(awk -F= '/^MimeType=/ { print $2 }' ${installdir}/usr/share/applications/org.pwmt.zathura-{cb,djvu,ps}.desktop | tr ';' '\n' | sort -u); do
        desktop-file-edit --add-mime-type="$mime_type" "$desktop_file"
    done
    rm -v ${installdir}/usr/share/applications/org.pwmt.zathura-{cb,djvu,ps}.desktop
patterns   :
    - mupdf :
        - /usr/lib64/zathura/libpdf-mupdf.so
        - /usr/share/applications/org.pwmt.zathura-pdf-mupdf.desktop
    - poppler :
        - /usr/lib64/zathura/libpdf-poppler.so
        - /usr/share/applications/org.pwmt.zathura-pdf-poppler.desktop
