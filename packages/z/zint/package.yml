# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zint
version    : 2.16.0
release    : 1
source     :
    - https://downloads.sourceforge.net/zint/zint-2.16.0-src.tar.gz : 37e767afada2403bb9ae49b93a19eb0a9e944a0c278d9f23522746b3d08a3c4b
homepage   : https://www.zint.org.uk
license    :
    - BSD-3-Clause
    - GPL-3.0-or-later
component  :
    - qt : programming.tools
    - qt-devel : programming.devel
    - programming.library
summary    :
    - qt : Zint Barcode Studio
    - qt-devel : Development files for zint-qt
    - Barcode generator library
description:
    - qt : Zint Barcode Studio is a Qt-based GUI which allows desktop users to generate barcodes which can then be embedded in documents or HTML pages.
    - qt-devel : Zint Barcode Studio is a Qt-based GUI which allows desktop users to generate barcodes which can then be embedded in documents or HTML pages.
    - main : |
        Zint is a C library for encoding data in several barcode variants. The bundled command-line utility provides a simple interface to the library.

        * Over 50 symbologies including all ISO/IEC standards, like QR codes.
        * Unicode translation for symbologies which support Latin-1 and Kanji character sets.
        * Full GS1 support including data verification and automated insertion of FNC1 characters.
        * Support for encoding binary data including NULL (ASCII 0) characters.
        * Health Industry Barcode (HIBC) encoding capabilities.
        * Output in PNG, EPS and SVG formats with user adjustable sizes and colors.
        * Verification stage for SBN, ISBN and ISBN-13 data.
builddeps  :
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(libpng)
    - pkgconfig(zlib)
rundeps    :
    - devel :
        - libpng-devel
    - qt-devel :
        - zint-devel
        - zint-qt
setup      : |
    %patch -p1 -i ${pkgfiles}/zint-shared.patch

    %cmake_ninja \
        -DZINT_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE

    install -Dm 00644 zint-qt.png -t ${installdir}/usr/share/icons/hicolor/48x48/apps
    install -Dm 00644 zint-qt.desktop -t ${installdir}/usr/share/applications
patterns   :
    - qt :
        - /usr/bin/zint-qt
        - /usr/lib64/libQZint.so.*
        - /usr/share/applications
        - /usr/share/icons/hicolor
    - qt-devel :
        - /usr/include/qzint.h
        - /usr/lib64/libQZint.so
