# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zim
version    : 0.76.3
release    : 31
source     :
    - https://github.com/zim-desktop-wiki/zim-desktop-wiki/archive/refs/tags/0.76.3.tar.gz : cb97c48740c140fb851c0ac16a93db9f8df54fcf307bf9e2a948043df8fce479
homepage   : https://www.zim-wiki.org
license    : GPL-2.0-or-later
component  : office.notes
summary    : A WYSIWYG text editor and desktop wiki
description: |
    Zim is a graphical text editor used to maintain a collection of wiki pages. Each page can contain links to other pages, simple formatting and images. Pages are stored in a folder structure, like in an outliner, and can have attachments. Creating a new page is as easy as linking to a nonexistent page. All data is stored in plain text files with wiki formatting. Various plugins provide additional functionality, like a task list manager, an equation editor, a tray icon, and support for version control.
builddeps  :
    - pkgconfig(gtk+-3.0)
    - pkgconfig(pygobject-3.0)
    - python-setuptools
rundeps    :
    - gnuplot
    - graphviz
    - gspell
    - python-gobject
    - pyxdg
    - scrot
    - xdg-utils
build      : |
    %python3_setup
install    : |
    %python3_install --skip-build
    sed -i 's/Utility;TextEditor;GTK;/Office;/g' $installdir/usr/share/applications/org.zim_wiki.Zim.desktop
    %install_license LICENSE
