# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zxing-cpp
version    : 3.1.0
release    : 9
source     :
    - https://github.com/zxing-cpp/zxing-cpp/releases/download/v3.1.0/zxing-cpp-3.1.0.tar.gz : a3eb825154f05242283e7d94d8ebdcf95beb3a534eba393cce504e91c9b215bd
homepage   : https://github.com/zxing-cpp/zxing-cpp
license    : Apache-2.0
component  :
    - programming.library
    - ^python-zxing-cpp : programming.python
summary    :
    - ZXing-C++ ("zebra crossing") is an open-source, multi-format linear/matrix barcode image processing library implemented in C++
    - ^python-zxing-cpp : Python bindings for the zxing-cpp barcode library
description: |
    ZXing-C++ ("zebra crossing") is an open-source, multi-format linear/matrix barcode image processing library implemented in C++. It was originally ported from the Java ZXing Library but has been developed further and now includes many improvements in terms of quality and performance. It can both read and write barcodes in a number of formats.
builddeps  :
    - pkgconfig(pybind11)
    - pkgconfig(python3)
    - pkgconfig(stb)
    - nanobind
    - patchelf
    - python-build
    - python-installer
    - python-scikit-build-core
    - python-wheel
    - zint-devel
setup      : |
    # we don't need cmake as a python dependency
    sed -r -i '/cmake/d' wrappers/python/pyproject.toml
    sed -i 's/pybind11\[global\]/pybind11/' wrappers/python/pyproject.toml

    # ZXING_PYTHON_MODULE=ON builds the Python shared library but not the metadata,
    # so we still need to build the wheel with pyproject
    %cmake_ninja \
        -DZXING_EXAMPLES=OFF \
        -DZXING_PYTHON_INSTALL_LIBDIR=%libdir% \
        -DZXING_PYTHON_MODULE=ON \
        -DZXING_USE_BUNDLED_ZINT=OFF \
        -DZXING_WRITERS=BOTH
build      : |
    %ninja_build

    pushd wrappers/python
    export VERBOSE=1
    %python3_setup
    popd
install    : |
    %ninja_install

    pushd wrappers/python
    %python3_install
    popd

    # Substitute the python shared library built by pyproject which is statically linked with the shared one built by cmake
    pushd ${installdir}/usr/lib/python%python3_version%/site-packages/zxingcpp/
    python_lib=$(find . -type f -iname "zxingcpp.abi3*")
    mv -f ${installdir}/%libdir%/${python_lib:2} .
    patchelf --remove-rpath ${python_lib}
    popd

    # Not needed since it's built by the wheel
    rm -rfv ${installdir}/%libdir%/*.{py,pyi,typed}

    %install_license LICENSE
check      : |
    %ninja_check
patterns   :
    - ^python-zxing-cpp :
        - /usr/lib/python*
