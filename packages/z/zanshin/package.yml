# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zanshin
version    : 25.12.3
release    : 55
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/zanshin-25.12.3.tar.xz : 4df387da010b1875f73052849634df03bed453b62d0a01e8131d37ba5865cbd2
homepage   : https://zanshin.kde.org/
license    :
    - GPL-3.0-or-later
    - LGPL-2.1-only
component  : office.notes
summary    : To-do management application for KDE.
description: |
    A powerful yet simple application to manage your day to day actions.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Qml)
    - akonadi-calendar-devel
    - kf6-kparts-devel
    - kf6-krunner-devel
    - kontactinterface-devel
    - libboost-devel
rundeps    :
    - kdepim-runtime
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
