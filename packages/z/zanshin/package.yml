# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zanshin
version    : 26.04.1
release    : 56
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/zanshin-26.04.1.tar.xz : b75c59eb4d736ab9e36cf99d71ca539945cd69ecffca81f5ae76ec7cd888a845
homepage   : https://zanshin.kde.org/
license    :
    - GPL-3.0-or-later
    - LGPL-2.1-only
component  : office.notes
summary    : To-do management application for KDE.
description: |
    A powerful yet simple application to manage your day to day actions.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Qml)
    - akonadi-calendar-devel
    - kf6-kparts-devel
    - kf6-krunner-devel
    - kontactinterface-devel
    - libboost-devel
rundeps    :
    - kdepim-runtime
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
