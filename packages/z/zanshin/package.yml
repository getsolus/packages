# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zanshin
version    : 26.04.3
release    : 59
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/zanshin-26.04.3.tar.xz : a805e9a20b8240c552ea3d7d1586419037bf43aab943ab1cd48f00c3b5dc9792
homepage   : https://zanshin.kde.org/
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - MIT
component  : office.notes
summary    : To-do management application for KDE.
description: |
    A powerful yet simple application to manage your day to day actions.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Qml)
    - akonadi-calendar-devel
    - kf6-kparts-devel
    - kf6-krunner-devel
    - kontactinterface-devel
    - libboost-devel
rundeps    :
    - kdepim-runtime
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
