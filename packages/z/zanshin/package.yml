# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : zanshin
version    : 26.04.2
release    : 58
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/zanshin-26.04.2.tar.xz : 43454518021eb57af6f28b5fb765f2f7eba93516de9c3b96efa71814fca7a64f
homepage   : https://zanshin.kde.org/
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - MIT
component  : office.notes
summary    : To-do management application for KDE.
description: |
    A powerful yet simple application to manage your day to day actions.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(Qt6Qml)
    - akonadi-calendar-devel
    - kf6-kparts-devel
    - kf6-krunner-devel
    - kontactinterface-devel
    - libboost-devel
rundeps    :
    - kdepim-runtime
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
