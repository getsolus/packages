name       : zlib
version    : 2.1.5
release    : 28
source     :
    - https://github.com/zlib-ng/zlib-ng/archive/refs/tags/2.1.5.tar.gz : 3f6576971397b379d4205ae5451ff5a68edf6c103b2f03c4188ed7075fbb5f04
homepage   : https://github.com/zlib-ng/zlib-ng
license    : ZLIB
component  : system.base
summary    : zlib replacement with optimizations for next generation systems.
description:
    - A zlib data compression library for the next generation systems. ABI/API compatible mode.
devel      : yes
emul32     : yes
avx2       : yes
optimize   :
    - speed
    - lto
    - no-reorder-blocks-partition
    - emit-relocs
builddeps  :
    - llvm-bolt
setup      : |
    %cmake -B build \
        -DZLIB_COMPAT=ON \
        -DWITH_BENCHMARKS=ON \
        -DWITH_GTEST=OFF \
        -DFORCE_SSE2=ON \
        -DBUILD_SHARED_LIBS=ON \
        -DINSTALL_LIB_DIR=%libdir%
build      : |
    %make -C build
profile    : |
    %make -C build test
install    : |
    if [[ ! -z "${PGO_USE_BUILD}" && -z "${EMUL32BUILD}" ]]; then
        %bolt_instr $workdir/build/libz.so.1.3.0.zlib-ng
        %make -C build test
        %bolt_merge $workdir/build/libz.so.1.3.0.zlib-ng
        %bolt_opt $workdir/build/libz.so.1.3.0.zlib-ng
    fi
    %make_install -C build
#check      : |
#    %make -C build test
