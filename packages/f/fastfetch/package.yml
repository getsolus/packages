# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : fastfetch
version    : 2.64.0
release    : 74
source     :
    - https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.64.0.tar.gz : cb2d5a1207c9ca9c6a5a25592c0b6064db2efe41dd88094972be9b7611694d8a
homepage   : https://github.com/fastfetch-cli/fastfetch
license    : MIT
component  : system.utils
summary    : Like neofetch, but much faster because written in C
description: |
    Fastfetch is a neofetch-like tool for fetching system information and displaying them in a pretty way. It is written in pure c, with performance and customizability in mind.
builddeps  :
    - pkgconfig(ImageMagick)
    - pkgconfig(OpenCL)
    - pkgconfig(dconf)
    - pkgconfig(ddcutil)
    - pkgconfig(egl)
    - pkgconfig(gio-2.0)
    - pkgconfig(libdrm)
    - pkgconfig(libelf)
    - pkgconfig(libpci)
    - pkgconfig(libpulse)
    - pkgconfig(libva)
    - pkgconfig(libxfconf-0)
    - pkgconfig(lua)
    - pkgconfig(sqlite3)
    - pkgconfig(vdpau)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(xrandr)
    - vulkan-headers
setup      : |
    %cmake_ninja \
        -DENABLE_IMAGEMAGICK6='OFF' \
        -DENABLE_RPM='OFF' \
        -Wno-dev
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
