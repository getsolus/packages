# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : filelight
version    : 26.04.2
release    : 89
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/filelight-26.04.2.tar.xz : e8c8f686814363d321107fc70db1d34eaed3d757bb79767c43e7976c08bd6ff8
homepage   : https://kde.org/applications/utilities/org.kde.filelight
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde
summary    : Graphical representation of your filesystem
description: |
    Filelight allows you to quickly understand exactly where your diskspace is being used by graphically representing your file system.
builddeps  :
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6Svg)
    - kf6-kcrash-devel
    - kf6-kdeclarative-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-qqc2-desktop-style-devel
rundeps    :
    - kf6-kirigami
    - kf6-qqc2-desktop-style
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove docs
    rm -rfv $installdir/usr/share/doc
