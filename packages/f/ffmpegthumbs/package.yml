# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ffmpegthumbs
version    : 26.04.3
release    : 104
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/ffmpegthumbs-26.04.3.tar.xz : a6d7a12a57f24113789203413d40a4355ce4c0aff516384ecd2c548ce42f389b
homepage   : https://kde.org/applications/multimedia/org.kde.ffmpegthumbs
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : desktop.kde
summary    : Video thumbnail generator
description: |
    FFMpegThumbs is a video thumbnail generator for KDE file managers.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libavcodec)
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
