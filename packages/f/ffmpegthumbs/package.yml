# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ffmpegthumbs
version    : 26.04.2
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/ffmpegthumbs-26.04.2.tar.xz : 865a1904b1f664c7118976603e38ffcb0a5873782d40eb684268767a303d8d48
homepage   : https://kde.org/applications/multimedia/org.kde.ffmpegthumbs
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : desktop.kde
summary    : Video thumbnail generator
description: |
    FFMpegThumbs is a video thumbnail generator for KDE file managers.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(libavcodec)
    - kf6-kio-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
