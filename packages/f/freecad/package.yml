# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : freecad
version    : 1.1.1
release    : 32
source     :
    - https://github.com/FreeCAD/FreeCAD/archive/refs/tags/1.1.1.tar.gz : 873702bb6564e0d393fe1a0db1ee38e11a14e54780237f9ba6041fe9cd5d1170
    - https://github.com/FreeCAD/AddonManager/archive/937b6877239dc78ef59eeefe8099e5f14243eda1.tar.gz#AddonManager.tar.gz : 70b2fa7f3c58c0ea5be830de90d33369670ee6658f13aeb7684f1ea478528178
    - https://github.com/Ondsel-Development/OndselSolver/archive/09d6175a2ba69e7016fcecc4f384946a2f84f92d.tar.gz#ondselsolver.tar.gz : 890fb6ddeb1b42face95854689ff7b96c926c368b7d616d9e31e4b35f79ddde8
homepage   : https://www.freecadweb.org/
license    : LGPL-2.1-or-later
component  : office
summary    : FreeCAD 3D parametric modeler
description: |
    FreeCAD is an open-source parametric 3D modeler made primarily to design real-life objects of any size. Parametric modeling allows you to easily modify your design by going back into your model history to change its parameters. FreeCAD lets you to sketch geometry constrained 2D shapes and use them as a base to build other objects. It contains many components to adjust dimensions or extract design details from 3D models to create high quality production-ready drawings. FreeCAD is designed to fit a wide range of uses including product design, mechanical engineering and architecture, whether you are a hobbyist, programmer, experienced CAD user, student or teacher.
clang      : true
builddeps  :
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(SoQt)
    - pkgconfig(eigen3)
    - pkgconfig(fmt)
    - pkgconfig(freetype2)
    - pkgconfig(gtest)
    - pkgconfig(opengl)
    - pkgconfig(pcl_io)
    - pkgconfig(pyside6)
    - pkgconfig(xerces-c)
    - pkgconfig(yaml-cpp)
    - VTK-devel
    - libboost-devel
    - matplotlib
    - med-c-devel
    - microsoft-gsl
    - opencascade-devel
    - pybind11
    - python-pivy
    - swig
rundeps    :
    - matplotlib
    - pybind11
    - python-pivy
setup      : |
    tar -xf ${sources}/ondselsolver.tar.gz --strip-components=1 -C src/3rdParty/OndselSolver
    tar -xf ${sources}/AddonManager.tar.gz --strip-components=1 -C src/Mod/AddonManager

    %patch -p1 -i ${pkgfiles}/0001-Solus-Don-t-hide-classic-theme.patch
    %patch -p1 -i ${pkgfiles}/freecad-1.1.1-qt-6.11.patch

    %cmake_ninja \
        -DBoost_NO_BOOST_CMAKE=ON \
        -DBUILD_DESIGNER_PLUGIN=ON \
        -DBUILD_FLAT_MESH=ON \
        -DBUILD_PLOT=ON \
        -DCMAKE_INSTALL_PREFIX=/usr/lib64/freecad \
        -DCMAKE_INSTALL_DATADIR=/usr/share/freecad \
        -DCMAKE_INSTALL_DATAROOTDIR=/usr/share \
        -DCMAKE_INSTALL_DOCDIR=/usr/share/doc/freecad \
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
        -DE57_BUILD_SHARED=ON \
        -DENABLE_DEVELOPER_TESTS=OFF \
        -DINSTALL_GTEST=OFF \
        -DINSTALL_TO_SITEPACKAGES=ON \
        -DFREECAD_QT_VERSION=6 \
        -DFREECAD_USE_EXTERNAL_PIVY=ON \
        -DFREECAD_USE_EXTERNAL_SMESH=OFF \
        -DFREECAD_USE_FREETYPE=ON \
        -DFREECAD_USE_OCC_VARIANT="Official Version" \
        -DFREECAD_USE_PCL=ON \
        -DFREECAD_USE_PYBIND11=ON \
        -DFREECAD_USE_QT_FILEDIALOG=ON \
        -DOpenGL_GL_PREFERENCE=GLVND \
        -DPYTHON_EXECUTABLE=/usr/bin/python3
build      : |
    %ninja_build
install    : |
    %ninja_install
    %python3_compile
    %install_license LICENSE

    # Tools
    install -Dm00755 src/Tools/fcinfo -t ${installdir}/usr/bin/

    # Symlinks
    ln -srv ${installdir}/usr/lib64/freecad/bin/FreeCAD ${installdir}/usr/bin/freecad
    ln -srv ${installdir}/usr/lib64/freecad/bin/FreeCAD ${installdir}/usr/bin/FreeCAD
    ln -srv ${installdir}/usr/lib64/freecad/bin/FreeCADCmd ${installdir}/usr/bin/freecadcmd
    ln -srv ${installdir}/usr/lib64/freecad/bin/FreeCADCmd ${installdir}/usr/bin/FreeCADCmd
    ln -srv ${installdir}/usr/lib64/freecad/bin/freecad-thumbnailer ${installdir}/usr/bin/freecad-thumbnailer

    # Docs
    rm -rfv ${installdir}/usr/share/doc

    # Cleanup libondsel artifacts we don't need
    rm -rfv ${installdir}/usr/lib64/freecad/include \
            ${installdir}/usr/share/pkgconfig
patterns    :
    - main :
        - /*
