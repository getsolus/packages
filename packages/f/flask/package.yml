# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : flask
version    : 3.1.3
release    : 19
source     :
    - https://github.com/pallets/flask/archive/3.1.3.tar.gz : 36a6183d453925f09bc37b2a8bffdb1eb1b5f18eae384c037c179b07aac88477
homepage   : https://palletsprojects.com/p/flask/
license    : BSD-3-Clause
component  : programming.python
summary    : A microframework based on Werkzeug, Jinja2 and good intentions
description: |
    Flask is a lightweight WSGI web application framework. It is designed to make getting started quick and easy, with the ability to scale up to complex applications. It began as a simple wrapper around Werkzeug and Jinja and has become one of the most popular Python web application frameworks.
builddeps  :
    - python-build
    - python-flit-core
    - python-installer
checkdeps  :
    - python-asgiref
    - python-blinker
    - python-click
    - python-itsdangerous
    - python-jinja
    - python-pytest
    - python-werkzeug
rundeps    :
    - python-asgiref
    - python-blinker
    - python-click
    - python-itsdangerous
    - python-jinja
    - python-werkzeug
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    # https://github.com/pallets/flask/issues/5961
    %python3_test pytest -k 'not test_environ_for_valid_idna_completes'
