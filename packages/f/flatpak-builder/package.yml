# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : flatpak-builder
version    : 1.4.10
release    : 29
source     :
    - https://github.com/flatpak/flatpak-builder/releases/download/1.4.10/flatpak-builder-1.4.10.tar.xz : 
        b1721078c0697c8ca1d7db965232b509d1aa87f68b4dae378eb500bddddb9cc1
homepage   : https://flatpak.org
license    : LGPL-2.1-or-later
component  : desktop
summary    : Tool to build flatpaks from source
description: |
    Flatpak-builder is a tool for building flatpaks from sources.
builddeps  :
    - pkgconfig(appstream-compose)
    - pkgconfig(flatpak)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libcap)
    - pkgconfig(libcurl)
    - pkgconfig(libelf)
    - pkgconfig(libsoup-2.4)
    - pkgconfig(yaml-0.1)
    - debugedit
    - docbook-xml
    - xmlto
rundeps    :
    - ccache
    - debugedit
    - elfutils
    - flatpak
    - fuse
    - git
    - patch
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    # Needs unprivileged userns enabled
    # Certain test will fail due to chrooted environment
    %ninja_check || true
