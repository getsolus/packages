# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : freeorion
version    : 0.5.1.2
release    : 41
source     :
    - https://github.com/freeorion/freeorion/releases/download/v0.5.1.2/FreeOrion-v0.5.1.2_Source.tar.gz : fe6c2577cd2a6a9f88bfe8a69f4c6efa204a85111cb7675d61a1a6d341fdda65
homepage   : https://www.freeorion.org
license    :
    - CC-BY-SA-3.0
    - GPL-2.0-only
component  : games.strategy
summary    : FreeOrion is a free, open source, turn-based space empire and galactic conquest (4X) computer game
description: |
    FreeOrion is a free, Open Source, turn-based space empire and galactic conquest computer game. It is inspired by the tradition of the Master of Orion games, but does not try to be a clone or remake of that series or any other game.  It builds on the classic *4X* (eXplore, eXpand, eXploit and eXterminate) model.
builddeps  :
    - pkgconfig(freetype2)
    - pkgconfig(glew)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(openal)
    - pkgconfig(python3)
    - pkgconfig(sdl2)
    - pkgconfig(vorbis)
    - libboost-devel
setup      : |
    %cmake -DCMAKE_INSTALL_LIBDIR=lib%LIBSUFFIX% .
build      : |
    %make
install    : |
    %make_install
    %install_license default/COPYING
