# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : freeglut
version    : 3.8.0
release    : 15
source     :
    - https://github.com/freeglut/freeglut/releases/download/v3.8.0/freeglut-3.8.0.tar.gz : 674dcaff25010e09e450aec458b8870d9e98c46f99538db457ab659b321d9989
homepage   : https://freeglut.sourceforge.net/
license    : MIT
component  : desktop.library
emul32     : true
summary    : OpenSource GLUT library
description: |
    Freeglut is intended to be a 100% compatible, completely opensourced clone of the GLUT library. GLUT is a window system independent toolkit for writing OpenGL programs, implementing a simple windowing API, which makes learning about and exploring OpenGL programming very easy.
builddeps  :
    - pkgconfig32(gl)
    - pkgconfig32(glu)
    - pkgconfig32(x11)
    - pkgconfig32(xext)
    - pkgconfig32(xi)
    - pkgconfig32(xxf86vm)
setup      : |
    %cmake . -DFREEGLUT_BUILD_STATIC_LIBS=OFF \
        -DCMAKE_INSTALL_LIBDIR=%libdir%
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
