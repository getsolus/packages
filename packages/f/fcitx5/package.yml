# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : fcitx5
version    : 5.1.17
release    : 2
source     :
    - https://github.com/fcitx/fcitx5/archive/refs/tags/5.1.17.tar.gz : 84a927fa5f3a3c713c9388a126a2e9b516f6ca7e6402b140cd82ff6614e61eaa
homepage   : https://github.com/fcitx/fcitx5
license    : LGPL-2.1-or-later
component  :
    - desktop.core
    - libs : programming.library
summary    :
    - Next generation of fcitx.
    - libs : Library files for fcitx5.
description: |
    Next generation of fcitx.
networking : true
builddeps  :
    - pkgconfig(cairo-xcb)
    - pkgconfig(enchant-2)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(nlohmann_json)
    - pkgconfig(pango)
    - pkgconfig(wayland-cursor)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xcb-aux)
    - pkgconfig(xcb-icccm)
    - pkgconfig(xcb-imdkit)
    - pkgconfig(xcb-keysyms)
    - pkgconfig(xkbcommon)
    - pkgconfig(xkbfile)
    - pkgconfig(xkeyboard-config)
    - extra-cmake-modules
rundeps    :
    - fcitx5-libs
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    install -Dm00644 ${pkgfiles}/fcitx5.sh ${installdir}/usr/share/defaults/etc/profile.d/fcitx5.sh

    %install_license LICENSES/*
check     : |
    %ninja_check
conflicts :
    - fcitx
patterns  :
    - libs :
        - /usr/lib64/libFcitx5*.so.*.*
        - /usr/lib64/libFcitx5Config.so.6
        - /usr/lib64/libFcitx5Core.so.7
        - /usr/lib64/libFcitx5Utils.so.2
