# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : font-iosevka-ttf
version    : 34.6.3
release    : 94
source     :
    - https://github.com/be5invis/Iosevka/releases/download/v34.6.3/PkgTTF-Iosevka-34.6.3.zip : 3874bfe3125e84b36963d35d249ee7ea2dc33b340e7a01d2e20189723c369c41
    - https://raw.githubusercontent.com/be5invis/Iosevka/refs/heads/main/LICENSE.md : 4ba53c7c1cb39279aae5f8d7d22054c485c71169920e5a36ed098b115e2e3c5d
homepage   : https://typeof.net/Iosevka
license    : OFL-1.1
component  : desktop.font
summary    : Versatile typeface for code, from code.
description: |
    Iosevka is an open-source, sans-serif + slab-serif, monospace + quasi-proportional typeface family, designed for writing code, using in terminals, and preparing technical documents.
install    : |
    install -Dm00644 *.ttf -t $installdir/usr/share/fonts/truetype/iosevka/
    install -Dm00644 $pkgfiles/iosevka.metainfo.xml $installdir/usr/share/metainfo/iosevka.metainfo.xml
    %install_license ${sources}/LICENSE.md
