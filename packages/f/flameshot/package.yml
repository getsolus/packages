# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : flameshot
version    : 14.0.0
release    : 20
source     :
    - https://github.com/flameshot-org/flameshot/archive/refs/tags/v14.0.0.tar.gz : 810c399f3b9fbfd72e24e61417ede24243925f9c0d03040a8aba0d4866676d93
    - git|https://gitlab.com/mattbas/Qt-Color-Widgets.git : 352bc8f99bf2174d5724ee70623427aa31ddc26a
homepage   : https://flameshot.org/
license    :
    - Apache-2.0
    - GPL-2.0-or-later
    - GPL-3.0-or-later
    - LAL-1.3
    - LGPL-3.0-or-later
component  : multimedia.graphics
summary    : Powerful yet simple to use screenshot software
description: |
    A program to capture screenshots. It includes CLI options as well as a GUI for capturing and annotating screenshots.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools)
    - kdsingleapplication-devel
rundeps    :
    - qt6-svg
setup      : |
    mkdir ${workdir}/external
    cp -aR ${sources}/Qt-Color-Widgets.git ${workdir}/external/Qt-Color-Widgets

    %cmake_ninja \
        -DDISABLE_UPDATE_CHECKER:BOOL=ON \
        -DUSE_WAYLAND_CLIPBOARD:BOOL=ON \
        -DUSE_BUNDLED_KDSINGLEAPPLICATION:BOOL=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
