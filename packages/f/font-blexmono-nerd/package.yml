# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : font-blexmono-nerd
version    : 3.4.0
release    : 1
source     :
    - https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/IBMPlexMono.tar.xz : 95e6ecaa5dfb9a96f27a6b6edc7be396fb6df30bc311a6f7e15cad56a30051c2
homepage   : https://www.nerdfonts.com/
license    : OFL-1.1
component  : desktop.font
summary    : IBM Plex font with nerdfonts patcher
description: |
    IBM Plex font with nerdfonts patcher
install    : |
    install -d $installdir/usr/share/fonts/blexmono-nerd-fonts
    install -Dm00644 *.ttf $installdir/usr/share/fonts/blexmono-nerd-fonts/
    install -Dm00644 $pkgfiles/blexmono-nerd-fonts.metainfo.xml $installdir/usr/share/metainfo/blexmono-nerd-fonts.metainfo.xml
    %install_license LICENSE.txt
