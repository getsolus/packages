# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : font-awesome
version    : 7.2.0
release    : 40
source     :
    - https://github.com/FortAwesome/Font-Awesome/archive/refs/tags/7.2.0.tar.gz : 8f433b74d3d4bbba2a6374a0a0ddf53be8e127809341e4c2578719229b43903a
homepage   : https://fontawesome.com
license    : OFL-1.1
component  :
    - otf : desktop.font
    - woff2 : desktop.font
summary    :
    - Font Awesome Free (OTF)
    - woff2: Font Awesome Free (WOFF2)
description: |
    Font Awesome - The iconic font and CSS toolkit
install    : |
    install -Dm00644 otfs/*.otf -t $installdir/usr/share/fonts/opentype/fontawesome/
    install -Dm00644 webfonts/*.woff2 -t $installdir/usr/share/fonts/woff2/fontawesome/
    install -Dm00644 $pkgfiles/fontawesome*.metainfo.xml -t $installdir/usr/share/metainfo/
    %install_license LICENSE*
patterns   :
    - otf :
      - /usr/share/fonts/opentype
      - /usr/share/metainfo/fontawesome-otf.metainfo.xml
    - woff2 :
      - /usr/share/fonts/woff2
      - /usr/share/metainfo/fontawesome-woff2.metainfo.xml
