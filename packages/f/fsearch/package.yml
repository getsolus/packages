# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : fsearch
version    : '0.3'
release    : 15
source     :
    - https://github.com/cboxdoerfer/fsearch/archive/refs/tags/0.3.tar.gz : 17e9bb26f0c6077192dc1f40800c5c2e6074d93ef0e7f95b42180eb6b143b556
homepage   : https://github.com/cboxdoerfer/fsearch
license    : GPL-2.0-or-later
component  : system.utils
summary    : A fast file search utility for Unix-like systems based on GTK+3
description: |
    FSearch is a fast file search utility, inspired by Everything Search Engine. It's written in C and based on GTK3.
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(icu-uc)
    - pkgconfig(libpcre2-8)
    - autoconf-archive
    - desktop-file-utils
    - itstool
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    %ninja_check
