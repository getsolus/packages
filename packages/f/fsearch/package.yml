# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : fsearch
version    : 0.3.1
release    : 16
source     :
    - https://github.com/cboxdoerfer/fsearch/archive/refs/tags/0.3.1.tar.gz : b16ab75556d841bf858633710d71c92f35d34362614b8584b0a5b71690a72c39
homepage   : https://github.com/cboxdoerfer/fsearch
license    : GPL-2.0-or-later
component  : system.utils
summary    : A fast file search utility for Unix-like systems based on GTK+3
description: |
    FSearch is a fast file search utility, inspired by Everything Search Engine. It's written in C and based on GTK3.
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(icu-uc)
    - pkgconfig(libpcre2-8)
    - autoconf-archive
    - desktop-file-utils
    - itstool
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    %ninja_check
