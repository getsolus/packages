# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : faugus-launcher
version    : 1.22.7
release    : 8
source     :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.22.7.tar.gz : 06a393aca815d5bc170549e18473fbfe99c3972b6b83477ec9bb0039c9766a7e
homepage   : https://github.com/Faugus/faugus-launcher
license    : MIT
component  : games
summary    : A simple and lightweight app for running Windows games using UMU-Launcher
description: |
    A simple and lightweight app for running Windows games using UMU-Launcher
builddeps  :
    - pkgconfig(gtk4)
rundeps    :
    - imagemagick
    - libayatana-appindicator
    - libcanberra
    - libgtk-3
    - python-gobject
    - python-icoextract
    - python-pillow
    - python-psutil
    - python-requests
    - python-vdf
setup      : |
    %meson_configure \
        -Dflatpak_build=true
build      : |
    %ninja_build
install    : |
    %ninja_install
