# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : faugus-launcher
version    : 2.0.0
release    : 10
source     :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/2.0.0.tar.gz : 34c9591a179d2206cc656dfcc23fbe985d3292c2da5801d5a6fb1a198eac3bee
homepage   : https://github.com/Faugus/faugus-launcher
license    : MIT
component  : games
summary    : A simple and lightweight app for running Windows games using UMU-Launcher
description: |
    A simple and lightweight app for running Windows games using UMU-Launcher
builddeps  :
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
    - pkgconfig(manette-0.2)
rundeps    :
    - libadwaita
    - libgtk-4
    - libmanette
    - python-gobject
    - python-icoextract
    - python-pillow
    - python-psutil
    - python-requests
    - python-vdf
    - python3-dbus
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
