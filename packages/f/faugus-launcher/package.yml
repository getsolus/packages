# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : faugus-launcher
version    : 1.22.8
release    : 9
source     :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.22.8.tar.gz : fe879f01617232125576b194cbac0ca6995cd65a5649daf7fe33d0a8a583d1a3
homepage   : https://github.com/Faugus/faugus-launcher
license    : MIT
component  : games
summary    : A simple and lightweight app for running Windows games using UMU-Launcher
description: |
    A simple and lightweight app for running Windows games using UMU-Launcher
builddeps  :
    - pkgconfig(gtk4)
rundeps    :
    - imagemagick
    - libayatana-appindicator
    - libcanberra
    - libgtk-3
    - python-gobject
    - python-icoextract
    - python-pillow
    - python-psutil
    - python-requests
    - python-vdf
setup      : |
    %meson_configure \
        -Dflatpak_build=true
build      : |
    %ninja_build
install    : |
    %ninja_install
