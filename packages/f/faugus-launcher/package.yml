# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : faugus-launcher
version    : 1.19.4
release    : 1
source     :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.19.4.tar.gz : d6b6eab03a9a28ce11b4f15abaf0e3aeaab4d59677e90c544938d557371ed0d0
homepage   : https://github.com/Faugus/faugus-launcher
license    : MIT
component  : games
summary    : A simple and lightweight app for running Windows games using UMU-Launcher
description: |
    A simple and lightweight app for running Windows games using UMU-Launcher
builddeps  :
    - pkgconfig(gtk4)
rundeps    :
    - imagemagick
    - libayatana-appindicator
    - libcanberra
    - libgtk-3
    - python-gobject
    - python-icoextract
    - python-pillow
    - python-psutil
    - python-requests
    - python-vdf
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
