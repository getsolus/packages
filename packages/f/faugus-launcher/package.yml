# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : faugus-launcher
version    : 2.0.2
release    : 12
source     :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/2.0.2.tar.gz : f7cbe011c7eaac0dedce60efb75d0ae3fa51e54aaf3396e3ee1d3c930941d8af
homepage   : https://github.com/Faugus/faugus-launcher
license    : MIT
component  : games
summary    : A simple and lightweight app for running Windows games using UMU-Launcher
description: |
    A simple and lightweight app for running Windows games using UMU-Launcher
builddeps  :
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
    - pkgconfig(manette-0.2)
rundeps    :
    - libadwaita
    - libgtk-4
    - libmanette
    - python-gobject
    - python-icoextract
    - python-pillow
    - python-psutil
    - python-requests
    - python-vdf
    - python3-dbus
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
