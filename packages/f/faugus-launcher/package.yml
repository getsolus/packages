# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : faugus-launcher
version    : 1.20.3
release    : 3
source     :
    - https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.20.3.tar.gz : 097aedd6527b2fa579e877565cfafb2bc0d7d6fca3b1d925c104220d6843584e
homepage   : https://github.com/Faugus/faugus-launcher
license    : MIT
component  : games
summary    : A simple and lightweight app for running Windows games using UMU-Launcher
description: |
    A simple and lightweight app for running Windows games using UMU-Launcher
builddeps  :
    - pkgconfig(gtk4)
rundeps    :
    - imagemagick
    - libayatana-appindicator
    - libcanberra
    - libgtk-3
    - python-gobject
    - python-icoextract
    - python-pillow
    - python-psutil
    - python-requests
    - python-vdf
setup      : |
    %meson_configure \
        -Dflatpak_build=true
build      : |
    %ninja_build
install    : |
    %ninja_install
