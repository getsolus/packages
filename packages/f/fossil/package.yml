# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : fossil
version    : '2.28'
release    : 16
source     :
    - https://fossil-scm.org/home/tarball/99675884a93c09125dbfbef0ca47959626c81545c132e247e67a08bd12ac7256/fossil-src-2.28.tar.gz : 64514e3f8206982a959717ab1fc5b38836d9bba41f5ed0f24b18ef8dfb2efa90
homepage   : https://fossil-scm.org/
license    : BSD-2-Clause
component  : system.utils
summary    : A simple, high-reliability, distributed software configuration management system
description: |
    Fossil is a simple, high-reliability, distributed software configuration management system with
    some features.
builddeps  :
    - pkgconfig(fuse)
    - pkgconfig(sqlite3)
setup      : |
    %configure --disable-internal-sqlite \
               --disable-static \
               --json
build      : |
    %make
install    : |
    %make_install
