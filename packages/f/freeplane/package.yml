# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : freeplane
version    : 1.13.2
release    : 27
source     :
    - git|https://github.com/freeplane/freeplane.git : release-1.13.2
homepage   : https://www.freeplane.org/
license    : GPL-2.0-or-later
component  : office
summary    : An application for mind mapping, plus knowledge and project management
description: |
    Freeplane is a free and open source software application that supports thinking, sharing information and getting things done at work, in school and at home. The software can be used for mind mapping and analyzing the information contained in mind maps.
networking : true
builddeps  :
    - gradle
    - openjdk-21
checkdeps  :
    - font-ubuntu-ttf
    - fontconfig
rundeps    :
    - fontconfig
    - openjdk-21
environment: |
    export JAVA_HOME=/usr/lib64/openjdk-21
    export PATH=${JAVA_HOME}/bin:${PATH}
build      : |
    rm -rf freeplane_mac/*
    %patch -p1 -i ${pkgfiles}/0001-Gradle-9.x.x-fixes.patch
    export GRADLE_USER_HOME=${workdir}/.gradle_home

    gradle build --no-daemon
install    : |
    install -dm00755 ${installdir}/usr/share/freeplane
    %install_license license*
    cp -a BIN/. ${installdir}/usr/share/freeplane
    chmod 00755 ${installdir}/usr/share/freeplane/freeplane.sh

    install -Dm00644 BIN/freeplane.svg ${installdir}/usr/share/icons/hicolor/scalable/apps/freeplane.svg

    install -Dm00644 debian-meta-data/freeplane.desktop ${installdir}/usr/share/applications/org.freeplane.App.desktop
    install -Dm00644 debian-meta-data/freeplane.sharedmimeinfo ${installdir}/usr/share/mime/packages/freeplane.xml
    install -Dm00644 debian-meta-data/org.freeplane.App.metainfo.xml -t ${installdir}/usr/share/metainfo/

    install -Dm00755 ${pkgfiles}/freeplane ${installdir}/usr/bin/freeplane

    rm ${installdir}/usr/share/freeplane/{*.bat,*.dll,freeplane.{png,svg},libflatlaf-linux-arm64.so}
