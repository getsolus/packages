# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : flake8
version    : 7.3.0
release    : 22
source     :
    - https://github.com/PyCQA/flake8/archive/refs/tags/7.3.0.tar.gz : 71a7d2ec4166f83c6fc66e6465a45c49b4565ee29b69f27b335366ce101d8c2b
homepage   : https://github.com/PyCQA/flake8
license    : MIT
component  : programming.python
summary    : Python Code Format Checking
description: |
    flake8 is a python tool that glues together pep8, pyflakes, mccabe, and third-party plugins to check the style and quality of some python code.
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
checkdeps  :
    - mccabe
    - pycodestyle
    - pyflakes
    - python-pytest
rundeps    :
    - mccabe
    - pycodestyle
    - pyflakes
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest -v
