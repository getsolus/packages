# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : featherpad
version    : 1.6.4
release    : 4
source     :
    - https://github.com/tsujan/FeatherPad/releases/download/V1.6.4/FeatherPad-1.6.4.tar.xz : 369c39059ff8978e8ce3b8575601e8ac805595cbabf1704601e829b3a745ca8a
homepage   : https://github.com/tsujan/FeatherPad
license    : GPL-3.0-or-later
