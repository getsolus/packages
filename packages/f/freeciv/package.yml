# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : freeciv
version    : 3.2.4
release    : 51
source     :
    - https://files.freeciv.org/stable/freeciv-3.2.4.tar.xz : e0a19508bf69dc4fb7c251d391253794d772bfcce2dbd30fa453521244edd32c
homepage   : https://www.freeciv.org/
license    : GPL-2.0-or-later
component  : games.strategy
summary    : Free and Open Source empire-building strategy game inspired by the history of human civilization
description: |
    Free and Open Source empire-building strategy game inspired by the history of human civilization.
libsplit   : false
builddeps  :
    - pkgconfig(ImageMagick)
    - pkgconfig(Qt6Core)
    - pkgconfig(SDL2_mixer)
    - pkgconfig(gtk4)
    - pkgconfig(libcurl)
    - pkgconfig(lua-5.4)
    - pkgconfig(sqlite3)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
