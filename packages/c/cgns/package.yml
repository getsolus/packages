# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cgns
version    : 4.5.2
release    : 6
source     :
    - https://github.com/CGNS/CGNS/archive/refs/tags/v4.5.2.tar.gz : 95075e1fd0b51d97b1b96b73ebe03b1a551fbcc9cd2b2b6f487ccccedcff5964
license    : Zlib
component  : programming.library
homepage   : https://cgns.github.io/
summary    : CFD General Notation System
description: |
    The CFD General Notation System (CGNS) provides a standard for recording and recovering computer data associated with the numerical solution of fluid dynamics equations.
builddeps  :
    - pkgconfig(hdf5)
setup      : |
    %cmake_ninja \
        -DCGNS_BUILD_SHARED=ON \
        -DCGNS_ENABLE_HDF5=ON \
        -DCMAKE_PREFIX_PATH=/usr
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license license.txt

    rm -f $installdir/usr/lib/libcgns.a
