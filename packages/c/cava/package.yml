# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cava
version    : 1.0.0
release    : 20
source     :
    - https://github.com/karlstav/cava/archive/refs/tags/1.0.0.tar.gz : 2866cea11d0bd38406924ab2b47d5577f14909a7321ee928b6836391f375af7e
homepage   : https://github.com/karlstav/cava
license    : MIT
component  : multimedia.audio
summary    : Console-based Audio Visualizer for Alsa
description: |
    Cava is a bar spectrum audio visualizer for terminal (ncurses) or desktop (SDL).
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(fftw3)
    - pkgconfig(iniparser)
    - pkgconfig(libpulse)
setup      : |
    %autogen --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE
