# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : containerd
version    : 2.3.1
release    : 73
source     :
    - https://github.com/containerd/containerd/archive/refs/tags/v2.3.1.tar.gz : 9de4cb8bfb27964a8ffd95e35326b7279ea2e2a6506da16c2533d3f523f12c11
license    : Apache-2.0
component  : virt
homepage   : https://containerd.io/
summary    : A daemon to control OCI container runtimes
description: |
    A daemon to control OCI container runtimes
builddeps  :
    - btrfs-progs-devel
    - git
    - go-md2man
    - golang
rundeps    :
    - runc
networking : true
environment: |
    export GO111MODULE=auto

    export GOFLAGS="-trimpath -mod=readonly -modcacherw"
    export EXTRA_LDFLAGS="-buildid="
    export VERSION=v$version

    unset LDFLAGS
setup      : |
    sed -i 's|/usr/local/bin/containerd|/usr/bin/containerd|' containerd.service

    go mod vendor
build      : |
    set -e
    export GITCOMMIT="$(git ls-remote https://github.com/containerd/containerd.git refs/tags/v$version^{} | awk '{print $1}')"

    mkdir -p src/github.com/containerd
    ln -s `pwd` src/github.com/containerd/containerd
    pushd src/github.com/containerd/containerd

    %make GO_BUILD_FLAGS="$GOFLAGS" REVISION=$GITCOMMIT binaries man
install    : |
    %make_install PREFIX=/usr/
    %install_license LICENSE

    # Install the service file, but disable it by default
    install -Dm00644 containerd.service ${installdir}/%libdir%/systemd/system/containerd.service
    install -Dm00644 ${pkgfiles}/containerd.preset ${installdir}/%libdir%/systemd/system-preset/containerd.preset

    # Shell Completions
    install -Dm00644 contrib/autocomplete/ctr ${installdir}/usr/share/bash-completion/completions/ctr
    install -Dm00644 contrib/autocomplete/zsh_autocomplete ${installdir}/usr/share/zsh/site-functions/_ctr

    # Man pages
    install -Dm00644 man/*.8 -t ${installdir}/usr/share/man/man8
    install -Dm00644 man/*.5 -t ${installdir}/usr/share/man/man5
