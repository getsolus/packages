# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : coolercontrol
version    : 4.3.1
release    : 1
source     :
    - https://gitlab.com/coolercontrol/coolercontrol/-/archive/4.3.1/coolercontrol-4.3.1.tar.gz : d00c1c91528b61c4e05de08bd39d5bf7256a48ee6c2461dd4c735e6792a71e5d
homepage   : https://gitlab.com/coolercontrol/coolercontrol/
license    : GPL-3.0-or-later
component  : system.utils
summary    : Powerful cooling control and monitoring for Linux
description: |
    CoolerControl is an open-source application for monitoring and controlling supported cooling devices on Linux. It features a system daemon with a built-in Web UI, an optional desktop app, and a comprehensive REST API.
builddeps  :
    - pkgconfig(Qt6WebChannel)
    - pkgconfig(Qt6WebEngineCore)
    - pkgconfig(protobuf)
    - nodejs
    - rust
rundeps :
    - libdrm
    - lm_sensors
networking : true
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE

    # Install CoolerControl icons
    install -Dm00644 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl.png ${installdir}/usr/share/icons/hicolor/256x256/org.coolercontrol.CoolerControl.png
    install -Dm00644 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl-alert.png ${installdir}/usr/share/icons/hicolor/256x256/org.coolercontrol.CoolerControl-alert.png
    install -Dm00644 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl-symbolic.svg ${installdir}/usr/share/icons/hicolor/symbolic/org.coolercontrol.CoolerControl-symbolic.svg
    install -Dm00644 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl-symbolic-alert.svg ${installdir}/usr/share/icons/hicolor/symbolic/org.coolercontrol.CoolerControl-symbolic-alert.svg
    install -Dm00644 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl.svg ${installdir}/usr/share/icons/hicolor/scalable/apps/org.coolercontrol.CoolerControl.svg

    # Install .desktop file and metainfo
    install -Dm00755 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl.desktop ${installdir}/usr/share/applications/org.coolercontrol.CoolerControl.desktop
    install -Dm00644 ${workdir}/packaging/metadata/org.coolercontrol.CoolerControl.metainfo.xml ${installdir}/usr/share/metainfo/org.coolercontrol.CoolerControl.metainfo.xml

    # Install manpages
    install -Dm00644 ${workdir}/packaging/man/coolercontrol.1 ${installdir}/usr/share/man/man1/coolercontrol.1
    install -Dm00644 ${workdir}/packaging/man/coolercontrold.8 ${installdir}/usr/share/man/man8/coolercontrold.8

    # Install service and preset
    install -Dm00644 ${workdir}/packaging/systemd/coolercontrold.service ${installdir}%libdir%/systemd/system/coolercontrold.service
    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/60-coolercontrold.preset
