# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : calibre
version    : 9.10.0
release    : 236
source     :
    - https://download.calibre-ebook.com/9.10.0/calibre-9.10.0.tar.xz : 53b8a277c766e6c3fb5dfb26fa29119f4a129bf8f9a954b4235a963c8a30c301
homepage   : https://calibre-ebook.com/
license    : GPL-3.0-only
component  : office.viewers
summary    : Calibre eBook Library Manager
description: |
    calibre is a free and open source e-book library management application developed by users of e-books for users of e-books.
networking : true
builddeps  :
    - pkgconfig(Qt6WebEngineCore)
    - pkgconfig(dbus-python)
    - pkgconfig(espeak-ng)
    - pkgconfig(hunspell)
    - pkgconfig(icu-i18n)
    - pkgconfig(libavutil)
    - pkgconfig(libinput)
    - pkgconfig(libmtp)
    - pkgconfig(mtdev)
    - pkgconfig(poppler)
    - pkgconfig(python3)
    - pkgconfig(shared-mime-info)
    - pkgconfig(sqlite3)
    - pkgconfig(uchardet)
    - pkgconfig(xkbcommon)
    - chmlib-devel
    - dnspython
    - hyphen-devel
    - liberation-fonts-ttf
    - libstemmer-devel
    - optipng
    - podofo-devel
    - pygments
    - pyqt-builder
    - python-apsw
    - python-beautifulsoup4
    - python-chardet
    - python-css-parser
    - python-dateutil
    - python-feedparser
    - python-fonttools
    - python-html2text
    - python-html5-parser
    - python-jeepney
    - python-markdown
    - python-mechanize
    - python-msgpack
    - python-netifaces
    - python-pillow
    - python-psutil
    - python-pyqt6-webengine
    - python-regex
    - python-setuptools
    - python-sip
    - python-tzdata
    - python-tzlocal
    - python-xxhash
    - python-zeroconf
    - qt6-base-private-devel
    - speech-dispatcher
    - xdg-utils
    - xorg-server-xvfb
rundeps    :
    - dnspython
    - liberation-fonts-ttf
    - optipng
    - poppler-utils
    - pygments
    - python-apsw
    - python-beautifulsoup4
    - python-css-parser
    - python-dateutil
    - python-feedparser
    - python-fonttools
    - python-html2text
    - python-html5-parser
    - python-jeepney
    - python-lxml-html-clean
    - python-markdown
    - python-mechanize
    - python-msgpack
    - python-netifaces
    - python-pillow
    - python-psutil
    - python-pyqt6-webengine
    - python-pystache
    - python-regex
    - python-tzdata
    - python-tzlocal
    - python-xxhash
    - python-zeroconf
    - python3-dbus
    - speech-dispatcher
# Needs to be built with the same toolchain that's used to build qt6-base
clang      : true
environment: |
    # Set XDG directories in fakeroot, add read privileges to /usr/share
    export XDG_DATA_HOME=${installdir}/usr/share
    export XDG_UTILS_INSTALL_MODE="user"
setup      : |
    %apply_patches
build      : |
    python3 setup.py build
    python3 setup.py gui

    # Un-vendor the bundled Liberation fonts in favour of the system copies
    python3 setup.py liberation_fonts --path-to-liberation_fonts /usr/share/fonts/truetype/liberation --system-liberation_fonts
install    : |
    %install_license LICENSE*

    # If this directory doesn't exist, zsh completions won't be installed
    install -dm00755 ${installdir}/usr/share/zsh/site-functions

    python3 setup.py install --root="%installroot%" --staging-root=%installroot%/usr --prefix=/usr
    %python3_compile

    # Restore read permissions for icons
    chmod -R +r ${installdir}/usr/share/icons

    # Remove MimeTypes from .desktop as it creates unwanted associations
    sed -e "/MimeType/d" -i  ${installdir}/usr/share/applications/calibre*.desktop
    chmod 00644 ${installdir}/usr/share/applications/calibre*.desktop
    install -Dm00644 ${workdir}/resources/calibre-mimetypes.xml ${installdir}/usr/share/mime/packages/calibre-mimetypes.xml

    # Install man pages, which setup.py install does not handle
    mkdir -p ${installdir}/usr/share/man
    cp -r ${workdir}/man-pages/. ${installdir}/usr/share/man/

    # Empty folder, also calibre shouldn't own this
    rmdir ${installdir}/usr/share/desktop-directories

    # Remove unneeded files
    rm ${installdir}/usr/share/calibre/*portable*

    # System fonts are provided by liberation-fonts-ttf; drop symlinks so ypkg
    # does not follow them into /usr/share/fonts/truetype/liberation/
    rm -rf ${installdir}/usr/share/calibre/fonts/liberation
    rm -rf ${installdir}/usr/share/fonts/truetype/liberation

    # We can only include one, remove other appstream metainfo files
    rm -rfv ${installdir}/usr/share/metainfo/calibre-ebook-*.metainfo.xml
check      : |
    # excluded tests for optional or missing packages like:
    # python-py7zr python-pychm python-pycryptodome python-pykakasi python-sgmllib3k python-unrardll piper is not yet packaged
    xvfb-run python3 setup.py test \
        --exclude-test-name 7z \
        --exclude-test-name feedparser \
        --exclude-test-name import_of_all_python_modules \
        --exclude-test-name pychm \
        --exclude-test-name pycryptodome \
        --exclude-test-name pykakasi \
        --exclude-test-name qt \
        --exclude-test-name recipe_browser_webengine \
        --exclude-test-name test_piper \
        --exclude-test-name test_plugins \
        --exclude-test-name test_dom_load \
        --exclude-test-name unrar
