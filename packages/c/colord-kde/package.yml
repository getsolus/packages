# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : colord-kde
version    : 25.12.3
release    : 36
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/colord-kde-25.12.3.tar.xz : a9ceeea73efa2c9d11de6cbf81a42c4d627aba99790c1b4872deca873d299f47
homepage   : https://userbase.kde.org/Color_Management
license    :
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Interfaces and session daemon to colord for KDE
description: |
    Interfaces and session daemon to colord for KDE
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(lcms2)
    - pkgconfig(xrandr)
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-kitemmodels-devel
    - qt6-base-private-devel
rundeps    :
    - kirigami-addons
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
