# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : colord-kde
version    : 26.04.2
release    : 39
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/colord-kde-26.04.2.tar.xz : 1631f03db1712826d0e86d950dc6502b8c4946b73a3b25a0a12db1747c029ce5
homepage   : https://userbase.kde.org/Color_Management
license    :
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Interfaces and session daemon to colord for KDE
description: |
    Interfaces and session daemon to colord for KDE
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(lcms2)
    - pkgconfig(xrandr)
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-kitemmodels-devel
    - qt6-base-private-devel
rundeps    :
    - kirigami-addons
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
