# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : colord-kde
version    : 26.04.1
release    : 38
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/colord-kde-26.04.1.tar.xz : d5af781a1bd68eeecde139d6d406f1c85bb9da0f2dea2a3e0d78adbb19177b37
homepage   : https://userbase.kde.org/Color_Management
license    :
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : Interfaces and session daemon to colord for KDE
description: |
    Interfaces and session daemon to colord for KDE
builddeps  :
    - pkgconfig(KF6WindowSystem)
    - pkgconfig(lcms2)
    - pkgconfig(xrandr)
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-kitemmodels-devel
    - qt6-base-private-devel
rundeps    :
    - kirigami-addons
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
