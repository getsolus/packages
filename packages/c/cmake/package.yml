# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cmake
version    : 4.3.3
release    : 69
source     :
    - https://gitlab.kitware.com/cmake/cmake/-/archive/v4.3.3/cmake-v4.3.3.tar.gz : fd1a9a6cbab704cacf19c5d109fc51339839a4073d366a72aa3412efdf24d172
homepage   : https://www.cmake.org/
license    : BSD-3-Clause
component  :
    - gui : programming.tools
    - system.devel
summary    :
    - gui : Qt-based GUI for CMake
    - CMake is a cross-platform, open-source build system.
description:
    - gui : Qt-based GUI for CMake.
    - CMake, the cross-platform, open-source make system. CMake is used to control the software compilation process using simple platform and compiler independent configuration files. CMake generates native makefiles and workspaces that can be used in the compiler environment of your choice.
builddeps  :
    - pkgconfig(Qt6Gui)
    - pkgconfig(expat)
    - pkgconfig(jsoncpp)
    - pkgconfig(libarchive)
    - pkgconfig(libcurl)
    - pkgconfig(libuv)
    - pkgconfig(ncurses)
    - pkgconfig(zlib)
    - python-sphinx
    - rhash-devel
rundeps    :
    - gui :
        - cmake
        - qt6-wayland
setup      : |
    # Set to true if bootstrapping a new release
    # of a dependency.
    _bootstrap=false

    _build_args=(
        --prefix=%PREFIX%
        --datadir=/share/${package}
        --docdir=/share/doc/${package}
        --mandir=/share/man
        --parallel=%YJOBS%
        # cppdap is currently shipped as a static lib from upstream,
        # so we do not have it in the repos.
        --no-system-cppdap
        --sphinx-man
        --qt-gui
    )

    if [ "${_bootstrap}" = true ]; then
        _build_args+=("--no-system-libs")
    else
        _build_args+=("--system-libs")
    fi

    mkdir solusBuildDir
    pushd solusBuildDir

    "${workdir}"/bootstrap \
        "${_build_args[@]}" \
        -- \
        -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON \
        -DCMAKE_INSTALL_DO_STRIP:BOOL=OFF \
        -DCMake_TEST_NO_NETWORK:BOOL=ON

    popd
build      : |
    %make -C solusBuildDir
install    : |
    %make_install -C solusBuildDir
    %install_license LICENSE.rst

    install -Dm00644 -t ${installdir}/usr/share/metainfo/ ${pkgfiles}/org.cmake.CMake-GUI.metainfo.xml
check      : |
    # CTestTestUpload requires internet access
    _excluded_tests="CTestTestUpload"
    # Fails in solbuild, probably due to hardening
    _excluded_tests="${_excluded_tests}|RunCMake.Configure|RunCMake.ParseImplicitLinkInfo|RunCMake.file-CHMOD|RunCMake.find_program|RunCMake.if|RunCMake.CommandLine"

    pushd solusBuildDir
    ./bin/ctest -E "${_excluded_tests}" --output-on-failure --parallel=$(/usr/bin/getconf _NPROCESSORS_ONLN)
    popd
patterns   :
    - /usr/share/cmake*
    - /usr/share/aclocal*
    - docs :
        - /usr/share/cmake*/Help
    - gui :
        - /usr/bin/cmake-gui
        - /usr/share/applications
        - /usr/share/icons
        - /usr/share/mime
        - /usr/share/man/man1/cmake-gui*
        - /usr/share/metainfo/org.cmake.CMake-GUI.metainfo.xml
