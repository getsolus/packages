# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cfitsio
version    : 4.6.4
release    : 7
source     :
    - https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.4.tar.gz : 227b637b91c9820ea96f39a65eb087f053de567d82f4338e2884f123f8183c55
homepage   : https://heasarc.gsfc.nasa.gov/fitsio/
license    : MIT
component  : programming.library
summary    : CFITSIO is a library of ANSI C routines for reading and writing FITS format data files.
description: |
    CFITSIO is a library of ANSI C routines for reading and writing FITS format data files.
builddeps  :
    - pkgconfig(libcurl)
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license licenses/License.txt
patterns   :
    - utils:
        - /usr/bin/cookbook
        - /usr/bin/fitscopy
        - /usr/bin/fitsverify
        - /usr/bin/fpack
        - /usr/bin/funpack
        - /usr/bin/imcopy
        - /usr/bin/smem
        - /usr/bin/speed
