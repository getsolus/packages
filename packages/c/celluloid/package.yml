# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : celluloid
version    : '0.30'
release    : 45
source     :
    - https://github.com/celluloid-player/celluloid/archive/refs/tags/v0.30.tar.gz : 75ff83f650180cf9fa2458a7015fa84fd3be014e9478d670f9cf94367720313e
license    : GPL-3.0-or-later
homepage   : https://celluloid-player.github.io/
component  : multimedia.video
summary    : A simple GTK+ frontend for MPV
description: |
    Celluloid (formerly GNOME MPV) is a simple GTK+ frontend for mpv. Celluloid interacts with mpv via the client API exported by libmpv, allowing access to mpv's powerful playback capabilities.
replaces   :
    - gnome-mpv
builddeps  :
    - pkgconfig(epoxy)
    - pkgconfig(libadwaita-1)
    - pkgconfig(mpv)
    - desktop-file-utils
setup      : |
    %patch -p1 -i $pkgfiles/0001-Enable-MPV-hwdec-by-default.patch
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
