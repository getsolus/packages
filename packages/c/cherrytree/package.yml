# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cherrytree
version    : 1.7.0
release    : 51
source     :
    - https://github.com/giuspen/cherrytree/releases/download/v1.7.0/cherrytree_1.7.0.tar.xz : 5a015cb3af54a096a41795e42f9e41288f7189709046f81717f89d40a16f799b
homepage   : https://www.giuspen.net/cherrytree/
license    : GPL-3.0-or-later
component  : office.notes
summary    : A hierarchical note taking application
description: |
    cherrytree is a hierarchical note taking application, featuring rich text, syntax  highlighting, images handling, hyperlinks, import/export with support for multiple formats, support for multiple languages, and more.
builddeps  :
    - pkgconfig(gspell-1)
    - pkgconfig(gtkmm-3.0)
    - pkgconfig(gtksourceview-4)
    - pkgconfig(libcurl)
    - pkgconfig(libxml++-2.6)
    - pkgconfig(spdlog)
    - pkgconfig(sqlite3)
    - pkgconfig(uchardet)
    - pkgconfig(vte-2.91)
rundeps    :
    - 7zip
setup      : |
    %cmake_ninja -DBUILD_TESTING=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
