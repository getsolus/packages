# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : chromaprint
version    : 1.6.0
release    : 14
source     :
    - https://github.com/acoustid/chromaprint/archive/v1.6.0.tar.gz : 65bfce4a35b2e673dbcda917b6aa577e2f145cf805243d19e6a50fea2a520c2a
license    : LGPL-2.1-or-later
component  : programming.library
homepage   : https://acoustid.org/chromaprint
summary    : Audio source fingerprint extraction library
description: |
    Library that implements a custom algorithm for extracting fingerprints from any audio source
builddeps  :
    - pkgconfig(libavutil)
    - pkgconfig(taglib)
    - libboost-devel
checkdeps  :
    - pkgconfig(gtest)
setup      : |
    %cmake_ninja -DBUILD_TESTS=ON \
                 -DBUILD_TOOLS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.md
check      : |
    %ninja_check %JOBS% -C solusBuildDir
