# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : crun
version    : '1.28'
release    : 4
source     :
    - https://github.com/containers/crun/releases/download/1.28/crun-1.28.tar.zst : 62b82f7db89df3652970d9ad76f635a177d09bcb543c8d1dae13a749cd3e6e35
homepage   : https://github.com/containers/crun
license    :
    - GPL-2.0-only
    - LGPL-2.1-only
component  : virt
summary    : A fast and low-memory footprint OCI Container Runtime fully written in C.
description: |
    - A fast and lightweight fully featured OCI runtime and C library for running containers
builddeps  :
    - pkgconfig(json-c)
    - pkgconfig(libcap-ng)
    - pkgconfig(libseccomp)
    - pkgconfig(libsystemd)
    - go-md2man
    - gperf
setup      : |
    %patch -p1 -i ${pkgfiles}/export-json-gen-symbols.patch
    %configure \
        --enable-shared \
        --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING*
