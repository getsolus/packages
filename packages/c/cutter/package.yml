# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cutter
version    : 2.4.1
release    : 35
source     :
    - https://github.com/rizinorg/cutter/releases/download/v2.4.1/Cutter-v2.4.1-src.tar.gz : 7cafc3cac74aa3e69b14d9d790e7ea88ab856e37573000f7403289ec410867ef
homepage   : https://cutter.re/
license    : GPL-3.0-or-later
component  : programming.tools
summary    : A Qt and C++ GUI for rizin reverse engineering framework
description: |
    Cutter is a free and open-source GUI for rizin. Willing to create an advanced, customizable and free reverse engineering framework.
patterns   :
    - devel :
        - /usr/lib64/Cutter/*.cmake
clang      : true
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Linguist)
    - pkgconfig(Qt6Svg)
    - pkgconfig(libgvc)
    - pkgconfig(pyside6)
    - pkgconfig(python3)
    - pkgconfig(rz_core)
    - kf6-syntax-highlighting-devel
    - shiboken6-devel
rundeps    :
    - python-pyside6
setup      : |
    %cmake_ninja \
        -DCUTTER_ENABLE_GRAPHVIZ=ON \
        -DCUTTER_ENABLE_PYTHON=ON \
        -DCUTTER_ENABLE_PYTHON_BINDINGS=ON \
        -DCUTTER_INCLUDE_GIT_HASH=OFF \
        -DCUTTER_QT=6 \
        -DCUTTER_USE_ADDITIONAL_RIZIN_PATHS=OFF \
        -DCUTTER_USE_BUNDLED_RIZIN=OFF \
        -DCUTTER_VERSION_SUFFIX=-$release \
        -DPYTHON_EXECUTABLE=/usr/bin/python3
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
