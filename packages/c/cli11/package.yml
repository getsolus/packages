# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cli11
version    : 2.6.2
release    : 2
source     :
    - https://github.com/CLIUtils/CLI11/archive/refs/tags/v2.6.2.tar.gz : c6ea6b2e5608b3ea8617999bd5f47420c71b2ebdb8dc4767c1034d1da5785711
homepage   : https://cliutils.github.io/CLI11/
license    : BSD-3-Clause
component  : programming.library
summary    : CLI11 is a command line parser for C++11 and beyond that provides a rich feature set with a simple and intuitive interface
description: |
    CLI11 is a command line parser for C++11 and beyond that provides a rich feature set with a simple and intuitive interface.
patterns   :
    - /*
setup      : |
    %cmake_ninja \
        -DCLI11_BUILD_EXAMPLES=OFF \
        -DCLI11_BUILD_TESTS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
