# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cxx-rust-cssparser
version    : 1.0.0
release    : 1
source     :
    - https://download.kde.org/stable/cxx-rust-cssparser/cxx-rust-cssparser-1.0.0.tar.xz : df233783cb017d352a7b96d9a0fefca5a1121b8fe384216c28f9544f682e6277
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.kde.core
summary    : Library for parsing CSS using the Rust cssparser crate
description: |
    Library for parsing CSS using the Rust cssparser crate
builddeps  :
    - pkgconfig(Qt6Core)
    - corrosion
    - extra-cmake-modules
clang      : true
networking : true
setup      : |
    pushd rust
    %cargo_fetch
    popd
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
