# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : codespell
version    : 2.4.2
release    : 7
source     :
    - https://files.pythonhosted.org/packages/source/c/codespell/codespell-2.4.2.tar.gz : 3c33be9ae34543807f088aeb4832dfad8cb2dae38da61cac0a7045dd376cfdf3
homepage   : https://github.com/codespell-project/codespell
license    : GPL-2.0-only
component  : programming.python
summary    : Fix common misspellings in source code
description: |
    Fix common misspellings in text files. It's designed primarily for checking misspelled words in source code, but it can be used with other files as well
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools-scm
setup      : |
    %python3_setup
install    : |
    %python3_install
