# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : codespell
version    : 2.4.3
release    : 8
source     :
    - https://files.pythonhosted.org/packages/source/c/codespell/codespell-2.4.3.tar.gz : cbe085e331227b37bb86ef8bddd08dc768c704ee9a07ca869852c093fa2793e2
homepage   : https://github.com/codespell-project/codespell
license    : GPL-2.0-only
component  : programming.python
summary    : Fix common misspellings in source code
description: |
    Fix common misspellings in text files. It's designed primarily for checking misspelled words in source code, but it can be used with other files as well
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools-scm
setup      : |
    %python3_setup
install    : |
    %python3_install
