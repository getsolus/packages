# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : crow-translate
version    : 4.0.2
release    : 36
source     :
    - https://download.kde.org/stable/crow-translate/4.0.2/crow-translate-4.0.2.tar.gz : e24b8e78b0bffa5dd02875e25126c371967f53729102c784e4e02d165feb3753
homepage   : https://apps.kde.org/crowtranslate
license    :
    - BSD-3-Clause
    - GPL-3.0-or-later
    - MIT
component  : office
summary    : Application that allows you to translate and speak text
description: |
    Application written in C++ / Qt6 that allows you to translate and speak text using Mozhi with multiple TTS providers including high-quality neural text-to-speech.
builddeps  :
    - pkgconfig(KWaylandClient)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Linguist)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6StateMachine)
    - pkgconfig(Qt6TextToSpeech)
    - pkgconfig(tesseract)
    - pkgconfig(x11)
    - extra-cmake-modules
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_ninja -DWITH_PIPER_TTS=OFF #Package onnxruntime for enablement
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
