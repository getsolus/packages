name       : difftastic
version    : 0.69.0
release    : 1
source     :
    - https://github.com/Wilfred/difftastic/archive/refs/tags/0.69.0.tar.gz : 49d722fb80a0324ea99fe11907f796cde635443084d15cc6f1afd9e0de54bde0
homepage   : https://difftastic.wilfred.me.uk/
license    : MIT
summary    : A structural diff that understands syntax.
description: |
    A structural diff that understands syntax.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install difft
    install -Dm0644 $workdir/difft.1 $installdir/usr/share/man/man1/difft.1
    %install_license
