# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : difftastic
version    : 0.69.0
release    : 2
source     :
    - https://github.com/Wilfred/difftastic/archive/refs/tags/0.69.0.tar.gz : 49d722fb80a0324ea99fe11907f796cde635443084d15cc6f1afd9e0de54bde0
homepage   : https://difftastic.wilfred.me.uk/
license    : MIT
component  : system.utils
summary    : A structural diff that understands syntax.
description: |
    Difftastic is a CLI diff tool that compares files based on their syntax, not line-by-line. Difftastic produces accurate diffs that are easier for humans to read.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install difft
    %install_license LICENSE
    install -Dm00644 difft.1 ${installdir}/usr/share/man/man1/difft.1
check      : |
    %cargo_test
