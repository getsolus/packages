# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : drawy
version    : 1.0.2
release    : 1
source     :
    - https://download.kde.org/stable/drawy/1.0.2/drawy-1.0.2.tar.xz : 5ffaddefa967a6dad6f904c87ff85084c9013f5d1a0a0d87665759880d7c6d6f
homepage   : https://apps.kde.org/drawy/
license    : GPL-3.0-or-later
component  : multimedia.graphics
summary    : Drawy lets you create ideas, diagrams, and visual notes on an infinite whiteboard with a smooth and responsive canvas
description: |
    Drawy lets you create ideas, diagrams, and visual notes on an infinite whiteboard with a smooth and responsive canvas. You can draw with pressure-sensitive tablet support, add text, insert images, and use basic shapes such as rectangles, ellipses, arrows, and lines to organise your content clearly. You can choose your own color palette and export your work as image files whenever needed. Drawy is built to stay lightweight and fast, making it easy to capture ideas and work freely without distractions.
libsplit   : false
builddeps  :
    - pkgconfig(Qt6Core)
    - extra-cmake-modules
    - kf6-kconfig-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kcrash-devel
    - kf6-ki18n-devel
    - kf6-kiconthemes-devel
    - kf6-kwidgetsaddons-devel
    - kf6-kxmlgui-devel
    - kf6-syntax-highlighting-devel
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/BSD-2-Clause.txt
    %install_license LICENSES/BSD-3-Clause.txt
    %install_license LICENSES/CC-BY-SA-4.0.txt
    %install_license LICENSES/CC0-1.0.txt
    %install_license LICENSES/GPL-2.0-or-later.txt
    %install_license LICENSES/GPL-3.0-or-later.txt
    %install_license LICENSES/LGPL-2.0-or-later.txt
    %install_license LICENSES/MIT.txt
    %install_license LICENSES/OFL-1.1.txt
