# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dsearch
version    : 0.2.1
release    : 1
source     :
    - https://github.com/AvengeMedia/danksearch/releases/download/v0.2.1/dsearch-0.2.1.tar.gz : a61156dd495dce01094216383d6e71d63d5f55a4780b54cc15e35c428e0df16a
homepage   : https://github.com/AvengeMedia/danksearch
license    : MIT
component  : desktop
summary    : Indexed filesystem search in Go
description: |
    A configurable filesystem search service powered by bleve for Unix-based operating systems.
builddeps  :
    - golang
build      : |
    go build -ldflags="-s -w -X main.Version=${version}" -o bin/dsearch cmd/dsearch/*.go
install    : |
    install -Dm00755 bin/dsearch -t ${installdir}/usr/bin/
    %install_license LICENSE

    install -Dm00644 assets/dsearch.service -t ${installdir}/%libdir%/systemd/user/
