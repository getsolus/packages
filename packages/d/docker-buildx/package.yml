# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : docker-buildx
version    : 0.34.1
release    : 28
source     :
    - https://github.com/docker/buildx/archive/refs/tags/v0.34.1.tar.gz : 907846895a843d1dc4fb6962f05567b0c279a2eca83be7461b5928125ebdcc51
homepage   : https://www.docker.com
license    : Apache-2.0
component  : virt
summary    : The Docker CLI plugin for extended build capabilities with BuildKit
description: |
    Docker CLI plugin for extended build capabilities with BuildKit
builddeps  :
    - git
    - golang
networking : true
environment: |
    export _buildx_r=github.com/docker/buildx
    export GO111MODULE=auto

    export CGO_CFLAGS="${CFLAGS}"
    export CGO_CPPFLAGS="${CPPFLAGS}"
    export CGO_CXXFLAGS="${CXXFLAGS}"
    export CGO_LDFLAGS="${LDFLAGS}"
    export GOFLAGS="-buildmode=pie -trimpath -mod=readonly -modcacherw"
setup      : |
    mkdir -p src/${_buildx_r}
    ln -s ${PWD} src/${_buildx_r}/buildx

    go mod vendor
build      : |
    cd src/${_buildx_r}/buildx
    export GITCOMMIT="$(git ls-remote https://github.com/docker/buildx refs/tags/v$version^{} | awk '{print $1}')"

    go build -o docker-buildx \
        -ldflags "-linkmode=external \
        -X ${_buildx_r}/version.Version=v$version \
        -X ${_buildx_r}/version.Revision=${GITCOMMIT} \
        -X ${_buildx_r}/version.Package=${_buildx_r}" \
        ./cmd/buildx
install    : |
    install -Ddm00755 ${installdir}/%libdir%/docker/cli-plugins
    install -m00755 ${workdir}/docker-buildx ${installdir}/%libdir%/docker/cli-plugins/docker-buildx
    %install_license LICENSE
