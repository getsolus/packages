# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dankmaterialshell
version    : 1.5.2
release    : 4
source     :
    - https://github.com/AvengeMedia/DankMaterialShell/archive/refs/tags/v1.5.2.tar.gz : 2fa4fccb9e3fd259fb5e2c8d6e5fe329096f893ca6b8ac9766c699061e0b347c
homepage   : https://danklinux.com/
license    : MIT
component  : desktop
summary    : Desktop shell for Wayland compositors built with Quickshell and Go
description: |
    DankMaterialShell is a complete desktop shell for niri, Hyprland, MangoWC, Sway, labwc, Scroll, Miracle WM, and other Wayland compositors. It replaces waybar, swaylock, swayidle, mako, fuzzel, polkit, and everything else you'd normally stitch together to make a desktop.
networking : true
builddeps  :
    - golang
rundeps    :
    - cava
    - dgop
    - dsearch
    - matugen
    - qt6-multimedia
    - quickshell
    - wl-clipboard
build      : |
    %make PREFIX=/usr
install    : |
    %make_install \
        DESTDIR=${installdir} \
        PREFIX=/usr \
        SYSTEMD_USER_DIR=${installdir}/usr/lib/systemd/user
    %install_license LICENSE
