# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dgop
version    : 0.2.3
release    : 2
source     :
    - https://github.com/AvengeMedia/dgop/releases/download/v0.2.3/dgop-0.2.3.tar.gz : 97bc47b292bc7289e506fffbf239313328b4aaa283c54bc0d462c7651ef4e3fe
homepage   : https://github.com/AvengeMedia/dgop
license    : MIT
component  : desktop
summary    : API & CLI for System & Process Monitoring
description: |
    System monitoring tool with CLI and REST API built in Go. Fast, single binary, JSON output, OpenAPI spec.
builddeps  :
    - golang
build      : |
    go build -ldflags="-s -w -X main.Version=${version}" -o bin/dgop cmd/dgop/*.go
install    : |
    install -Dm00755 bin/dgop -t ${installdir}/usr/bin/
    %install_license LICENSE
