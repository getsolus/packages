# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dolphin-plugins
version    : 25.12.3
release    : 93
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/dolphin-plugins-25.12.3.tar.xz : a738d4f9f1148283ff0552ffc5a440cabc5f216aa2473c22e699593b3b01a7c0
homepage   : https://apps.kde.org/dolphin_plugins/
license    : GPL-2.0-or-later
component  : desktop.kde
summary    : Plugins for Dolphin
description: |
    Bazaar, dropbox, git, hg and svn plugins for dolphin.
builddeps  :
    - dolphin-devel
    - kf6-ktexteditor-devel
    - kf6-ktextwidgets-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
