# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dolphin-plugins
version    : 26.04.2
release    : 95
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/dolphin-plugins-26.04.2.tar.xz : 8c53ce19b2b910f087de42180c034dd9c087598d3b145815a3eba713006e22e7
homepage   : https://apps.kde.org/dolphin_plugins/
license    : GPL-2.0-or-later
component  : desktop.kde
summary    : Plugins for Dolphin
description: |
    Bazaar, dropbox, git, hg and svn plugins for dolphin.
builddeps  :
    - dolphin-devel
    - kf6-ktexteditor-devel
    - kf6-ktextwidgets-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
