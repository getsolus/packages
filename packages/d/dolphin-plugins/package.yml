# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dolphin-plugins
version    : 26.04.1
release    : 94
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/dolphin-plugins-26.04.1.tar.xz : eff4e09163ef6785fa4f93074f32be7e7e2bb0173f16a06bdfaabc3860f06d02
homepage   : https://apps.kde.org/dolphin_plugins/
license    : GPL-2.0-or-later
component  : desktop.kde
summary    : Plugins for Dolphin
description: |
    Bazaar, dropbox, git, hg and svn plugins for dolphin.
builddeps  :
    - dolphin-devel
    - kf6-ktexteditor-devel
    - kf6-ktextwidgets-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
