# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : discord
version    : 1.0.139
release    : 160
source     :
    - https://dl.discordapp.net/apps/linux/1.0.139/discord-1.0.139.tar.gz : 7eacf2f46af49ddf2258f74d7b92f5e0f71f6a75b169d5205f4a8679b435063f
license    : Distributable
component  : network.im
homepage   : https://discord.com/
summary    : All-in-one voice and text chat for gamers
description: |
    All-in-one voice and text chat for gamers that's free, secure, and works on both your desktop and phone.
replaces   :
    - discord-canary
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(xshmfence)
rundeps    :
    - libayatana-appindicator
    - opus
install    : |
    _discord_root=/usr/share/discord
    _discord_install=${installdir}/$_discord_root

    install -Dm00755 discord -t $_discord_install
    install -Dm00755 updater_bootstrap -t $_discord_install

    install -dm00755 ${installdir}/usr/bin
    ln -srv $_discord_install/discord ${installdir}/usr/bin/discord

    # Desktop file, icon, metainfo
    install -Dm00755 ${pkgfiles}/discord.desktop ${installdir}/usr/share/applications/com.discordapp.Discord.desktop
    install -Dm00755 discord.png ${installdir}/usr/share/icons/hicolor/256x256/apps/discord.png
    install -Dm00644 ${pkgfiles}/discord.appdata.xml ${installdir}/usr/share/metainfo/com.discordapp.Discord.metainfo.xml
