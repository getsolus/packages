# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : delta
version    : 0.19.2
release    : 4
source     :
    - https://github.com/dandavison/delta/archive/refs/tags/0.19.2.tar.gz : f59b86f8c8dda4d76a3ba34b8553777a20c3b461646917d8e480fac6531bba9f
homepage   : https://dandavison.github.io/delta/
license    : MIT
component  : programming.tools
summary    : A syntax-highlighting pager for git, diff, and grep output
description: |
    A syntax-highlighting pager for git, diff, and grep output
networking : true
builddeps  :
    - pkgconfig(oniguruma)
    - rust
checkdeps  :
    - git
setup      : |
    %cargo_fetch
build      : |
    export RUSTONIG_DYNAMIC_LIBONIG=1
    %cargo_build --all-features

    for shell in bash fish zsh; do
        target/release/delta --generate-completion="$shell" > "${shell}-completion"
    done
install    : |
    %cargo_install
    %install_license LICENSE

    # Completions
    install -Dm00644 bash-completion ${installdir}/usr/share/bash-completion/completions/delta
    install -Dm00644 fish-completion ${installdir}/usr/share/fish/vendor_completions.d/delta.fish
    install -Dm00644 zsh-completion ${installdir}/usr/share/zsh/site-functions/_delta
check      : |
    %cargo_test
