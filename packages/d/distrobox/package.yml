# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : distrobox
version    : 1.8.2.5
release    : 7
source     :
    - https://github.com/89luca89/distrobox/archive/refs/tags/1.8.2.5.tar.gz : 0c3bc4785ee3be3b89f93abb7cc0a9f60e56989e81319af140a4b60403b18f80
