# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dankcalendar
version    : 0.2.1
release    : 1
source     :
    - https://github.com/AvengeMedia/dankcalendar/releases/download/v0.2.1/dankcalendar-0.2.1.tar.gz : cc4701465f719be10641307d391170f92685f9625d69442097e37093b83a77c9
homepage   : https://danklinux.com
license    : MIT
component  : desktop
summary    : Calendar from the Dank Linux Suite
description: |
    DankCalendar is a standalone calendar app that brings your Local, Google, Microsoft, CalDAV, and iCloud calendars together in one place. It runs as a lightweight daemon with a tray icon, keeps your accounts in sync, and reminds you about events — all with the look and feel of DankMaterialShell.
builddeps  :
    - golang
build      : |
    pushd core
    go build -ldflags="-s -w -X main.Version=${version}" -o bin/dcal cmd/dcal/*.go
install    : |
    install -Dm 00755 core/bin/dcal -t ${installdir}/usr/bin
    %install_license LICENSE

    install -Dm 00644 assets/com.danklinux.dankcalendar.desktop -t ${installdir}/usr/share/applications
    install -Dm 00644 assets/danklogo.svg ${installdir}/usr/share/icons/hicolor/scalable/apps/dankcalendar.svg
    install -Dm 00644 assets/systemd/dcal.service -t ${installdir}/usr/lib/systemd/user
    install -Dm 00644 ${pkgfiles}/com.danklinux.dankcalendar.metainfo.xml -t ${installdir}/usr/share/metainfo

    install -dm 00755 ${installdir}/usr/share/quickshell/dankcal
    cp -r --preserve=mode,timestamps quickshell/* ${installdir}/usr/share/quickshell/dankcal
