# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : setxkbmap
version    : 1.3.5
release    : 8
source     :
    - https://www.x.org/releases/individual/app/setxkbmap-1.3.5.tar.gz : fe5948c40209b2ae35651968566cd09723865bf86a10a27b1e2ce3c6c543dd31
license    : GPL-3.0
component  : xorg.apps
homepage   : https://www.x.org/
summary    : X11 client to change the keymaps in the X server for a specified keyboard
description: |
    setxkbmap is an X11 client to change the keymaps in the X server for a specified keyboard to use the layout determined by the options listed on the command line
builddeps  :
    - pkgconfig(x11)
    - pkgconfig(xkbfile)
    - pkgconfig(xrandr)
setup      : |
    %configure --disable-static
build      : |
    %make
install    : |
    %make_install
