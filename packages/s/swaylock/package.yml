# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : swaylock
version    : 1.8.5
release    : 9
source     :
    - https://github.com/swaywm/swaylock/archive/refs/tags/v1.8.5.tar.gz : a13f9de319f3a498b89a027fd46a93310505615956dfb4b40b5cfdb986fb6b58
license    : MIT
homepage   : https://github.com/swaywm/swaylock
component  : desktop
summary    : swaylock is a screen locking utility for Wayland compositors
description: |
    swaylock is a screen locking utility for Wayland compositors
builddeps  :
    - pkgconfig(cairo)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(scdoc)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
setup      : |
    %meson_configure -Dgdk-pixbuf=enabled -Dpam=enabled
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
    install -d $installdir/usr/share/defaults
    mv $installdir/etc $installdir/usr/share/defaults/etc
