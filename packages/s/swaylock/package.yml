# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : swaylock
version    : 1.8.6
release    : 10
source     :
    - https://github.com/swaywm/swaylock/archive/refs/tags/v1.8.6.tar.gz : 904376fd012bfff888d042606539c677d90e11f8beeeccc50a9fe387fc41a686
license    : MIT
homepage   : https://github.com/swaywm/swaylock
component  : desktop
summary    : swaylock is a screen locking utility for Wayland compositors
description: |
    swaylock is a screen locking utility for Wayland compositors
builddeps  :
    - pkgconfig(cairo)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(scdoc)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
setup      : |
    %meson_configure -Dgdk-pixbuf=enabled -Dpam=enabled
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
    install -d $installdir/usr/share/defaults
    mv $installdir/etc $installdir/usr/share/defaults/etc
