# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : subnetcalc
version    : 2.6.6
release    : 7
source     :
    - https://github.com/dreibh/subnetcalc/archive/refs/tags/subnetcalc-2.6.6.tar.gz : 5f33894fac3420d0d906ba7d4e3f7bcfee831707deec08a43d6f2397e30ac486
homepage   : https://github.com/dreibh/subnetcalc
license    : GPL-3.0-or-later
component  : network.util
summary    : An IPv4/IPv6 Subnet Calculator
description: |
    SubNetCalc is an IPv4/IPv6 subnet address calculator. For given IPv4 or IPv6 address and netmask or prefix length, it calculates network address, broadcast address, maximum number of hosts and host address range.
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
