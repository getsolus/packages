# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : subnetcalc
version    : 2.7.4
release    : 8
source     :
    - https://github.com/dreibh/subnetcalc/archive/refs/tags/subnetcalc-2.7.4.tar.gz : 05450353236b3a9cbbd24c1aa2fd866d770a7244874c978b764bf574600b433d
homepage   : https://github.com/dreibh/subnetcalc
license    : GPL-3.0-or-later
component  : network.util
summary    : An IPv4/IPv6 Subnet Calculator
description: |
    SubNetCalc is an IPv4/IPv6 subnet address calculator. For given IPv4 or IPv6 address and netmask or prefix length, it calculates network address, broadcast address, maximum number of hosts and host address range.
builddeps  :
    - pkgconfig(libmaxminddb)
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
