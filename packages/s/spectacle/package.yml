# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : spectacle
version    : 6.7.2
release    : 128
source     :
    - https://download.kde.org/stable/plasma/6.7.2/spectacle-6.7.2.tar.xz : 24d2cd02296401538f0ac7736804b071b9e9f516a8ad58a4b821411bc15642a3
homepage   : https://kde.org/applications/utilities/org.kde.spectacle
license    :
    - BSD-3-Clause
    - GFDL-1.2-or-later
    - GPL-2.0-only
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.kde.core
summary    : KDE Screenshot Utility
description: |
    Spectacle is screenshot taking utility for the KDE desktop. Spectacle can also be used in non-KDE X11 desktop environments.
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6QuickControls2)
    - pkgconfig(Qt6WaylandClient)
    - pkgconfig(libarchive)
    - pkgconfig(opencv4)
    - pkgconfig(tesseract)
    - pkgconfig(x11)
    - pkgconfig(xcb-cursor)
    - pkgconfig(xcb-util)
    - kf6-kdbusaddons-devel
    - kf6-kdeclarative-devel
    - kf6-kdoctools-devel
    - kf6-kglobalaccel-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-knotifications-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-kxmlgui-devel
    - kf6-prison-devel
    - kf6-purpose-devel
    - kpipewire-devel
    - kquickimageeditor-devel
    - layer-shell-qt-devel
    - plasma-wayland-protocols-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
