# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : scrot
version    : 2.0.0
release    : 12
source     :
    - https://github.com/resurrecting-open-source-projects/scrot/releases/download/2.0.0/scrot-2.0.0.tar.gz : 1b4b3acadfe07bf89234838675d1d23508a9a6810cb64584f1d9610103d6cdfa
homepage   : https://github.com/resurrecting-open-source-projects/scrot
license    : MIT
component  : system.utils
summary    : scrot (SCReen shOT) is a simple commandline screen capture utility
description: |
    scrot (SCReen shOT) is a simple commandline screen capture utility that uses imlib2 to grab and save images. Multiple image formats are supported through imlib2's dynamic saver modules.
builddeps  :
    - pkgconfig(imlib2)
    - pkgconfig(libbsd)
    - pkgconfig(xcomposite)
    - pkgconfig(xfixes)
    - pkgconfig(xrandr)
    - autoconf-archive
setup      : |
    %configure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
