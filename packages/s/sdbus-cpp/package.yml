# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sdbus-cpp
version    : 2.3.1
release    : 3
source     :
    - https://github.com/Kistler-Group/sdbus-cpp/archive/refs/tags/v2.3.1.tar.gz : 3a289eded586c26d06c1387de72c7bf7c809527a70d51ba6401fe61059b19626
homepage   : https://github.com/Kistler-Group/sdbus-cpp
license    : LGPL-2.1
component  :
    - tools : programming.tools
    - programming.library
summary    :
    - tools : Stub code generator for sdbus-c++
    - C++ D-Bus library
description:
    - tools : The stub code generator for generating the adapter and proxy interfaces out of the D-Bus IDL XML description.
    - sdbus-c++ is a high-level C++ D-Bus library for Linux designed to provide expressive, easy-to-use API in modern C++. It adds another layer of abstraction on top of sd-bus, a nice, fresh C D-Bus implementation by systemd.
builddeps  :
    - pkgconfig(expat)
    - pkgconfig(libsystemd)
rundeps    :
    - devel :
        - sdbus-cpp-tools
    - tools :
        - sdbus-cpp
setup      : |
    %cmake_ninja \
        -DSDBUSCPP_BUILD_CODEGEN=ON \
        -DSDBUSCPP_BUILD_DOCS=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING COPYING-LGPL-Exception
patterns   :
    - tools :
        - /usr/bin/sdbus-c++-xml2cpp
        - /usr/lib64/cmake/sdbus-c++-tools
