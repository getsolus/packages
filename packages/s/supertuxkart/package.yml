# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : supertuxkart
version    : '1.5'
release    : 20
source     :
    - https://github.com/supertuxkart/stk-code/releases/download/1.5/SuperTuxKart-1.5-src.tar.gz : 33cf8841e4ff4082d80b9248014295bbbea61d14683e86dff100e3ab8f7b27cb
homepage   : https://supertuxkart.net/
license    :
    - CC-BY-SA-3.0
    - GPL-3.0-or-later
component  :
    - games.arcade
    - assets : games.arcade
summary    : SuperTuxKart is a Free 3D kart racing game, with many tracks, characters and items for you to try
description: |
    SuperTuxKart is a 3D open-source arcade racer with a variety characters, tracks, and modes to play.
patterns   :
    - assets : /usr/share/supertuxkart
builddeps  :
    - pkgconfig(bluez)
    - pkgconfig(freetype2)
    - pkgconfig(fribidi)
    - pkgconfig(glew)
    - pkgconfig(glu)
    - pkgconfig(harfbuzz)
    - pkgconfig(libcurl)
    - pkgconfig(libpng)
    - pkgconfig(libturbojpeg)
    - pkgconfig(openal)
    - pkgconfig(sdl2)
    - pkgconfig(shaderc)
    - pkgconfig(vorbis)
    - pkgconfig(xrandr)
    - cantarell-fonts
    - libopenglrecorder-devel
    - wiiuse-devel
rundeps    :
    - cantarell-fonts
    - supertuxkart-assets
setup      : |
    %patch -p1 -i $pkgfiles/0001-Don-t-install-angelscript-devel-files.patch
    %cmake_ninja -DUSE_SYSTEM_WIIUSE=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
