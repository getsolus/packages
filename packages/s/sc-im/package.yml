# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sc-im
version    : 0.8.5
release    : 5
source     :
    - https://github.com/andmarti1424/sc-im/archive/refs/tags/v0.8.5.tar.gz : 49adb76fc55bc3e6ea8ee414f41428db4aef947e247718d9210be8d14a6524bd
homepage   : https://github.com/andmarti1424/sc-im
license    : BSD-4-Clause
component  : office
summary    : SC-IM - Spreadsheet Calculator Improvised -- An ncurses spreadsheet program for the terminal
description: |
    Terminal-based spreadsheet program with vi-like key bindings
environment: |
    export CFLAGS="${CFLAGS} -fcommon"
setup      : |
    sed -i 's/\/usr\/local/\/usr/g' src/Makefile
build      : |
    %make -C src
install    : |
    %make_install -C src
    %install_license LICENSE
