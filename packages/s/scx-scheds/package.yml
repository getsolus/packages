# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : scx-scheds
version    : 1.1.2
release    : 6
source     :
    - https://github.com/sched-ext/scx/archive/refs/tags/v1.1.2.tar.gz : aef3c575dfceb272c7169eb4d7aa2d9c4710298a8f2facf400c3fefa9120bc46
homepage   : https://github.com/sched-ext/scx
license    : MIT
component  : system.utils
summary    : sched_ext schedulers and tools
description: |
    sched_ext schedulers and tools
clang      : true
networking : true
builddeps  :
    - pkgconfig(libbpf)
    - pkgconfig(libseccomp)
    - pkgconfig(protobuf)
    - rust-devel
rundeps    :
    - scx-tools
environment: |
    # sscache is broken for this build. Disable it for now.
    unset RUSTC_WRAPPER
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    find target/release \
        -maxdepth 1 -type f -executable ! -name '*.so' \
        -exec install -Dm00755 -t "$installdir/usr/bin/" {} +

    %install_license LICENSE

    # Useless stuff not needed
    rm -v $installdir/usr/bin/{scx_arena_selftests,vmlinux_docify,xtask}
