# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : scx-scheds
version    : 1.1.0
release    : 4
source     :
    - https://github.com/sched-ext/scx/archive/refs/tags/v1.1.0.tar.gz : 80ce590601780013cdd9ad44b1338475649a1b69358c65c4a8066a34efc34fc1
homepage   : https://github.com/sched-ext/scx
license    : MIT
component  : system.utils
summary    : sched_ext schedulers and tools
description: |
    sched_ext schedulers and tools
clang      : true
networking : true
builddeps  :
    - pkgconfig(libbpf)
    - pkgconfig(libseccomp)
    - pkgconfig(protobuf)
    - rust-devel
rundeps    :
    - scx-tools
environment: |
    # sscache is broken for this build. Disable it for now.
    unset RUSTC_WRAPPER
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    find target/release \
        -maxdepth 1 -type f -executable ! -name '*.so' \
        -exec install -Dm00755 -t "$installdir/usr/bin/" {} +

    # Useless stuff not needed
    rm -v $installdir/usr/bin/{scx_arena_selftests,vmlinux_docify,xtask}
