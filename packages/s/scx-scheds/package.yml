# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : scx-scheds
version    : 1.1.1
release    : 5
source     :
    - https://github.com/sched-ext/scx/archive/refs/tags/v1.1.1.tar.gz : 1b162f0a198e379fc1f7016505b78c236acb63d1b8f22d66a4b6fd762ec592fb
homepage   : https://github.com/sched-ext/scx
license    : MIT
component  : system.utils
summary    : sched_ext schedulers and tools
description: |
    sched_ext schedulers and tools
clang      : true
networking : true
builddeps  :
    - pkgconfig(libbpf)
    - pkgconfig(libseccomp)
    - pkgconfig(protobuf)
    - rust-devel
rundeps    :
    - scx-tools
environment: |
    # sscache is broken for this build. Disable it for now.
    unset RUSTC_WRAPPER
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    find target/release \
        -maxdepth 1 -type f -executable ! -name '*.so' \
        -exec install -Dm00755 -t "$installdir/usr/bin/" {} +

    # Useless stuff not needed
    rm -v $installdir/usr/bin/{scx_arena_selftests,vmlinux_docify,xtask}
