# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : signal-desktop
version    : 8.16.0
release    : 209
source     :
    - https://updates.signal.org/desktop/apt/pool/s/signal-desktop/signal-desktop_8.16.0_amd64.deb : 71e28ac7b2432410401c96b8bac54b21e61eb4ce542341caa8f58ecbd1f73327
homepage   : https://signal.org
license    : AGPL-3.0-or-later
component  : network.im
summary    : A private messenger for Windows, macOS, and Linux
description: |
    Signal Desktop is an Electron application that links with your Signal Android or Signal iOS app.
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(cups)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libdrm)
    - pkgconfig(libpulse)
    - pkgconfig(xscrnsaver)
setup      : |
    ar xf ${sources}/signal-desktop_${version}_amd64.deb
    mkdir root
    tar xf data.tar.xz -C root
install    : |
    # This only excludes /usr/bin link which will be invalid
    install -dm00755 ${installdir}/usr/bin
    install -dm00644 ${installdir}/usr/share/{applications,signal-desktop}

    for icon_size in 16 24 32 48 64 128 256 512 1024; do
        install -Dm00644 root/usr/share/icons/hicolor/${icon_size}x${icon_size}/apps/signal-desktop.png \
            ${installdir}/usr/share/icons/hicolor/${icon_size}x${icon_size}/apps/signal-desktop.png
    done

    # We do not use /opt for binary packages in Solus, so just use /usr/share.
    cp -R root/opt/Signal/* ${installdir}/usr/share/signal-desktop/
    ln -sv /usr/share/signal-desktop/signal-desktop ${installdir}/usr/bin/signal-desktop

    install -Dm00644 ${pkgfiles}/org.signal.Signal.desktop -t ${installdir}/usr/share/applications
    install -Dm00644 ${pkgfiles}/org.signal.Signal.metainfo.xml -t ${installdir}/usr/share/metainfo

    %install_license root/opt/Signal/LICENSE.electron.txt root/opt/Signal/LICENSES.chromium.html
