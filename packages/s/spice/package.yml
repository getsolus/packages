# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : spice
version    : 0.16.0
release    : 21
source     :
    - https://www.spice-space.org/download/releases/spice-server/spice-0.16.0.tar.bz2 : 0a6ec9528f05371261bbb2d46ff35e7b5c45ff89bb975a99af95a5f20ff4717d
homepage   : https://www.spice-space.org
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : SPICE (Simple Protocol for Independent Computing Environments)
description: |
    SPICE (Simple Protocol for Independent Computing Environments) is a remote display system built for virtual environments which allows you to view a computing 'desktop' environment not only on the machine where it is running, but from anywhere on the Internet and from a wide variety of machine architectures.
optimize   : speed
builddeps  :
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(glib-2.0)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gstreamer-app-1.0)
    - pkgconfig(libcacard)
    - pkgconfig(libjpeg)
    - pkgconfig(liblz4)
    - pkgconfig(libsasl2)
    - pkgconfig(libturbojpeg)
    - pkgconfig(openssl)
    - pkgconfig(opus)
    - pkgconfig(orc-0.4)
    - pkgconfig(pixman-1)
    - pkgconfig(spice-protocol)
    - pyparsing
    - python-six
checkdeps  :
    - glib-networking
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
check      : |
    %ninja_check
