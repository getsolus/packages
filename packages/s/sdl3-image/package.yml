# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sdl3-image
version    : 3.4.4
release    : 1
source     :
    - https://github.com/libsdl-org/SDL_image/archive/refs/tags/release-3.4.4.tar.gz : b0c11bbde540e26d1cedf31174349fe6ab67e57658efe22e16e75172859c817d
homepage   : https://github.com/libsdl-org/SDL_image/
license    : Zlib
component  : multimedia.library
summary    : SDL_image is an image file loading library.
description: |
    SDL_image is a simple library to load images of various formats as SDL surfaces.
optimize   :
    - speed
builddeps  :
    - pkgconfig(libavif)
    - pkgconfig(libjpeg)
    - pkgconfig(libjxl)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libwebp)
    - pkgconfig(sdl3)
setup      : |
    %cmake_ninja \
        -DBUILD_SHARED_LIBS=ON \
        -DSDLIMAGE_VENDORED=OFF \
        -DSDLIMAGE_BACKEND_STB=OFF \
        -DSDLIMAGE_AVIF_SHARED=OFF \
        -DSDLIMAGE_JPG_SHARED=OFF \
        -DSDLIMAGE_JXL_SHARED=OFF \
        -DSDLIMAGE_PNG_SHARED=OFF \
        -DSDLIMAGE_TIF_SHARED=OFF \
        -DSDLIMAGE_WEBP_SHARED=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.txt
