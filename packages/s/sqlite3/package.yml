# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sqlite3
version    : 3.53.1
release    : 66
source     :
    - https://www.sqlite.org/2026/sqlite-src-3530000.zip : fbc30cdbfcfa42c78fe7bddd3fd37ab8995369a31d39097a5d0633296c0b6e65
license    : Public-Domain
component  :
    - system.base
    - lemon : programming.tools
emul32     : true
homepage   : https://www.sqlite.org
summary    :
    - Self contained SQL package
    - lemon : A parser generator
description:
    - The SQLite package is a software library that implements a self-contained, serverless, zero-configuration, transactional SQL database engine.
    - lemon : The Lemon program is an LALR(1) parser generator. It takes a context free grammar and converts it into a subroutine that will parse a file using that grammar.
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    ex_opts=""
    if [[ -z "${EMUL32BUILD}" ]]; then
        ex_opts="--enable-readline"
    fi
    %patch -p1 -i $pkgfiles/sqlite-lemon-system-template.patch

    %configure --disable-static \
        --enable-fts3 \
        --enable-fts4 \
        --enable-fts5 \
        --enable-geopoly \
        --enable-rtree \
        --enable-threadsafe \
        $ex_opts \
        --disable-tcl \
        --soname=legacy \
        CPPFLAGS="$CPPFLAGS \
        -DSQLITE_ENABLE_COLUMN_METADATA=1 \
        -DSQLITE_ENABLE_DBPAGE_VTAB=1 \
        -DSQLITE_ENABLE_DBSTAT_VTAB=1 \
        -DSQLITE_ENABLE_FTS3_PARENTHESIS=1 \
        -DSQLITE_ENABLE_STMTVTAB=1 \
        -DSQLITE_ENABLE_UNLOCK_NOTIFY=1 \
        -DSQLITE_SECURE_DELETE=1 \
        -DSQLITE_ENABLE_SESSION=1 \
        -DSQLITE_ENABLE_PREUPDATE_HOOK=1 \
        -DSQLITE_ENABLE_STAT4=1"
build      : |
    %make
    pushd tool
    clang lemon.c -o lemon
    popd
install    : |
    %make_install
    install -Dm00644 sqlite3.1 $installdir/usr/share/man/man1/sqlite3.1
    pushd tool
    install -Dm00644 lempar.c -t $installdir/usr/share/lemon/
    install -Dm00755 lemon $installdir/usr/bin
    popd
    %install_license LICENSE.md
patterns   :
    - lemon :
        - /usr/bin/lemon
        - /usr/share/lemon
