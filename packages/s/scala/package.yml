# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : scala
version    : 3.3.8
release    : 11
source     :
    - git|https://github.com/scala/scala3.git : 3.3.8
homepage   : https://www.scala-lang.org/
license    : Apache-2.0
component  : programming
summary    : Scala Language Toolchain
description: |
    Scala combines object-oriented and functional programming in one concise, high-level language. Scala's static types help avoid bugs in complex applications, and its JVM and JavaScript runtimes let you build high-performance systems with easy access to huge ecosystems of libraries.
builddeps  :
    - openjdk-25-devel
    - sbt
rundeps    :
    - openjdk-25
networking : true
build      : |
    export SBT_OPTS="-Xmx4G"
    export JAVA_HOME=/usr/lib64/openjdk-25
    export RELEASEBUILD=yes

    sbt -Divy.home=${workdir}/.ivy2 \
        -Dsbt.global.base=${workdir}/.sbt \
        -Dsbt.ivy.home=${workdir}/.ivy2 \
        -Duser.home=${workdir}/.java \
        dist/packArchive
install    : |
    %install_license LICENSE

    install -dm00755 ${installdir}/usr/share/scala
    tar xf dist/target/scala3-*.tar.gz \
        -C ${installdir}/usr/share/scala --strip-components=1

    install -dm00755 ${installdir}/usr/bin
    for FILE in scala scalac scaladoc; do
        install -Dm00755 ${pkgfiles}/java-shim.sh ${installdir}/usr/bin/${FILE}
        echo "/usr/share/scala/bin/${FILE} \"\$@\"" >> ${installdir}/usr/bin/${FILE}
    done
