# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : shadow
version    : 4.19.4
release    : 42
source     :
    - https://github.com/shadow-maint/shadow/releases/download/4.19.4/shadow-4.19.4.tar.gz : ba7e9aed1c5420203ac549583d6e6f485a819ac7505af9c7cd8c13b2013210b8
homepage   : https://github.com/shadow-maint/shadow
license    : BSD-3-Clause
component  : system.base
summary    : login and password tools
description: |
    Utilities for managing shadow password files and user/group accounts
builddeps  :
    - pkgconfig(libacl)
    - pkgconfig(libattr)
    - pkgconfig(libeconf)
    - pkgconfig(libxcrypt)
setup      : |
    %patch -p1 -i ${pkgfiles}/0002-Solus-login.defs-changes.patch
    %patch -p1 -i ${pkgfiles}/0001-Always-initialize-econf_file.patch

    # add extra check, preventing accidental deletion of other user's home dirs when using `userdel -r <user with home in />`
    export CFLAGS="${CFLAGS} -DEXTRA_CHECK_HOME_DIR"

    %configure \
        --disable-account-tools-setuid \
        --disable-static \
        --enable-man \
        --enable-vendordir=/usr/share/defaults/etc \
        --with-fcaps \
        --with-libpam \
        --with-yescrypt \
        --without-libbsd \
        --without-nscd \
        --without-su
build      : |
    %make
install    : |
    %make_install
    make DESTDIR="${installdir}" -C man install

    # Stateless
    install -dm 00755 ${installdir}/usr/share/defaults/etc
    mv ${installdir}/etc/login.defs ${installdir}/usr/share/defaults/etc/login.defs

    # Stateless PAM
    mv ${installdir}/etc/pam.d ${installdir}/usr/share/defaults/etc/

    # Tempfiles
    install -Dm 00644 ${pkgfiles}/subid-files.tmpfiles ${installdir}/%libdir%/tmpfiles.d/shadow-subids.conf

    # Remove unused files
    for file in faillog logoutd; do
        find ${installdir}/usr -wholename "*bin/${file}*" -type f -exec rm {} \; # Binaries
        find ${installdir}/usr/share/man -name "*${file}*" -type f -exec rm {} \; # man pages
    done
    
    # Remove files that conflict with coreutils
    for file in groups; do
        find ${installdir}/usr -wholename "*bin/${file}*" -type f -exec rm {} \; # Binaries
        find ${installdir}/usr/share/man -name "*${file}*" -type f -exec rm {} \; # man pages
    done

    # Remove files that conflict with util-linux
    # Expect logoutd, vipr, sg to conflict also at a later point
    for file in chfn chsh login newgrp nologin vigr vipw; do
        find ${installdir}/usr -wholename "*bin/${file}*" -type f -exec rm {} \; # Binaries
        find ${installdir}/usr -wholename "*bin/${file}*" -type l -exec rm {} \; # Links
        find ${installdir}/usr/share/defaults -name "${file}" -type f -exec rm {} \; # PAM files
        find ${installdir}/usr/share/man -name "*${file}*" -type f -exec rm {} \; # man pages
    done
    
    find ${installdir}/usr/share/man -name "*su.1*" -type f -exec rm {} \;

    # License
    %install_license COPYING

    # Cleanup
    find ${installdir} -type d -empty -print -delete

    # Without setuid on /usr/bin/new{u,g}idmap, user namespaces do not work
    # (this breaks e.g. boulder)
    chmod -c u+s ${installdir}/usr/bin/new{u,g}idmap

