# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : s-tui
version    : 1.4.0
release    : 11
source     :
    - https://github.com/amanusk/s-tui/archive/refs/tags/v1.4.0.tar.gz : 92ca86bc7b3c95a573678d0d6ac7b88609c5355762d0278a78bbae998a2f4a39
license    : GPL-2.0-or-later
homepage   : https://amanusk.github.io/s-tui
component  : system.utils
summary    : Terminal-based CPU stress and monitoring utility
description: |
    Stress-Terminal UI, s-tui, monitors CPU temperature, frequency, power and utilization in a graphical way from the terminal.
builddeps  :
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - python-psutil
    - python3-urwid
    - stress-ng
setup      : |
    %patch -p1 -i $pkgfiles/use-zenergy.patch
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE
