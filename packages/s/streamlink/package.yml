# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : streamlink
version    : 8.2.1
release    : 70
source     :
    - https://github.com/streamlink/streamlink/releases/download/8.2.1/streamlink-8.2.1.tar.gz : afa26582cabf343f49733d79e2bc9a5bbe90aec7dbb246ec5f97796499c637ee
homepage   : https://streamlink.github.io/
license    : BSD-2-Clause
component  : network.clients
summary    : Extracts streams from various services and pipes them into a video player of choice
description: |
    Streamlink is a command-line utility which pipes video streams from various services into a video player, such as VLC or mpv. The main purpose of Streamlink is to avoid resource-heavy and unoptimized websites, while still allowing the user to enjoy various streamed content.
networking : true
builddeps  :
    - python-build
    - python-installer
    - python-packaging
    - python-setuptools
checkdeps  :
    - python-freezegun
    - python-pytest
    - python-pytest-trio
    - python-requests-mock
    # rundeps required for running tests
    - python-isodate
    - python-lxml
    - python-pycountry
    - python-pycryptodome
    - python-requests
    - python-trio
    - python-trio-websocket
    - python-urllib3
    - python-websocket-client
rundeps    :
    - ffmpeg
    - python-certifi
    - python-isodate
    - python-lxml
    - python-pycountry
    - python-pycryptodome
    - python-pysocks
    - python-requests
    - python-trio
    - python-trio-websocket
    - python-urllib3
    - python-websocket-client
setup      : |
    %patch -p1 -i $pkgfiles/remove-pytest-minversion.patch
build      : |
    %python3_setup
install    : |
    %python3_install
check      : |
    %python3_test pytest3
