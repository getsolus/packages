# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : strace
version    : '7.1'
release    : 17
source     :
    - https://github.com/strace/strace/releases/download/v7.1/strace-7.1.tar.xz : 81743ecf2a5b44186b2f5038afdc8beda7e5c70aed15b4fbfbcc6e9ece24490f
license    : BSD-3-Clause
summary    : Diagnostic, debugging and instructional userspace utility
component  : programming.tools
description: |
    Strace is a diagnostic, debugging and instructional userspace utility for Linux. It is used to monitor and tamper with interactions between processes and the Linux kernel, which include system calls, signal deliveries, and changes of process state.
homepage   : https://strace.io/
builddeps  :
    - pkgconfig(libunwind)
clang      : true
setup      : |
    %configure --with-libunwind
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
