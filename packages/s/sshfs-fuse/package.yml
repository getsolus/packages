# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sshfs-fuse
version    : 3.7.6
release    : 12
source     :
    - https://github.com/libfuse/sshfs/releases/download/sshfs-3.7.6/sshfs-3.7.6.tar.xz : 6a1bcb31450a077e9cb1b7ff158c71de34db697c3c0da6cb362502131e495893
homepage   : https://github.com/libfuse/sshfs
license    : GPL-2.0-only
component  : network.util
summary    : A network filesystem client to connect to SSH servers
description: |
    SSHFS allows you to mount a remote filesystem using SFTP. Most SSH servers support and enable this SFTP access by default, so SSHFS is very simple to use - there's nothing to do on the server-side.
builddeps  :
    - pkgconfig(fuse3)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
