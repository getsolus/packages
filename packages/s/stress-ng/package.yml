# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : stress-ng
version    : 0.21.04
release    : 19
source     :
    - https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.04.tar.gz : a328ba050bd3014f07a3265fb6c1aab071ae942dfad75c7459cce45a987869e1
license    : GPL-2.0-or-later
component  : system.utils
homepage   : https://github.com/ColinIanKing/stress-ng
summary    : Multi-option stress test utility
description: |
    stress-ng will stress test a computer system in various selectable ways. It was designed to exercise various physical subsystems of a computer as well as the various operating system kernel interfaces.
clang      : true
builddeps  :
    # See https://github.com/ColinIanKing/stress-ng?tab=readme-ov-file#building-stress-ng
    - pkgconfig(eigen3)
    - pkgconfig(gbm)
    - pkgconfig(keyutils)
    - pkgconfig(libacl)
    - pkgconfig(libapparmor)
    - pkgconfig(libbsd)
    - pkgconfig(libcap)
    - pkgconfig(libglvnd)
    - pkgconfig(libjpeg)
    - pkgconfig(libmd)
    - pkgconfig(libxcrypt)
    - pkgconfig(libxxhash)
    - pkgconfig(mpfr)
    - libaio-devel
optimize   :
    - thin-lto
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
