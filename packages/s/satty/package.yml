# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : satty
version    : 0.21.1
release    : 1
source     :
    - https://github.com/Satty-org/Satty/archive/refs/tags/v0.21.1.tar.gz : 890384695583e649074f453f2e694fd2cae6960c189363f849e2ecd2a27f8b79
homepage   : https://github.com/gabm/Satty
license    : MPL-2.0
component  : multimedia.graphics
summary    : Modern Screenshot Annotation
description: |
    Satty is a screenshot annotation tool inspired by Swappy and Flameshot. It has been created to provide the following improvements over existing screenshot annotation tools.
builddeps  :
    - pkgconfig(epoxy)
    - pkgconfig(fontconfig)
    - pkgconfig(gtk4)
    - pkgconfig(libadwaita-1)
    - rust
networking : true
setup      : |
    %cargo_fetch
build      : |
    %cargo_build --features ci-release
install    : |
    %cargo_install
    %install_license LICENSE

    install -Dm 00644 org.satty.Satty.metainfo.xml -t ${installdir}/usr/share/metainfo
    install -Dm 00644 satty.desktop -t ${installdir}/usr/share/applications
    install -Dm 00644 assets/satty.svg -t ${installdir}/usr/share/icons/hicolor/scalable/apps

    install -Dm 00644 completions/satty.bash ${installdir}/usr/share/bash-completion/completions/satty
    install -Dm 00644 completions/satty.fish -t ${installdir}/usr/share/fish/vendor_completions.d
    install -Dm 00644 completions/_satty -t ${installdir}/usr/share/zsh/site-functions

    install -Dm 00644 man/satty.1 -t ${installdir}/usr/share/man/man1
