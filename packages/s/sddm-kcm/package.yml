# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sddm-kcm
version    : 6.6.2
release    : 130
source     :
    - https://download.kde.org/stable/plasma/6.6.2/sddm-kcm-6.6.2.tar.xz : d544910d9c35318f9d5dcb54cbe2112e573528fdcc01101bf17352fe2db433a7
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Config module for SDDM
description: |
    Hosts the KCM module for SDDM. This module allows for configuring SDDM in Plasma System Settings.
builddeps  :
    - pkgconfig(Qt6Quick)
    - pkgconfig(xcb-cursor)
    - kf6-karchive-devel
    - kf6-kauth-devel
    - kf6-kcmutils-devel
    - kf6-kio-devel
    - kf6-knewstuff-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
