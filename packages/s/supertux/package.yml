# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : supertux
version    : 0.7.0
release    : 21
source     :
    - https://github.com/SuperTux/supertux/releases/download/v0.7.0/SuperTux-v0.7.0-Source.tar.gz : 32fc5b99b9994ed58e58341d6f21de925764b381256e108591136de53bc31da5
homepage   : https://www.supertux.org/
license    : GPL-3.0-or-later
component  : games.platformer
summary    : SuperTux is a jump'n'run game with strong inspiration from the Super Mario Bros
description: |
    SuperTux is a jump'n'run game with strong inspiration from the Super Mario Bros.
builddeps  :
    - pkgconfig(SDL2_image)
    - pkgconfig(fmt)
    - pkgconfig(freetype2)
    - pkgconfig(gl)
    - pkgconfig(glew)
    - pkgconfig(glm)
    - pkgconfig(libcurl)
    - pkgconfig(openal)
    - pkgconfig(vorbis)
    - libboost-devel
    - physfs-devel
setup      : |
    sed -i "s/games\/supertux2/supertux2/" CMakeLists.txt
    %cmake -DCMAKE_BUILD_TYPE=Release \
           -DINSTALL_SUBDIR_BIN=bin \
           .
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE*
patterns   :
    - main :
        - /usr/lib64/libsimplesquirrel.so
