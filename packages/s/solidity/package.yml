# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : solidity
version    : 0.8.35
release    : 6
source     :
    - https://github.com/argotorg/solidity/releases/download/v0.8.35/solidity_0.8.35.tar.gz : 76178a2d5ba92f08b6faa109fdd452a3fbe05ca610a43fa2f1a9426deda7e191
homepage   : https://soliditylang.org
license    : GPL-3.0-or-later
component  : programming
summary    : Solidity, the smart contract programming language.
description: |
    Solidity is a statically typed, contract-oriented, high-level language for implementing smart contracts on the Ethereum platform.
builddeps  :
    - libboost-devel
setup      : |
    %cmake -B build \
        -DBoost_USE_STATIC_LIBS=OFF
build      : |
    %make -C build
install    : |
    %make_install -C build
    %install_license LICENSE*
check      : |
    ./scripts/soltest.sh --no-semantic-tests
