# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sz
version    : 2.1.12.5
release    : 9
source     :
    - https://github.com/szcompressor/SZ2/releases/download/v2.1.12.5/SZ-2.1.12.5.tar.gz : 32a820daf6019156a777300389d2392e4498a5c9daffce7be754cd0a5ba8729c
homepage   : https://szcompressor.org/
license    : BSD-4-Clause
component  : programming.library
summary    : Error-bounded Lossy Data Compressor
description: |
    SZ is a modular parametrizable lossy compressor framework for scientific data (floating point and integers). It has applications in simulations, AI and instruments.
libsplit   : false
builddeps  :
    - pkgconfig(hdf5)
    - pkgconfig(libzstd)
    - pkgconfig(netcdf)
    - pkgconfig(python3)
    - numpy
    - swig
setup      : |
    %patch -p1 -i $pkgfiles/devel-install-cmake.patch
    %cmake_ninja \
        -DCMAKE_SKIP_RPATH=ON \
        -DBUILD_FORTRAN=ON \
        -DBUILD_HDF5_FILTER=ON \
        -DBUILD_NETCDF_READER=ON \
        -DBUILD_OPENMP=ON \
        -DBUILD_PYTHON_WRAPPER=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -f $installdir/usr/bin/test*
