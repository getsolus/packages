# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : strawberry
version    : 1.2.23
release    : 99
source     :
    - https://github.com/strawberrymusicplayer/strawberry/releases/download/1.2.23/strawberry-1.2.23.tar.xz : 4fe6aef7b340b557929b7d8e680e3bd1d6e70bc828249542de8f6aeef2d393fd
license    : GPL-3.0-or-later
homepage   : https://www.strawberrymusicplayer.org
component  : multimedia.audio
summary    : Strawberry is a audio player and music collection organizer.
description: |
    Strawberry is a audio player and music collection organizer. It is a fork of Clementine released in 2018 aimed at music collectors, audio enthusiasts and audiophiles.
builddeps  :
    - pkgconfig(Qt6UiTools)
    - pkgconfig(alsa)
    - pkgconfig(fftw3)
    - pkgconfig(gstreamer-audio-1.0)
    - pkgconfig(icu-i18n)
    - pkgconfig(libcdio)
    - pkgconfig(libchromaprint)
    - pkgconfig(libebur128)
    - pkgconfig(libmtp)
    - pkgconfig(libpulse)
    - pkgconfig(libsparsehash)
    - pkgconfig(sqlite3)
    - pkgconfig(taglib)
    - gstreamer-plugins-good
    - gstreamer-plugins-ugly
    - kdsingleapplication-devel
    - libboost-devel
    - liblastfm-devel
    - qt6-base-private-devel
setup      : |
    %cmake_ninja \
        -DINSTALL_TRANSLATIONS=ON \
        -DENABLE_GPOD=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
