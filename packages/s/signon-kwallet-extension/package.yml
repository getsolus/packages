# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : signon-kwallet-extension
version    : 26.04.3
release    : 94
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/signon-kwallet-extension-26.04.3.tar.xz : 329bd9bc50504eb6bd7d431f7db6725287832550d60f7189ef8d0201092753c7
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : programming
summary    : KWallet integration for signon framework
description: |
    KWallet integration for signon framework.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(SignOnExtension)
    - extra-cmake-modules
    - kf6-kwallet-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
