# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : skanlite
version    : 25.12.3
release    : 53
source     :
    - https://download.kde.org/stable/release-service/25.12.3/src/skanlite-25.12.3.tar.xz : e30dfc3601545291fc3d813ceaafcee91d0b850dcb54688be49a0f431779501f
homepage   : https://apps.kde.org/skanlite/
license    : GPL-2.0-or-later
component  : desktop.kde
summary    : Image Scanning Application for KDE
description: |
    Skanlite is a simple image scanning application that does nothing more than scan and save images, based on the KSane backend.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - ksanecore-devel
    - libksane-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rfv $installdir/usr/share/doc
