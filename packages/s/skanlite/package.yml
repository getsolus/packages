# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : skanlite
version    : 26.04.3
release    : 56
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/skanlite-26.04.3.tar.xz : dac757451b430192a00eef7a90aad14f5e59d9460e9ff5fb162922ca47403417
homepage   : https://apps.kde.org/skanlite/
license    :
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde
summary    : Image Scanning Application for KDE
description: |
    Skanlite is a simple image scanning application that does nothing more than scan and save images, based on the KSane backend.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - ksanecore-devel
    - libksane-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    rm -rfv $installdir/usr/share/doc
