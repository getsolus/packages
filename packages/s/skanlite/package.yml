# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : skanlite
version    : 26.04.1
release    : 54
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/skanlite-26.04.1.tar.xz : a0b41784907b138f90f999de757a38e36b00805bd3cc59dcb2e3ae60b2d02d61
homepage   : https://apps.kde.org/skanlite/
license    : GPL-2.0-or-later
component  : desktop.kde
summary    : Image Scanning Application for KDE
description: |
    Skanlite is a simple image scanning application that does nothing more than scan and save images, based on the KSane backend.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-kcoreaddons-devel
    - kf6-kdoctools-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kxmlgui-devel
    - ksanecore-devel
    - libksane-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rfv $installdir/usr/share/doc
