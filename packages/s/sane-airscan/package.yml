# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sane-airscan
version    : 0.99.37
release    : 4
source     :
    - https://github.com/alexpevzner/sane-airscan/archive/refs/tags/0.99.37.tar.gz : b012d4ca8b526e28b0baf1e0dcc1504a1f67118914ee9362201d04a37dbf7e5f
homepage   : https://github.com/alexpevzner/sane-airscan
license    : GPL-2.0-or-later
component  : office
summary    : SANE backend for AirScan (eSCL) and WSD document scanners
description: |
    SANE backend for MFP and document scanners that implements either eSCL (AirScan/AirPrint scanning) or WSD "driverless" scanning protocol.
builddeps  :
    - pkgconfig(avahi-client)
    - pkgconfig(gnutls)
    - pkgconfig(libinsane)
    - pkgconfig(libjpeg)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libxml-2.0)
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
