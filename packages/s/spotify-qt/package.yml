# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : spotify-qt
version    : 4.0.4
release    : 13
source     :
    - https://github.com/kraxarn/spotify-qt/archive/refs/tags/v4.0.4.tar.gz : 10656f4c980c8d4b90f11879a6a58fe542e8b0ef1212297a700bcde3d9a6e396
homepage   : https://github.com/kraxarn/spotify-qt
license    : GPL-3.0-or-later
component  : multimedia.audio
summary    : Lightweight Spotify client using Qt
description: |
    Spotify client using Qt as a simpler, lighter alternative to the official client, inspired by spotify-tui.
builddeps  :
    - pkgconfig(Qt6Svg)
rundeps    :
    - qt6-svg
    - spotifyd
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license license
    # Install AppStream metainfo
    install -Dm00644 $pkgfiles/io.github.kraxarn.spotify_qt.metainfo.xml -t $installdir/usr/share/metainfo
