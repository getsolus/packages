# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : stellarsolver
version    : '2.7'
release    : 3
source     :
    - https://github.com/rlancaste/stellarsolver/archive/refs/tags/2.7.tar.gz : 36ff495f325920b9a23b7c3f7453a99c8d405e0984d4b27da7568625cb6c76c9
homepage   : https://github.com/rlancaste/stellarsolver
license    : GPL-3.0-or-later
component  : office.scientific
summary    : The Cross Platform SEP-based Star Extractor and Astrometry.net-Based Internal Astrometric Solver
description: |
    The Cross Platform SEP-based Star Extractor and Astrometry.net-Based Internal Astrometric Solver
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(cfitsio)
    - pkgconfig(gsl)
    - pkgconfig(wcslib)
setup      : |
    %cmake_ninja -DUSE_QT5=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
