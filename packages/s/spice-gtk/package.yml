# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : spice-gtk
version    : '0.43'
release    : 32
source     :
    - https://gitlab.freedesktop.org/-/project/64/uploads/88f5d31a961da9921add46ca3f0be904/spice-gtk-0.43.tar.xz : 
        cee26e5b2d22909f35b40a94398d1e863ca3962ee46494ca97aab206abc3203b
homepage   : https://www.spice-space.org
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Gtk client and libraries for SPICE remote desktop servers (gtk3 version)
description: |
    Gtk client and libraries for SPICE remote desktop servers (gtk3 version)
builddeps  :
    - pkgconfig(gstreamer-plugins-bad-1.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gusb)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libacl)
    - pkgconfig(libcacard)
    - pkgconfig(libcap-ng)
    - pkgconfig(liblz4)
    - pkgconfig(libphodav-3.0)
    - pkgconfig(libsasl2)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libusbredirhost)
    - pkgconfig(opus)
    - pkgconfig(pixman-1)
    - pkgconfig(polkit-gobject-1)
    - pkgconfig(spice-protocol)
    - pkgconfig(wayland-protocols)
    - gstreamer-plugin-libav
    - gstreamer-plugins-good
    - valadoc
setup      : |
    %meson_configure -Dusb-ids-path="/usr/share/hwdata/usb.ids"
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    chmod 4755 $installdir/%libdir%/spice-gtk/spice-client-glib-usb-acl-helper

    # Fix USB redirection by setting the correct file capabilities
    setcap 'cap_net_admin,cap_fowner,cap_setgid,cap_setuid,cap_setpcap=+ep cap_net_raw=eip' ${installdir}/%libdir%/spice-gtk/spice-client-glib-usb-acl-helper
check      : |
    %ninja_check
