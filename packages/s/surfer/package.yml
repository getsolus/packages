# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : surfer
version    : 0.7.0
release    : 2
source     :
    - git|https://gitlab.com/surfer-project/surfer.git : v0.7.0
homepage   : https://surfer-project.org/
license    : EUPL-1.2
component  : office.scientific
summary    : An Extensible and Snappy Waveform Viewer
description: |
    A waveform viewer with a focus on a snappy usable interface, and extensibility.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install

    install -Dm00644 %workdir%/surfer/assets/com.gitlab.surferproject.surfer.png $installdir/usr/share/icons/hicolor/256x256/apps/com.gitlab.surferproject.surfer.png
    install -Dm00644 %workdir%/surfer/assets/com.gitlab.surferproject.surfer.desktop $installdir/usr/share/applications/com.gitlab.surferproject.surfer.desktop
    install -Dm00644 %workdir%/surfer/assets/com.gitlab.surferproject.surfer.metainfo.xml $installdir/usr/share/metainfo/com.gitlab.surferproject.surfer.metainfo.xml 
    %install_license LICENSE-EUPL-1.2.txt
