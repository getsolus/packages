# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : yewtube
version    : 2.13.1
release    : 5
source     :
    - https://github.com/mps-youtube/yewtube/archive/refs/tags/v2.13.1.tar.gz : cfff2f05a403b26807dd9000457bd339aff33fc437b79609b2454c0903c97895
homepage   : https://github.com/mps-youtube/yewtube
license    : GPL-3.0-or-later
component  : multimedia.audio
summary    : Terminal based YouTube jukebox with playlist management
description: |
    yewtube, forked from mps-youtube, is a Terminal based YouTube player and downloader
replaces   :
    - mps-youtube
builddeps  :
    - pkgconfig(python3)
    - python-build
    - python-installer
    - python-setuptools
rundeps    :
    - mpv
    - python-pylast
    - python-pyperclip
    - python-requests
    - youtube-search-python
    - yt-dlp
build      : |
    %python3_setup
install    : |
    %python3_install

    # Replace auto-installed yt script witht the one that actually works
    install -m 0755 yt $installdir/usr/bin/yt
