# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : yosys
version    : 0.67
release    : 30
source     :
    - git|https://github.com/YosysHQ/yosys.git : v0.67
homepage   : https://yosyshq.net/yosys/
license    : ISC
component  : office.scientific
summary    : Yosys Open SYnthesis Suite
description: |
    Yosys is a framework for Verilog RTL synthesis. It currently has extensive Verilog-2005 support and provides a basic set of synthesis algorithms for various application domains.
clang      : true
networking : true
patterns   :
    - devel :
        - /usr/bin/yosys-config
        - /usr/share/yosys/include
builddeps  :
    - pkgconfig(gtest)
    - pkgconfig(libedit)
    - pkgconfig(libffi)
    - pkgconfig(python3)
    - pkgconfig(tcl)
    - uv
setup      : |
    %cmake_ninja \
        -DYOSYS_WITH_PYTHON=ON \
        -DYOSYS_INSTALL_LIBRARY=ON \
        -DYOSYS_INSTALL_PYTHON=ON \
        -DYOSYS_INSTALL_PYTHON_SITEDIR=$(python -c "import site; print(site.getsitepackages()[0])")
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
