# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tmuxp
version    : 1.67.0
release    : 19
source     :
    - https://files.pythonhosted.org/packages/source/t/tmuxp/tmuxp-1.67.0.tar.gz : 990720d9fa5a6f4758790aecc201d2d29af0ad9ad8c47b58ac20acb0e8a94f12
homepage   : https://tmuxp.git-pull.com/
license    : MIT
component  : system.utils
summary    : tmux session manager
description: |
    tmux session manager, built on libtmux.
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
    - python-packaging
    - python-shtab
    - python-wheel
rundeps    :
    - python-colorama
    - python-libtmux
    - pyyaml
    - tmux
checkdeps  :
    - python-gp-libs
    - python-libtmux
    - python-pytest
    - python-pytest-mock
    - python-pytest-rerunfailures
build      : |
    %python3_setup

    mkdir completions
    shtab --shell=bash tmuxp.cli.create_parser > completions/tmuxp
    shtab --shell=zsh tmuxp.cli.create_parser > completions/_tmuxp
install    : |
    %python3_install

    install -Dm00644 -t ${installdir}/usr/share/bash-completion/completions/ completions/tmuxp
    install -Dm00644 -t ${installdir}/usr/share/zsh/site-functions/ completions/_tmuxp
check      : |
    _site_packages="$(python -c "import site; print(site.getsitepackages()[0])")"
    python -m installer --destdir=test_dir dist/*.whl
    export PYTHONPATH="test_dir/${_site_packages}:${PYTHONPATH}"
    export PATH="${PWD}/test_dir/usr/bin:${PATH}"

    %python3_test pytest -vv tests
