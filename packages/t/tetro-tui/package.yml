# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tetro-tui
version    : 3.6.1
release    : 4
source     :
    - https://github.com/Strophox/tetro-tui/archive/refs/tags/v3.6.1.tar.gz : 3b08e3087ef24fb79bad373408b67e6391093e3aea368698d9b994aeb7c491ff
homepage   : https://github.com/Strophox/tetro-tui
license    : MIT
component  : games.puzzle
summary    : Cross-platform terminal tetromino game
description: |
    A cross-platform terminal game where tetrominos fall and stack. Features multiple
    game modes (Swift, Classic, Master, Puzzle, and more), customizable graphics and
    keybinds, scoreboards, replays, and statistics.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build --all-features
install    : |
    %cargo_install
    %install_license LICENSE
check      : |
    %cargo_test
replaces   :
    - tetrs
    - dbginfo :
        - tetrs-dbginfo
