# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : topydo
version    : '0.16'
release    : 11
source     :
    - https://github.com/topydo/topydo/archive/refs/tags/0.16.tar.gz : 382d1e707d619aee53fc13f712a980b911293a00c0aaba681689eee81a522681
homepage   : https://github.com/topydo/topydo
license    : GPL-3.0-or-later
component  : office.notes
summary    : A powerful todo list application for the console, using the todo.txt format
description: |
    A powerful todo list application for the console, using the todo.txt format.
builddeps  :
    - python-arrow
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
checkdeps  :
    - pytest-runner
    - python-freezegun
    - python-pytest
rundeps    :
    - python-arrow
    - python-prompt-toolkit
    - python-watchdog
    - python3-urwid
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license LICENSE.txt
check      : |
    %python3_test
