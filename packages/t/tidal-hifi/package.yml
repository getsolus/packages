# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tidal-hifi
version    : 8.0.0
release    : 6
source     :
    - https://github.com/Mastermindzh/tidal-hifi/archive/refs/tags/8.0.0.tar.gz : c4372905477db3d87fd2be6dfbc5e8bfbc634d25e4554c8637b311c645a53416
homepage   : https://github.com/Mastermindzh/tidal-hifi
license    : MIT
component  : multimedia.audio
summary    : Tidal in Electron with HiFi support via Widevine
description: |
    The web version of Tidal running in Electron with HiFi support thanks to Widevine.
    A desktop client for Tidal streaming music service with high-fidelity audio support.
networking : true
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(gbm)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(xscrnsaver)
    - nodejs
setup      : |
    npm install
build      : |
    npm run build-unpacked
install    : |
    %install_license LICENSE

    install -dm00755 ${installdir}/usr/share/tidal-hifi
    cp -a dist/linux-unpacked/. ${installdir}/usr/share/tidal-hifi/
    chmod +x ${installdir}/usr/share/tidal-hifi/tidal-hifi

    # Wrapper launcher so users can tune flags and avoid sandbox-related zygote crashes.
    install -Dm00755 ${pkgfiles}/tidal-hifi.sh ${installdir}/usr/bin/tidal-hifi

    install -Dm00644 assets/icon.png ${installdir}/usr/share/icons/hicolor/512x512/apps/tidal-hifi.png
    install -Dm00644 ${pkgfiles}/tidal-hifi.desktop -t ${installdir}/usr/share/applications

    # AppStream metainfo for software center
    install -Dm00644 ${pkgfiles}/com.mastermindzh.tidal-hifi.metainfo.xml -t ${installdir}/usr/share/metainfo
