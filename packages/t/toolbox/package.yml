name       : toolbox
version    : '0.3'
release    : 1
source     :
    - https://github.com/containers/toolbox/releases/download/0.3/toolbox-0.3.tar.xz : adad7bc04bff16016f862d17596dda9f83238bb4ee20362f2fa7c2de6aa3b3fe
homepage   : https://containertoolbx.org/
license    : Apache-2.0
component  : virt
summary    : Tool for interactive command line environments
description: |
    Toolbx is a tool for Linux, which allows the use of interactive command line environments for software development and troubleshooting the host operating system, without having to install software on the host. It is built on top of Podman and other standard container technologies from OCI.
networking : true
builddeps  :
    - go-md2man
    - golang
    - shadow-devel
rundeps    :
    - podman
setup      : |
    %patch -p1 -i $pkgfiles/stateless.patch
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    install -dm00755 $installdir/usr/share/defaults/toolbox/containers/
    mv $installdir/etc/containers/toolbox.conf $installdir/usr/share/defaults/toolbox/containers/
    rm -frv $installdir/etc/
