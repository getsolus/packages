# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : texworks
version    : 0.6.11
release    : 23
source     :
    - https://github.com/TeXworks/texworks/archive/refs/tags/release-0.6.11.tar.gz : f4017afb359e7c91824bd32b06a96426db88498dc43edfd5fe041599b2a30f19
homepage   : https://www.tug.org/texworks/
license    : GPL-2.0-or-later
component  : editor
summary    : A simple TeX front-end program
description: |
    TeXworks is an environment for authoring TeX (LaTeX, ConTeXt, etc) documents, with a Unicode-based, TeX-aware editor, integrated PDF viewer, and a clean, simple interface accessible to casual and non-technical users.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(hunspell)
    - pkgconfig(poppler-qt6)
    - pkgconfig(python3)
rundeps    :
    - texlive
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_ninja -DQT_DEFAULT_MAJOR_VERSION=6 \
                 -DTeXworks_DIC_DIR=/usr/share/hunspell \
                 -DWITH_PYTHON=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rf $installdir/usr/share/doc
    %install_license COPYING
