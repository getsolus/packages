name       : thunar
version    : 4.19.4
release    : 10
source     :
    - https://archive.xfce.org/xfce/4.20pre1/src/thunar-4.19.4.tar.bz2 : 6358d15d1e4650e6d09386bc8449217cf81536a7456f059c223dab3664ea64f6
homepage   : https://docs.xfce.org/xfce/thunar/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : Modern, fast and easy-to-use file manager for Xfce.
description: |
    Modern, fast and easy-to-use file manager for Xfce.
builddeps  :
    - pkgconfig(exo-2)
    - pkgconfig(libxfce4panel-2.0)
    - pkgconfig(libxfce4ui-2)
rundeps    :
    - gvfs
setup      : |
    # appstream metainfo cleanup
    %patch -p1 -i $pkgfiles/562.patch

    %configure \
        --disable-debug \
        --enable-gio-unix \
        --enable-gudev \
        --enable-notifications \
        --enable-exif \
        --sysconfdir=/usr/share
build      : |
    %make
install    : |
    %make_install
