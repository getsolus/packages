# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tickrs
version    : 0.15.0
release    : 10
source     :
    - https://github.com/tarkah/tickrs/archive/refs/tags/v0.15.0.tar.gz : d06648feb9d0da53f10188f050e8324162a1a83a1ed0f2f7a360983dc2f2b0a6
homepage   : https://github.com/tarkah/tickrs
license    : MIT
component  : network.news
summary    : Realtime ticker data in your terminal
description: |
    Realtime ticker data in your terminal. Built with Rust. Data sourced from Yahoo! Finance.
networking : true
builddeps  :
    - pkgconfig(libcurl)
    - rust
setup      : |
    %patch -p1 -i $pkgfiles/0001-vendored-ssl.patch
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install
    %install_license LICENSE
check      : |
    %cargo_test -- --skip test_options_data
