# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : typst
version    : 0.15.0
release    : 10
source     :
    - https://github.com/typst/typst/archive/refs/tags/v0.15.0.tar.gz : 5044bd12138491c6e880df0e09056a9ae4607d937c73962d5806402ae6ee96a6
homepage   : https://typst.app
license    : Apache-2.0
component  : office
summary    : A new markup-based typesetting system that is powerful and easy to learn
description: |
    Typst is a new markup-based typesetting system that is designed to be as powerful as LaTeX while being much easier to learn and use.
networking : true
builddeps  :
    - rust
environment: |
    export TYPST_VERSION=%version%
    export OPENSSL_NO_VENDOR=true
    export GEN_ARTIFACTS=artifacts/
setup      : |
    %cargo_fetch
build      : |
    %cargo_build -p typst-cli
install    : |
    %cargo_install
    install -Dm00644 crates/typst-cli/artifacts/typst*.1 -t "${installdir}/usr/share/man/man1/"
    install -Dm00644 "crates/typst-cli/artifacts/typst.bash" "${installdir}/usr/share/bash-completion/completions/typst"
    install -Dm00644 "crates/typst-cli/artifacts/typst.fish" "${installdir}/usr/share/fish/vendor_completions.d/typst.fish"
    install -Dm00644 "crates/typst-cli/artifacts/_typst" "${installdir}/usr/share/zsh/site-functions/_typst"
    %install_license LICENSE
check      : |
    %cargo_test
