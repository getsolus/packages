# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ttyd
version    : 1.7.7
release    : 1
source     :
    - https://github.com/tsl0922/ttyd/archive/refs/tags/1.7.7.tar.gz : 039dd995229377caee919898b7bd54484accec3bba49c118e2d5cd6ec51e3650
homepage   : https://github.com/tsl0922/ttyd
license    : MIT
component  : network.util
summary    : Share your terminal over the web
description: |
    ttyd is a simple command-line tool for sharing a terminal over the web.
builddeps  :
    - pkgconfig(json-c)
    - pkgconfig(libuv)
    - pkgconfig(libwebsockets)
    - pkgconfig(openssl)
    - pkgconfig(zlib)
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
