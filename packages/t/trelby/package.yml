# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : trelby
version    : 2.4.16.2
release    : 10
source     :
    - https://github.com/trelby/trelby/archive/refs/tags/2.4.16.2.tar.gz : 2f69f90057ca31746eeeddb5cffa944e29aa5e67905f141043f6e3a9ea6cbe3e
license    : GPL-2.0-or-later
homepage   : https://www.trelby.org/
component  : office
summary    : Trelby is a screenplay writing program.
description: |
    The free, multiplatform, feature-rich screenwriting program!
builddeps  :
    - python-build
    - python-installer
    - python-wheel
    - wxPython
rundeps    :
    - python-lxml
    - python-reportlab
    - wxPython
build      : |
    %python3_setup
install    : |
    %python3_install
    install -Dm00644 trelby/resources/trelby.desktop $installdir/usr/share/applications/trelby.desktop
    install -Dm00644 trelby/resources/icon256.png $installdir/usr/share/icons/hicolor/256x256/apps/trelby.png
    install -Dm00644 $pkgfiles/org.trelby.Trelby.metainfo.xml -t $installdir/usr/share/metainfo
    %install_license LICENSE
