# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : xiphos
version    : 4.4.0
release    : 36
source     :
    - https://github.com/crosswire/xiphos/releases/download/4.4.0/xiphos-4.4.0.tar.xz : 64787e97906e5c2f58b59bfc9122d7d2e89565f05329a84d8567834995d5a5db
homepage   : https://xiphos.org/
license    : GPL-2.0-only
component  : office
summary    : Xiphos is a Bible study application
description: |
    Xiphos is a Bible study application
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(gconf-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libglade-2.0)
    - pkgconfig(libgsf-1)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(minizip)
    - pkgconfig(rarian)
    - pkgconfig(speech-dispatcher)
    - pkgconfig(sword)
    - pkgconfig(uuid)
    - pkgconfig(webkit2gtk-4.1)
    - pkgconfig(yelp-xsl)
    - biblesync-devel
    - desktop-file-utils
    - intltool
    - itstool
    - rarian
    - yelp-tools
setup      : |
    mkdir build && cd build
    %cmake ..
build      : |
    pushd build
    %make
install    : |
    pushd build
    %make_install
    popd
    %install_license COPYING
