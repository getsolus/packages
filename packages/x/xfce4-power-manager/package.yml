name       : xfce4-power-manager
version    : 4.19.4
release    : 7
source     :
    - https://archive.xfce.org/xfce/4.20pre1/src/xfce4-power-manager-4.19.4.tar.bz2 : 8980a2a844d51f78ebe55ecf5c828a9120ff776665680dcb2598a05696bc9cd2
homepage   : https://docs.xfce.org/xfce/xfce4-power-manager/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : Power Manager for Xfce.
description: |
    Power Manager for Xfce.
builddeps  :
    - pkgconfig(libnotify)
    - pkgconfig(libxfce4panel-2.0)
    - pkgconfig(libxfce4ui-2)
    - pkgconfig(upower-glib)
setup      : |
    %patch -p1 -i $pkgfiles/0001-data-appdata-Add-launchable-desktop-id-tag-for-appst.patch
    %configure \
        --enable-polkit \
        --disable-debug \
        --sysconfdir=/usr/share
build      : |
    %make
install    : |
    %make_install
