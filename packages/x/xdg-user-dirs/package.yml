# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : xdg-user-dirs
version    : '0.20'
release    : 14
source     :
    - https://gitlab.freedesktop.org/xdg/xdg-user-dirs/-/archive/v0.20/xdg-user-dirs-v0.20.tar.gz : 988d3f3274cb2b69796ace22ddbb0abfc2c0157fff65258045f055cfba024d6e
homepage   : https://www.freedesktop.org/wiki/Software/xdg-user-dirs/
component  : desktop.core
license    :
    - GPL-2.0-only
summary    : Tool to manage well known user directories
description: |
    xdg-user-dirs is a tool to help manage "well known" user directories like the desktop folder and the music folder. It also handles localization (i.e. translation) of the filenames.
builddeps  :
    - docbook-xml
    - gettext-devel
setup      : |
    %patch -p1 -i $pkgfiles/0001-Convert-to-a-stateless-configuration.patch

    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING

    install -Dm00644 -t ${installdir}/%libdir%/systemd/user-preset/ ${pkgfiles}/20-xdg-user-dirs.preset
