name       : xfdesktop
version    : 4.19.6
release    : 4
source     :
    - https://archive.xfce.org/xfce/4.20pre1/src/xfdesktop-4.19.6.tar.bz2 : d52026c9e45fc669c4f373cf10b1f218327e818bb71f1eae3d1d10d9ec13c3a6
homepage   : https://docs.xfce.org/xfce/xfdesktop/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : Xfce's desktop manager.
description: |
    Xfce's desktop manager.
builddeps  :
    - pkgconfig(exo-2)
    - pkgconfig(gtk-layer-shell-0)
    - pkgconfig(libnotify)
    - pkgconfig(libwnck-3.0)
    - pkgconfig(libxfce4ui-2)
    - pkgconfig(libxfce4windowing-0)
    - pkgconfig(libxfconf-0)
    - pkgconfig(thunarx-3)
    - pkgconfig(yaml-0.1)
setup      : |
    %patch -p1 -i $pkgfiles/169.patch
    %configure \
        --enable-thunarx \
        --enable-notifications \
        --disable-debug \
        --disable-desktop-menu \
        --with-default-backdrop-filename="/usr/share/backgrounds/solus/LakeSideView.jpg"
build      : |
    %make
install    : |
    %make_install
