name       : xfce4-settings
version    : 4.19.3
release    : 10
source     :
    - https://archive.xfce.org/xfce/4.20pre1/src/xfce4-settings-4.19.3.tar.bz2 : 30c2659a266240b6d2950bf2cf7ab86b70372e127cd092385693c26fb928aa43
homepage   : https://docs.xfce.org/xfce/xfce4-settings/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : Xfce's Configuration System.
description: |
    Xfce's Configuration System.
builddeps  :
    - pkgconfig(exo-2)
    - pkgconfig(garcon-gtk3-1)
    - pkgconfig(libxfce4ui-2)
    - pkgconfig(libxfconf-0)
    - pkgconfig(libxklavier)
    - pkgconfig(xi)
    - pkgconfig(xrandr)
setup      : |
    %patch -p1 -i $pkgfiles/0001-Use-Solus-defaults.patch

    %configure \
        --enable-xrandr \
        --enable-xcursor \
        --enable-libnotify \
        --enable-libxklavier \
        --enable-pluggable-dialogs \
        --enable-sound-settings \
        --disable-debug \
        --sysconfdir=/usr/share
build      : |
    %make
install    : |
    %make_install
