# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : xrt
version    : 2.21.75
release    : 2
source     :
    - https://github.com/Xilinx/XRT/releases/download/2.21.75/2.21.75.tar.gz : 30343a3c74103ac5d5016525d6f051601b197855c54e980f8d6623bfc6f3d229
homepage   : https://xilinx.github.io/XRT/
license    : Apache-2.0
component  : programming.library
summary    : Runtime for AMD's AIE and FPGA based platforms 
description: |
    FleXible RunTime (XRT) is a combination of user-space and kernel driver components. It provides an abstracted runtime software interface for AMD NPUs and AMD FPGAs, enabling seamless access across AMD Ryzen™ client, AMD Ryzen™ Embedded, AMD Versal™ Adaptive SoCs, AMD Alveo™ Adaptable Accelerator Cards, and AMD Zynq™ UltraScale+™ MPSoCs.
builddeps  :
    - pkgconfig(OpenCL)
    - pkgconfig(RapidJSON)
    - pkgconfig(libdrm)
    - pkgconfig(protobuf)
    - pkgconfig(pybind11)
    - pkgconfig(python3)
    - libboost-devel
setup      : |
    # Install to Solus's OpenCL vendor directory
    sed -i 's|set(OCL_ICD_INSTALL_PREFIX "/etc/OpenCL/vendors")|set(OCL_ICD_INSTALL_PREFIX "/usr/share/OpenCL/vendors")|' xrt/XRT/src/CMake/icd.cmake

    # Install licenses and documentation adhereing to FHS
    sed -i 's|DESTINATION ${XRT_INSTALL_DIR}/license|DESTINATION ${CMAKE_INSTALL_DATADIR}/licenses/xrt|' xrt/XRT/src/CMake/nativeLnx.cmake
    sed -i 's|DESTINATION ${XRT_INSTALL_DIR}/share/doc|DESTINATION ${CMAKE_INSTALL_DATADIR}/docs/xrt|' xrt/XRT/src/CMake/changelog.cmake

    # Skip spec/doc generation targets that require wget and network access
    sed -i 's|add_subdirectory(specification)||' xrt/XRT/src/runtime_src/core/common/aiebu/CMakeLists.txt

    %cmake_ninja -L \
      -DXRT_NPU=ON
build      : |
    %ninja_build
install    : |
    %ninja_install

    # Upstream additionally copies libraries installed in /usr/lib64 to
    # /bins/lib64 for conveinent testing
    # ```cmake
    # set(XDNA_BIN_DIR      /bins) # For saving all built artifacts for quick testing
    # ```
    rm -rf $installdir/bins

    # Grepped the source code and not being used by any libraries, just for
    # some build-time setup.
    rm -r $installdir/usr/version.json

    # Completion is totally broken, wait for upstream fix. Not important since
    # the autocompletions are actually for `xrt-smi` (yes even the completion
    # scripts' names are wrong) which very few options and sub-commands.
    rm -r $installdir/usr/share/completions

    %install_license xrt/XRT/LICENSE
