name       : xfwm4
version    : 4.19.0
release    : 3
source     :
    - https://archive.xfce.org/xfce/4.20pre1/src/xfwm4-4.19.0.tar.bz2 : 73546c60c348bcbe088fd990f7d5d1d6a6eca4226f956c109d3655c00583b9cf
homepage   : https://docs.xfce.org/xfce/xfwm4/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : Xfce's window manager.
description: |
    Xfce's window manager.
builddeps  :
    - pkgconfig(libwnck-3.0)
    - pkgconfig(libxfce4ui-2)
    - pkgconfig(libxfconf-0)
    - pkgconfig(xpresent)
setup      : |
    %configure --enable-startup-notification --enable-randr --enable-compositor --enable-xsync --disable-debug
build      : |
    %make
install    : |
    %make_install
