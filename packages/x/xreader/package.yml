# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : xreader
version    : 4.6.5
release    : 9
source     :
    - https://github.com/linuxmint/xreader/archive/refs/tags/4.6.5.tar.gz : 502e069c9f20861544067433ec81a3859c9453b931b58f38e5e442381dc39528
homepage   : https://github.com/linuxmint/xreader
license    : GPL-2.0-or-later
component  : office.viewers
summary    : A generic Document Reader
description: |
    Xreader is a document viewer capable of displaying multiple and single page document formats like PDF and Postscript.
builddeps  :
    - pkgconfig(ddjvuapi)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libgnomekbdui)
    - pkgconfig(libgxps)
    - pkgconfig(libsecret-1)
    - pkgconfig(libspectre)
    - pkgconfig(libtiff-4)
    - pkgconfig(libxml-2.0)
    - pkgconfig(poppler-glib)
    - pkgconfig(sm)
    - pkgconfig(webkit2gtk-4.1)
    - pkgconfig(xapp)
    - pkgconfig(xkbfile)
    - pkgconfig(zlib)
    - itstool
    - mathjax2
    - yelp-tools
rundeps    :
    - xapp-symbolic-icons
setup      : |
    %meson_configure \
        -Ddjvu=true \
        -Dpixbuf=true \
        -Dcomics=true \
        -Dintrospection=true \
        -Dhelp_files=true \
        -Dmathjax-directory=/usr/share/mathjax2
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
