# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : atkmm
version    : 2.28.5
release    : 21
source     :
    - https://download.gnome.org/sources/atkmm/2.28/atkmm-2.28.5.tar.xz : ae449192a582a2582a95e0602b15d792bbd639e836339b81ef916aa87540ac5c
homepage   : https://gitlab.gnome.org/GNOME/atkmm
license    : LGPL-2.1-only
component  : desktop.gtk
summary    : C++ bindings to atk
description: |
    C++ bindings to atk
builddeps  :
    - pkgconfig(glibmm-2.4)
    - pkgconfig(sigc++-2.0)
    - at-spi2-devel
patterns   :
    - devel :
        - /usr/lib64/atkmm-1.6
replaces   :
    - libatkmm
    - devel : libatkmm-devel
setup      : |
    %meson_configure -Dbuild-documentation='false'
build      : |
    %ninja_build
install    : |
    %ninja_install
