# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : audacious
version    : 4.6.1
release    : 44
source     :
    - https://distfiles.audacious-media-player.org/audacious-4.6.1.tar.bz2 : 62a5a609267eca7f6e3ce52ef6f42d5618d2961e3b4ddc227c6a5859026965d9
homepage   : https://audacious-media-player.org/
license    : GPL-3.0-or-later
component  :
    - multimedia.audio
    - libs : multimedia.library
    - libs-devel : programming.devel
summary    :
    - Audacious is an open source audio player
    - libs : Library files for Audacious
    - libs-devel : Development files for audacious-libs
description: |
    Audacious is an open source audio player. A descendant of XMMS, Audacious plays your music how you want it, without stealing away your computer’s resources from other tasks.
optimize   : lto
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Gui)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(libarchive)
rundeps    :
    - audacious-plugins
    - libs-devel :
        - audacious-libs
setup      : |
    %meson_configure \
        -Dbuildstamp="Solus package" \
        -Dgtk=true \
        -Dlibarchive=true
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
patterns   :
    - libs-devel :
        - /usr/include
        - /usr/lib64/lib*.so
        - /usr/lib64/pkgconfig
    - libs :
        - /usr/lib64/lib*.so.*
replaces   :
    - libs-devel : audacious-devel
