# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : adw-gtk3-theme
version    : '6.5'
release    : 22
source     :
    - https://github.com/lassekongo83/adw-gtk3/archive/refs/tags/v6.5.tar.gz : fc9fc3b3e89d90d9a0e38bae05445ce9e65faf47acea3ac658e5f42566def473
    - https://github.com/sass/dart-sass/releases/download/1.99.0/dart-sass-1.99.0-linux-x64.tar.gz#sass.tar.gz : f0a32ab99bc0a1eb62ea7140a056a1bca82d534390b7c3dba4f2016eb0077753
license    : LGPL-2.1-only
homepage   : https://github.com/lassekongo83/adw-gtk3
component  : desktop.theme
summary    : An unofficial GTK3 port of libadwaita
description: |
    An unofficial GTK3 port of libadwaita
builddeps  :
    - gnome-themes-extra
rundeps    :
    - gnome-themes-extra
environment: |
    export PATH="$PATH:$sources/dart-sass"
setup      : |
    tar -xvf $sources/sass.tar.gz -C $sources/
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install

    # Symlink adwaita gtk2 theme so we have _some_ gtk2 theming
    ln -sv /usr/share/themes/Adwaita/gtk-2.0/ $installdir/usr/share/themes/adw-gtk3/
    ln -sv /usr/share/themes/Adwaita-dark/gtk-2.0/ $installdir/usr/share/themes/adw-gtk3-dark/
    %install_license LICENSE
