# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ack
version    : 3.10.0
release    : 23
source     :
    - https://github.com/beyondgrep/ack3/archive/refs/tags/v3.10.0.tar.gz : ef1df66e8bd5cee004473231423cf2033450b8f2955f2020628361ff80a5675e
homepage   : https://beyondgrep.com/
license    : Artistic-2.0
component  : system.utils
summary    : ack is a grep-like search tool optimized for source code
description: |
    ack is a code-searching tool, similar to grep but optimized for programmers searching large trees of source code. It is highly portable and runs on any platform that runs Perl.
rundeps    :
    - perl-file-next
setup      : |
    %perl_setup
build      : |
    %perl_build
install    : |
    %perl_install
    %install_license LICENSE.md
