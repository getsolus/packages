# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ansible
version    : 2.21.0
release    : 70
source     :
    - https://github.com/ansible/ansible/archive/refs/tags/v2.21.0.tar.gz : edabd2768625a0b5a0695b87c060596a16578d2d9c82c9e470f277da65b8f669
license    : GPL-3.0-or-later
homepage   : https://www.ansible.com/
component  : system.utils
summary    : Ansible is a radically simple IT automation system
description: |
    Ansible is a radically simple IT automation system
builddeps  :
    - pkgconfig(python3)
    - asciidoc
    - python-build
    - python-docutils
    - python-installer
    - python-jinja
    - python-setuptools
    - python-wheel
rundeps    :
    - python-jinja
    - python-jmespath
    - python-paramiko
    - python-resolvelib
    - pyyaml
build      : |
    %python3_setup
install    : |
    %python3_install
    %install_license COPYING
