# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ark
version    : 26.04.3
release    : 110
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/ark-26.04.3.tar.xz : 8018fec69668aac35e5ab7ce4e51ce04de6ab7f56a3996322b016f41c31d5a01
homepage   : https://kde.org/applications/utilities/org.kde.ark
license    :
    - BSD-2-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-3.0-only
    - MIT
component  : desktop.kde.core
summary    : A graphical file compression/decompression utility
description: |
    Ark is a graphical file compression/decompression utility with support for multiple formats, including tar, gzip, bzip2, rar and zip, as well as CD-ROM images.
builddeps  :
    - pkgconfig(libarchive)
    - pkgconfig(libzip)
    - 7zip
    - breeze-icons-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kf6-kfilemetadata-devel
    - kf6-kiconthemes-devel
    - kf6-kparts-devel
    - kf6-kpty-devel
    - lrzip
    - unrar
rundeps    :
    - 7zip
    - lrzip
    - unrar
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove docs
    rm -rf $installdir/usr/share/doc
