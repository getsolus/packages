# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : alsa-utils
version    : 1.2.15.2
release    : 30
source     :
    - https://www.alsa-project.org/files/pub/utils/alsa-utils-1.2.15.2.tar.bz2 : 7aaaafbfb01942113ec0c31e51f705910e81079205088ca2f8f137a3869e1a3a
homepage   : https://www.alsa-project.org
license    : GPL-2.0-or-later
component  : multimedia.audio
summary    : Various utilities which are useful for controlling your sound card
description: |
    Various utilities which are useful for controlling your sound card
builddeps  :
    - pkgconfig(alsa)
setup      : |
    %configure --disable-alsaconf \
               --disable-xmlto \
               --with-udev-rules-dir=/usr/lib/udev/rules.d
build      : |
    %make
install    : |
    %make_install
    rmdir $installdir/usr/share/man/man7
    %install_license COPYING
