# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : akregator
version    : 26.04.3
release    : 99
source     :
    - https://download.kde.org/stable/release-service/26.04.3/src/akregator-26.04.3.tar.xz : c59d7d6899e34b1a9c58089cd139838a7be22e358ff036532c8700871c182910
homepage   : https://kde.org/applications/internet/org.kde.akregator
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - MIT
component  : network.news
summary    : RSS Feed Reader
description: |
    Akregator is a news feed reader for the KDE desktop. It enables you to follow news sites, blogs and other RSS/Atom-enabled websites without the need to manually check for updates using a web browser. Akregator is designed to be both easy to use and to be powerful enough to read hundreds of news sources conveniently.
builddeps  :
    - pkgconfig(Qt6WebEngineCore)
    - kf6-kcmutils-devel
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-knotifications-devel
    - kf6-knotifyconfig-devel
    - kf6-kparts-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-ktexttemplate-devel
    - kf6-kuserfeedback-devel
    - kf6-syndication-devel
    - kontactinterface-devel
    - ktextaddons-devel
    - libkdepim-devel
    - messagelib-devel
    - pimcommon-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*

    # remove doc
    rm -rfv $installdir/usr/share/doc
