# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : aurorae
version    : 6.7.2
release    : 16
source     :
    - https://download.kde.org/stable/plasma/6.7.2/aurorae-6.7.2.tar.xz : 6d648b5fb2098ab3feeb64fa5467ba0205ef41730c0887e373cdf5be70f3ce96
homepage   : https://kde.org/plasma-desktop/
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - MIT
component  : programming.library
summary    : Themable window decorations for KWin
description: |
    Themable window decorations for KWin
builddeps  :
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6UiTools)
    - extra-cmake-modules
    - kdecoration-devel
    - kf6-kcmutils-devel
    - kf6-kcolorscheme-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-knewstuff-devel
    - kf6-kpackage-devel
    - kf6-ksvg-devel
rundeps    :
    - kf6-ksvg
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
