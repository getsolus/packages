# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : aerc
version    : 0.21.0
release    : 3
source     :
    - https://git.sr.ht/~rjarry/aerc/archive/0.21.0.tar.gz : 3f1469bbaea982fc58352f2682932ecc2fb50c705994d96b2343e771747745a7
homepage   : https://aerc-mail.org
license    : MIT
component  : network.mail
summary    : An email client for your terminal.
description: |
    aerc is an email client that runs in your terminal. It's highly efficient and extensible, perfect for the discerning hacker.
networking : true
builddeps  :
    - golang
    - scdoc
build      : |
    %make
install    : |
    %make_install PREFIX=/usr
    %install_license LICENSE
