# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : android-tools
version    : 35.0.2
release    : 28
source     :
    - https://github.com/nmeum/android-tools/releases/download/35.0.2/android-tools-35.0.2.tar.xz : d2c3222280315f36d8bfa5c02d7632b47e365bfe2e77e99a3564fb6576f04097
    - https://github.com/M0Rf30/android-udev-rules/archive/refs/tags/20250525.tar.gz#android-udev-rules.tar.gz : 582bf8daa23f318047e77ece4c101c8696fd9151c459f695dca56cf4a40a72a2
license    :
    - Apache-2.0
    - GPL-3.0-or-later
homepage   : https://developer.android.com/studio/releases/platform-tools
summary    : Android development tools (adb and fastboot)
component  : programming.tools
description: |
    Android development tools, this includes adb (android debug bridge) and fastboot (diagnostic protocol for androids fastboot bootloader)
clang      : true
networking : true
fatfakeroot: true
builddeps  :
    - pkgconfig(fmt)
    - pkgconfig(libbrotlicommon)
    - pkgconfig(liblz4)
    - pkgconfig(libpcre2-8)
    - pkgconfig(libselinux)
    - pkgconfig(libsepol)
    - pkgconfig(libusb-1.0)
    - pkgconfig(libzstd)
    - pkgconfig(protobuf)
    - golang
setup      : |
    rm -rf vendor/selinux

    %patch -p1 -i $pkgfiles/android-tools-35.0.2-use-system-selinux.patch
    %patch -p1 -d "vendor/extras" -i $pkgfiles/android-tools-35.0.2-fix-protobuf-30.0-compilation.patch

    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install

    mkdir android-udev-rules
    tar --strip-components=1 -xf $sources/android-udev-rules.tar.gz -C android-udev-rules
    install -Dm00755 android-udev-rules/51-android.rules $installdir/usr/lib/udev/rules.d/51-android.rules

    %install_license LICENSE
    install -Dm00644 android-udev-rules/LICENSE $installdir/usr/share/licenses/android-udev-rules/LICENSE
