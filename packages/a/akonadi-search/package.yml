# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : akonadi-search
version    : 26.04.1
release    : 102
source     :
    - https://download.kde.org/stable/release-service/26.04.1/src/akonadi-search-26.04.1.tar.xz : 2a3a40284faeb61c2d2f1b09ecc80c1844e498115ad8bccc1729431141b95e3f
homepage   : https://kde.org/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.library
summary    : Libraries and daemons to implement searching in Akonadi
description: |
    Libraries and daemons to implement searching in Akonadi.
networking : true
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - pkgconfig(xapian-core)
    - akonadi-mime-devel
    - corrosion
    - kf6-kcmutils-devel
    - kf6-kcontacts-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kio-devel
    - kf6-krunner-devel
    - ktextaddons-devel
rundeps    :
    - devel :
        - akonadi-devel
        - akonadi-mime-devel
        - kf6-kcalendarcore-devel
        - kf6-kcontacts-devel
        - kf6-kcoreaddons-devel
        - kmime-devel
        - qt6-base-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
