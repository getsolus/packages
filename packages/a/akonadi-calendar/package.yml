# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : akonadi-calendar
version    : 26.04.2
release    : 103
source     :
    - https://download.kde.org/stable/release-service/26.04.2/src/akonadi-calendar-26.04.2.tar.xz : 8300ea894acdbdd7496feff870ecfdd368687104a3442ed82abef09f58e774fa
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
component  : desktop.library
summary    : Library that effectively bridges the type-agnostic API of the Akonadi client libraries and the domain-specific KCalCore library
description: |
    Akonadi Calendar is a library that effectively bridges the type-agnostic API of the Akonadi client libraries and the domain-specific KCalCore library. It provides jobs, models and other helpers to make working with events and calendars through Akonadi easier.
builddeps  :
    - pkgconfig(KF6CalendarCore)
    - akonadi-contacts-devel
    - akonadi-mime-devel
    - kcalutils-devel
    - kf6-kdbusaddons-devel
    - kf6-kio-devel
    - kf6-knotifications-devel
    - kf6-kxmlgui-devel
    - kidentitymanagement-devel
    - kmailtransport-devel
    - libkleo-devel
    - messagelib-devel
rundeps    :
    - devel :
        - akonadi-devel
        - kf6-kcalendarcore-devel
        - kf6-ki18n-devel
        - kf6-kwidgetsaddons-devel
        - kidentitymanagement-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
