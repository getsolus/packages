# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : antimicrox
version    : 3.6.1
release    : 15
source     :
    - https://github.com/AntiMicroX/antimicrox/archive/refs/tags/3.6.1.tar.gz : badaae3c472e07f8df1d85a5ed32c48394b25c75f0a9892ac3fe7e4db3098a91
homepage   : https://github.com/AntiMicroX/antimicrox
license    : GPL-3.0-or-later
component  : games
summary    : antimicro is a graphical program used to map keyboard keys and mouse controls to a gamepad
description: |
    antimicro is a graphical program used to map keyboard keys and mouse controls to a gamepad
builddeps  :
    - pkgconfig(Qt6Linguist)
    - pkgconfig(sdl2)
    - pkgconfig(xtst)
    - extra-cmake-modules
    - itstool
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_ninja -DUSE_QT6_BY_DEFAULT=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm $installdir/usr/share/antimicrox/CHANGELOG.md
    rm -r $installdir/usr/share/doc
    %install_license LICENSE
