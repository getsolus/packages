# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : aerion
version    : 0.2.3
release    : 1
source     :
    - https://github.com/hkdb/aerion/archive/refs/tags/v0.2.3.tar.gz : 54d40a98c2a18ab29daca3799b453b053e12e55236f98dd20e735410318aafec
homepage   : https://aerion.3df.io/
license    : Apache-2.0
component  : network.mail
summary    : Lightweight open-source email client
description: |
    Aerion is a modern, lightweight email client inspired by Geary, focused on
    resource efficiency and a clean user experience. It supports Gmail, Outlook,
    Microsoft 365, and generic IMAP/SMTP, with conversation threading, rich text
    composition, contact sync, PGP/S/MIME, and multiple color themes.
networking : true
builddeps  :
    - pkgconfig(glib-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(webkit2gtk-4.1)
    - golang
    - nodejs
environment: |
    export CGO_ENABLED=1
    export CGO_CFLAGS="${CFLAGS}"
    export CGO_CXXFLAGS="${CXXFLAGS}"
    export CGO_LDFLAGS="${LDFLAGS}"
    export GOFLAGS="-buildmode=pie -trimpath -mod=readonly -modcacherw"
setup      : |
    go mod download -x
build      : |
    pushd frontend
    npm install
    npm run build
    popd

    go build -tags desktop,webkit2_41,production -ldflags "-w -s -linkmode=external" -o aerion .
install    : |
    install -Dm00755 aerion ${installdir}/usr/bin/aerion
    install -Dm00644 build/appicon.png ${installdir}/usr/share/icons/hicolor/256x256/apps/io.github.hkdb.Aerion.png
    install -Dm00644 build/linux/aerion.desktop ${installdir}/usr/share/applications/io.github.hkdb.Aerion.desktop

    install -Dm00644 build/flatpak/io.github.hkdb.Aerion.metainfo.xml -t ${installdir}/usr/share/metainfo
    %install_license LICENSE
